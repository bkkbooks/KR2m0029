body:
  text: 頖宫禮樂疏卷一明李之藻撰歴代褒崇疏古者先聖先師祀典不一四時常奠皆祭先師惟始立學及天子視學乃祭先聖四代之學所稱先聖者舜禹湯文也稱先師者當時左右四聖成其徳業者也漢儒所傳第謂立學釋奠未指先聖先師為誰唐初周公孔子互為先聖顯慶後専聖孔子維時所云先師悉傳經之師髙堂伏生制氏毛公之流也原本學無常師稱聖廼至生民以来未有夫子稱曰至聖先師禮崇義至雖王公衮冕寧足益其褒尊至於郡縣學校之祠實始永平辟雍專廟始於武徳州縣學皆立廟始於貞觀前此不過脩其林廟即魏之齊王芳晉之孝武帝臨雍執鬯亦不過掃壇張幕一修爼豆之觀而止其諸牢醴器幣典故無可徴者大抵歴代尊崇儀文以漸而備然禮多意起師古尚疎胥名釋奠抑亦存崇文之雅意云爾漢髙皇帝十二年自淮南還過魯以太牢祀孔子太牢重祀也不事詩書之主識展禮焉嗣是者除挾書律表章六經文教漸興傳經之儒兩漢為盛則貽謀亦有自矣漢祚所以靈長也元帝初元中令太師褒成君覇以食邑八百戸祀孔子按孔子子孫封爵奉祀始此先是戰國魏封八代謙為文信君錄賢爾非奉祀也髙帝封九代騰為奉祀君未有食邑至是始以闗内侯専奉祀其子福孫房皆嗣侯後至平帝進褒成侯和帝改褒亭侯魏曰宗聖晉曰奉聖宋及北魏曰崇聖北齊曰恭聖後周進鄒國公隋曰文宣曰紹聖唐曰褒聖宋仁宗乃改衍聖哲宗仍稱奉聖崇寧以迄金元皆稱衍聖至今因焉所封皆大宗子職主蒸嘗睦宗族不涉吏事其擇賢族俾吏於鄉也自漢桓帝元嘉錄十八代澍為魯從事始唐開元詔每代賜一子官宋初擇一人知曲阜縣英宗治平中言者乞慎重長吏詔停用後復承襲然吏治漸媮萬厯初年乃令三載入覲黜陟如流官焉大程敏政聖裔考曰先聖之後凡嗣爵奉祀者謂之宗子宗法在禮不可不慎重而考諸史籍則因襲之間尚有可議盖自先聖一傳為泗水侯再𫝊為沂國公沂國五𫝊生斌史記作順一名謙仕衛以孔子後封魯國文信君其聖裔之受封始此順生三子長曰鮒秦封魯國文通君又為陳王博士次曰騰為漢長沙王太傅次曰澍而鮒騰之後分為兩宗鮒六世生何齊成帝時梅福上書言孔子殷人宜封其後以奉湯祀遂封何齊為殷紹嘉侯尋進爵為公地滿百里此一宗也騰四世生覇元帝時賜號褒成君奉孔子祀此一宗也然則紹嘉公乃大宗褒成君乃小宗何齊生安光武時嗣爵又進封宋公為漢賔位諸侯上覇三世生均平帝元始初進封褒成侯均再世生損和帝永光中徙封褒亭侯至獻帝初國絶盖兩宗至于漢亡俱失傳矣魏文帝黄初中復求先聖之後得議郎羡賜爵宗聖侯傳再世生震晉武帝泰始初改封奉聖亭侯震再世生懿随元帝南渡居㑹稽孔氏自此復分南北兩宗懿生鮮宋文帝元嘉八年以罪奪爵十九年以隠之嗣隠之復以子不道失爵二十八年以恵雲嗣又以重疾失爵孝武大明二年以邁嗣邁傳其子拲亦以罪失爵此南宗也後魏時求先聖之後得二十七世孫乗以為崇聖大夫孝文時改封其子靈珍為崇聖侯靈珍三世生渠北齊文宣帝改封恭聖侯入後周宣帝進封鄒國公渠再世生嗣悊隋煬帝時改封紹聖侯此北宗也然則從元帝南渡者為大宗受北魏所封者為小宗南北兩宗至于隋亡又并失傳矣唐太宗貞觀十一年始得先聖之後徳倫賜爵褒聖侯徳倫再世生璲之𤣥宗開元中進封文宣公傳七世生光遭五季之亂失爵為泗水令有灑掃戸孔末欲冒襲封盡殺諸孔氏光妻生子仁玉方九月遂秘養之後周時乃得嗣爵入宋而卒至太平興國中復召仁玉之子宜嗣封宜再世生聖佑無子以弟宗愿嗣仁宗嘉祐中以祖諡不可加後人改封衍聖公宗愿傳若蒙哲宗元祐初改封奉聖公若蒙坐事廢弟若虚嗣復為衍聖公若虚傳若蒙子端友從髙宗南渡居衢州孔子自此又分南北兩宗端友傳四世生洙以宋亡失爵此南宗也偽齊劉豫自濟南僭位得先聖四十九代孫璠賜爵衍聖公豫廢金因之璠三𫝊生元措金末崔立作亂降元遂并執元措以去此北宗也然則從髙宗南渡者為大宗受劉豫所封者為小宗矣元措入元而卒乃召洙俾嗣爵固譲歸衢州仁宗延祐四年召中書定議先聖五十三世孫當嗣封者遂得元措宗人思晦以聞思晦受爵以卒因子貴追封魯郡公盖今之為大宗子者皆思晦之後矣夫宗禮先王之所制盖以制天下之大倫而絶爭端者也先聖定禮樂以為萬世法而况其後人奉世祀可不慎乎夫以魏晉之初其所封者史記不載其世次而凡在北宗者又皆出于一時之訪求乃以之當大宗子之責亦異乎先聖之禮矣必不得已則南宗猶為近之盖南宗出於當時嗣爵之人而北宗出其踈且逺者或乃以去宗國為南宗之罪以守林廟為北宗之賢則又有大不然者焉以史考之凡出于北宗者實皆逃難四出流落民間非真有仗義守禮之心効死而不去者也然則取此去彼又豈大公至正之道哉矧北宗祖璠始受逆豫之命所謂因襲之間尚有可議者凡以此而已作聖裔考平帝元始元年六月追諡孔子曰褒成宣尼公改封孔均為褒成侯食邑二千戸梅福上書曰仲尼之廟不出闕里孔氏子孫不免編戸以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天無極何者以聖人之素功封其子孫未有法也後世必以為則不滅之名可不勉哉檀藻按此後世尊崇孔子之始亦孔子諡宣之始也弓魯哀公誄孔子曰天不遺耆老莫相予位焉嗚呼哀哉尼父鄭𤣥曰尼父者因其字以為之諡也夫尼父豈可言諡其諡也盖自宣尼始也然宣者聖善周聞之謂寧足盡吾夫子此王莽假善收譽聖人在天之靈未必受耳光武皇帝建武五年幸魯遣大司空以太牢祠孔子十月還宫幸太學明帝永平二年躬養三老五更於辟雍令郡縣道行鄉飲酒禮於學校皆祀聖師周公孔子藻按嬴秦滅學之後至漢武帝時始有太學至北魏獻文帝時始有郡縣學此稱郡縣道學校者盖武帝雖未備設學校而天下郡國已立學校官故禮祀以漸修舉十五年東巡至魯詣孔子宅廟以太牢致祀及七十二弟子親御講堂命太子諸王說經按後世祀孔子弟子始此章帝元和二年過魯幸闕里祠孔子作六代之樂大㑹孔氏命儒者講論語帝升廟西面羣臣中庭北面皆再拜帝進爵而後坐大㑹孔氏男子六十三人命儒者論難賜褒成侯損等錢帛大藻按祠孔子用樂始此作六代樂即古成均之教合樂也至梁武帝始謂祭日不宜徧舞六代樂罷之安帝延光三年三月戊戌幸太學如元和禮和帝永光四年封孔子為褒尊侯桓帝元嘉二年詔孔子廟置百石卒史一人掌領禮器春秋饗禮出王家錢給大酒直河南尹給牛羊豕各一大司農給米司徒吳雄等言褒成侯四時來祠事已即去廟有禮器無常人掌領請置百石卒史一人典主守禮故事辟雍祠先聖太宰太祝各一人備爵太常丞監祠河南尹給牛羊豖大司農給米制曰可按此畧存漢祠孔子之禮靈帝建寜三年詔祀孔子依社稷出王家穀春秋行禮按此春秋二祭之始光和元年始置鴻都門學畫先聖及七十二弟子像按漢以後辟雍外置學始此魏主丕黄初二年詔魯􅇿修孔子廟封孔羨為宗聖侯奉祀詔曰昔仲尼負大聖之才懷帝王之器當衰周之末無受命之運敎化乎洙泗之上於是王公莫能用之乃退考五代之禮修素王之事因魯史而制春秋就太師而正雅頌千載之後莫不宗其文以述作仰其聖以成謀真可謂命世之大聖億載之師表者也遭天下大亂百祀墮壞舊居之廟毁而不修褒成之後絶而莫繼闕里不聞講頌之聲四時不覩烝嘗之位斯豈所謂崇禮報功盛徳百世必祀者哉其以議郎孔羨為宗聖侯邑百戸奉孔子祀令魯􅇿修起舊廟置百戸吏卒以守衞之又於其外廣為室屋以居學者魏主芳正始七年令太常釋奠以太牢祀孔子于辟雍以顔淵配按釋奠及顔淵配皆始此講論語通也五年尚書通七年禮記通亦如之前此第祠闕里至是始行於太學云晉武帝泰始二年詔太學及魯國四時以三牲祀孔子及七十二弟子七年皇太子親釋奠于太學講孝經通也按此太子釋奠之始自是咸寜三年講詩通太康三年講禮記通太子並親釋奠以顔子配恵帝元康二年春皇太子講論語通釋奠于太學潘尼上釋奠頌曰掃壇為殿張幕為宫夫子位于西序顔回侍于北墉宗伯掌禮司儀辨位元帝太興二年皇太子講論語通釋奠成帝咸康元年二月甲子帝講詩通親釋奠穆帝升平元年三月壬申帝講孝經通釋奠于中堂孝武帝寜康三年二月癸巳帝講孝經通釋奠于中堂時議以大學在水南懸逺依穆帝故事於中堂權立大學藻按古者明堂辟雍大學太廟合為一所以朝以祭以饗以射見蔡邕說至東漢始别辟雍為天子養老大射行禮之所太學為博士弟子授受之所而晉因之宋文帝元嘉十九年十二月丙申建孔子廟祀置守墳戸詔曰冑子始集學業方興自微言泯絶逝將千載感事思人意有慨然奉聖之𦙍可速議襲於先廟地特為營建依舊給祠宜令四時饗祀闕里往經冦亂黌學殘毁并下魯􅇿復修學舍採召生徒昔之賢哲及一介之善猶或衛其土壠禁其芻牧况尼父徳表生民功被百代而墳塋荒蕪荆棘弗剪可蠲墓側數戸以掌灑掃魯􅇿士民孔景等五戸居近孔子墓側蠲其課役以給灑掃并栽種松栢六百株二十二年皇太子釋奠舞六佾設軒懸之樂牲牢器用悉如上公從裴松之之議也按釋奠用六佾軒懸始此武帝孝建元年詔建孔子廟制同諸侯禮詔曰仲尼體天降徳繼周興漢經緯三極冠冕百王爰自前代咸加褒述典司失人因闕宗祀先朝逺存遺範有詔繕立世故妨道事未克就國難頻深忠勇奮厲實憑聖義大敎所敦永惟兼懷無忘待旦可開建廟制同諸侯之禮詳擇爽塏後給祭秩齊武帝永明三年正月詔立學是年秋集有司議禮冬十月皇太子講孝經親臨釋奠車駕幸聽尚書令王儉議周禮春入學舍菜合舞祭法云始敎皮弁祭菜示敬道也又云始入學必祭先聖先師中朝以來釋菜禮廢今之所行釋奠而已金石爼豆皆無明文陸納車𦙍謂宣尼廟宜依亭侯之爵范甯欲依周公之廟用王者儀范宣謂當其為師則不臣之釋奠日備帝王禮樂車陸失於過輕二范傷于太重引周上公即事惟允元嘉立學裴松之議應舞六佾以郊樂未具權奏登歌今金石已備宜設軒懸之樂六佾之舞牲牢器用悉依上公七年詔修闕里封孔子後詔曰宣尼誕敷文徳峻極自天發揮七代陶鈞萬品英風獨舉素王誰匹功隱于當年道深于日月感麟厭世􅃡邈千祀川竭谷虚陵夷淵塞非但洙泗湮淪至乃饗嘗乏主前王敬仰崇修寢廟嵗月亟流鞠為茂草今學校興立實禀洪規撫事懷人彌増欽屬可改築宗祊務在爽塏量給祭秩禮同諸侯奉聖之爵以時繼紹明帝永泰元年三月詔復孔子祭秩詔曰仲尼明聖在躬允光上哲𢎞厥雅道大訓生民師範百王軌儀千載世人斯仰忠孝攸出𤣥功潛被至徳彌闡雖反袂遐曠而祧薦靡缺時祭舊品秩比諸侯頃嵗以來祀典陵替爼豆寂寥牲奠莫舉豈所以克昭大烈永隆風敎者哉可式循舊典詳復祭秩使牢餼備禮欽饗兼申梁武帝天監四年六月初立孔子廟于江左八年九月皇太子釋奠大同七年皇太子釋奠國學表其子寜國臨城公入學臣纉等以為參㸃回路並事宣父洙汶無譏制可時樂府無孔顔登歌令杜之偉製文敬帝太平二年訪孔子後修廟堂備四時祭詔曰夫子降靈體喆經仁緯義允克素王載闡𤣥功仰之者彌髙誨之者不倦立忠立孝徳被蒸民制禮作樂道冠羣后雖泰山極峻一簣不遺而泗水餘瀾千載猶在自國圖屯阻祧薦不修奉聖之門𦙍嗣殱滅敬神之寢簠簋寂廖永言聲烈實兼欽愴可搜舉魯國之族以為奉聖之後并修繕廟堂祇備祀典四時薦秩一皆遵其舊陳宣帝泰建三年八月辛丑皇太子釋奠于太學後主至徳三年親行釋奠禮畢設金石之樂宴王公卿士詔曰宣尼誕膺上哲體資至道祖述憲章之典並天地而合徳樂正雅頌之奥與日月而皆明垂後昆之制範開生民之耳目梁季湮微靈寢忘處鞠為茂草三十餘年敬仰如在永惟愾息今雅道和熈由庚得所斷琴故履零落不追閲笥聞書無因修復可詳之禮典改築舊廟葯房榱棟咸使維新芳蘩潔潦以時饗奠北魏主拓跋珪始光三年起太學于城東祀孔子以顔子配天興四年命樂師入學習舞釋奠于先聖先師按此祭用舞佾之始然亦暫一舉之而後未有繼也所稱先聖先師其詳不可考矣顧崛起而能不忘師祀且備禮樂焉君子有取乎爾魏主燾太平真君十一年南伐至鄒山以太牢祀先聖魏主濬詔宣尼廟别勅有司行薦享之禮按此有司薦享之始魏主𢎞皇興二年以青徐既平遣中書令髙允以太牢祀孔子魏主𢎞延興二年春二月乙巳詔崇祀孔子禁巫覡媟狎詔曰尼父禀達聖之資體生知之量窮理盡性道光四海頃者徐淮未賔廟隔非所致令祀典頓寢禮章殄滅遂使女巫妖覡淫進非禮殺生鼓舞倡優媟狎豈所以尊明師敬聖道者也自今以後有祭孔子廟制用酒脯而已不聽婦女合雜以祈非望之福犯者以違制論其公家有事如常犧牲粢盛務盡豐潔臨事致敬肅如也太和十六年二月丁未改諡宣尼為文聖宣父十九年四月庚申如魯城親祠孔子拜孔顔二氏子孫官魏主詡正光三年行講學之禮于國子寺釋奠司徒崔光執經常褧録義詔百官作釋奠詩北齊主髙洋天保元年令魯􅇿修先聖先賢廟遣使致祭又制春秋二仲釋奠于先聖先師樂用軒懸舞六佾太子每通一經必釋奠以為常每朔日祭酒領博士國子生四門博士升堂助敎及大學諸生階下拜孔揖顔日出行事郡學則于坊内立孔顔廟博士以下亦每月朝此月朔行禮之始後周宣帝大象二年視露門學釋奠追封孔子為鄒國公詔曰大徳之後是稱不絶功施于民義昭祀典孔子徳惟藏往道實生知以大聖之才屬千古之運載𢎞儒業式次彛倫至如參贊天人之理裁成禮樂之務作範百王垂風萬葉朕欽承寶厯服膺敎義眷言洙泗懐道滋深而褒成啟號雖彰故實旌崇聖績猶有闕如可追封為鄒國公邑數准舊并立後承襲隋文帝贈孔子為先師尼父制國子寺每嵗以四仲月上丁釋奠先聖先師州縣學以春秋仲月釋奠按元魏雖勑有司薦享未有定期亦未名為釋奠其州縣學春秋二仲釋奠實始于此樂奏咸夏唐髙祖武徳二年六月戊戌詔國子學立周公孔子廟各一所四時致祭七年二月丁巳親臨釋奠以周公為先聖孔子配皇太子王公皆從祭酒以下說經九年十二月太宗皇帝即位詔立孔子後詔曰宣尼以大聖之徳天縱多能王道藉以裁成人倫資其敎義故孟軻稱生民以來一人而已自漢氏馭厯魏室分區爰及晉朝暨于隋代咸相崇尚用存享祀朕欽若前王憲章故實親師宗聖是所庶㡬存亡繼絶抑惟通典可立孔子後為褒聖侯太宗貞觀二年升孔子為先聖以顔子配備爼豆干戚之容左僕射房𤣥齡等議武徳中詔釋奠于太學以周公為先聖孔子配享臣以為周公尼父俱稱聖人庠序置奠本緣孔子故晉宋梁陳及隋皆以孔子為先聖顔回為先師請停周公升孔子為先聖以顔回配從之周按孔子定稱先聖始此至髙宗永徽中復聖公師孔子顯慶中乃稱孔子先聖如故四年詔州縣學皆作孔子廟十一年尊孔子為宣父作廟于兖州給戸二十奉之十四年二月丁丑釋奠于國子學二十年詔皇太子詣國學釋奠先聖先師皇太子初獻國子祭酒張復𦙍亞獻光州刺史趙𢎞智攝司業終獻初釋奠以儒官主祭至是中書奏按禮凡學官春釋奠于先師註謂官詩書禮樂之官也彼謂四時之學將習其道故儒官釋奠各於其師既非國家行禮所以不及先聖至於春秋合樂則天子視學命有司興秩節總祭先聖先師焉請國學釋奠令國子祭酒為初獻祝祠稱皇帝謹遣仍令司業為亞獻博士為終獻其諸州刺史為初獻上佐為亞獻博士為終獻縣學令為初獻丞為亞獻無博士以主簿為終獻次年詔以為永制又増左丘明等二十二人從祀設先聖神坐于廟室内西楹間東向先師於先聖東北南向其餘弟子及二十一賢以次東陳南向西上春秋上丁行事前享一日奉禮郎設三獻位於東門之内道北執事位於道南皆西向北上學官館官位於縣東當執事西南西向學生位於館官之後皆重行北上觀者位於南門之内道之左右重行北靣相對為首設三獻門外位於東門之外道南執事位於其後每等異位北向西上館官學官位於三獻東南北向西上藻按唐世太子釋奠總章開耀景雲太極先天皆踵行之而開元太子諸王齒胄无為曠典仲附開元禮開元二十年撰定續有變更大畧遵用春仲秋上丁釋奠於太學孔宣父為先聖顔子為先師凡九十五座先聖先師籩豆各十簠簋各二登鉶爼各三其七十二弟子及左丘明公羊髙等二十一人從祀諸座籩豆各二簠簋爼各一新撰享樂用姑洗之均三成十祀孔宣父用太牢凡肉皆實爼其牲皆升右胖體一前節三肩臂臑後節二肫胳正脊一脡脊一横脊一長脅一短脅一代脅一皆二骨以竝脊從前為正脅旁中為正凡供别祭用太牢者犢一羊一豬一酒二斗脯一段醢四合若供少牢者去犢減酒一斗凡用籩豆各十二籩實以石鹽乾魚乾棗栗黄榛子人菱人芡人鹿脯白餅黒餅糗餌粉餈豆實韭葅醯醢菁葅鹿醢芹葅兎醢笋葅魚醢脾析葅䐁