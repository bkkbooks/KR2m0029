所頒多參差不可用唐開元禮却好開寳禮只是全録開元禮易去帝號耳若政和五禮則甚錯髙宗顯慶二年以周公配武王定孔子為先聖先是永徽中令復以周公為先聖孔子為先師顔回丘明降配享為從祀至是長孫無忌等議曰謹按禮記云凡學春官釋奠其先師鄭𤣥注曰官謂詩書禮樂之官也先師者若漢禮有髙堂生樂有制氏詩有毛公書有伏生可以為師者又禮記始立學釋奠于先聖鄭𤣥注曰若周公孔子是也據禮為定昭然自别聖則非周即孔師則偏善一經漢魏以來取捨各異顔回夫子互作先師宣父周公迭為先聖求其節文遞有得失所以貞觀之末親降綸言依禮記之明文酌康成之奥説正夫子為先聖加衆儒為先師永垂制於後昆革往代之紕繆而今新令不詳制旨輙事刋改遂違明詔且成王㓜年周公踐極制禮作樂功比帝王所以禹湯文武成王周公為六君子此即姬旦鴻業合同王者祀之仲尼生衰周之末祖述堯舜憲章文武宏聖敎於六經闡儒風於千世故孟軻稱生民以來一人而已自漢以降奕葉封侯崇奉其聖迄於今日胡可降兹上哲俯入先師且丘明之徒見行其學貶令從祀亦無故事今請改令從詔其周公仍依别禮配享武王詔從之於是始為定制三年撰文宣王廟登歌用宣和之舞詔國子博士范頵等撰次其迎神祴和之曲亦曰宣和聖道日用神機不測金石以陳絃歌載陟爰釋其菜匪馨于稷來顧來享是宗是極成皇太子行承和之曲亦曰永和姑洗為宫文舞三萬國以貞光上嗣三善茂徳表重輪視膳寢門尊要道髙闢崇賢引正人其奠幣肅和之曲南吕之均粤惟上聖有縱自天傍周萬物俯應千年舊章允著嘉䞇孔䖍王化兹首儒風是宣其迎爼雍和之曲此後酌獻皆奏永和堂獻瑶篚庭敷璆縣禮備其容樂和其變肅肅觀享雍雍執奠明醴惟馨蘋蘩可薦送文舞出迎武舞入舒和之曲隼集龜開昭聖列龍蹲鳳跱肅神儀尊儒敬業宏圖闡緯武經文盛徳施送神祴和與迎神同乾封元年正月辛卯追贈孔子為太師車駕發泰山至曲阜親幸祠廟詔曰朕閒徳契機神盛烈光于後代化成天地𤣥功被於庶物魯大司冦宣尼父孔某資大聖之材屬衰周之末思欲屈已濟俗𢎞道佐時厯聘周流莫能見用想乗桴以永嘆因獲麟而興感於是垂素王之雅則正魯史之繁文播鴻業於一時昭景化於千祀朕嗣膺寶厯祗奉睿圖憲章前王規矩先聖崇至公于海内行大道於天下遂復九圍乂安兩儀交泰功成化洽禮備樂和展采東廵回輿西上途經兹境撫事興懷駐驆荒區願為師友瞻望幽墓思承格言雖宴寢荒蕪餘基尚在靈廟空寂徽烈猶存孟軻曰自生民以來未若孔子者也微禹之歎既深褒崇之道宜峻可追贈太師庶年代雖逺式範令圖景業維新儀刑茂實其廟宇制度卑陋非宜更加修造仍令三品一人以少牢致祭褒聖侯徳倫既承𦙍嗣有異常流其子孫並宜免賦役戌其遣官致祭文曰維乾封元年嵗次庚寅二月戊朔二日己亥皇帝李治謹遣司稼正卿扶餘隆以少牢之奠致祭于先師孔宣父之靈惟神玉鉤陳貺靈開四肘之源金鼎流禎慶傳三命之範神資越誕授山嶽以騰英天縱攸髙藴河海而標壯折􅇆六藝宣創九流睿乃生知靈非外奬於是考三古裒一言刋典謨定風什莊敬之容畢備鐘鼓之音載和父子爰親君臣以穆蕩乎煥乎樂正雅頌各得其所可不謂至聖矣乎朕以凉徳嗣膺神器式崇祗配展義云亭感周禮之尚存悲素王之獨往杼軸洙泗如挹清瀾留連舞雩似聞金奏閶門曳練徒有生芻之疑漢曲疑舟非復祥萍之實慨然不已爰贈太師堂宇卑陋乃命修造褒聖子孫合門勿事庶能不遺百代助損益之可知永鑑千年同比肩而為友聿陳菲奠用旌無朽梅曙霞梁松春月牖徳音暢而無斁形神忽其將乆儻弗殊於生前亦知榮於身後尚饗贈尹起莘曰過曲阜祠孔子庶見尊師重道之意然以三公之官是臣之也至亳州尊老子為太上𤣥元皇帝其輕重不倫如此綱目於贈太師削不書為先聖諱也雖然吾先聖豈以是為輕重哉武后天授元年十月封孔子為隆道公中宗景龍元年皇太子釋奠于國學睿宗太極元年製宣聖贊皇太子釋奠開講筵賛曰猗歟夫子實有聖徳其道可尊其儀不忒刪詩定禮百王取則吾豈匏𤓰東西南北藻按賛吾夫子者至祖述憲章數語而盡嗣雖代有褒頌然而繪天難為工也𤣥宗有孔子詩顔子賛宋太祖真宗徽宗髙宗理宗皆親製贊今録其存者南梁元帝初在荆州起宣聖廟自畫聖像為之贊而書之時稱三絶帝王作贊始此𤣥宗開元七年詔皇太子諸王入國學行齒胄禮謁孔子太子奠孔子文具開元禮其奠羣賢文曰維某年嵗次月朔日子皇太子某敢昭告于先師顔子等七十二賢爰以仲春仲秋率遵故實敬修釋奠于先聖孔宣父惟子等或服膺聖敎徳冠四科或光闡儒風貽範千載謹以制幣牲齊粢盛庶品式陳明薦從祀配神尚饗是年詔春秋釋奠用牲牢其屬縣用酒脯至憲宗時劉禹錫謂凡學官春秋釋奠於先師斯止辟雍頖宫非及天下今制咸以春秋上丁有事孔子廟其禮不應古甚非孔子意武徳初詔國學立周公孔子廟四時祭貞觀中詔修孔子廟于兖州後許敬宗奏天下州縣置三獻官𤣥宗與儒臣議罷釋奠牲牢止薦酒脯時王孫林甫為相不學使王敬宗以明衣牲牢著為令遂無有非之者今舉天下州縣嵗費四十萬適資三獻官飾衣裳飽妻子於學無補也請下禮官議罷天下州縣牲牢衣幣藉其資使増學校嗚呼衣幣之罷是已牲牢可罷哉今之獻官飽妻子者不盡無然而子言之我愛其禮其甚焉者飾梵宇飯緇流有司汲汲若狂也而獨與寒氊老儒校蝇饞之算此之謂不知務十三年封禪迴幸孔子宅奠祭又遣使以太牢祀墓二十六年詔諸州貢舉人就胄監謁先師官為開講按此貢士謁廟之始今釋褐必于國學昉此宋大觀中强淵建議貢士始入辟雍並以元日釋菜二十七年八月甲申追諡孔子為文宣王二京國子監及州縣始正南向位詔曰𢎞我王化在乎儒術𤼵揮此道廸啟含靈自生民以來未有如孔子者也所謂自天攸縱將聖多能徳配乾坤身揭日月故能立天下之大本成天下之大經美徳敎善風俗君君臣臣父父子子民到於今受其賜不其偉歟於戯楚王莫封魯公不用俾夫大聖才列陪臣栖遲旅人固可知矣年祀寖遠光靈益彰雖代有褒稱未為崇峻不副其實人其謂何夫子改稱先聖可追諡為文宣王令三公持節册命其後嗣褒聖侯改封嗣文宣公昔周孔並祀之時周公南靣坐夫子西牖坐及貞觀二年停祀周公之後孔子坐仍其舊制今位既有殊豈宜依舊宜補其墜典永作成式其兩京國子監及天下諸州夫子南靣坐十哲等東西行列侍坐被王者服釋奠樂用宮懸且門人三千見稱十哲包夫衆美實越等夷暢𤣥聖之風規發人倫之耳目並宜褒贈以寵賢明其顔子既云亞聖宜優其秩於是二京之祭牲用太牢樂舞六佾矣州縣少牢無樂子姚燧曰杜預春秋傳叙曰子路欲使門人為臣孔以為欺天而云仲尼素王丘明素臣非通論也斯言為獲聖人之心而後世王之堯舜二帝也宰我以夫子遠賢於堯舜何王之不可居然後世天子之子有功之臣皆曰王以孔子之聖下比爵於其臣不知其可也吳沉孔子封王辨曰後世之禮有甚似而實非者且以追諡夫子為王言之王君之號也夫子人臣也生非王爵死而諡之可乎夫子曰必也正名乎名不正則言不順臣而王之於名正乎於言順乎春秋之時列國有僭王者麟經黜之盖名者實之著也無其實有其名謂之淫名在天之靈其肯歆之哉嗟夫有徳必有位理之常也有其徳而無其位此則夫子之不幸也曽謂以無實之稱而足以為聖人榮乎或曰夫子之道王者之道也謂仲尼素王其來乆矣奚至今封之而不可吁謂夫子有王者之道則可謂夫子有王者之號則不可昔夫子病子路使門人為臣夫子責之曰乆矣哉由之行詐也無臣而為有臣夫無臣不可以為有臣非王而可以稱王乎聖人不敢欺天也人其可以欺聖人乎然則當若之何曰褒之以王之貴曷若事之以師之尊書曰天降下民作之君作之師古者治敎之職不分君即師也師即君也二帝三王盡君師之責者也夫子不得君而為師師也者君之所不得而臣者也故曰雖詔于天子無北靣所以尊師也被以王爵之貴為隆於稱師者習俗之見也考之經聖門髙弟之稱其師有曰孔子有曰夫子其孫子思直字之曰仲尼盖夫子既無爵諡則稱之者不曰仲尼必曰夫子觀其門人弟子之不敢過號其師則知以無實之謚加于聖人必非聖人之意也帝丘濬曰此孔子封王弟子封公侯之始夫自漢平追諡孔子為宣尼公後世因謂孔子為宣父為宣尼夫宣之為諡不過聖善周聞而已豈足以盡吾聖人之大徳哉况北齊髙洋李元忠南齊蕭子良隋長孫賢先有此諡聖人萬世道徳之宗稱天以誄之猶恐未稱區區荒誕之稱何足為聖人重輕哉二十八年詔以春秋二仲月上丁祭先聖先師按此祭用上丁之始代宗永泰二年修國學祠堂成行釋奠禮宰相及參軍官六軍將軍皆就觀焉自肅宗以來初復二京宮懸不具至是乃奏宫懸於祠堂藻按祭復官懸禮稱隆盛乃緣魚朝恩典監事而奏復之又雜敎坊二伎吾夫子詎歆此哉徳宗貞元二年釋奠詔宰臣以下畢集于國學貞元間每年春秋釋奠祝版御署訖北靣而揖宋太祖建隆元年二月視國子監詔加飾祠宇及塑繪先聖先賢先儒之像親製文宣王及兖公二贊十哲以下分命宰臣兩制譔贊曰王澤下衰文武將墜尼父挺生河海標異祖述堯舜有徳無位哲人其萎鳳鳥不至按藝祖建國首幸辟雍自後太宗真宗相繼釋奠遂為一代常典多不具載三年詔祀文宣王用一品禮廟門立㦸十六祭用永安之曲真宗咸平三年幸曲阜謁文宣王廟追諡𤣥聖文宣王帝服鞾袍詣廟酌獻廟内外設黄旄仗孔氏家屬陪列初有司定儀止肅揖帝特再拜又至孔林降輿乗馬詣墳奠拜加諡𤣥聖文宣王先是詔有司檢討漢唐褒崇宣聖故事欲追諡為帝或言宣父周之陪臣周止稱王不當加帝號乃按春秋演孔圖曰孔子母感黒帝而生又莊子恬淡𤣥聖素王之道故加以𤣥聖又加冕服禮從上公九旒九章大大中祥符元年十一月制曰王者順考古道懋建猷崇四術以化民昭宣敎本總百王而致治丕變人文方啟廸于素風思丕揚於鴻烈先聖文宣王道膺上聖體自生知以天縱之多能實人倫之先覺𤣥功侔乎簡易景鑠配乎貞明惟列辟以尊崇為億載之師表肆朕以寡昧欽承命厯曷嘗不遵守彛訓保乂中區屬以祗若元符告成喬嶽觀風廣魯之地飭駕數仭之墻躬詣逺祠􅃡懐遐躅仰明靈之如在肅奠獻以惟寅是用稽簡册之文昭聰睿之徳聿舉追崇之禮庶申嚴奉之心備物典章垂之不朽誕告多士昭示朕意宜追諡曰𤣥聖文宣王復遣官以太牢致祭於闕里祝文特進御名其文曰維大中祥符元年嵗次戊申十一月戊午朔四日辛酉皇帝趙恒謹遣推誠保徳功臣光禄大夫行禮部尚書上柱國清河􅇿開國公食邑一千五百戸食實封八百戸張齊賢致祭於𤣥聖文宣王朕有事岱宗畢告成之盛禮􅃡懐闕里欽設敎之素風躬謁奠於嚴祠特褒崇于懿號仍令舊相載達精誠昭薦吉蠲用遵典禮以兖國公顔子等配尚饗大中祥符二年製宣聖贊追封從祀諸賢詔曰朕乃者封巒禪社昭列聖之鴻休崇徳報功廣百王之彛制泊言旋於闕里遂躬謁于魯堂瞻河海之姿晬容穆若出泗水之上髙風凛然舉茂典之有加期斯文之益振由是推恩世胄併錫寵章祗事祠庭廣増其奉邑復念性與天道徳冠生民議兹𤣥聖之名冀廣嚴師之禮兼朕親為製贊以表崇儒至於四科鉅賢並起五等七十達者俱増列侯仍命宷寮分紀遺烈式盡褒揚之旨庶資善誘之方宜令中書門下樞密院三司使兩制丞郎待制閣館直館校理分撰贊以聞御製宣聖贊若夫檢玉岱丘迴輿闕里􅃡懐於宣聖躬謁於嚴祠以為易俗化民既仰師於彜訓崇儒尊道宜益峻於徽章増薦崇名聿陳明祀思形容于盛徳爰刻鏤於斯文贊曰立言不朽垂敎無疆昭然令徳偉哉素王人倫之表帝道之綱厥功茂實其用允臧升中既畢盛典載揚洪名有赫懿範彌彰六月丙辰頒諸州釋奠儀注祭器圖先是景徳四年同判太常禮院李維言按開寳通禮諸州釋奠並刺史致齋三日從祀之官齋於公館祭日刺史為初獻上佐為亞獻博士為終獻今諸州長史不親行祀非尊師重敎之道詔太常禮院檢討按五禮精義州縣釋奠刺史縣令初獻上佐縣丞亞獻州博士縣主簿終獻有故以次官攝之至是判國子監孫奭又言上丁釋奠舊禮以祭酒司業博士充三獻官新禮以三公行事近嵗止命獻官兩員臨時通攝未副崇祀向學之意朢自今備差太尉太常光禄卿以充三獻乃命崇文院刋釋奠儀注及詔太常禮院定州縣釋奠器數先聖先師每坐酒尊一籩豆八簋二簠二爼三罍一洗一篚一尊皆加勺羃各置於坫巾共一燭二爵共四坫有從祀之處諸坐各籩二豆二簋一簠一爼一燭一爵一以其制頒行諸路州縣釋奠儀春秋二仲上丁釋奠至聖文宣王前一月檢舉關所屬排辦前釋奠五日應行事官執事官散齋三日治事如故宿於正寢不弔喪問疾作樂判書刑殺文書决罰罪人及與穢惡致齋二日一日於㕔事其一日質明赴祠所宿齋唯釋奠事得行其餘悉禁獻官各以州縣長吏已齋而闕者通攝行事地前釋奠三日有司設行事執事官次於廟門外隨之宜前二日有司牽牲詣祠所前一日掃除廟之内外設登歌之樂於殿上稍南北向釋奠日丑前五右刻執事者陳幣篚各於神位之左祝版各於神位之置於坫次設祭器掌饌者實之每位各左十籩為三行以左為上右十豆為三行以右為上爼二一在籩前一在豆前又爼六在豆右為三重以北為上簠二簋二在籩豆外二爼間簠在左簋在右設犧尊四象尊四為二重在殿上東南隅北向西上犧尊在前皆有坫加勺羃為勺尊又設太尊二山尊二在神位前著尊二犧尊二象尊二壺尊六在殿下皆北向西上加羃五齊三酒皆設而不酌又設諸從祀位祭器每位各左二籩右二豆爼一在籩豆間簠一在籩前簋一在豆前爵一在籩豆之前兩廡各設象尊二有司設燭於神位前洗二於東階之東罍在洗東加勺篚在洗西南肆實以巾執罍篚者位於其後設揖位於廟南門外初獻在西東向亞終獻及祝在東西向北上又設三獻官席位於殿下東階東南西向北上分獻官位其後祝位二於庭中稍北學生位於庭中北向西上設初獻飲福位於東序西向又設祝位於殿上前楹間西向開瘞坎於廟殿之北壬地方深取足容物南出陛設朢瘞位於瘞坎之南三獻官在南北向西上祝在東西向腯前釋奠一日釋奠官帥其屬常服閱饌物視牲充詣厨視滌溉訖各還齋所脯後掌廟者掃除廟之内外帥釋奠日丑前五刻行事執事官各入就次掌饌者其屬實饌具畢贊禮者引升自東階㸃視陳設訖退就次各服其服學生先入就位三獻官詣廟南門外揖位立定贊禮者贊揖次引祝入殿下席位西向立贊者對立於三獻之前少定贊請行事凝安之樂作三成止贊唱者曰再拜初獻以下皆再拜贊者引祝升殿就位贊者引初獻詣盥洗位同安之樂作至位北向立執罍者酌水初獻搢笏盥手帨手執笏升詣至聖文宣王神位前北向立樂止明安之樂作搢笏跪祝立於神位之左西向搢笏跪執事以幣授祝祝奉幣授初獻祝執笏興先詣兖國公神位前北向立初獻受幣奠訖執笏俛伏興再拜次詣兖國公郕國公沂國公鄒國公神位前東向奠幣並如上儀樂止祝復位初獻降階樂作復位樂止少頃贊者引初獻再詣盥洗位樂作至位北向立搢笏盥手帨手執笏次詣爵洗位北向立搢笏洗爵拭爵以授執事者執笏升殿詣至聖文宣王酌尊所南向立樂止成安之樂作執事者以爵授初獻初獻搢笏跪執爵執尊者舉羃執事者酌犧尊之泛齊初獻以爵授執事者興執笏詣至聖文宣王神位前北向立搢笏跪執事者以爵授初獻初獻執爵三祭酒奠爵執笏俛伏興樂止次引祝詣神位前東向搢笏跪讀祝文讀訖執笏興先詣配位前南向立初獻再拜成安之樂作次詣兖國公郕國公沂國公鄒國公神位前東向酌獻讀祝並如初儀俱復位初獻降階樂作復位樂止贊者引亞獻詣盥洗爵洗位升詣酌尊所立酌象尊之醴齊亞獻以爵授執事者執笏詣神位前搢笏跪執爵三祭酒奠爵執笏俛伏興再拜次詣兖國公郕國公沂國公鄒國公神位前並如上儀降復位樂止贊者引終獻詣洗升殿酌獻並如亞獻之儀降復位終獻將升次引分獻官詣洗盥手帨手分獻殿内及兩廡諸神位搢笏跪執爵三祭酒奠爵執笏俛伏興再拜分獻訖俱復位贊者引初獻升階詣東序西向立執事者以爵酌正配位福酒合置於一爵持爵詣初獻之左北向立初獻再拜搢笏跪受爵祭酒啐酒奠爵執饌者以爼進減正配位胙肉合置一爼又以豆取黍稷飯合置一豆先以飯授初獻初獻受訖以授執饌者又以爼授初獻初獻受爵飲卒爵執事者受虚爵復於坫初獻執笏俛伏興再拜降復位贊禮者曰執事者各復位贊唱者曰賜胙再拜在位者皆再拜贊禮者引初獻以下就朢瘞位執事者取幣祝版寘于瘞坎贊禮者曰可瘞寘土半坎初獻以下詣南門外揖位立定贊禮者贊曰揖禮畢退有司監徹禮饌閻戸以降乃退附朱子滄洲精舍釋菜儀前期獻官以下皆盛服掌儀設神座用席先聖南向配位西向從祀位東西向設祝版於先聖位之右設香爐香案香合於堂中設祭器於神座前每位各左一籩右一豆設犧尊一於堂上東南隅加以勺羃設燭四於堂中二於東西從祀位之前設洗二於東階上設卓一於洗東卓上箱二設獻官位於堂下北靣分奠各官又次之諸生又次之皆北向西上及期獻官以下序立於東廊下掌儀帥執事者升堂實酒饌贊者一人引獻官升堂㸃閲降就堂下位分奠官及諸生各就位贊者一人離位少前再拜訖進立于主人之右西向曰再拜在位者皆再拜掌儀祝司尊者皆升掌儀立于東序西向祝立於阼階上西向司尊者立於尊南北向贊引獻官詣盥洗之南北向立盥手帨手升焚香再拜降再詣盥帨如初詣爵洗南北向立洗爵以授贊升詣尊所西向立贊以爵授獻官司尊舉羃酌酒獻官以爵授贊俱詣先聖前獻官北向跪贊跪授爵獻官執爵三祭奠爵於籩之間俛伏興少立祝詣獻官之左東向跪讀祝訖興復位獻官再拜次詣盥洗爵如初洗諸配位爵訖贊者以盤兼捧升酌詣配位如初儀但不讀祝獻官復位當獻官詣配位酌獻時贊者二人各引分奠官分行東西從祀禮盥洗以下並如配位之儀分奠訖復位在位者皆再拜古歐陽修穀城夫子廟記曰釋奠釋菜祭之畧者也者士之見師以菜為摯故始入學者必釋菜以禮其先師其學官四時之祭乃皆釋奠釋奠有樂無尸而釋菜無樂則其又畧也故其禮亡焉而今釋奠幸存然亦無樂又不徧舉於四時獨春秋行事而已又曰祭之禮以迎尸酌鬯為盛釋奠薦饌直奠而已故曰祭之畧者其事有樂舞授器之禮今又廢則於其畧者又不備馬然古之所謂吉凶鄉射賔燕之禮民得而見焉者今皆廢失而州縣幸有社稷釋奠風雨雷師之祭民猶得以識先王之禮器焉其牲酒器幣之數升降俯仰之節吏又多不能習至其臨事舉多不中而色不莊使民無所瞻仰見者怠焉因以為古禮不足復用可勝歎哉丘濬曰修之記作於宋盛時而謂釋菜禮亡又謂釋奠幸存而亦無樂今制國子監每月朔先期太常送兎蔬等物至日行禮其春秋上丁二祭則先期皇帝傳制遣官行禮文武官朝服侍班牲用太牢禮行三獻樂備登歌舞用八佾其禮可謂備矣說者謂釋奠釋菜二者之重輕繋乎樂之有無今世之樂襲勝國用宋人魏漢津所製大晟之故耳非古樂也是年賜文宣王廟桓圭一就廟立學豫養孔氏子孫按此立學敎聖裔之始魏黄初詔廟外廣為屋宇以居學者尚非専為聖裔而設至是因四十四代孫知仙源縣朂之請始立學以訓孔氏子孫而學官未設至哲宗元祐元年設敎授四年設學錄各一員元世祖中統三年以楊庸為敎授兼訓孔顔孟之後延祐間遂改孔氏學為三氏學國朝洪武二年改稱三氏子孫敎授司宣徳以後以聖裔充學録三氏孫許應山東鄉試每三嵗貢有文行者一人五年十二月壬辰改諡𤣥聖為至聖文宣王以𤣥聖犯聖祖諱也丘濬曰加諡用緯書異端之說改諡因黥卒所言妖妄之神而避其諱要皆非禮之禮仁宗天聖元年視國子監奠謁先聖退閱七十二賢贊觀東序及禮器天聖慶厯再幸有司言舊儀肅揖特再拜景祐元年詔釋奠用登歌登歌六首丕其迎神凝安之曲大哉至聖文教之宗紀綱王化變民風常祀有秩備物有容神其格思是仰是崇有其初獻升降同安之曲右文興化憲古師今明祀典吉日惟丁豐犧在爼雅奏來庭周旋陟降福祉是膺無其奠幣明安之曲一王垂法千古作程有儀可仰徳而名齋以滌志幣以達誠禮容合度黍稷非馨陟其酌獻成安之曲自天生聖垂範百王恪恭明祀降上庠酌彼醇旨薦此令芳三獻成禮率由舊章既其飲福綏安之曲犧象在前豆籩在列以享以薦芬既潔禮成樂備人和神悅祭則受福率遵無越將其送神凝安之曲肅肅庠序祀事惟明大哉宣父聖多能歆馨肹蠁迴馭凌競祭容斯畢百福是膺配哲宗朝増兖國公配位酌獻成安之曲無疆之祀侑可宗事舉以類與享其從嘉栗旨酒登薦惟恭降此遐福令儀肅雍春陳𤾉曰禮記文王世子几釋奠必有合也月令仲上丁命樂正習舞釋菜盖學校禮樂之所自出小有釋菜而以食為主大有釋奠而以飲為主其習舞與聲而大合六代之樂一也北齊以太牢釋奠孔子設軒架之樂六佾之舞唐開元中釋奠用宮架之樂宋朝上丁設奠設登歌之樂不用軒架而用判架不設於堂下而施於堂上於其庭又不設舞焉有歌而無舞非古人習舞合樂之意矣哲宗元祐六年幸國子監釋奠一獻再拜徽宗崇寜四年詔辟雍文宣王殿名大成幸國子監謁拜行酌獻禮乃加文宣王冕十二旒服九章畫圖頒天下州縣學依圖改正先是國子監丞趙子櫟言唐封孔子為文宣王其廟像内出王者衮冕衣之今乃循五代故制服上公之服七十二子皆周人而衣冠率用漢制非是詔孔子仍舊七十二子易以周之冕服又詔辟雍文宣王殿以大成為名帝幸國子監謁文宣王殿皆再拜行酌獻禮遣官分奠兖國公而下司業蔣静言先聖與門人通被冕服無别配享從祀之人當從所封之爵服周之服公之衮冕九章侯伯之鷩冕七章衮公服也達於上鄭氏謂公衮無升龍誤矣攷周官司服所掌則公之冕與王同弁師所掌則公之冕與王異今既考正配享從祀之服亦宜考正先聖之冕服於是増文宣王冕為十有二旒時議禮局又言太學獻官太祝奉禮皆以法服至於􅇿邑則用常服朢命有司降祭服於州縣凡獻官祝禮各服其服詔頒衣服制度使州縣自造大觀元年令貢士始入辟雍並以元日釋菜於先聖從强淵之請也唐徳宗時太常奏以十一月貢舉人謁先師若上丁釋奠與親饗太廟大祀同日即用仲丁其貢舉人謁先師請别擇日盖貢舉人謁廟自唐有之至是殆乆廢云其始自何時不可考三年更撰釋奠樂章凡六首被其迎神凝安之曲仰之彌髙鑽之彌堅於昭斯文於萬年峩峩膠庠神其來止思報無窮敢忘於始惟其升降同安之曲生民以來道莫與京温良恭儉神惟明我潔尊罍陳兹芹藻言升言旋式崇斯敎有其奠幣明安之曲於論鼔鐘於兹西雍粢盛肥碩顯其容其容洋洋咸瞻像設幣以達誠歆我明潔素其酌獻成安之曲道徳淵源斯文之宗功名糠粃王之風碩兮斯牲芬兮斯酒綏我無疆與天為乆承其配位酌獻成安之曲儼然冠纓崇然廟庭百王祀㳙辰惟丁於牲於醑其從予享與聖為徒其徳不爽薦其送神凝安之曲肅莊紳緌吉蠲牲犧於皇明祀登惟時神之來兮肹蠁之隨神之去兮休嘉之貽次年大晟府擬撰釋奠十四首持其迎神凝安黄鍾為宮大哉宣聖道徳尊崇維王化斯民是宗典祀有常精純並隆神其來格於昭盛容大呂為角生而知之有敎無私成均之祀威儀孔時維兹初丁潔我盛粢永適其道萬世之師而太蔟為徴巍巍堂堂其道如天清明之象應物然時惟上丁備物薦誠維新禮典樂諧中聲昭應鍾為羽聖王生知闡廼儒䂓詩書文敎萬世垂良日惟丁霛誠丕爽揭此精䖍神其來享祀初獻盥洗同安姑洗宮右文興化憲古師今明有典吉日惟丁豐犧在爼雅奏在庭周旋陟降福祉是膺民升降同安南呂宮誕興斯文經天緯地功加於實千萬世笙鏞和鳴粢盛豐備肅肅降登欽兹秩祀前奠幣明安自生民來誰底其盛惟王神明度越聖粢幣具成禮容斯稱黍稷非馨惟神之聽窮奉爼豐安姑洗宫道同乎天人倫之至有饗無其興萬世既潔斯牲粢明醑旨不懈以忱神之來暨徳文宣王位酌獻成安南呂宮大哉聖王實天生作樂以崇時祀無斁清酤惟馨嘉牲孔碩薦羞神明庶㡬昭格兖國公位酌獻成安庶㡬屢空淵源深矣亞聖宣猷百世宜祀吉蠲斯辰昭陳尊簋旨酒欣欣神其來止鄒國公位酌獻成安道之由興於皇宣聖惟公之傳人知趨正與享在堂情文實稱萬年承休假哉天命亞終獻俱用文安姑洗宮百王宗師生民物軌瞻之洋洋神其寜止酌彼金罍惟清且旨登獻惟三於嘻成禮徹豆娛安南呂宮犧象在前豆籩在列以饗以薦既芬既潔禮成樂備人和神悅祭則受福率遵無越送神凝安黄鍾宮有嚴學宮四方來宗恪恭祀事威儀雍雍歆兹惟馨颷馭旋復明禋斯畢咸膺百福咸淳加配位酌獻二章俱成安彛郕國公位心傳忠恕一以貫之爰述大學萬世訓恵我光明尊聞行知繼聖迪後是享是宜宗沂國公位公傳自曾孟傳自公有嫡緒承允得其提綱開藴乃作中庸侑於元聖億載是崇藻按宋之登歌景祐六章七奏大觀三年五奏四年増為十三奏終宋之世遵焉樂繁則怠節促則茍禮之斁也國朝摘取六章止於六奏迎神用首章更名咸和奠帛初獻更名寜和亞獻更名安和俱用太簇為羽終獻更名景和徹饌更名咸和俱用仲呂為宮送神亦名咸和太簇為羽皆仲呂調也政和元年詔先聖廟用㦸二十四文宣王執鎮圭並用王者之制三年頒辟雍大成殿名于諸路州學又御書大學殿額頒闕里六年五月賜堂上正聲大樂一部及禮器于闕里按此乃魏漢津之樂藉口於聲律身度而以帝指定尺造律焉者也宋自景祐以來講求鍾律初時遵用王朴舊樂李照譏其音髙乃以太常布帛尺定律而其聲失之太濁歌工不能成聲山堂肆考云朴之樂比古樂髙三律其黄鍾應古之夾鍾玉海則云照之樂比古樂下二律其黄鍾應古無射之倍聲和峴胡瑗更之比朴第下一律又以古之太簇為其黄鍾然則其失維均總之於雅樂無當焉至於蔡元定之律與王朴算異而律同而漢津之樂又大抵即李照之樂但恥與之同於是乃駕說于時君之指姑以獻謟而懾衆嗚呼曽是而誇詡於孔氏之庭乎哉宣和四年製宣聖贊贊曰厥初生民自天有造百王之師立人之道有彛有倫垂世立敎爰集大成千古允蹈乃嚴斯所乃瞻斯宮瞻彼徳容云孰不崇髙宗紹興十年七月甲子復釋奠文宣王為大祀加籩豆十二禮如社稷十四年三月己巳視太學謁先聖製像贊及七十二子贊刻石詔曰宣王復古采芑著詠於新田世祖緯文建武肇興於太學將欵謁於先聖仍備舉於舊章乃幸大學止駕於大成門外登降步趨執爵灌獻禮畢御敦化堂頒詔閱徽宗大晟樂頒降肄習仍内降玉圭贊曰大哉宣王斯文在兹帝王之式古今之師志則春秋道由忠恕賢於堯舜日月其喻惟時載雍戢此武功肅昭盛儀海㝢聿崇孝宗淳熈四年二月乙卯視太學御崇化堂詔曰昔我藝祖開基之月首幸國學越三月又幸既宏先師之宅復審象而為贊本原治道厥有深旨太上中興開設學校乗輿臨幸儒術益光肆朕纂圖儲精稽古爰以仲春謁欵將聖躬釋奠之禮闡中庸之義洙泗遺風儼然在目朕甚嘉之夫孝于事親忠于事君學之本也業精於勤行成於思學之序也子大夫其念哉當為君子之儒毋慕人爵之得理宗淳祐元年視太學以紹定所製伏羲堯舜禹湯文武周孔顔曾思孟道統十三贊就賜國子監宣示諸生贊曰聖哉尼父秉徳在躬厯聘列國道大莫容六藝既作文敎聿崇古今日月萬代所宗金主完顔雍大定十四年加宣聖像十二旒十二章兖國公鄒國公像九章九旒遷鄒國公像於宣聖之右與兖國公相對元世祖忽必烈中統二年六月申嚴廟祀禁䙝擾詔聖廟國家嵗時致祭諸儒月朔釋奠宜令灑掃修潔今後禁約諸官員使臣理問詞訟及飲宴營造使臣安下違者罪之崇此稍存其意至元中亦有中外奉孔子之詔成宗鐡木耳大徳十年命江浙行省製宣聖廟樂秋八月用於廟祀其歌樂仍宋之舊又令翰林新撰樂章然因循未用今錄元史禮樂志迎神奏文明之曲天縱之聖集厥大成立言垂敎萬世凖程廟庭孔碩尊俎既盈神之格思景福來并及盥洗奏昭明之曲神既寧止有孚顒若罍洗在庭載盥載濯匪惟潔修亦新厥徳對越在兹敬恭惟則升殿奏景眀之曲降同大哉聖功薄海内外禮隆秩宗光垂昭代陟降在庭攝齊委佩莫不肅雍洋洋如在奠幣奏徳明之曲圭衮尊崇佩紳列侑籩豆有楚樂具和奏式陳量幣駿奔左右天睠斯文繄神之佑文宣王酌獻奏誠明之曲惟聖監格享於克誠有樂在縣有碩斯牲奏醴以告嘉薦惟馨綏以多福永底隆平兖國公酌獻奏誠明之曲潛心好學不違如愚用舍行蔵乃與聖俱千載景行企厥歩趨廟食作配祀典弗渝郕沂酌獻俱闕拒鄒國公酌獻奏誠明之曲洙泗之傳學窮性命力楊墨以承三聖遭時之季孰識其正髙風仰止莫不肅敬具亞終獻俱奏靈明之曲廟成奕奕祭祀孔時三爵舉是獻是宜於昭聖訓示我民彜紀徳報功酌於兩儀不送神奏慶明之曲禮成樂備靈馭其旋濟濟多士懈益䖍文教兹首儒風是宣佑我皇祚闕武宗海山至大元年七月加孔子號大成至聖文宣王詔曰盖聞先孔子而聖者非孔子無以明後孔子而聖者非孔子無以法所以祖述堯舜憲章文武儀範百王師表萬世朕纂承丕緒敬仰休風循沿古之良規舉追封之盛典加號大成至聖文宣王遣使闕里祀以太牢於戲父子之親君臣之義永惟聖教之尊天地之大日月之明奚罄名言之玅尚資神化祚我皇元乃遣使致祭牲加太牢其文曰惟至大元年七月丁巳朔越十一日丁卯皇帝竒渥温海山謹遣集賢學士嘉議大夫王徳淵謹以銀幣牲牢庶差之奠敢昭告於大成至聖文宣王惟王秉徳生知垂教不朽聖之時者天何言哉由百世之後莫能違自生民以來未之有特加封號大展祭儀仍命臣僚往祀林廟以兖國公鄒國公配尚享三年冬十月置曲阜宣聖廟登歌樂闕夫膠序至尊大昕而秩節元嗣執鬯於辟雍生民以來祀典之盛未有焉然而意多緣飾禮或謟䛕像祀王封多盭古制所以折􅇆釐正不無待於明時者也聖朝釐正疏天生素王木鐸萬禩師道通乎天子祼獻逹乎庶人惟師也故祀也不師而王而公於義何居將足以榮夫子乎哉聖人建極正名定制義莫精乎昭代矣然而席嚮灌獻制參古今堂廡配食尚貽討論鴻儒喆輔議既盈庭而卒乃衷之乎獨斷則禮時為大乎所謂非天子不議禮也太祖髙皇帝吳元年秋七月乙亥閱釋奠樂舞是日上御㦸門召學士朱升率樂舞生入見設雅樂閱之上親擊石磬命升辨五音升以宫為徴上詰責之起居注熊鼎對曰八音之中石最難和故書曰於予擊石拊石百獸率舞上曰石音固難和然樂以人聲為主人聲和即八音和矣登歌一闋上復歎曰古者作樂以和民心格神感人而與天地同其和近世儒者鮮知音律欲樂和難矣鼎曰樂音不在外求實在君心君心和則天地之氣亦和樂無不和矣上深然之先是命選道童充樂舞生至是始集釋奠樂舞用道童自此始按樂舞用羽流制出權設爾時經營草昧即講釋奠雅樂諭儒臣以審音聖祖之識夐矣熊鼎歸重君心轉圜採納盖聖人之𢎞也然而和徳莫盛于唐虞后夔之典亟焉樂官樂音職司自在豈可以迂談取㨗給哉洪武元年二月詔以太牢親祀孔子於國子學八月丁丑遣官釋奠於先師孔子初禮官奏周制凡始立學者釋奠於先聖先師凡學春夏釋奠於先師秋冬亦如之漢儒以先聖為周公若孔子先師為詩書之官若禮有髙堂生樂有制氏詩有毛公書有伏生可以為師者盖四時之學將習其道故釋奠各以其師而不及先聖惟春秋合樂則天子視學有司總祭先聖先師是則漢時釋奠亦畧可知矣魏正始中使太常釋奠於辟雍晉釋奠皆於國學東晉成穆孝武皆親釋奠隋置國子監每嵗四仲月唐初釋奠儒官為祭主直書博士姓名敢昭告於先聖許敬宗奏請令國子祭酒為初獻辭稱皇帝謹遣仍令司業為亞獻博士為終獻縣則令為初獻丞為亞獻主簿及尉通為終獻永為禮制武徳頁觀中皆以二月親幸國子監釋奠開耀景龍中皆皇太子釋奠於太學開元中詔春秋釋奠以三公攝事著之常式若遇大祀則用仲丁州縣用上丁宋元因古禮而損益之今宜定制以仲春仲秋二上丁日降香遣官祀於國學以丞相為初獻翰林學士亞獻國子祭酒終獻從之二年十月辛巳諭中書省臣令天下􅇿縣皆立學每學皆有孔廟禮延師儒敎授生徒三年五月立祀典之碑於國學先師廟墀東詔曰自有元失馭羣雄鼎沸土宇分裂聲敎不同朕奮起布衣以安民為念訓將練兵平定華夷大統以正永惟為治之道必本於禮考諸祀典知五嶽五鎮四海四瀆之封起自唐世崇名美號歴代有加在朕思之則有不然夫嶽鎮海瀆皆髙山廣水自天地開闢以至於今英靈之氣萃而為神必皆受命於上帝幽微莫測豈國家封號之所可加瀆禮不經莫此為甚至如忠臣烈士雖可加以封號亦惟當時為宜夫禮所以明人神正名分不可以僭差今命依古定制凡嶽鎮海瀆並去其前代所封名號止以山水本名稱其神􅇿縣城隍神號一體改正厯代忠臣烈士亦依當時初封以為實號後世溢美之稱皆與革去其孔子善明先王之要道為天下師以濟後世非有功於一方一時者可比所有封爵宜仍其舊庶㡬神人之際名正言順於理為當用稱朕以禮祀神之意於戲明則有禮樂幽則有鬼神其理既同其分當改正故兹詔示四年秋更定孔廟釋奠祭器禮物正位犢一羊一豕一籩豆各十豋一鉶一簠簋各二酒尊三爵三初孔子之祀像設髙座而器物陳於座下其來已乆至是各置髙案其籩豆簠簋豋鉶悉用瓷器樂六奏擇監生及文職大臣子弟在學校者充樂舞生預敎習之時宋濓以議禮謫知安逺縣濓上孔子廟堂議曰世之言禮者咸取法孔子然則為廟以祀之其可不稽於古之禮乎不以古之禮祀孔子是褻祀也褻祀不敬不敬則無福奈何今人之與古異也古者將祭主人朝服即位於阼階東西靣祝告利成主人立於阼階上靣尸出入主人降立於阼階東西面此皆主人之正位也卒巹祝盥於洗升自西階主人盥升自阼階祝先入南面主人從戸内西靣祝酌奠主人西靣再拜稽首皆為几筵之在西也尸升筵主人西靣立於戸内拜妥尸尸醋主人主人西靣奠爵拜皆為尸之在西也漢晉春秋所載章帝元和二年幸魯祀孔子帝升廟西靣再拜開元禮亦謂先聖東向先師南靣三獻官皆西向是猶未失古之意也今襲開元二十七年之制遷神於南靣而行禮者北靣則非神道尚右之義矣古者造木主以棲神天子諸侯之廟皆有主卿大夫士雖無之大夫束帛以依神士結茅為菆無有像設之事開元禮亦謂設先聖神座於堂上西楹間設先師神座於先聖神座東北席皆以莞則尚掃地而祭也今因開元八年之制摶土而肖像焉則失神而明之之義矣古者灌用鬯臭鬱合鬯臭陰達於淵泉既灌然後迎牲致陰氣也蕭合黍稷臭陽達於牆屋故既奠然後焫蕭合羶薌盖求神於陰陽也今用薰薌代之庸非簡乎古朝覲㑹同與凡郊廟祭饗之事皆設庭燎司烜共之火師監之其數則天子百公五十餘三十以為不若是則不嚴且敬也今以秉炬當之庸非瀆乎古之有道有徳者使敎焉死則為樂祖祭於瞽宗此之謂先師若漢禮有髙堂生樂有制氏詩有毛公書有伏生之類也又凡始立學者必釋奠於先聖先師釋奠必有合有國故則否謂國無先聖先師則所以奠者當與鄰國合若唐虞有夔伯夷周有周公魯有孔子則皆自奠之不合也當是時學者各自祭其先師非其師弗學也非其學弗祭也學校既廢天下莫知所師孔子集羣聖之大成顔回曽參孔伋孟軻實傳孔子之道尊之以為先聖先師而通祀於天下固宜其餘當各及其邦之先賢雖七十二子之祀亦當罷去而於國學設之庶幾弗悖禮意開元禮國學祀先聖孔子以顔子七十賢配諸州但以先師顔子配今也雜置而妄列甚至荀况之言性惡揚雄之事王莽王弼之宗老莊賈逵之忽細行杜預之建短喪馬融之黨附勢家亦厠其中吾不知其為何說也古者立學専以明人倫子雖齊聖不先父食乆矣故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也今一切置而不講顔回曽參孔伋子也配享堂上顔路曾㸃孔鯉父也列祀廡間張載則二程之表叔也乃坐其下淳祐初張居程上後因國子監集議再定張遂居程下顛倒彜倫莫此為甚吾又不知其為何說也古者士之見師以菜為䞇故始入學者必釋菜以禮其先師其學官四時之祭乃皆釋奠今専用春秋亦非釋奠冇樂無尸而釋菜無樂是二者之重輕繫乎樂之有無也今則用魏漢津所製大晟之樂乃先儒所謂亂世之音者其可乎哉古者釋奠釋菜名義雖存其儀注皆不可知唐開元禮彷彿儀禮饋食篇節文為詳所謂三獻各於獻後飲即尸醋主人主婦及賔之義也今憚其繁惟初獻者得行之其可乎哉嗚呼學校者禮之所自出猶河瀆之宗海也猶山岳之祖崑崙也今乃舛謬若是則其他可知矣禮固非士庶人之所敢議有人心者孰能黙黙以自安乎雖然此姑言其畧爾若夫廟制之非宜冕服之無章器用則雜乎雅俗升降則昧乎左右如此類甚多雖更僕不可盡也或者則曰子之言信辨矣建安熊氏欲以伏羲為道統之宗神農黃帝堯舜禹湯文武各以次而列焉臯陶伊尹太公望周公暨稷契夷益傅說箕子皆可與享於先王天子公卿所宜師式也當以此秩祀天子之學若孔子實兼祖述憲章之任其為通祀則自天子下達矣茍如其事則道統益尊三皇不汨於醫師太公不辱於武夫也不識可乎昔周有天下立四代之學其所謂先聖者虞庠則以舜夏學則以禹殷學則以湯東膠則以文王復各取當時左右四聖成其徳業者為之先師以配享焉此固天子立學之法也奚為而不可也是年令進士釋褐行釋菜禮于國學孔廟五年作文廟成遣官以太牢祭遂視學釋奠六年八月庚午學士承旨詹同侍講學士樂韶鳳協律郎冷謙等上所定釋奠樂章舞六佾迎神曰咸和奠帛初獻曰寧和亞獻曰安和終獻曰景和徹饌亦曰咸和望瘞送神皆同禮部尚書牛諒復定禮儀自遣官傳制至行事皆典儀唱禮自迎神至徹饌皆用同等樂章從之丁丑遣御史大夫陳寧釋奠於先師孔子時誠意伯劉基參政馮冕等不陪祭而受胙上聞之曰基等學聖人之道而弗陪祀使弗學者何以勸既不與祭而享其胙於禮可乎其武人不知禮道者皆不足責命停基冕俸各一月寧坐不舉亦停俸半月自是不與祭者不頒胙七年正月定上丁遇朔日日食者改仲丁致祭時二月丁酉日食禮臣引禮記曾子問所載當祭日食牲至未殺則止唐六典釋奠有故改用仲丁元延祐六年二月丁亥朔日食改用十一日丁巳釋奠今擬二月十一日仲丁遣官行禮其正月三十日降香仍舊從之十一年七月命今後各處祭祀都用帛不用紙十五年正月作先師孔子廟去塑像用木主四月詔天下通祀孔子賜學糧增師生廪膳上諭禮部尚書劉仲質曰孔子明帝王之道以教後世使君君臣臣父父子子綱常以正彜倫攸叙其功參乎天地今天下􅇿縣廟學並建而報祀之禮止行京師豈非缺典卿與儒臣其定釋奠禮儀頒之天下學校令以每嵗春秋仲月通祀孔子初釋奠之禮儀止曲阜林廟刑部尚書錢唐疏言孔子百王宗師先儒謂仲尼以萬世為土祀孔子如天下祝聖夀報本之禮不可廢也吏部尚書程徐亦上疏其畧曰曠古以來帝王之治天下教養而已民無社稷三皇則無以生非孔子之道則無以立斯二者在國家在萬世不可一日㦯廢者也故冇國者祀之徧天下無非為維持人心世道之計而人以崇本始報功施之典耳三代而上若堯舜文武周公皆聖人也然而發揮三綱五常之道載之於經以之儀範百王師表萬世使世愈降而人愈不墜者孔子之力也孔子以道設教其心未嘗一日忘天下天下祀之非祀其人祀其教也祀其道也天下不可一日無孔子之道則教不可一日廢天下不可一日無孔子之教則祀不可一日廢使天下之人必讀其書由其教行其道而不得通祀焉非所以崇本始報功施也從之五月乙丑幸國子監謁先師行釋菜禮自經始國學車駕數臨視焉至是成上謂禮部尚書劉仲質曰國學新成朕將釋菜令諸儒議禮議者曰孔子雖聖人臣也禮宜一奠而再拜朕以為孔子明道徳以教後世豈可以職位論哉昔周太祖如孔子祠將拜左右曰孔子陪臣不宜拜周太祖曰百世帝王之師敢不拜乎遂再拜朕深嘉其明斷不惑於左右之言今朕有天下敬禮百神於先師之禮宜加尊於是仲質上議服皮弁服執圭詣先師再拜獻爵後又再拜退易服詣彜倫堂祭酒司業博士助教進講賜坐侍臣以次東西列坐講畢宣諭師生明日表謝上從之視學釋菜禮成御講筵畢諭諸臣曰中正之道無踰於儒上古聖人不以儒名而徳行實儒後世儒之名立雖有儒名或無其實孔子生於周末身儒道行儒行立儒教率天下後世之人皆欲其中正惜乎魯國君臣無能用之者當時獨一公父文伯之母知其賢責其子之不能從則一國君臣可愧矣卿等為師表正當以孔子之道為教使諸生咸趨乎正則朝廷得人矣復取尚書大禹臯陶謨洪範親為講說反復開諭羣臣聞者莫不悚恱賜宴竟日而還十六年正月令祭酒朔望行釋菜禮郡縣長以下詣學行香丘濬曰朔望行香之禮古未有也北齊每月朔祭酒博士諸生展拜階下郡縣朔朝是時未爇今所謂香也然朔日行禮始此其後遂以朔望行香朱熹曰謁宣聖焚香不是古禮捻香不當叩頭只直上捻香耳却出笏叩首而降拜由是言之則在宋已有矣其行禮當以朱氏言為則十七年六月辛巳命禮部製大成樂器甲午諭禮部臣曰近命製大成樂器將以頒天下學校俾諸生習之以祀孔子朕思古人之樂所以防民欲後世之樂所以縱民欲其故何也古樂之詩章平而正後世之歌詞淫以誇古之律吕協天地自然之氣後之律吕出人為智巧之私天時與地氣不審人聲與樂音不比故雖以古之詩章用古之器數亦乖戾而不合陵犯而不倫矣手擊之而不得於心口歌之而非出於志人與樂判然為二而用以動天地感鬼神豈不難哉然其流已久救之甚難卿等宜求諸此俾樂成而頒之諸生得以肄習庶㡬可以復古人之意嗚呼古今樂之不相及也聖諭諄諄焉教化本源實在於此今學校祀典樂器不具青衿子冇白首而未覩雅樂為何物者二百餘年崩壊滋甚未審學校以何為教古者仲春合舞季春合樂仲秋合聲於此時天子親往祀焉奈何提調有司不以屑意哉二十六年頒大成樂器於天下府學令州縣學如府式始定舞用六佾樂用登歌成祖文皇帝永樂四年三月辛卯朔視太學先是勅禮部曰朕惟孔子百世之師帝王為生民之主孔子立生民之道三綱五常之禮治天下之大經大法皆孔氏明之以教後世朕皇考太祖髙皇帝膺君師億兆之任正中夏文明之統復衣冠禮樂之舊渡江之初首建學校親祀孔子御筵講書守帝王之心法繼聖賢之道學集其大成以臻至治朕承鴻業惟成憲是遵今當躬詣太學釋奠先師以稱崇儒重道之意其合行禮儀禮部詳議以聞尚書鄭賜言宋制謁孔子服鞾袍再拜上曰見先師禮不可簡必服皮弁行四拜禮於是悉如洪武儀注禮畢御彜倫堂諭諸臣曰六經聖人之道彌綸天地昭揭日月垂憲萬世率由彜訓與卿等皆勉之命光禄寺賜百官茶翊日表謝賜師生宴及衣鈔立視學之碑於國學先師廟墀西御製文曰朕惟帝王之興必首舉學校之政以崇道徳𢎞教化正人心成天下之才致天下之治唐虞三代之盛率由於兹後世之君其學政或修或否是以治不古若也我皇考聖神文武欽明啟運峻徳成功統天大孝髙皇帝龍飛淮甸渡江首建學校親祀孔子日引儒臣講論經義求古聖人之道身體力行既統有萬方即詔府州縣皆立學天下士子雲集京師復作新廟學於雞鳴山之陽親製教條頒布中外又命天下增廣生員復其家府州縣皆命春秋有事孔子賜以樂舞徳教廣被海外諸國及蠻夷酋長幷遣子入學教化之隆視古為盛朕纘承大統仰遵成憲乃永樂四年三月朔日詣廟庭謁先師孔子前期三日雨將事之夕􅙨雨澄霽星緯昭明暨旦天宇穆清旭日鮮麗舎菜於廟退即彜倫堂文武羣臣咸侍左右師儒在席諸生序列堂下命祭酒胡儼等以次講經成禮而還夫學以明道也道之體廣大光明配乎天地日月而其實不離乎日用彜倫之間孔子明之上以承堯舜禹湯文武之傳下以為後世植綱常開太平於無窮而世之極其尊崇其禮者非於孔子有所增益特以著明其道之至大天下不可一日而無也惟我皇考繼統帝王尊師孔子舉天下皆約之使由於斯道是以治化之盛隆洽周徧薄海内外罔不嚮風慕義朕景仰洪謨夙夜祗敬思維繼承之道不敢怠荒爰因視學謹叙述皇考所以致隆治化之本勒石於廟俾我子孫臣庶尚克欽承於千萬年八年正文廟聖賢繪塑衣冠令合古制英宗睿皇帝正統三年禁天下祀孔子於釋老宫令祭丁品物非其土産者鹿以羊代榛棗以所産果品代九年春新建北京太學成三月臨視行釋奠禮先是太學猶因元陋吏部主事李賢上言國家建都北京以來所廢弛者莫甚於大學所創新者莫多於佛寺舉措如此可謂舛矣若重修太學雖極壯麗不過一佛寺之費宜諭及時修舉以致養賢及民之效從之景皇帝景泰六年二月乙卯詔兩廡從祀先賢增豕四棗栗各五十斤黍稷各一斗形鹽五十斤用太常卿許術言也憲宗純皇帝成化元年視學行釋奠禮蔡復賞曰按朱熹曰弟子見師其贄束修若禮扵先師則釋菜其禮比釋奠為最簡不酌鬯不列饌不作樂不授器我太宗躬謁先師行釋菜禮至憲宗則行釋奠何若是其不同乎伏覩太祖因禮部定奏天子親祀與遣官致祭之儀嘗諭之曰凡祭享之禮載牲致帛交於神明費出已帑神必歆之如庶人陌紙瓣香皆可格神不以菲薄而弗享者何也所得之物皆已力所致耳由是言之則釋奠釋菜惟在於致力之何如而不在於物之詳與畧也我祖宗之承祀也尊醪俎饌皆供之於耕籍而頒之於太常其交於神明者信得其道矣書曰黍稷非馨明徳惟馨其斯之謂與十三年閏二月丁丑釋奠初用八佾籩豆各十二遣官祭告其文曰惟王生知之質天縱之聖道徳配於二儀教法昭於萬世􅃡懐功烈宜極褒揚顧冕服之章數雖隆而祀享之儀物弗稱爰考儀章參合輿論增樂舞為八佾加籩豆為十二盖用祭天享地之禮樂庶副尊師重道之本意也特遣儒臣用申祭告王其鑒知謹告先是祭酒周洪謨奏請加孔子封號改大成至聖為神聖廣運若謂孔子陪臣不當稱帝則宋儒羅從彦嘗曰唐既封先聖為王襲其舊號可也加之帝號而褒崇之亦可也所封乃當時天王之王既正南靣之位宜服冕十二旒衣十二章十籩十豆各增為十二增六佾之舞為八佾又言古者鳴球琴瑟堂上之樂笙鏞柷敔堂下之樂而干羽舞於兩階今舞羽居上而樂器居下非古制也宜改正下禮官議尚書鄒幹言正統十二年御史李奎奏請加封孔子英宗皇帝制曰孔子萬世帝王所尊已有大成至聖之號祖宗已來既仍其舊不必損益今神聖廣運乃伯益贊堯之辭不若大成至聖本於孟子中庸猶可擬議也洪武中新剏南京太學止用神主不設塑像故當時祭酒宋訥奉勅撰文有像不土繪祀以神主百年舊習乃革之語今北監所有塑像乃仍元舊不忍撤毁故有冕旒原非聖朝之制而籩豆樂舞之數祖宗斟酌已有定式矧易諡號加器數舉不足為孔子重輕所貴乎孔子之道者在身體力行乃尊崇之實耳加封籩豆樂舞俱當仍舊洪謨復請上曰尊崇孔子朝廷盛典籩豆佾舞如洪謨言增之自是羽舞始居下云孝宗敬皇帝𢎞治元年三月視學釋奠先師用太牢加幣改分獻為分奠從吏部尚書王恕之請也世宗肅皇帝嘉靖九年十二月詔釐正祀典御製正孔子祀典說曰朕惟孔子之道王者之道也徳王者之徳也功王者之功也事王者之事也特其位也非王者之位焉昨輔臣少保張璁再疏請正其號稱服章等事已命禮官集翰林諸臣議正外惟號與服章二事所闗者重亦闗於朕者不得不為言之朕惟我聖祖髙皇帝應天作辟以繼羲農堯舜而君天下傳至我皇兄皇兄升遐以朕為我皇考至親之子命入奉大統繼承宗祀以主郊廟百神爾豈敢於義理不當為者而率為之兹所議祀典亦未為輕而號稱章服實又重焉孔子當周家哀時知其不能行王者之道耳乃切切以王道望於魯衛二國二國之君竟不能明孔子之道孔子既逝後世至唐𤣥宗乃薦諡曰文宣加以王號至元又益其諡為大成夫孔子之於當時諸侯有僭王者皆筆削而心誅之故曰孔子作春秋而亂臣賊子懼孔子生如是其死乃不體聖人之心漫加其號雖曰尊崇其實目為亂賊之徒是何心哉又我聖祖當首定天下之時命天下崇祀孔子於學不許祀於釋老宫又除去塑像止令設主樂舞用六佾籩豆以十可謂尊崇孔子極其至矣無以加矣特存其號豈無望於後人哉亦或當時草創未暇歟至我皇祖文皇帝始建北京國學因元人之舊塑像猶存盖不忍毁之也又至我皇祖考用禮官之議增樂舞用八佾籩豆用十二牲用熟而上擬乎事天之禮也畧無忌焉夫孔子設或在今肯安享之昔不觀魯僭王之禮寧肯自僭祀天之禮乎果能體聖人之心决當正之也至於稱王賊害聖人之甚王者已有是徳宜居是位堯舜是也無其徳而居是位者昏亂之君如桀紂幽厲是也若至於後世之為君而居王者之位者其徳於孔子或二三肖之十百肖之未有能與之齊也至我太祖髙皇帝雖道用孔子之道而聖仁神智武功文徳宜與堯舜並矣恐有非孔子所可擬也由是觀之王者之名不宜偽稱王者之徳不容偽為偽稱者近於僭亂偽為者其實有未盡之也至於章服之加因其位耳孔子昔曰名不正則言不順言不順則事不成何其不幸身遭之哉夫既以王者之名而横加於孔子故使顔回曾參孔伋以子而並配於堂上顔路曾晳孔鯉以父從列於下安有子坐堂上而父食於下乎此所謂名不正者焉皆由綱領一紊而百目因之以隳傳至有宋而程頥以親接道統之傳遂主英宗不父濮王之禮誠所謂是可忍也孰不可忍也之明驗哉今也不正滋來世之非道將見子不父其父臣不君其君内離外叛可勝言哉除待該部集議施行兹朕不得不辨亦不得不為輔臣辨璁也為名分也為義理也非諛君也非滅師也若朕所正者亦如是所以防閑於萬世之下也設或有謂朕以位而凌先師實非知原心者是為說又御製正孔子祀典申記於是禮官上議通行天下學校去塑像為木主題曰至聖先師孔子神位改大成殿為先師廟殿門為廟門四配稱復聖顔子宗聖曾子述聖子思子亞聖孟子神位十哲以下及門弟子皆稱先賢某子神位左丘明以下稱先儒某子神位罷公侯伯諸封爵進后蒼王通歐陽修胡瑗陸九淵黜諸不當祀者公伯寮等罷林放等七人祠於鄉别祠叔梁紇其木主稱啓聖公孔氏神位以顔無繇曾㸃孔鯉孟孫氏配俱稱先賢以程珦朱松蔡元定從祀稱先儒而先師之祭國學十籩十豆郡縣學八籩八豆樂舞俱止用六佾舊樂章宣聖改曰孔聖聖王改曰聖師維王改曰維師大抵皆閣臣張璁議也得旨俱准議行仍改神位作之位云宋洪邁曰自唐以來相傳於孔門髙弟顔淵至子夏為十哲坐祀於廟堂上其後升顔子配享則進曾子於堂居子夏之次以補其闕然顔子之父路曾子之父㸃乃在廡下從祀之列子處父上神靈有知何以自安所謂子雖齊聖不先父食正謂是也曾姚燧曰江之左進曾子子思並顔孟别躋子張於子之舊由孟子而視子思師也由子思而視曾子又師也子思孔子孫也弟子於師孫於祖坐而語道者有之非可並南面燧知四子已避讓於冥冥中不能一日自安其身於一堂之上又祀無繇㸃鯉於廡其失在於崇子而抑父夫為是學宫將以明人倫於天下而倒施錯置於數筵之地如是奚以為訓熊禾曰宜别設一堂以齊國公叔梁紇居中南面顔路曾晳孔鯉孟孫氏侑食東西向春秋二祀當先聖酌獻之時以齒徳之尊者為分獻官行禮於齊國之前其配位亦如之如此則亦可以示有尊而教民孝矣𢎞治中侍講學士程敏政奏曰自唐宋以來以顔子曾子子思孟子配享坐堂上而顔子父無繇曾子父㸃子思父鯉皆坐廡下臣考之禮子雖齊聖不先父食而三代之學皆所以明人倫也夫孔子之所以為教與諸弟子之所以為學者不過明此而已今乃使子坐於上父坐於下豈禮也哉若以為此乃論傳道之功則自古及今未有外人倫而言道者恐諸賢冥冥之中必有不安於心乞於各處廟學别立一祠中祀啓聖王以杞國公顔無繇萊蕪侯曾㸃泗水侯孔鯉邾國公孟孫氏配享臣又觀聖學失傳千五百年程朱出而後孟氏之統始續則程朱之先亦不可缺况程子之父大中大夫封永年伯程珦首識濂溪周子於屬掾之中薦以自代而又使二子從逰朱子之父韋齋先生追諡靖獻公朱松臨沒之時以朱子託其友籍溪胡氏而得程氏之學珦以不附王安石新法退居於洛松以不附秦檜和議奉祠於閩其歴官行已俱有稱述乞將程珦朱松從祀啓聖使學者知道學之𫝊有開必先明倫之義不為虚文矣是時祭酒謝鐸亦持别祀啓聖之議以部議不合而止至是大學士張璁條議及之乃舉行桂萼曰嘗讀宋史有蔡元定者史曰朱熹疏釋四書及易詩傳通鑑綱目皆與元定參訂啓䝉一書則元定之藁又曰朱子論易推本圖書往往與元定往復而有發焉考其所著有律吕新書皇極指要洪範解大衍詳說等書性理全書指要新書固已備錄至於範數雖止入其子沈所著沈之所受則何自哉真徳秀謂範數西山獨得之沈之受於元定可知矣元定勤斯道而􅇡死與古以死勤事者同所宜從祀張璁是其說亦祀啓聖祠十年以釐正服皮弁謁廟用特牲奠帛行釋奠禮迎神送神各再拜三樂三奏文舞六佾配享從祀及啓聖祠分奠用酒脯亦遣官致祭於南監及闕里其文曰維嘉靖十年嵗次辛卯月日皇帝致祭於先師孔子曰自昔混沌之初天命羲農軒聖創世開物以至堯舜禹湯文武周公及先師列聖相繼奉天行道立教誨人肆我聖祖再造區宇化行天下我聖祖崇禮於先師者御製有文典冊具在予惟寡昧之人近仰遵祖憲去䙝慢之偶像如祖制崇禮之聖謨號稱核實爼豆究本以遵祖典兼體先師至意予實不聰賴先師黙鑒及良輔洪儒所贊之也爰擇令辰奉安先師神位以及配從之位於此惟先師鑒知永依陟降大運神化教我君民俾予性理早開而無負皇天付託之眷命暨士庶學業咸正而無違先師傳道之至情子實有望焉先師鑒之以復聖顔子宗聖曾子述聖子思子亞聖孟子配尚饗遂各鐫於石增構二碑亭如洪武永樂之制云丘濬曰塑像之設中國無之至佛教入中國始有也三代以前祀神皆以主無有所謂像設也彼異教用之無足怪者不知祀吾聖人者何時而始為像云觀李元瓘言顔子立侍則像在唐前已有矣嗚呼姚燧有言北史敢有造泥人銅人者門誅則泥人固非中土為主以祀聖人法也後世莫覺其非亦化其道而為之郡異縣殊不一其狀長短豐瘠老少美惡惟其工之巧拙是隨就使盡善亦豈其生盛徳之容甚非神而明之無聲無臭之道也增張璁籩豆樂舞議曰夏寅曰籩豆增為十二六佾為八佾惟太學可行此皇上所自祭也若十三布政司各府行之則祭禮僭矣盖天子之禮所以用於太廟郊天古之諸侯惟杞宋王者之後得用先代禮樂他雖周公有大功魯用天子禮樂孔子亦不欲觀以其僭也况於今各府可用天子禮樂乎臣竊惟夏寅之論所以矯當時之失其曰天子之禮所以用於太廟郊天誠然矣然惟孔子敬天之心八佾十二籩豆之禮肯安然享之而同於天乎魯用天子之禮樂孔子誠不欲觀之矣然推孔子尊君之心八佾十二籩豆又肯安然享之而同於天子乎璁既請正孔子祀典又撰或問以進其文曰或問孔子祀典自有唐以來稱號定矣子必願皇上正之者何也臣答曰為尊孔子也為人道大倫也聖人人倫之至也孔子以徳則師也以位則臣也大倫正而後孔子之道尊故曰尊孔子也然非愚一人之見也今昔諸儒之公論也世之人徒知以封王尊孔子而實不知所以尊也或曰孔子封號聖祖詔仍元舊也臣答曰聖祖初未嘗為孔子作諡號也仍元舊耳按洪武三年詔曰夫禮所以明神人正名分不可以僭差歴代忠臣烈士依當時初封以為實號後世溢美之稱皆與革去其孔子善明先王之要道為天下師以濟後世非有功於一方一時之可比所以封爵宜仍其舊夫封號祀神瀆禮極矣名之不正甚矣聖祖一切革去獨存孔子祀典者實以孔子明先王之道為天下師也曰為天下師聖祖實尊之以師也非以王號也祖訓凡傳制遣官代祀厯代帝王孔子廟於帝王則直曰帝王於孔子則直曰孔子故凡祭祀遣命俱稱先師孔子實未嘗有以王號稱之者也夫孔子稱文宣王太公稱武成王實始於開元之制也洪武二十年禮部奏請如前代故事立武學仍祀太公建武成王廟聖祖曰太公周之臣封諸侯若以王祀之則與周天子並矣加之以非號必不享也太公之祀止冝從祀帝王廟遂命去其號罷其舊廟觀此則孔子專廟祀之實聖祖尊之以師之故其不王孔子之意亦自可見矣不然孔子道徳雖非太公可擬然以周天子視之則皆臣子也加以非號太公既必不享也孔子又豈肯享哉或曰尊崇之禮其來尚矣凡為人君者皆追崇其祖父孔子師也獨不可追崇乎臣答曰此國朝陳守仁之論也其言曰孔子道徳教化之盛賢堯舜而配天地自生民以至於今一人而已後世人君皆師之則皆其弟子也稱為先師固當矣若追崇之典必當臻乎極而後已焉周公制禮追王其父祖前未有也師生之義與父子之恩同子可以追王其父則生亦可以追王其師况孔子义萬世一人後王實被罔極之思者乎噫斯言也悖也甚矣夫子而追崇其父周公之制也弟子而追王其師古有是制乎信斯言也成湯之於伊尹學焉者也亦追崇伊尹可乎哉或曰孔子有天徳王道者也追崇為王奚為不可臣答曰孟軻氏曰匹夫而有天下者徳必若舜禹而又有天子薦之者故仲尼不有天下夫昔者堯薦舜於天矣舜薦禹於天矣故舜禹之有天下天與之也孔子之徳雖無愧於舜禹而無天子薦之者故不有天下自夫唐𤣥宗加孔子以王號也末世因之若將使孔子有天下者也以為尊孔子也噫欺天甚矣或曰然則周惇頥以為萬世無窮王祀夫子其言不足證矣臣答曰周惇頥曰春秋正王道明大法也孔子為後世王者而修也亂臣賊子誅死者於前所以懼生者於後也宜乎萬世無窮王祀夫子報徳報功之無盡焉夫王祀孔子自唐宋未之有改也惇頥之意特主言孔子功徳之隆宜萬世報之無盡焉耳夫豈既以孔子正王道明大法也而復以王祀為宜乎讀者不以辭害意可也或曰孔子王號自唐宋至今未之有改也雖三尺童子皆知所尊也臣答曰三尺童子皆知所尊者尊孔子以師也非以王也有人於此列堯舜禹湯文武之像而祀之其罹刑禁也必矣孔子雖三尺童子皆得以祀之尊之以師故也或曰塑像之設果非禮乎臣答曰非禮也諸儒已論之詳矣又按國朝宋濂曰不以古之禮祀孔子是䙝祀也䙝祀不敬不敬則無福開元之制摶土而肖像焉則失神而眀之之義矣或曰孔子塑像固非禮也然仍元之舊一旦毁之忍乎臣答曰以土梗為孔子也為禮也誠一旦不忍毁也以土梗非孔子也非禮也則不可不亟毁之矣毁之所以尊孔子也以全禮也夫奚疑哉或曰塑像毁矣無假於章服矣然則籩豆樂舞之數其仍舊可乎一旦殺之忍乎臣答曰以籩豆樂舞之加為尊孔子也為禮也誠一旦不忍殺之矣以籩豆樂舞之加非尊孔子也非禮也則不可不亟殺之矣殺之所以尊孔子也以全禮也夫奚疑哉或曰祭用生者之祿天子以天子之禮樂祀其先師矣奚不可臣答曰祭用生者之禄人子推之以祀其父則古禮也弟子推之以事其師則古禮未之有聞也杞宋用天子禮樂以祀其先為二代王者後也若魯以周公之功用天子禮樂則非禮矣孔子謂季氏八佾舞於庭是可忍也孰不可忍也又謂俎豆之事則嘗聞之矣然則八佾十二籩豆天子之禮樂也孔子肯安然享之乎或曰廟仍以殿名可乎臣答曰孔子學宫之祭本古弟子釋奠先師之禮也謂廟可也非殿也或曰孔子祀典之正將行之天下也然則闕里如之何臣答曰孔子之後其𫝊者宜莫如子思也昔魯哀公誄孔子曰尼父子思作中庸則直稱曰仲尼固未嘗援之為孔子重也曾子將死起而易簣責曾元曾申曰君子之愛人也以徳細人之愛人也以姑息是不安用大夫之禮也孔子豈肯安然享天子之樂乎又子思曰今天下車同軌書同文行同倫言天下一統也奚疑於闕里乎哉或曰聖明在上凡諸祀典誠不可不正也無乃太速乎臣答曰天地定位日月隂陽各正其所禮儀有成典矣夫孔子與天地合其徳日月合其明實亦祀典之大者不可不急正者也非速也宜也按天順中林鶚知蘇州府時蘇學廟像多剝落或請修飾鶚曰塑像非古我大祖於大學易以木主百年俗乃革彼未壊者猶當毁之况遇其壊乎可易以木主或以毁聖賢像為疑鶚曰此上泥耳豈聖賢耶孔子生於佛教未入中國之前烏識所謂泥像哉况古人席地而坐政不如此也於是併從祀諸賢皆易木主云盖當時南京蘇州已遵聖祖之制而天下郡邑尚多拘泥未改至是始盡釐正甚矣俗見之難破哉噫古教之不易復也事尚有甚於木主者二十一年八月初十日丁祭是日恭遇萬夀聖節又孝慈髙皇后忌辰禮官議先拜牌次行香次祭孔子從之頖宫禮樂疏卷一
