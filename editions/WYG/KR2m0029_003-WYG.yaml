奠三始立學天子視學出征告訊是也所謂釋奠有牲幣有合樂有獻者大祝之釋奠吿祭也而凡吿必用牲幣載於曾子問與夫始立學釋奠以幣此牲幣之證文王世子釋奠必有合劉敞曰合樂也此合聲與舞之證聘禮觴酒陳席於阼薦脯醢三獻一人舉爵獻從者行酬乃出此獻酬之證今牲帛樂舞咸具而獻酬則苐存飲福行於三獻之後葢其簡也古者四時常祀苐祀先師周禮凡有道者有徳者使教焉祭於瞽宗此謂先師若禮有髙堂生樂有制氏之類此謂經師葢學生常祀惟此三禮義宗所謂四時入學不及先聖天子視學廼祭先聖與夫立學吿訊亦兼先聖先師者是也或曰舜禹湯文為先聖當時左右四聖成其德業者為先師古無明文然舜禹湯文帝王之師天下學校祀之則僭常祀則凟惟吾孔子之聖生民未有自天子達於庶人均之有師道焉稱曰至聖先師孔子而配享者從祀者苐稱先賢先儒禮有隆殺祀通天下葢萬世不能易也祀名釋奠故𢎞治間改分獻為分奠今賛者猶稱分獻似誤釋菜詁釋菜亦曰舎菜亦曰舎萌大胥春入學舎菜合舞鄭司農以菜為蔬食菜羮之菜康成云舎即釋也菜蘋藻之屬舎萌者占夢季冬乃舎萌於四方是也注云舎萌猶釋菜也萌菜始生也士昏禮婦奠舅姑執笲菜毛詩采蘋于以奠之宗室牖下葢釋菜之禮猶摯然婦見舅姑摯用􅀥栗腵脩若沒而廟見則釋菜弟子見師摯用束脩若禮於先師則亦釋菜至於舎萌以贈惡夢則用以祓矣䘮大記大夫士既殯而君往弔焉釋菜於門内亦用以祓此皆不但為摯用也故知釋菜禮輕非釋奠比而注王制者以釋奠獻馘為釋菜奠幣則遂混釋菜釋奠而一之南齊王儉以為始教皮弁釋菜示敬道也中朝以來釋菜禮廢今之所行釋奠而已則是釋菜更隆於釋奠乎文王世子始立學者既興釁器用幣然後釋菜不舞不授器葢釋奠則舞舞則司兵司戈司盾授舞者器釋菜不然虞庠儐于東序一獻無介禮皆最簡即大胥有舎菜合舞乃先舎菜後合舞也樂正習舞釋菜亦將習舞先釋菜也入學也釁器也皮弁也頖宮之舎菜有三而總之皆以芹藻薦忱茍有明信澗溪沼沚之毛蘋蘩薀藻之菜筐筥錡釜之器潢汙行潦之水可薦於鬼神此之謂也今制月朔釋菜僅行之於國學而郡國則於朔望之晨爇香展謁而已然爇香於古未有郊特牲曰蕭合黍稷臭陽達於墻屋故既奠然後焫蕭合羶薌凡祭慎諸此陳澔曰蕭香蒿也取此蒿及牲之脂膋合黍稷而燒之使其氣旁達於墻屋是以臭而求諸陽今不奠而焫香木與夫奠而不焫蕭合羶薌非古義矣香木多出嶺南成周盛時未入包匭近世迺多用之以祭朝廷時或遣使降香致敬所謂禮時為大殆此類乎抑或聖人聲教既已施及蠻貊以其方物附於薦馨固亦無所不可乎齋戒詁祭所以交神明也神明其徳防其邪物訖其嗜欲心不茍慮必依於道手足不茍動必依於禮身不聴樂不敢散其志所以致精明之徳而齊不齊以致其齋也散齋七日以定之致齋三日以齊之致齋於内散齋於外是故先期十日太宰率執事而卜日遂戒大司㓂於戒之日涖誓百官戒於百族而又協之以太史審之以遂師相之以司士卜之日王立於澤親聴誓命獻命庫門之内戒百官也太廟之命戒百姓也其戒曰各惕其職百官廢職服大刑滌狼氏執鞭以趨誓之以殺轘鞭墨嚴之至也既戒而散齋矣散齋雖豫外事不御不樂不弔不飲酒不茹葷不賓不鳴佩䘮者則弗見也不蠲則弗見也凡不以哀欲惡貳其心而已致齋則王即齋宮百官御事各即其齋晝夜處於適寝不豫外事祭義所謂思其居處思其笑語思其志意思其所樂思其所嗜齋三日必見其所祭者精誠之極也而後可交於神明三日齋七日戒此常禮也迺先儒謂人君卜日則散齋卜尸則致齋大夫前祭一日筮尸則散齋九日致齋一日士前祭三日筮尸則致齋三日則其禮有隆殺焉至於飲食車服亦與恒異膳夫五日三舉玉府王齊則共食玉鬯人齊事共其秬鬯及期物人薦鬯犧人薦醴則齋食異饌也諸侯𤣥冠丹組纓士𤣥冠綦組纓與夫綪佩爵􅔖𤣥端素端則齋服異色也君羔幦虎犆大夫士鹿幦豹犆則齋車異飾也王制天子齋戒受諫冡宰齊戒受質月令先立春三日天子迺齊昏禮𤣥冕齊戒玉藻將適公所齊戒居外寝沐浴儀禮疾者齊處適寝國語耕籍齊三日古者凡有大事致其恭敬則無所不齊而祀典為尤重云我聖祖諭陶凱曰經言鬼神無常享享於克誠人謹方寸於此而能格神明於彼由至誠也然人心操舎無常必有所儆而後無所放耳迺命禮部鑄銅人髙尺五寸手執簡書曰齋戒三日致齋則致朕前庶朕心有所儆惕而不敢放也又曰釐齊心志對越神明此心不能不為事物所動檢持甚難葢防閑此身使不妄動則自信已能若防閑此心使不妄動尚難能也葢檢心如此而後可為神明其德祭則受福此非與祭臣工共當恪遵無斁者乎令甲凡遇大祭祀前期七日陪祭官詣中書省受誓戒曰某月某日皇帝有事於某神爾百官其聴誓戒祭祀必先齊戒然後可以感神眀戒者禁止其外事齊者整齊其内心凡戒是沐浴更衣别於乾浄房舎宿歇不飲酒不食蔥韭薤蒜不問疾不弔䘮不聴樂不理刑名不與妻妾同處此便是戒凡齋是専一其心十分謹慎不思别事才舉意時便想着合祭那箇神道模様如在虛空如在頭上如在靣上如此思想謹慎使其心至誠此便是齋如大祭祀齋戒七日前四日戒後三日齋爾百官受誓之後各惕其職不共其事國有常刑此洪武二年禮部所擬也奉聖㫖大祀宗廟是我祖宗只教百官齋戒三日餘准所擬後二年仍定祀天地齋戒十日太廟社稷七日山川百神五日先農三日兩京孔廟之祭則先期十日行㑹四日演樂隔日庀事外􅇿國則先一日演樂齋宿然亦有不盡然者夫齋戒宜稟令甲况士人誦法孔子一嵗兩祀此而猶然忽諸不知其可也祭時詁祭必用丁葢丙丁屬火文眀之象而丁其眀之盛丙其眀之初故祠令用丁不用丙至日質眀行事亦取隂陽之交神屬隂神就人隂交陽也故求之隂陽之介古者天子視學大昕鼓徵所以警衆也衆至然後天子至焉命有司興秩節致祭先師先聖小宗伯祭之日吿時於王雞人大祭祀掌夜嘑旦以􅑧百官康成曰夜夜漏未盡時也嘑旦以警起百官使夙興則質眀在昧爽後也子路為季氏宰季氏逮闇而祭論者以為不敬他日祭子路與室事交乎户堂事交乎階質眀而始行事晏朝而退孔子聞之曰孰謂由也而不知禮乎唐制凡祀以日未明十五刻大官令率宰人以鸞刀割牲祝史以豆歛毛血置饌所釋奠孔廟未明三刻諸饗官各服祭服入久之刺史方至又皇太子釋奠平明服學生之服立於門外葢夜而割牲無夜祭者至宋釋奠仲春用丑時七刻仲秋用丑時一刻則夜半而祭不止逮闇矣或者先期省牲不欲久頓秋暑未退更為夙戒乎然日取文明時用幽闇於義為舛藻嘗陪祀國學見其漏盡二鼔輙祭心竊非之旋有具疏論之者謂非祭丁迺祭丙然亦未能改也􅇿國尤無定時竊謂宜師古禮定以質明行事庶俾廟庭禮儀更肅橋門觀聴更新耳郊特牲饋食迺諸侯士祖禰祭禮而其儀曰厥明日夙興朱子家禮凡祭告皆用厥明固知釋奠先師不必以未央之夜為敬也古者祭饗皆設庭燎司烜共之火師監之其數則天子百公五十餘三十以為不若是則不嚴且敬也今皆廢而不用尤非質明不可省牲詁大亨之饗牲牷為重周禮牧人掌之凡陽祀用騂牲毛之隂祀用黝牲毛之望祀各以其方之色牲毛之凡時祀之牲必用牷物外祭毁事用尨可也純色謂牷完體謂犧祭之日君牽牷卿大夫序從司徒奉牛宗伯奉雞司馬奉馬羊司㓂奉犬司空奉豕太宰太僕賛事封人共水藁充人共其互與盆簝諸侯則士執芻君執鸞刀羞嚌詩云執其鸞刀以啓其毛凡大祭祀皆然不止於郊丘廟社而已也大宗伯祀大神享大鬼祭大示宿眡滌濯省牲鑊小宗伯大祭祀省牲眡滌濯及詔於庭而麗於碑則王射之國語曰禘郊之事天子必自射其牲然考周禮司弓矢凡祭祀共射牲之弓矢則射牲之禮凡祀皆然亦非特行於禘郊也漢郊祀志武帝祠后土令侍中儒者皮弁縉紳射牛葢猶行古之道者矣夫古者養老之禮天子袒割况先聖先師之祭哉今制國學之祀用大牢牛羊豕各一牛用黄黝純色太常供牲祠官監宰獻官分獻官省之外􅇿國用少牢則羊豕各一而已牲無常牧臨時取辦先祭一日省牲如常儀燔瘞詁爾雅祭天曰燔柴祭地曰瘞埋祭山川曰􅔑縣祭川曰浮沈周禮以禋祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌師雨師以血祭祭社稷五祀五嶽以貍沈祭山林川澤記曰燔柴于泰壇祭天也瘞埋于泰圻祭地也又曰列祭祀瘞繒則古禮燔非特帛瘞非特毛血也其禮之先後説亦不同崔靈恩謂祭天以燔柴為始祭地以瘞血為先是燔瘞各有所先賈公彦以為燔瘞在作樂降神之後而禮神又燔瘞之後則燔瘞俱在祭先曾子問曰天子將出必以幣帛皮圭吿於祖禰反必吿設奠卒歛幣玉藏諸兩階之間乃出此則所謂瘞繒者又瘞於既事之後矣郭璞云祭天既祭積柴燒之祭地既祭埋藏之則燔瘞亦俱在後與崔賈説異周魏之間燔柴皆在祭末所燔則漢用牲首晉用左胖唐用牲脅以祭義考之升首所以報陽則天地燔瘞固當用首乃周禮羊人犬人亦有伏瘞則是凡牲皆瘞也詩云圭璧既卒書金縢爾之許我我其以璧與圭歸俟爾命則亦幣玉皆瘞之證今制幣燎於祭畢毛血瘞於迎神與古不同葢毛血所以瘞者禮運云薦其血毛禮器云血毛詔於室國語云毛以吿物血以吿殺葢血在内為吿幽毛在外為吿全以明表裏之純故用之於祭先也儀禮大夫士無祼禮故殺牲而後迎牲迎牲而後迎尸天子諸侯有祼禮故迎尸而後迎牲葢尸入則祼牲入則用幣於庭以吿將殺既殺則薦血毛於室以吿幽全既祼然後焫蕭所謂燔燎羶薌見以蕭光以報氣者也羶者膟膋之氣薌者黍稷之氣蕭合膟膋黍稷而燔燎之在朝事之節則燔多在前而血毛言詔不言瘞則瘞似在後然皆不可攷矣祼也瘞貍也皆求神於隂也燔柴瞷蕭燔帛皆求神於陽也今祀無祼古者大夫士之禮也抑亦宗廟有祼天地無祼義各有所重猶不失為敬之至也迎神樂詁周人尊禮而辨神於幽故先祼而求諸隂殷人尊神而求神於明故先樂而求諸陽郊特牲曰殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔吿於天地之間也周官大司樂凡樂黄鍾為宮大吕為角太簇為徵應鍾為羽於宗廟之中奏之若樂九變則人鬼可得而禮矣良由人神寥絶其接不易冥漠之表而欲以聲音召之非三闋九變未易感通宋大觀釋奠迎神曲黄鍾宫大吕角太簇徵應鍾羽各一成元制黄鍾宫乃至三成大吕角太簇徵應鍾羽各三成以合九變今所奏迎神苐用宋黄鍾一曲而調改太簇羽以義揆之九成固繁一奏則太迫矣且一奏初動而賛者即唱鞠躬是音樂未暢而神已來歆既不焫蕭以臭陽達墻屋又不祼鬯以臭隂達重泉雖几筵如在而降格似易言之宜於迎神之後獻官陪祭者凝立以待樂奏過半然後下拜庶幾得之拜儀詁兩手垂下曰拜周禮作􅉔今賛所謂鞠躬拜者即書稱拜手稽首是也禮曰拜服也稽手服之甚也拜手手拜也稽首首至地稽留也稽顙則以首叩地荀卿云平衡曰拜下衡曰稽首至地曰稽顙周禮大祝辯九􅉔一稽首二頓首三空首四振動五吉􅉔六㓙􅉔七奇􅉔八褒􅉔九肅􅉔葢以輕重叙之稽首之禮最重記曰大夫之臣不稽首避君也孟武伯曰非天子寡君無所稽首知武子曰天子在君稽首寡君懼矣是稽首者諸侯於天子大夫士於其君之禮也故以之事先師焉􅉐首則首頓於手而已説文􅉐下首也何註首叩地即起也晉穆嬴抱太子䪺首於趙宣子魯季平子頓首於叔孫則䪺首非施於尊者之禮矣空首不至於手苐空其首何註以為首至手而不相接振動者以手振動禮之輕者也鄭謂王動色變為振動之拜疑悮吉􅉔者拜而後稽顙㓙􅉔者稽顙而後拜説見檀弓奇􅉔者一拜也儀禮鄉飲鄉射聘禮士相見凡禮之殺者皆一拜也肅拜俯其手而肅之婦人與介者之拜也少儀曰婦人雖有君賜肅拜句為尸坐則不手拜句肅拜句所謂手拜者手至地也士昏禮婦拜扱地是也褒􅉔者鄭注褒讀為報再拜也古者非君非父非師但再拜而已故禮莫重於四拜唐宋釋奠苐再拜則太簡然唐制再拜者九宋制再拜者二十六則又太煩至送神又皆不拜繁簡葢胥失之今制前後皆四拜飲福再拜可謂得禮之中奠帛詁周官大宰以九賦歛財賄有幣餘之賦以祀五帝祀之日賛玉幣爵之事祀大神示亦如之小宰凡祭祀亦賛玉幣爵國語酬幣宴貨以示容合好故侑食有侑幣用饗有酬幣而禮神亦有奠幣所以將其誠敬也肆師立大祀用玉帛牲牷立次祀用牲幣立小祀用牲然攷典瑞所職則中祀未嘗無玉日月星辰有圭璧山川有璋邸是也小祀亦或用幣釋幣于禰釋幣于行與夫息民祈以幣大灾奉玉幣之類不一而足凡用幣之禮其色則天地四方各象其類大宗伯云各放其器之色是也宗廟則𤣥纁雜焉聘禮制𤣥纁注以為𤣥纁之率𤣥居三纁居二是也其數則十端為束曾子問禆冕執束帛升聘禮𤣥纁束是也其長則一丈八尺天子廵狩禮所載是也其奠則或於几上或於几下曾子問奠于殯東几上聘禮𤣥纁束奠于几下出是也其埋則廟階之間曾子問歛幣玉藏諸兩階之間聘禮埋於西階東是也古者有燔瘞之幣有禮神之幣有從爵之酬幣酬幣施於賓主之侑與酬也非祭祀所用今祭禮神之幣名曰制帛正位用綾餘用絹俱白色長同古制祭畢燔而不瘞其奠在初獻之前而樂與初獻同奏攷大成釋奠樂譜乃成化中所刻其奠帛初獻各有樂章奠帛所奏寧和也初獻所奏安和也其亞獻奏景和其三獻重奏景和據此則奠帛訖宜降自西階俟奏畢仍升自東階以行初獻此亦唐宋舊禮而儀注迺奠帛初獻同奏寜和而以安和奏之亞獻以景和専用之三獻其奠獻次第悉同於社稷説者謂大社稷帝社稷皆無奠帛樂章故宜與初獻同行孔廟明有奠獻兩詩則奠獻各舉為當其説是也但奠帛初獻分為兩舉則亞獻終獻亦不免重奏一曲至送神望瘞又重奏一曲是六詩而八奏也大廟迎神泰和初獻壽和亞獻豫和終獻寜和徹饌雍和還宫望瘞並奏安和而無奠帛之曲止於六曲七奏若令孔廟有加殆為過禮國朝諸大祀典圜丘九曲九奏方澤八曲九奏朝日夕月社稷七曲七奏厯代帝王先農八曲八奏皆無一詩兩奏者惟方澤大廟於望瘞重奏一曲釋奠亦重望瘞一曲祀師之禮同於祀親祀示矣既極尊崇固不必重奏景和亦不妨奠獻同舉然則見行儀注不為誤也三獻詁禮器云一獻質三獻文五獻察七獻神郊特牲云郊血句大饗腥句三獻爓一獻熟鄭氏謂一獻祭羣小祀三獻祭社稷五祀五獻祭四望山川七獻祭先公也然社稷之祀不降於山川而大祫十有二獻四時與禘九獻亦不止七且祫大於時祭而禘又大於祫若禘儕時祭而祫之為獻反増則於禮為不倫周禮所載九獻以圭瓉酌雞彛之鬱為一獻以璋瓉酌鳥彛之鬱為二獻酌犧尊之醴齊為三獻酌犧尊之醍齊為四獻酌象尊之盎齊為五獻酌象尊之醍齊為六獻酌犧尊之醴齊為七獻酌象尊之盎齊為八獻諸臣酌於罍為九獻而祭統尸飲五君洗玉爵獻卿句尸飲七以瑶爵獻大夫句尸飲九以散爵獻士及羣有司解者曰凡祭二獻祼用鬱鬯尸祭奠而不飲至朝踐二獻饋食二獻及食畢酳尸則皆尸飲之故云尸飲五繼之以主婦酳尸賓長獻尸此時九獻既畢因初二祼不飲故云尸飲七也自後長賓長兄弟更為加爵尸又飲二并前飲九主人迺散爵獻士及羣有司則尸飲凡九而獻不止九其所云十二獻者似亦禮之所有周官掌客諸侯長十有再獻皆所謂以多為貴者也陳氏曰司尊彛朝踐用兩尊皆有罍饋食用兩尊皆有罍籩人醢人有朝踐之籩豆有饋食之籩豆有加籩加豆則朝踐王獻后亞之諸臣之所昨酢三獻也饋食王獻后亞之諸臣之所昨亦三獻也併酳尸三凡九獻而加爵不與焉此宗廟九獻之禮也加爵不與則九獻以外之獻也葢古者宗廟之祭王與后同有事焉又卿大夫士相之酳尸獻户王及后各四諸臣一以成九獻其禮如此漢以後南北郊宗廟社稷但皆三獻昭代亦然無所謂九獻者享至九獻儀節太繁将恐不肅所謂逮闇而祭日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣其為不敬大矣此之謂也聖祖之諭中書省亦疑獻牲致帛酬酒奉餚為華飾之過恐飾過事生禮繁人勌而享祀之神弗安所以作樂殷薦雖自六奏以至九奏而禮則止於三獻葢既無迎尸以下諸事則九獻固無所用之耳或以為祭天地祖考皆九獻而孔子從殺禮僅三獻者葢未攷典故也飲福受胙詁古者祭必迎尸尸酢主人受之嘏飲福者古相酢之禮也禮運曰修其祝嘏正義謂祝以主人辭饗神嘏謂祝以尸之辭致福而嘏主人祝以孝吿嘏以慈吿天子祭天地諸侯祭社稷祝嘏莫敢易其常周禮司几筵設王昨酢席鬱人大祭祀與量人受舉斝之卒爵而飲之所謂飲福受胙者也然攷儀禮特牲與少牢饋食之禮飯酳之後尸酢主人佐食摶黍稷以授尸尸迺命祝以嘏或尸自嘏主人再拜士卒角大夫卒爵受嗇寫嗇與夫三進爵三祭酒三奠爵葢自皇尸酳飯而亞獻三獻無不相酢特酳尸迺摶黍受嘏而亞獻終獻不過受尸之酢爵而已也自開元開寳禮儀注及熈寜祀儀迺於亞終獻飲福今苐於終獻飲福割腥為胙洪武六年命别用一牲先割胙置酒尊左右賜胙用之遂為常儀葢今之胙古之酢今之肉古之黍今之終獻飲福古之饋食亞終三酢相去逺矣至於攝祭亦皆飲福受胙自唐以來大尉攝祭禮皆如是然攷之古禮曾子問云攝主不厭祭不旅不嘏不綏祭不配梁天監中明山賓議請郊廟受福惟皇帝再拜明上靈降祚臣下不敢同也然則攝祭而飲福亦皆僭也併祭主之所謂飲福亦謂之飲酢焉而可也五齊三酒詁周禮酒正掌酒之政令以式灋授酒材辨五齊劑之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊辨三酒之物一曰事酒二曰昔酒三曰清酒郊特牲曰先王之薦可食也而不可耆也所以交於神明者不可同於所安䙝之甚也禮器曰醴酒之用𤣥酒之尚葢祭祀之有五齊非人所飲不致其味特致其義而已故苐云辨其名也太古以明水為禮其後乃有𤣥酒𤣥酒變而為泛齊泛者滓浮而上泛也又變而醴齊醴者滓汁相將而一體也二者最濁次則盎齊盎者滃滃然蔥白色也又次則緹齊緹者成而紅赤色也又次沈齊沈者成而滓沈也三者差清此五者皆酒之始而未可以言酒但曰劑而已矣三酒則以飲矣給其材故辯其物事者方事於精漉也昔者乆醸而熟也清者澄之而可飲也祭祀之有五齊以神事也有三酒以人飬也酒正供五齊三酒以實八尊陳而弗酌所以致事養之義也大祭三貳中祭再貳小祭一貳尊各有副以祭之大小為其多寡皆酌而獻所以致事養之用也朝踐犧尊再獻象尊皆有罍備其器也犧象之實泛與醴君獻之罍尊之實盎緹沈夫人薦之别其用也禮運𤣥酒在室醴醆在户粢醍在堂澄酒在下坊記醴酒在室醍酒在堂澄酒在下禮器罍尊在阼犧尊在西君西酌犧象夫人東酌罍尊君親制祭夫人薦盎君親割牲夫人薦酒祫備五齊禘備四齊時祭備二齊朝用醴齊饋用盎齊諸臣自酢用凡酒而五齊三酒之用於是乎備矣釋奠之禮唐以犧尊實醍齊象尊實盎齊山罍實酒皆設於堂上混而無别宋以泛齊醴齊設堂上則以神道處孔子也以盎醍沈三酒設堂下則以人道處羣弟子及諸儒也元因之今制但言犧象山罍而不言用何齊何酒實何尊罍其酒彷彿清酒葢樂章有清酤維馨之句或者泥於信南山之詩祭以清酒旱麓之詩清酒既載鳬翳爾酒既清烈祖既載清酤而於禮經貴五味之本者未詳考耶抑有説焉太古未始有酒凡祭天神地示先農社稷五齊以致其義宜也孔子維酒無量又云不為酒困則酒其生前所嘗享也又安取不可食之五齊以申其薦乎天下醸法隨其水土而異古人縮酌用茅醆酒涗於清與夫醴齊縮酌盎齊涗酌鬱齊獻酌事酒泲醴齊清酒泲盎齊之類恐是一方醸法今釋奠通之天下而以古人一方之法拘之或不可成其將必茍焉以塞夫祭品之苟且從事者多矣而又可益之以難一之酒齊乎以今之酒供今之祭禮時為大或亦無傷第醴當特設市沽斷所不可耳鬱鬯詁周禮鬱人凡祭祀賓客之祼事和鬱鬯以實彛而陳之肆師祭之日及祼築鬻音煮禮記曰鬱合鬯又曰暢臼以椈杵以梧正義曰椈栢也梧桐也以栢香桐潔白𢷬鬱鬯於神為宜然則椈也梧也皆所以築鬱而和暢之即所謂築鬻也鄭衆曰鬱為草若蘭許慎曰鬯以秬醸鬱草芬芳攸服以降神也中象米七所以扱之易曰不喪匕鬯鬱芳草也十葉為貫築百二十貫以煮之蘇恭曰鬱金出蜀地及西戎苖似薑黄花白質紅未秋出莖心而無實根黄赤取四畔子根去皮火乾蘇頌曰鬱金出鬱林郡又生大秦國二月三月有花状如紅藍其花即香也諸説不同朱震亨曰鬱金無香而性輕揚能致達酒氣於髙逺古人用治鬱遏不升者此説是也用葉用根凡二種今藥肆所用者苗如薑根大小如指體圓有横紋如蟬腹外黄内赤亦有香氣故用以和秬黍如云出於鬱林則周時未入職方聖人不貴逺物未必取是以共祭况西戎大秦其説尤誕又有以鬱即為鬯者黄流在中之箋與夫朱子之註秬鬯一卣蔡氏之註秬鬯二卣皆以秬為黑黍一稃二米鬯即鬱金香草是也有以秬黍即鬯者鄭註周禮鬯人以鬯為秬黍孔疏曲禮凡摯天子鬯鬯者醸黑黍為酒其氣蕡芳調暢因謂為鬯是也有謂鬱鬯為兩種草者證類本草曰鬱鬯百草之華逺人鬱人所貢芳草合醸之以降神五音篇曰鬱非鬯又别為一香草是也夫周官鬱人掌鬱鬯鬯人掌秬鬯明分二職安可謂一但鬯取芬香調暢固不可謂之草正義云凡鬯有二若和之鬱謂之鬱鬯鬱人所掌祭宗廟而灌者也若不和鬱謂之秬鬯鬯人所掌黑黍之酒即名鬯也以事上帝詩生民維秬維秠李廵曰黑黍一名秬郭璞曰秠亦黑黍但中米異耳大者名秬中有二米者名秠葢宗廟之祭惟祼為重秬有一稃二米嘉異之物天地和氣所生其芬芳已自調鬯於上下無待鬱金之和此為秬鬯與鬱鬯别周人尚臭灌用鬯臭鬱合鬯令臭隂達於淵泉以求神於隂故宗廟有鬱鬯然無禮神之玉天地有禮神之玉則用秬鬯而已社稷山川外神亦用秬不用鬱也粢盛詁黍稷曰粢在器曰盛爾雅釋草云粢稷也禮記名稷曰明粢郭璞云今江東呼粟為粢周禮小宗伯辨六齍蓋受黍稷之器而注讀為粢以黍稷稻粱麥苽釋之則諸穀通名粢矣大宗伯奉玉齍太祝五曰齍號則言粢而盛可知閭師不耕者無盛廩人共接盛饌人共盛􅐪人凡祭祀共盛則言盛而粢可知甸師共齍盛舂人共齍盛之米小宗伯表齍盛吿潔則又兼言齍盛他經直謂粢盛其義一也粢盛特祭品之一耳乃甸師共之舂人舂之􅐪人􅐪之舎人實之大小宗伯奉之逆之而又王后必自舂其粢夫人必自舂其盛而猶未也周公盛魯公燾羣公廩則紀之公羊天子親舂郊禘之盛則載在楚語古人維馨之薦備物備官又必躬致其力以冀神明之格而今之粢盛有未必備其物者簋實黍稷簠實稻粱今有黍稻粱而無稷以蘆粟充之夫黍即秫也旱地所種稻即秔稻穤稻也水田所種粱即粟米也汜勝之曰粱是秫葢大者粱小者粟一類也三者人皆知之獨不辨稷為何穀其蘆粟自名薥秫北人謂之髙粱其髙丈許種以醸酒或飼牛馬豈祭品哉説文稷為五穀之長羅願云稷穄粢皆一物語音之輕重耳赤者名􅓱白者名芑黑者名秬吕覧飯之美者有陽山之穄髙誘註云關西謂之􅓱冀州謂之䵖月令章句稷秋種夏熟厯四時備隂陽故為五穀之長宼宗奭云稷米先諸米熟其香可愛故取以供祭作飯不粘其味淡一云三月下種五六月可収與黍一類二種粘者為黍不粘者為稷猶稻之有秔與穤也稷苗似粟而低小有毛結子成枝而殊散其粒如粟而光滑北人通呼為黍不辨為稷稷乃穀之最貴土穀之神謂稷上古厲山氏與周之始祖棄皆以稷祀而奈何以他物代之此穀非難得者宜特種之或購之北方以共祭祀詩曰誕祀如何或舂或揄或簸或蹂釋之叟叟烝之浮浮粢盛之不備而胡可輕以祭也豚解體解詁古者正祭天子諸侯有豚解體解大夫士有體解無豚解禮運曰腥其爼熟其餚體其犬豕牛羊腥其爼謂豚解而腥之為七體也熟其餚謂解之爓之為二十一體也豚解者殊左右肩髀而為四又兩胉脅也一脊而為七體解者左右肱之肩臂臑左右股之肫胳觳凡十二與夫左右脅骨各三曰代脅曰長脅曰脰肩又脊骨三曰正脊曰脡脊曰横脊也然而二觳不薦於神尸主人之爼兩髀不升於主人主婦之爼膉不升於吉祭之爼則祭之所用者去髀膉故二十一去二觳則十九矣國語禘郊之事則有全脀王公立飫則有房脀親戚燕飲則有餚脀全脀即脾解房脀即體解餚脀則骨析也祭統曰商人貴髀周人貴肩考之禮經周人之禮大抵脅貴中而賤兩端骨貴右而賤左貴前而賤後貴上而賤下祭不升髀以髀在後體也祭不用膉膉雖前非體之正也儀禮或言合升或言升左胖或言升右胖葢用成牲則升其胖合升則髀亦升矣士喪禮載兩髀於兩端是也升胖則去髀矣既夕禮實羊豕左胖髀不升是也士虞亦升左胖公食大夫鄉射記少牢皆升右胖特牲尸爼右肩葢禮皆貴右唯喪尚左則左右亦有别焉少儀凡膳吿於君子太牢以牛左肩臂臑折九箇少牢以羊左肩七箇犆豕以左肩五箇其膳以肩不以膞者貴其前也其肩以左不以右者右以祭也唐制肉載以爼皆升右胖猶有古意而體分十一前節三肩臂臑後節三肫胳觳正脊一脡脊一横脊一正脅一短脅一代脅一皆並骨别祭而髀膉二觳亦不與焉然曰别祭則視禮經所云肩臂臑􅈩胳在兩端脊脅肺肩在上與夫正脊二骨長脅二骨者亦已簡矣宗廟之祀始則以神事焉故以腥終則以人養焉故以熟豚解而腥之法上古也體解而爓之法中古也體其犬豕牛羊設饌於堂行饋食之禮薦今世之食也釋奠有腥有熟而不敢以今世之食薦其剥烹燔炙皆在祭前亦不全用古禮其腥則太學之制正壇牛一九體羊豕各一俱五體四配羊豕各一五體東哲一豕分五體毎位一體西哲亦如之東西廡各共豕三東解四十六分西解四十三分外郡國正壇無太牢兩廡俱止一豕其餘皆同然大抵全而不解葢去古益逺矣學校禮所自出博士弟子所當講求庶品詁上脯腊薧魚周禮腊人掌乾肉凡四獸之脯腊膴胖之事葢析而乾之曰脯全而乾之曰腊脯在籩腊在爼脯先於醢腊亞於魚腊或以祭或不以祭今祭惟脯惟鹿内則牛修鹿脯田豕脯麋脯儀禮大夫腊用麋康成云士腊用兎葢凡脯腊之類皆田獸耳故不以鮮也郊特牲云大饗尚腶脩先儒謂薄析曰脯捶而施薑桂曰腶然則腶猶濁氏之冒脯也斷者曰腶長者曰脩學者束脩以見師故釋奠必致其脯非特此也冠禮有牲爼取脯以見母昏禮婦摯腶脯見舅姑燕禮賓執脯以賜鍾人則脯之於禮其用甚隆脯亦謂尹曲禮士虞謂之尹祭是也亦謂之脡士虞禮脯四脡是也脡亦作挺鄉飲薦脯五挺是也亦謂之膱鄉射禮薦腊用籩五膱祭半膱膱長尺二寸也又曲禮藳魚曰商祭鮮魚曰脡祭則魚亦可謂脡矣獻人凡祭祀共其魚之鱻薧薧亦曰鱐籩人朝事事籩膴鮑魚鱐加籩之實蔆芡栗脯則籩之所薦又先魚而後脯也古者禮重薦魚然罛罶有時月令季冬魚師始漁周禮􅈄師春獻王鮪夏行則腒鱐矣今春秋二丁祭魚非乏鱻也而必以薧葢非薦魚獻鮪之時用薧猶存古意其魚之在爼或縮或横或左或右進首進尾進鬐進腴禮皆不同然鬐者體之所在腴者氣之所聚禮貴右神貴氣則右首進腴為當庶品詁下籩豆之實周禮曰籩四豆者薦籩豆有四次一朝事二饋食三加籩加豆者羞籩羞豆也王薦腥后亞獻於是乎薦朝事之籩豆王薦熟后亞獻於是乎薦饋食之籩豆王酳尸后於是薦加籩加豆既酳尸后於是薦羞籩羞豆今制籩之所盛白餅黑餅形塩薧魚即周禮朝事之籩實也􅀥栗榛即饋食之籩實也蔆芡鹿脯即加籩之實糗餌粉餈即羞籩之實也豆之所盛韭菹醓醢菁菹鹿醢即朝事之豆實脾析豚拍即饋食之豆實芹菹兎醢筍菹魚醢即加豆之實酏食糝食即羞豆之實也然周禮朝事之籩尚有䵄蕡膴鮑魚其豆尚有菖本麇臡茅菹麇臡饋食之籩尚有桃乾橑其豆尚有葵菹蠃醢蠯醢蜃蚳醢加豆尚有深蒲箈菹鴈醢此數物者水陸飛潛家畜田禽草木昆虫各有所取謂之備物而尋常之䙝味不與焉説者曰籩豆之實四時之和氣也又曰恒豆之菹水草之和氣也然天下之物多矣凡其肥碩膴庶大抵悉鍾和氣所生若論食物性味則亦各有所偏人稟五常以生尚多偏戾而謂此數物者獨鍾和氣則漢儒之迂説也必欲備物致享則内則所載子事父母婦事舅姑如穀部之白黍黄粱秫稌蕡菽麥食苽食草部之薌藿芼羮藙芥荼蓼薤蔥菓部之桃諸梅諸棋柤棃栭楂禽部之爵雉鶉雞舒鴈舒鳬鷃鴽􅟀鴇鶚蟲部之范蜩蝸魚部之魴鱮魚膾卯醬鼈而牛羊豕則有臛有胾有膾有炙又有野豕田豕脯豕麇膚麇腥麇脯麕脯麑犬馬狸狐狼其品甚多亦豈皆非和氣所毓而籩豆不盡取焉葢聖人固欲備物又不欲以四方難得之物繼之故所用於祭者皆中州常有可以隨取隨給而又不用恒䙝之味所以籩豆所需止此惟其取給土宜則北方或乏蔆芡南方或乏榛棗雖未盡合古典亦非甚礙有用羗桃葡萄扶荔蓮實者亦皆足申維馨之薦豈其五齊三酒之不必備而惟是籩豆之實之為拘乎洪武中溧水丁祭以牛醢代鹿而聖祖罪之謂鹿為江南易致之物而苟且從事所以可罪至正統三年仍有非其土産以所産代之之令葢萬里一統五方異宜各薦其物正以昭聖化同文之遠夫子聖之時者其必不以尊爼之獻強人以難耳至於朝踐饋食加籩加豆羞籩羞豆明有四薦而今皆豫為陳設則禮記郊特牲何以既有恒豆又有加豆耶葢陳設之初惟當先設朝事之實其饋食加薦羞薦皆當於再獻三獻時次第進之以合古禮有司治之不可以為剏作之難而㮣從茍簡為也周制籩豆各二十六漢魏六朝以暨宋元其籩豆之數史皆不載惟唐書載大祀用籩十二實石塩即形塩藁魚栗棗榛蔆芡鹿脯白餅黑餅糗餌粉餈而減周禮䵄蕡膴鮑魚乾䕩諸物凡一十四豆十二實韭菹醓醢菁菹鹿醢芹菹兎醢筍菹魚醢脾析豚胉􅀈食糝食而減周禮菖本茆菹葵菹深蒲箈菹鹿臡麇臡蠃醢蜃蚳醢蠯醢鴈醢諸物一十四其中祀用籩十則減糗餌粉餈用豆十則減􅀈食糝食其小祀用籩八則又減白餅黑餅用豆八又減脾析豚胉國朝釋奠率􅆓唐舊不盡與周禮合亦已簡矣而所薦籩豆又不悉循古禮次第此議禮者之所未安也然唐乾封中詔宗廟薦享爵及簠簋登鉶各宜别奠雖不言及籩豆大抵亦非祭前並設熬麥曰䵄枲實曰蕡即脂蔴也熬稻曰白熬黍曰黑膴䐑生魚為大臠也鮑以魚於􅟺室中糗乾之也鱐折乾之即薧魚也乾䕩乾梅也蔆芰也芡雞頭也糗熬大豆與穤米即蒸餅也粉豆屑也或云穤米粉杵成􅀈膏舊註合蒸曰餌餅之曰餈以上籩實有骨為臡無骨為醢醓肉汁也昌本菖蒲根也菁蔓菁也茆鳬葵也蠃䗂蝓也蠯蛤也蜃大蛤也蚳蛾子也深蒲謂蒲始生者箈箭萌也筍竹萌也酏食以酒酏為餅或云以狼臅膏及蜜拌穤飯成塊也糝食以牛羊豕肉與米合為餌而煎之也以上豆賔薌紫蘇之屬藙茱萸也椇石李也栭小栗也楂山查也乾雉曰腒鵞曰舒鴈鴨曰舒鳬鴽即鴿也麕也蜜蜂曰范卯醤鯤也即魚子俱見内則菹音葅醓音毯臡音泥茆音卯麇音均音皮蚳音池箈音臺酏音移糝音散餘見後祭品造祭品法大羮淡牛肉汁如無羊代和羮豬脊膂肉薄切片滚湯焯過漉起塩醤醋拌匀腰子切荔形葢面臨祭用淡牛肉熱汁澆黍稷稻粱此四品各揀完潔滚湯澇起作飯形塩浄白塩印作虎形薧魚白魚重一斤白塩醃過曬乾用時溫水洗浄酒浸片時黑餅黍粉造或蕎麥麵造白餅稻粉造或小麥麵造俱砂糖作饀印作小餅子鹿脯宰活鹿為之如無以獐麂代韭菹韭切去本末取中二寸淡用如無時則用根亦可醓醢猪膂肉細切小方塊用油塩酒蔥椒蒔蘿茴香拌作鮓菁菹蔓菁畧經沸湯切長片淡用鹿醢鹿肉切小方塊製法與醓醢同芹菹生芹菜切作長叚如無用其根兎醢宰兎取肉切小方塊作酢製法與鹿醢同筍菹乾笋煮過淨洗切作長片淡用魚醢活魚切小方塊作酢製與兎醢同凡造醢料每淨肉一斤所用塩春秋二兩五錢夏三兩冬二兩香油一兩淨蔥白一兩五錢椒茴蒔蘿末各一錢豚胉豬肩􅈩上取肉一圓塊用若壇數多肩膊以次皆可脾析牛百葉刷去黒皮切細條沸湯澇過塩酒拌匀如無羊代棗栗榛蔆芡此五種不拘乾鮮俱揀淨用如無則胡桃枝圓蓮子皆可代數六十二外方内圓兩旁有紐上覆以盖髙一尺厚半寸唇厚一寸口徑五寸二分深七寸二分底徑與口徑同簋詁明堂位曰有虞氏之兩敦音對夏后氏之四璉殷之六瑚周之八簋注以為皆盛黍稷之器則簋與瑚璉同用周名曰簋然而堯舜土簋則又非自周始也考工記旊人為簋則亦以瓦為之而先儒以為天地之簋用瓦宗廟之簋用木則用各有宜矣其實一觳崇尺厚半寸脣寸豆實三而成觳左傳四升為豆是簋容斗二升也其制外圓内方易損卦彖云二簋可用亨四以簋進黍稷於神初與二真其四與五承上故用二簋四巽爻也巽為木五離爻也離體圓木器圓簋象也故宗廟之簋用木其用瓦者天地外神尚質器用陶匏之類也周禮舍人凡祭祀共簠簋實之陳之􅐪人共簠簋之實祭統曰三牲之俎八簋之實美物備矣祭有餕以四簋黍玉藻朔月少牢五俎四簋詩伐木陳饋八簋而掌客五等諸侯之禮其簋皆十有二則兼西夾東夾分饋所用而其陳之於堂上者固不過八簋而已也中髹以朱天子飾以玉諸侯飾以象其上有盖儀禮曰啓簋㑹㑹者葢也簠簋敦之葢皆象龜形近制鑄銅為之或用磁博古圖所載有實簋旋簋饗簋煮簋方圓異制或四足或無足葢玩器非祭器也數六十二其制外圓内方有紐有盖口徑六寸深七寸二分底徑五寸二分厚八分足底徑六寸厚半寸簠詁簠與簋相須為用正義曰方曰簠圓曰簋皆據外而言按孝經云陳其簠簋注云内圓外方受斗二升葢形制雖與簋異而容受則與簋同也其實稻粱公食大夫禮云宰夫授公粱公設之宰夫膳稻于粱西註云膳猶進也進稻粱者以簠周禮掌客公簠十侯伯簠八子男簠六注亦以為稻粱之器上覆以葢四隅㣲稜起如雲狀儀禮曰簠有葢羃古者飾以金玉近制或銅或磁與簋同數二百有二形制如豆竹豆曰籩口有籐縁容受四升面徑尺柄尺籩古周禮籩人掌四籩之實葢朝事也饋食也加籩羞籩也薦籩者凡四也朝事之籩其實䵄方中切一蕡符文切二白三黒四形塩五膴六鮑七魚鱐八朝事者謂清朝未食先進寒具薦此八籩也饋食之籩其實棗􅙫桃乾䕩榛實按饋食所薦皆果盖食後繼以清饌加籩之實蔆芡􅙫脯蔆芡􅙫脯重言四物以明八籩加籩者謂尸既食后亞獻所加之籩也羞籩之實糗餌粉餈羞籩謂若少牢主人獻尸宰夫薦房中之羞于尸者也周語品其百籩漢郊祀歌嘉籩列陳庶其宴饗而所用則有等焉禮特牲少牢士二籩二豆大夫四籩四豆則諸侯宜六大夫宜八矣籩是竹器亦名篹魯祀周公以雕篹注篹籩屬以竹為之雕刻飾其直疏謂雕鏤其柄以木為之髙一尺口足俱徑一尺校徑二寸實四升數與籩同豆詁豆若脰然其實菹醢周禮醢人掌四豆之實朝事之豆其實韭菹醓醢醓音毯昌本麋臡乃兮切菁菹鹿臡茒菹麋臡麋京倫切饋食之豆其實葵菹蠃醢脾析廬醢蠯蒲迷切蜃市軫切蚳醢蚳音移豚拍魚醢加豆之實芹菹兎醢深蒲醓醢箈菹鴈醢筍菹魚醢羞豆之實酏食酏陳知切食音嗣糝食糝素感切其獻饋與籩同用明堂位曰夏以楬豆殷玉豆周獻豆方氏曰楬豆以木為柄若蜡氏之楬而已玊豆於楬之上又飾以玊獻豆若周官再獻之獻也乃外宗佐王后薦玉豆是周亦用玉豆矣内宗薦加豆籩宗伯攝薦豆籩司士率屬羞俎豆所謂籩豆之事有司存也其數則古者二十有六祭與饗同故禮器云天子之豆二十有六諸公十六諸侯十二上大夫八下大夫六掌客所載則上公豆四十侯伯三十二子男二十四葢禮器之豆用數也掌客之豆陳數也聘禮致饔餼于上大夫堂上八豆西夾六豆此其證也而總之以多為貴貴貴之義也鄉老六十者三七十者四八十者五九十者六亦尚齒之義也豆木器也醢人四豆以木而亦用瓦旊人為豆是也吕氏考古圖説及政和近制以銅其足名鐙中央植者名校祭統云夫人薦豆執校執醴授之執鐙鄭注云校中央直者也鐙豆下跗也口圓徑尺黑漆飾朱中大夫以上畫以雲氣諸侯則口飾以象天子以玉數一範金為之髙一尺四寸用盛太羮登詁爾雅木豆謂之豆竹豆謂之籩瓦豆謂之登登者執而登之以實太羮之湇音泣唐書作㽅公食大夫禮云太羮湇不和實於登湇者肉汁太古之羮也不調以塩菜以其質故以瓦盛之詩生民于豆于登儀禮作鐙則亦以金為之矣大抵食禮用之飲禮不設故鄉飲鄉射燕禮皆無此器唐制釋奠國學㽅三鉶三州縣不具㽅鉶今制先聖一登二鉶配哲以下無登其餘簠簋籩豆之數嘉靖釐正悉同唐制南雍太常二志所載如此今郡國四配十哲皆具太羮用登殆非典制數二十二三足口有兩耳覆以葢用盛和羮鉶詁禮運注鉶如鼎而小周禮脯修刑膴注刑與鉶同韓非子堯有天下飯於土簋飲於土鉶亨人祭祀賓客供鉶羮盖鉶羮所以具五味也而鉶鼎則所以實羮者也自羮言之曰鉶羮自鼎言之曰鉶鼎亦曰陪鼎以其陪正鼎也亦曰羞鼎以其具庶羞也王日食九鼎而陪鼎三大夫七鼎而鉶鼎四掌客上公鉶四十有二侯伯鉶二十有八子男鉶十有八聘禮之賓飱饔之羞鼎皆三上介飱饔之羞亦三少牢設羊鉶豕鉶特牲主婦設兩鉶則鉶之為用甚廣不第為和羮用也今釋奠則以薦和羮耳範銅為之數三形似壺刻梓木為之畫山雲形即山尊也髙九寸八分五釐口徑六寸七分五釐深七寸五分脰髙三寸脰下横徑九寸足髙二寸貯初獻酒今制或瓦或銅兩旁有螭首紐曰罍洗一曰罍尊挹酒以勺尊彞詁雲雷尊象尊犧尊壺尊太尊著尊周禮司尊􅂜掌六尊六彞之位詔其酌辨其用與其實彞以盛鬯所以灌也尊以盛酒所以獻也獻尊象尊著尊壺尊太尊山尊是謂六尊鄭司農云獻讀為犧音娑犧尊飾以翡翠象尊以象鳯凰孔謂犧象畫沙羽及以象骨飾尊阮諶禮圖犧尊飾以牛象尊畫象飾尊則於尊腹之上而畫牛象之形説與鄭同乃王肅引子尾送女器犧尊犧牛為尊因知象尊尊為象形則今制所用是也㤗亦作大虞之瓦尊也山罍即雲雷也畫為山雲之形罍取雷義雷有聲無形雷起於雲雲出於山故刻山雲一云刻木作雲雷形以象施之不窮也著尊無足而底著地壺尊者以壺為尊左傳尊以魯壺燕禮兩方壺左𤣥酒是也六􅂜者雞鳥斝黄虎蜼也凡祼春祠夏禴彞以雞鳥尊以犧象秋嘗冬烝彞以斝黄尊以著壺追享朝享彞以虎蜼尊以泰山虞夏以上虎蜼而已夏以雞殷以斝周以黄目明堂位曰泰有虞氏之尊也山罍夏后氏之尊也著殷尊也犧象周尊也而説文以壺為昆吾尊則亦商以前之器矣周兼用之而各有副焉大祭三貳中祭再貳小祭一貳故大祫之尊十八禘祭之尊十六時祭之尊十二皆備器以致孝享也唐制釋奠先聖先師每座以犧尊實醍齊象尊實盎齊山罍實酒皆貳宋制犧尊四象尊四在殿上為酌尊注酒之尊泰尊三山尊二犧尊二象尊二著尊二壺尊二在殿下設而不酌元制以犧尊實泛實以象尊實醴齊皆三設堂上以泰尊實泛齊山罍實醴齊著尊實盎齊犧尊實緹齊象尊實沈齊壺尊實三酒設堂下以象尊實醴齊設兩廡國朝禮同唐制秪設犧尊象尊山罍其闕里志仍備六尊之制葢勝國之舊也或謂先師之祭宜備四代尊罍増設副尊以示敬慎愚謂古者設一器必有一器之用如春祠朝闕獻尊王醴之饋獻用兩象尊后酌之皆有罍諸臣闕其量則彞受二斗尊受五斗罍受一斛彞以祼故其受少尊以獻故其受多罍則助祭之臣衆矣故倍其量是宜上尊之外復有副尊以備其乏今三獻之外祼鬯迎尸酬酢一切不行則以雲雷尊供初獻象尊供亞獻犧尊備三獻而於用已足雖無副貳固不失為任質之義耳設而不酌毋乃以虛文事吾夫子若謂循闕里之規備諸彞器俾入廟者知所講求此在賢有司固無所不可數一象形範銅為之穴背受酒於腹上覆以葢葢後有紐以便開合瀉酒以鼻通葢髙九寸八分耳髙一寸五分濶九分深四寸五分口徑二寸二分通長一尺二寸七分濶三寸八分容三升三合貯亞獻酒數一牛形範銅為之穴背受酒於腹上覆以葢制同象尊惟紐在前瀉酒以口通葢髙九寸四分耳髙二寸二分濶一寸深三寸五分口徑二寸通長一尺二寸濶五寸二分容三升三合貯終獻酒右象犧二尊載闕里志與博古圖相近吾杭郡庠祭器亦用之然似几案中物也古尊俱有棜禁以木為方案穴孔置尊則犧象二形似乎不倫如毛鄭諸説則刻畫牛象於尊腹與雲罍同制他處學校如此者多典制祗有三獻之尊不言堂上堂下南雍志亦苐云酒尊不知四配十哲兩廡復用何尊闕里志載象尊數十犧尊壺尊數各六盖似通諸兩廡泰尊山尊著尊各二似僅設之堂下如元制也然犧象二尊其説不一故配享從祀俱用雲雷尊或壺尊亦可髙八寸四分口徑四寸五分腹徑六寸深七寸一分禮運曰門外缶門内壺君尊瓦甒則壺尊為磁器宜兼用於堂上堂下其數九通足髙八寸一分口徑五寸七分腹徑六寸一分足徑三寸八分深六寸五分瓦為之髙八寸四分五釐口徑四寸三分腹徑六寸二分深八寸三分木為之右三尊太常南雍諸志俱不載數二十八幅廣二尺二寸以疏布為之釋奠儀譜用絳帛畫龍二四角以錢鍍金為墜以覆尊巾幂詁幂人祭祀以疏布巾冪八尊以畫布巾冪六􅂜葢八尊以獻及於天地故巾疏冪不畫尚質也六彞以祼施於宗廟故巾畫而不疏則稍文焉凡王巾皆黼則又畫斧於巾而白黒其色雖文而不至於靡也自宗廟以外凡祭尊彞有冪而冠禮聘禮則有醴而無冪君尊有冪而大夫方壺士圜壺則無冪皆因尊卑有隆殺也燕禮公尊冪用綌若錫大射冪用錫若絺士喪冪用功布士虞冪用綌鄉飲酒士昏特牲冪皆用綌君冬夏異大夫士冬夏一也然冪不止用於尊彞亦施於籩豆簠簋禮經所載如郊特牲籩巾以綌纁裏士喪籩豆用布巾士昏笲緇被纁裏聘禮竹簋方𤣥被纁裏有司徹簠有葢冪則冪之用非一而用之祭祀則尊彞尤重故歴代不敢廢焉若論致慎致潔則籩豆簠簋皆當偏設一冪今制唯尊有冪盖相􅆓之禮如此數二十八柄長尺二寸九分口濶二寸一分深一寸一分縱徑三寸五分勺詁勺所以酌酒而注之爵者明堂位夏后氏以龍勺殷以疏勺周以蒲勺周禮梓人為飲器勺一升龍勺者勺為龍頭疏勺者刻鏤勺頭令疏通也蒲勺皇氏云刻勺為鳬頭其口㣲開如蒲草本合而末㣲開也三者皆指勺柄開元儀先聖先師每座犧尊二象尊二山罍二皆有勺元制堂上六尊兩廡各尊亦皆有勺而未著所用何如金用龍勺範今為之臨獻則司尊者舉冪而酌數一百二十八通髙八寸三分深三寸三分口徑長六寸二分濶二寸九分前俯後仰兩柱三足有流有鋬爵所以獻也夏曰琖殷曰斝周曰爵琖者以玉飾之爾雅鍾之小者謂之棧爵之淺者亦曰琖也爵説文作象爵之形中有鬯酒又持之也所以飲器象爵者取其名節節足足也兩旁有柱使飲不盡戒其過也因以寓警焉祭統尸酢夫人執柄夫人受尸執足柄其尾也有足有尾命之以爵其制若雀然也明堂位言玉琖周禮言玊爵春秋傳言瓘斝則三者皆飾以玉矣而又有瑶爵散爵琥璜爵廢爵足爵繶爵之名玊爵太宰少宰之所贊也散爵加獻所用琥璜禮器所載廢爵無足足爵無篆繶爵口足有篆爵之繶猶屨之繶也宗廟之器以小為貴貴者獻爵賤者獻散儀禮少牢鄉飲鄉射皆獻以爵酬以觶梓人獻以爵酬以觚一升曰爵二升曰觚三升曰觶四升曰角五升曰散觥亦五升先儒之説曰爵盡也觚寡也觶適也角觸也散訕也總名曰爵其實曰觴觴餉也觥亦名兕爵其用不同自唐以來釋奠飲器皆以爵陸佃禮象圖載古銅爵云有首有尾有柱有足有柄今制或瓦或木或金玉為之髙爼三有跗有葢朱漆兩端中以黒葢施兩環祭則舉環而去葢正壇用之餘用古爼尺寸見前其數一百三十而無葢爼詁明堂位曰爼有虞氏以椀款夏后氏以厥貴殷以椇矩周以房爼陳氏曰斷木為椀横距為嶡椇木枝多曲撓房制似乎户閾葢有虞氏未有文飾斷木為四足而已嶡之言蹷也爼則足間横木有似乎距少牢所云爼距是也禹為雕爼墨染其外而朱畫其内以致孝乎鬼神則漸趨文飾矣椇之言枳椇也撓屈其足則愈文矣周人足下加跗上下兩間有似堂房魯頌籩豆大房國語王公立飫則有房烝是也周公之廟用梡嶡魯公之廟用大房其兼四代之制而用之者乎鼎爼貴竒籩豆貴偶竒以象陽偶以象隂是故少牢五爼特牲三爼玉藻諸侯日食三爼朔月五爼葢皆尚乎竒也而司徹六爼則又因時制宜有不必於盡拘者房爼長一尺八寸濶八寸髙八寸五分以載體解列於籩豆之間而禮樂志所載乃髙二尺七寸廣二尺三寸長三尺此非古制古者席地而坐其祭也亦掃地而列爼豆其髙不過數寸而止過髙則不適于用近世改設髙案故載牲之爼與案齊髙此獨正壇全牲可以用之四配以下仍宜悉從古制庶可列于籩豆之間今祭率用牲盤失之太簡數一十四長二尺廣五寸深四寸上盖深二寸八分足髙一寸五分篚詁篚箱屬通作匪象形漢志作棐應劭註曰方曰箱隋曰篚隋圜而長也音妥爾雅注隋狹長也禹貢厥篚織文葢以篚盛文錦而貢則其形狹長可知亦曰篋士冠禮緇組紘同篋禮記入學鼓篋鄭氏曰隋方曰篋葢以盛書亦即篚也以竹為之上覆以盖後世用木而髹以朱以實制帛髙六寸深三寸一分口徑一尺四寸足徑六寸容九升銅為之兩傍有環中飾以龜魚盥洗匜盤詁周禮鬱人几祼事沃盥小祝大祭祀沃尸盥御僕大祭祀相盥而登天府凡吉凶之事祖廟之中沃盥士師祀五帝則沃尸及王盥泊鑊水盖祭祀之盥備官乃爾而設之則於東榮士冠禮之文也設於阼階東南鄉飲鄉射大射燕禮特牲之文也而罍水則皆設於洗東匜水則皆實於槃中盖祭之時有罍以盛水有枓以􅆽水而洗則以盛棄水祭祀禮肅不欲其停汚於地也特牲尸盥句匜水實於盤中則匜之用猶罍而槃之用猶洗也匜亦名匜盤形圜有耳四足象獸洗制亦類匜盤而無耳有環今制設於墀東將獻則盥其帨用白布髙四寸五分深八分口徑一尺四寸髙二寸二分濶二寸八分容一斗亦銅為之以木為之髙九寸濶一尺二寸用白紙寫祝文黏版上祭畢揭而焚之祝案一髙二尺一寸濶一尺九寸長二尺二寸酒尊案髙二尺七寸五分濶一尺五寸長五尺卓靣剜三孔仍横置木板於孔下以載酒尊以代古之棜禁凡三先師四配十哲皆雲雷尊也爵帛案髙二尺七寸五分濶二尺三寸長三尺盥洗案與爵帛案同以上四案皆近制也故不為圖説外有毛血盤滌牲桶籸盆如數備之庭燎隨用香案香合洪武七年令祭祀皆免上香頖宫禮樂疏卷三
