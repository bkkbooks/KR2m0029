body:
  text: 頖宫禮樂疏卷六明李之藻撰操縵琴瑟合譜下終獻樂奏景和之曲右仲呂之宮仲呂起調仲呂畢曲徹饌樂奏咸和之曲聲揮綽其名髙融五鍾一曰清鍾太音二曰赤鍾重心三曰黄鍾灑光四曰景鍾昧其明五曰黑鍾隠其常五聲既調而後天地之美生又命岐伯作鐃角神鉦以揚徳建威而金之為樂權輿於此矣至有虞氏之樂間笙鏞夏后氏之器縣鍾鐸商頌之鞉鼓鏞鼓靈臺之鼖鼓維鏞周官之鎛師鼓金奏之樂鼓人掌教六鼓四金以金錞和鼓以金鐲節鼓以金鐃止鼓以金鐸通鼓而金之用綦備後世胡部俗部之樂其器之用金者殆半於絲竹匏革而説者以為秋肅之氣過盛而不和先王之世則不然所重者鍾律鍾也者律之寄而樂之首也故黄鍾函鍾圜鍾應鍾皆以鍾名而儒者談律呂謂之鍾律之學律也者制事立法物度軌則皆於是乎出者也第鍾之於律也難别則又鑄銅為律方外圓内以其容為之量以其長為之度以其重為之權衡而聲音之道賴以有傳於世鑄必以銅銅者所以同天下齊風俗也是以大師執同先鄭直訓為銅後鄭謂陽律以竹隂律以銅竹陽銅隂各順其性雖未盡爾亦可以見金之為物有重於樂者矣凡範金者必致其精然後可協其聲考工記曰㮚氏為量改煎金錫則不耗不耗然後權之權之然後凖之凖之然後量之世俗之金工則賤丈夫者為之惟恐其耗也而鉛濁雜焉期以諧律而和樂也其可得乎古者攻金之工冶氏執上齊劑鳧氏為聲六分其金而錫居一謂之鍾鼎之齊則剛柔有劑也凡鑄金之候金與錫黑濁之氣竭黄白次之黄白之氣竭青白次之青白之氣竭青氣次之然後可鑄也則火劑有候也如是故厚薄之所震動清濁之所由出侈弇之所由興可得而論也金用紅銅錫用滇蜀髙錫余嘗試之煉銅至於不耗什殆損五鼔鑄之法黄白青白之氣皆鉛濁也鉛濁浄後方可用錫和合錫以引銅令入範易灌而不璺金六斤錫一斤所謂六分其金而錫居一金精則聲清雜錫則聲濁聲之清濁非特於厚薄大小辯之調劑分量火候遲疾更須諦審此必非世俗金工可辦也有不合音律者必煉而更鑄之昔者晉平公鑄大鍾使工聽之皆曰調矣師曠以為不調請更鑄焉曰後世有知音者將知鍾之不調也臣竊恥之後師涓至果知其不調世固未嘗無知音者也聲中乎律通神明動天地恒必由之陜州黄河之鍾感隂雨而鳴豐山九耳之鍾遇霜降則鳴晉銅澡盤之鳴與洛陽之鍾相應漢未央鍾之鳴與南郡山崩相應其輕重厚薄之器有動乎氣因發乎聲物類與之相感莫測其所以然然而有知音者能默識之是以宋沇聞光宅寺鐸以協姑洗長孫紹逺獲浮圖鳴鐸以備黄鍾荀朂訪趙州之牛鐸廉郊躍池内之蕤賔所謂用志不分乃疑於神者夫亦精誠之極而鬼神為之通焉者乎要以道㝠於器器合於氣氣通於神即一器之微其精靈存乎世亦有必不可磨滅者况乎元聲之在天地間而謂其終不可求也編鍾詁周禮鍾師掌金奏磬師掌教編鍾鍾大為鏞以其能考民功凡樂象成民功為大也孫炎曰鏞深長之聲也爾雅大鍾為鏞中曰剽小曰棧左傳單襄公曰先王之制鍾也大不過鈞重不過石伶州鳩曰鍾音之器也小者不窕大者不槬則和於物齊景公之大鍾周景王之大林魯莊公之國小而鍾大君子皆譏至秦皇千石之鍾西漢陵廟十二萬斤之鍾則侈心為之中聲不與焉樂鍾所用惟特鍾鎛鍾編鍾三種而已特鍾形制小於鎛而大於編以特懸得名其器大其聲宏雜奏於八音之間則絲竹為其所掩故但於起調畢曲之時擊之以為節編懸則聲器皆小故可以雜奏而不相凌也陳氏曰虞夏之時小鍾謂之鍾大鍾謂之鏞周之時大鍾謂之鍾小鍾謂之鎛因而指鎛鍾為編鍾則悞矣許慎曰鎛錞于之類又一説也凡縣鍾磬者半為堵全為肆十六枚而在一虡謂之堵鍾一堵磬一堵謂之肆數用十六者蔡元定以為四象相因之數凡天地之變化萬物之感應古今之因革損益皆不出乎十六十六而天地之道畢焉故磬與鳯簫皆十六也而或謂大架倍十二律為二十四小架倍七音為十四中架倍八音為十六豈其然乎鍾之為制備於考工記所載古文深奥註家多舛古制遂不可曉今細解之其釋名也兩欒謂之銑銑間謂之于欒稜也古鍾形扁兩旁有稜故曰欒欒下兩角銛利光澤故曰銑銑之為言跣也讀下文則自鍾跣上至鍾肩經文似通名為銑也于在兩角之間俗名鍾脣于上謂之鼔鼓上謂之鉦鉦上謂之舞鼓者受擊處也鉦正也鍾之正體鉦中震動處為舞如人之肩舞而動也自舞至于亦通名為鉦也舞上謂之甬甬上謂之衡鍾縣謂之旋旋謂之幹甬者涌出之貌鍾上柄也古鍾有柄而中實此處用銅最多甬端極平平之為言衡也甬下束腰為旋旋前有紐獸面名為旋蟲又名為幹云鍾帶謂之篆篆間謂之枚枚謂之景蓋鍾體界道狀如田畦縱横若篆籀然故名曰篆枚即鍾乳也古鍾前二區後二區每每九枚前後共乳三十六枚景如圭表之景于上之攠謂之隧攠者敝也擊久而敝則形窪如取火之燧古字隧燧通用也以上皆鍾之名義也其釋度數也十分其銑去二以為鉦以其鉦為之銑間言舞至于其視舞至銑得五之一如黄鍾正律之鍾鉦長十寸則銑長十二寸五分矣鉦為銑間則左右兩銑相距亦十寸也去二分以為之鼓間以其鼔間為之舞修去二分以為舞廣鼔間者鍾身前後兩鼔之徑舞廣者鍾肩前後兩舞之徑舞修則左右肩之距也兩銑間横距十寸則兩鼓間縱徑八寸左右肩亦距八寸前後舞間縱徑六寸四分以此知古鍾横寛縱窄也銑間外半周也鼓間舞修舞廣皆外徑也故鉦之長即舞修也以其鉦之長為之甬長以其甬長為之圍參分其圍去一以為衡圍參分其甬長二在上一在下以設其旋此釋甬制也鉦長八寸甬長亦如之其甬下近舞處圍亦如之其衡則三分去一以為圍五寸三分寸之一也又甬通長八寸其近下三之一以設旋蟲旋之狀旋繞於甬其徑四寸其上安鼻有獸面是名旋蟲也其論厚薄清濁侈弇則謂已厚則石已薄則播侈則柞弇則鬱長甬則震是故大鍾十分其鼓間以其一為之厚小鍾十分其鉦間以其一為之厚已厚則石者脣固欲厚若鉦與俱厚則過於堅實而聲石已薄則播者舞至鼓宜漸厚若脣處亦薄則過於浮薄而聲播散張口則聲柞縮口則聲鬱甬長則聲搖拽皆非中和是故鍾脣務取鼓間鉦間十分之一鉦間即舞廣也又云鍾大而短則其聲疾而短聞鍾小而長則其聲舒而逺聞論至於是而鑄鍾審音無遺法矣又云為遂六分其厚以其一為之深而圜之遂即隧也圜者擊之攠也而深取六分其厚之一則鑄時已預設之非必由擊而後攠矣古人鑄鍾之法詳盡如此而又煉銅必精火齊必適加以磨鑢安得不中律呂乎唐殷盈孫後周王朴皆按其法所鑄俱稱工美形匾而側垂屬甬於虡以便考擊李照胡瑗非之改鑄圜形正紐垂下扣之弇鬱不協乃欲毁前代所寳古鍾以滅其跡至劉傑亦欲銷朴舊鍾卒為樂工揶揄噫甚矣宋人之陋也然宣和博古圖鍾制多與考工記相合當時第為玩具不擬作樂殊為可恨今取其諸圖中善者存之以為鍾式其十二律各依正律尺度四清聲依半律尺度更攷其聲清則去其厚濁則去其長太極殿鍾聲嘶張環鑿其突處鳴盤聲諧洛鍾茂先磨鑿令輕此前事之師也鍾脣厚四分自舞至銑兩邊各長一尺二寸五分自舞至于各長一尺兩銑左右相距亦長一尺銑間前後相距廣八寸兩舞左右相距長八寸舞間前後相距廣六寸四分甬依實甬之制衡端至舞八寸上圍五寸三分寸之一下圍八寸旋圍一尺二寸廣一寸九分寸之七下距舞九分寸之八鍾紐名旋蟲形如獸面鍾乳如枚前後共三十六其形如乳此黄鍾尺寸也諸律倣此十二特鍾各以其倍律為尺十二編鍾各以其正律為尺四清鍾各以其半律為尺毎尺均作十寸寸十分今大成樂所用皆編鍾也其尺寸以自舞至于為鍾體銑加五分之二又在數外依律鑄造厚薄適宜自與律合過清去厚過濁損長懸法自右下起黄鍾次大呂次太簇夾鍾姑洗仲呂蕤賔林鍾而止又自左上起夷則次南呂次無射應鍾次清黄清大清太清太清夾終焉所用者惟黄鍾之合太簇之四仲呂之上南呂之工清黄鍾之六一虡十六鍾律度算鉦舞至于通為鉦兩銑横距外半圍同銑兩旁舞至銑通為銑舞修正面横半圍黄鍾一尺一尺二寸五分八寸大呂九寸四分三八一尺二寸一分四七八七寸五分五四太蔟八寸九分八一尺一寸一分三五七寸一分二六四夾鍾八寸四分八一尺五一六寸七分二六四姑洗七寸九分三七九寸九分三三六寸三分四九六仲呂七寸四分九一九寸三分六三七五寸九分九二八蕤賔七寸七一八寸八分三八七五寸八分九二八林鍾六寸六分七四八寸三分四二五五寸三分三九二夷則六寸二分九九七寸八分七二五寸三九二南呂五寸九分四六七寸四分三二五四寸七分五六八無射五寸六分一二七寸一四四寸四分八九六應鍾五寸二分九七六寸六分二三四寸二分三七六清黄五寸六寸二分五四寸清大四寸七分一九五寸九分二三七三寸七分七二五清太四寸四分五四五寸五分六八四三寸五分五三三清夾四寸二分四五寸二分五五三寸三分六三二甬長圍鼓間直徑同衡圍甬上平頭舞肩肩正徑黄鍾八寸五寸三之一六寸四分大呂七寸五分五四五寸三三六六寸四三二太蔟七寸一分二六四四寸七分五一五寸七分四二三夾鍾六寸七分二六四四寸四分八五一五寸三分八二二姑洗六寸三分四九六四寸二分四四五寸八四八仲呂五寸九分九二八三寸九分九二五四寸四分九四六蕤賔五寸八分九二八三寸九分三五三三四寸四分一九一林鍾五寸三分三九二三寸五分五九四六四寸二分七一三六夷則五寸三九二三寸四分五九四四寸三一六三南呂四寸七分五六八三寸一分七一二三寸八分五四四無射四寸四分八九六二寸八分九三六三寸五分九一六八應鍾四寸二分三七六二寸八分二五六三寸三分九八清黄四寸二寸三之二三寸二分清大三寸七分七二五二寸五分一五三寸一八清太三寸五分五三三二寸三分六八八六二寸八分四二四四清夾三寸三分六三二二寸二分四二一三二寸六分九四六石音疏其器編磬少狊始制浮磬以通山川之風帝嚳之樂亦有沈鳴之磬則石音之所自逺矣或謂始於古毋句氏而明堂位叔之離磬皇氏釋之曰毋句叔之别名也一云始於伶倫皆不可考呂覽堯命䕫鳴球以象上帝玉磬之音其説尤誕乃攷之尚書舜興樂教申命於八音克諧而后䕫所對第曰於予擊石拊石當時徐州泗磬梁州璆磬雍州球琳豫州磬錯大抵以充樂器之用聖王無他玩好又厚䘏民力甚明也而任土作貢九州之内玉石居四樂成而百獸率舞則石音之有貴於樂可想焉石之美者名球又名璆禮曰玉之清越以長樂也其聲有隆無殺衆聲求而依之故曰天球書言戛擊鳴球又言天球在東序詩言受大球小球而國語言籧篨䝉璆漢樂章言軒朱璆磬璆即是球之美者一物而二名焉蓋鍾有齊量磬無齊量因玉石之自然以十二律為之度數其制曲折中矩記所謂立必磬折考工記所謂磬折以三五者是也古人論磬以為有貴賤焉有親疏焉有長幼焉三者行然後王道得萬物成天下樂之故在廟朝聞之君臣莫不和敬在閨門聞之父子莫不和親在族黨聞之長㓜莫不和順然則磬以立辯依我磬聲豈適耳之謂哉世傳黄帝作律以玉為琯而汲郡魏冢之琯漢殿候氣之律大抵用玉為之玉為山川精英能該八音是以涼王之笛明皇之簫石音也而代乎竹天水夏架臨平零陵洞庭逄山往往有石鼓焉則石音而近於革舜祠玉笙之管石也而匏武昌鍾臺之石石也而金雖非雅樂常用亦以驗天地自然之音人工琢造之巧體貴用備允為八音領袖后䕫之聖舜徳之至而用之以播於樂獸舞允諧之盛又奚惑乎哉春秋時齊以玉磬賂晉止師魯以玉磬如齊告糴古者天子諸侯之磬似皆用玉而戴記鄉飲鄉射皆有磬然而不言玉磬蓋大夫士之器以石代玉成禮而已不必求備也産磬石處山海經所載不一而足一云小華之山其隂多磬石一云髙山涇水出焉東流注於渭其中多磬石一云鳥危之山其陽多磬石俱今關隴之間殆古雍梁所貢之石而世泥泗濵浮磬之文必以靈璧之産為勝尚書蔡𫝊曰今下邳磬石山或以為古取磬之地一統志邳州城西南八十里靈璧縣北七十里俱載山出磬石此為古者泗濵之石無疑然今河内太行諸山産石頗勝靈璧則磬石隨處有之唐制採華原縣石為磬固亦倣之禹貢而宋人譏其淫聲召亂迂矣石以浮名舊注以為浮生於土不根著者一云取其土少而水多其聲和潤蓋石出土上者常見風日其質堅脆雖琢之甚艱然而其品最佳其埋沒水土中者不見風日質柔而聲不可叶石工以其易琢往往以此欺人擇石者不可不留意於此也趙希鵠曰靈璧石出虹州靈璧縣其石不在山谷深山之中掘之廼見色如漆間有細白紋如玉然不起峰亦無岩岫佳者如菡蓞或如卧牛如蟠螭扣之聲清越如金玉以利刀刮之畧不動此則璆琳之類而今不可易得矣編磬詁周禮磬師掌教擊磬而考工記磬氏為磬倨句一矩有半其博為一股為二鼓為三參分其股博去一以為鼔博參分其鼔博以其一為之厚已上則摩其旁已下則摩其耑鄭司農釋之云假令磬股廣四寸半者股長九寸也鼔廣三寸長一尺三寸半厚一寸股磬之上大者鼔其下小者康成曰股外面鼓内面蓋擊者為前為内為下為小不擊者為後為外為上為大也大小長短雖殊其厚則均黄鍾之磬股鼔皆厚二寸則餘磬可推矣顧笙磬頌磬有不同者判縣笙磬在阼階東其形厚而小其聲清而髙與笙管協詩所謂笙磬同音磬筦將將者也頌磬在賔階西其形薄而大其聲和而平與頌相協詩所謂既和且平依我磬聲者也笙磬之制以本律半數為鼓博鼔博加半為股博股博倍之為股長股長加半為鼓長以鼔博三之一為其厚此厚而小者頌磬之制以本律正數為股博參分去一以為鼔博倍律為股長三律為鼓長七分其股博以其一為厚其厚則三分損益算之此薄而大者鄭司農所説即頌磬而笙磬長廣之算亦相類焉所異者長廣增四之一厚殺三之一耳石乃天生之物不假劑量陶鑄惟因其自然之質而以大小厚薄别之而清濁髙下之音次第具焉宋時縣磬大小長短若一其黄鍾厚二寸一分餘磬漸厚至應鍾厚至三寸五分與律全乖范鎮曾言其失未之改正今尚遵之舛也凡擊磬厚者宜重不宜輕輕則不清擊薄者宜輕不宜重重則不和故先儒釋擊石拊石謂重擊為擊輕擊為拊輕重之間妙義寓焉所以諸器不言輕重惟磬言之磬和則諸樂皆和后䕫論樂惟磬舉其綱也大戴禮曰縣一磬而尚拊明堂位云搏拊玉磬皆大磬也爾雅大磬謂之毊此特縣者孔庭編磬率用笙磬以配編鍾其石必擇堅縝清越似玉音者廼佳宋皇祐中議者言大鍾輕小鍾厚重磬無博厚無長短不合古制知制誥王洙辯之曰黄鍾最尊以聲有尊卑不在形體言依律大小者經典無正文鄭康成假設之法孔疏因而述之據歴代史籍亦無鍾磬依數大小之説其康成頴逹非曾制作樂器至如言磬前長三律後長二律臣曾依此造黄鍾特磬止得林鍾律聲若隨律長短則黄鍾長二尺二寸半减至應鍾比黄鍾才四分之一無射應鍾為宫即黄鍾太吕為商宫小商大君弱臣彊承㫖王拱辰非之然終不能改也藻用泗石試按宋制琢磬大抵皆不協律子聲尤不可厚因知洙謬然最要在於擇石按律琢造或磨其耑或去其厚古法自不爽也其言宫小商大蓋不知用四清律更不足辯此笙磬也上段謂之股長一律半博四分律之三其下段謂之鼔長二律四分律之一博半律通厚六分律之一孔徑十四分律之一其率見上其頌磬股長二律博一律鼓長三律博三分律之二通厚股博七之一孔徑鼔博七分之一欲造何律之磬各以其律之尺造之長廣厚數悉如前例其聲自與律協如或不協磬聲太清則去其厚太濁則去其長一虡十六磬律度算本律鼔博鼔長黄鍾一尺五寸二尺大吕九寸四分三八四寸七分一九一尺八寸八七六太蔟八寸九分八四寸四分五四一尺七寸八一六夾鍾八寸四分八四寸二分二一尺六寸八一六姑洗七寸九分三七三寸九分六八一尺五寸八七四仲呂七寸四分九一三寸七分四五一尺四寸九八三蕤賔七寸七一三寸五分三五一尺四寸一四二林鍾六寸六分七四三寸三分三七一尺三寸三四八夷則六寸二分九九三寸一分四五一尺二寸五九八南呂五寸九分四六二寸九分五七三一尺一寸八九二無射五寸六分一二二寸八分五一一尺一寸二二四應鍾五寸二分九七二寸六分四七一尺寸五九四清黄五寸二寸五分一尺清大四寸七分一九二寸三分五五九寸四三八清太四寸四分五四二寸二分二五八寸九四清夾四寸二分四二寸一分二八寸四八股博股長厚黄鍾七寸五分一尺五寸一寸七一大吕七寸七七七一尺四寸一五七一寸一二太蔟六寸六分七五六一尺三寸三七八九分五三六夾鍾六寸二分六一尺二寸四一二八分八六五姑洗五寸九分五二一尺一寸九四八分五二仲呂五寸六分一七五一尺一寸二三五八分二五蕤賔五寸二分五五二一尺寸五一七分五七林鍾五寸分五一尺寸一七分一五夷則四寸七分一七五九寸四三五六分七三九南呂四寸四分三五八八寸八七一六六分三三六無射四寸二分七六七寸三五二六分一八應鍾三寸九分七五七寸九四一五分六七二清黄三寸七分五七寸五五分三五七清大三寸四分三六寸八六四分九清太三寸三分三七五六寸六七五四寸七六七清夾三寸一分五二六寸三六四分五四右編磬在縣次序與編鍾同鍾磬簨虡詁縣鍾磬之木其植者名為虡横者名為簨簨上加業大雅靈臺虡業維樅釋器大版謂之業孫炎曰業所以飾虡刻版㨗業如鋸齒也其縣鍾磬之處又以采色為大牙其狀隆然謂之崇牙又謂之樅詩傳曰樅崇牙也簨之上有崇牙崇牙上有業業兩端又有璧翣蓋簨虡所以縣鍾磬崇牙璧翣又所以飾簨虡明堂位曰夏后氏之龍簨虡殷之崇牙周之璧翣夏飾簨虡以龍未有崇牙殷人飾以崇牙而無璧翣至周極文而三者乃備故曰設業設虡崇牙樹羽鄭氏謂簨上畫繪為翣載之以璧垂五采羽其下掛於簨角者是也凡鍾磬之簨皆飾以鱗屬其文若竹筍然從巽為義故簨亦曰筍虡亦曰鐻凡鍾虡則飾以臝磬虡則飾以羽考工記曰宗廟之事脂者膏者以為牲臝者羽者鱗者以為筍虡厚脣弇口出目短耳大胷耀後大體短脰若是者謂之臝屬恒有力而不能走其聲大而宏有力而不能走則於任重宜聲大而宏則於鍾宜若是者以為鍾虡鋭喙決吻數音促目顅音堅脰小體鶱腹若是者謂之羽屬恒無力而輕其聲清揚而逺聞無力而輕則於任輕宜其聲清揚而逺聞則於磬宜若是者以為磬虡故擊其所縣而由其虡鳴小首而長博身而鴻若是者謂之鱗屬以為筍此器異異虡之㫖也而謂擊其所縣而由其虡鳴則虡取中虚或如琴瑟之音由桐而發漢武時樂虡銅人生毛董卓壞銅人銅虡充鑄則漢虡用銅或取其音之相應也然亦與古者制木為鐻異矣所取臝屬羽屬鱗屬大扺樂聲在器而鳴取諸物故管夷吾之論五聲有似馬之鳴野者有似鷄之鳴木者有似牛之鳴窌者亦此意也至於刻畫載虡之獸其説亦備於考工凡攫閷援簭之類必深其爪出其目作其鱗之而句深其爪出其目作其鱗之而句則於眡必撥爾而怒苟撥爾而怒則於任重宜且其匪斐同色必似鳴矣爪不深目不出鱗之而不作則必頽爾如委矣茍頽爾如委則加任焉必將如廢指其匪色必似不鳴矣周文郁郁誦此想見當時廟虡之制今制梁列木鳯凡五兩端亦刻羽屬如鳯首者口銜璧翣下垂五層采綫為旞五色相間貫以絲縧其業繪飾博山崇牙南向翹出其縣鍾者牙端更設銅鈎以系旋蟲甬屬於簨牢固不動縣磬者則不施銅鉤用繩而已所謂磬紘者也註疏云以其卷然可以挂縣故言磬用繩可縣挂於上也故牙端不設銅鉤右編鍾編磬一虡之數歴代不同或以十九為一虡者取十二月辰又加七律也或以二十一為一虡者以一均聲更加濁倍也或以十六為一虡者以均清正為十四宮商各置一是謂縣八用七也或以二十四為一虡則備清正之聲故唐制以十六之數為小架二十四為大架宗廟朝㑹各有所施今大常鍾縣十六者舊𫝊正聲之外有黄大太夾四清聲雖於圖典未明所出然考之實有義趣蓋旋宮之法自夷則至應鍾四律為均之時若盡用正聲則宮輕商重宮弱商彊是謂陵僣故須用子聲乃得長短相叙自角而下亦循兹法故夷則為宮則黄鍾為角南呂為宮則大呂為角無射為宮則黄鍾為商太蔟為角應鍾為宮則大呂為商夾鍾為角蓋黄大太夾正律俱長當用清聲音律方諧此四清可用之驗至於他律為宮其長短尊卑自以序及者不當更以清聲間之如今諸司文移若品卑者為政以行品尊衙門則檄經歴司轉達正與子聲義合其自尊臨卑初無拘礙者自是不必此鍾磬所以但用十六者也而陳𤾉欲去四清以為鄭衛之音謬矣宋時大樂諸器塤篪竽筑瑟五器本無清聲磬簫琴和巢五器俱有清聲五弦阮九弦琴太宗御製有譜然歌工引聲極唱止及黄鍾清聲蓋歌者本用中聲故夏禹以聲為律明人皆可及若强所不及足累至和孔庭歌章其清者止於黄鍾之六自大呂下五以上縣而不用亦此義也故因論樂虡併及鐘磬合譜迎神樂奏咸和之曲大太四哉南工孔林尺聖仲上道太四徳仲上尊林尺崇仲上三十八六三六八六維南工持林尺王仲上化太四斯林尺民仲上是黄合宗大四十八六三八六一三典黄合祀太四有仲上常林尺精南工純林尺並太四隆仲上一三六八十八三六神黄六其南工來林尺格仲上於林尺昭仲上聖黄合容太四十三十八六八六一三奠帛初獻樂奏寧和之曲自太四生仲上民林尺來仲上誰太四底黄合其仲上盛太四三六八六三一六三維南工師林尺神仲上明太四度黄合越太四前仲上聖太四十八六三一三六三粢仲上帛太四具仲上成林尺禮黄合容太四斯林尺稱仲上六三六八一三八六黍大四稷南工非黄六馨林尺維南工神林尺之仲上聽太四三十十二八十八六三亞獻樂奏安和之曲大太四哉仲上聖黄合師太四實南工天林尺生仲上徳大四三六一三十八六三作仲上樂太四以仲上崇林尺時仲上祀太四無林尺斁仲上六三六八六三八六清黄六酤南工維林尺馨仲上嘉林尺牲仲上孔黄合碩太四十三十八六八六一三薦太四羞南工神黄六明林尺庶南工幾林尺昭仲上格太四二十十三八十八六三徹饌樂奏咸和之曲百仲上王南工宗林尺師仲上生林尺民仲上物太四軌黄合六十八六八六三一瞻黄六之南工洋林尺洋仲上神林尺其仲上寧太四止黄合十三十八六八六三一酌太四彼黄合金林尺罍仲上維南工清林尺且太四㫖仲上三一八六十八三六登仲上獻太四維林尺三仲上於黄六嘻南工成林尺禮仲上六三八六十三十八六終獻樂奏景和之曲犧仲上象太四在仲上前林尺豆太四籩仲上在黄合列太四六三六八三六一三以太四享南工以林尺薦仲上既仲上芬林尺既太四潔仲上三十八六六八三六禮黄合成太四樂仲上備太四人南工和林尺神仲上悦太四一二六三十八六三祭黄合則太四受仲上福林尺率黄六遵南工無林尺越仲上一三六八十三十八六送神樂奏咸和之曲有太四嚴南工學林尺宮仲上四黄合方太四來仲上崇太四三十八六一三六三恪黄六恭南工祀林尺事仲上威南工儀林尺雝仲上雝太四十三十八六十八六三歆仲上兹林尺維南工馨林尺神仲上馭太四還林尺復仲上六八十八六三八六明黄六禋南工斯林尺畢仲上咸南工膺林尺百仲上福太四十三十八六十八六三革音疏其器建鼔搏拊黄帝命岐伯作鼔吹靈鞞揚徳建威帝少昊立建鼔以通山川之風帝嚳命柞卜作鼙鼓鼔奏以觀聲明堂位所載則土鼔蕢桴固自伊耆氏始土鼔者陶土為腔蓋太古之希聲歟而或解之曰土沖氣也樂沖氣之和聲亦一義也迨後世而制加備矣夏后氏足鼔足趺也鼔下用柱柱下用趺故曰足鼔殷人貫之以楹楹如屋楹鼔大而不可趺故埋柱於地而堅築之貫鼔於其端一楹四稜猶四植之桓圭也周官太僕建路鼔大寢之門外儀禮大射建鼔在阼階西皆楹鼔也而莊子曰負建鼔陳氏曰建鼔可負則以楹貫而置可知然則建鼔楹鼔其大小亦隨宜用之乎其小而播者别為鼗鼓故曰置我鼗鼔置讀作植暨周乃有縣鼔戴記縣鼔在東應鼔在西毛詩􅉧田縣鼔然周禮儀禮不載當是建鼓兩傍所懸應朔二鞞而或謂宮縣設之四隅軒縣設之三隅判縣設之東西夫宫縣軒縣判縣通指八音之樂豈專謂革音乎哉其土鼓足鼔楹鼔周亦用之周官籥章掌土鼔擊之以逆暑迎寒樂田畯息老物詩云賁音焚鼔維鏞賁鼓即足鼓也又云鼛音髙鼔弗勝鼛鼔即楹路也曰朔鞞曰􅉧鼔曰相鼓曰田鼓總是縣鼓蓋一物而五名焉皆鼔之小者也曰應鞞曰應鼓又曰應曰鞞亦一物而四名則又次之其鼔之大者則以靁鼓鼓神祀以靈鼓鼓社祭以路鼓鼓鬼享而又鼓人救日月以靁鼓㝠氏攻猛獸以靈鼓太僕路鼓以達窮者與遽令然其鼔制則一耳惟繪以風雲雷雨之象謂之雷鼔繪以麟鳳龜龍之象謂之靈鼔繪以飛鷺盤旋之象謂之路鼓路與鷺通古文從省詩所謂振振鷺鷺於飛鼓咽咽醉言歸者是也舊稱鷺乃鼓精周制但繪鷺於鼓腔隋唐以來則刻鷺於鼔上今制則訛為彩鳳矣盖猶然路鼔鬼享之遺意也易通卦驗冬至鼓用馬革夏至鼔用牛革解之者曰乾為馬故雷鼔用之坤為牛故靈鼓用之然則路鼓又用何革不亦穿鑿甚乎雷鼓雷鼗六面靈鼔靈鼗八面路鼓路鼗四面盖亦一様六面八面四面如今儀仗花腔鼔二十四面杖鼔十二面之類非一鼔而有多面也而宋人圖説迺以靈鼓八各冒一面總為一架承以槃軼轉以金樞作靁車之狀雷鼓路鼔亦如之悞矣鼔音初無律呂詎若排簫笙竽取備多面者哉其周官六鼔又有所謂以鼖鼔鼓軍事以鼛鼔鼔役事以晉鼔鼓金奏鼖賁通用鼛鼓亦作臯鼓暨晉鼓皆建鼓也晉鼔建於軍路鼔則建於寢故其名異耳韗人為臯陶其制甚備晉鼔長六尺有六寸臯鼔長尋有四尺鼖鼔長八尺皆兩面相距之度鼓皆四尺兩面擊處為鼓中圍加三之一句倨磬折長短無異而鼔制不殊則六鼓之制可推焉獨應鞞􅉧朔乃縣於大鼓之旁者其制有異􅉧朔之度長二尺大面一尺四寸小面七寸聲徐而洪類鞭鼔之聲應鞞之度長一尺四寸大面一尺小面五寸聲焦而急類鼗鼔之聲爾雅大鼓謂之鼖小者謂之應而應田縣鼓鄭箋皆以為小鼓毛傳以田為大鼓盖以田較應則為稍大而總之皆小鼓縣於建鼔之旁者耳凡作樂先鼔􅉧次擊大鼔復擊應大師大祭祀鼓􅉧小師大祭祀擊應則大祭祀皆鼓􅉧擊應而大射有朔鼙應鼙詩又以應配􅉧則􅉧鼓即是朔鼙以其引鼔焉故曰􅉧以其始鼓焉故曰朔而應鼙則與之相應周禮有􅉧無朔儀禮有朔無􅉧名異而用則同也又有大鞉小鞉形如小鼓有柄有耳播之為樂爾雅大鼗謂之麻小者謂之料世紀倕作鞀鞞夫鼗鞀一也大謂之鞞而與麻同小謂之鞀而與料同小師掌敎鼓鼗下管擊應鼓瞽矇掌播鼗而眡瞭亦掌凡樂事播鼗盖􅉧者引鼔者也鼗者兆鼔者也先儒謂凡樂先擊鍾次坎鼓鍾動而鼗已作及下管播樂器而樂具作焉乃鼔􅉧以先之則鼗又先於􅉧也今太常樂器無鼗至於􅉧朔又不用以引而用之於搏拊以為應蓋其去古制亦逺矣建鼓詁今之建鼓其貫之以柱類楹鼔承之以趺類足鼓上有翔鳳藻謂宜如隋唐之制刻木為鷺其猶有路鼓遺意焉堂下之樂貴西堂上之樂貴東故建鼔設於堂東南隅鼔無當於五聲五聲弗得不和鼓為雄樂其聲讙而象雷其形穹而象天其於衆樂為君是故其器不宜小小則不尊其擊不宜輕輕則不嚴而尤不宜於繁其聲音不配律呂第以檢樂所謂鼙鼓疎節以節繁弦之契者是也鼔之為言孤也老子曰孤者王公以為稱又曰大音希聲言其尊重而不繁也拊之為言輔也擊之宜輕而亦不嫌於繁近代雅樂其與鼓相間而擊者雖名為拊其實鞞也鞞之為言裨也鼓聲疾而短聞須鞞以裨助之故曰鞞所以助鼔也商頌奏鼔簡簡又簡兮簡兮方將萬舞簡簡鼔聲將萬而鼓先焉又有先鼔而擊者曰􅉧鼔與鼔相應者曰應鞞俱縣建鼔之旁是謂縣鼓今應鞞乃代搏拊之用而􅉧鼔亦廢獨有建鼓則古制不盡存也古者冒鼓必於啟蟄之日義取震奮以暢陽氣其謂鼔大而短則其聲疾而短聞晉鼓近之疾以作氣固不嫌於節短其謂鼔小而長則其聲舒而逺聞朔鼙之類近之舒以導和正欲取其雍徐至於鼛鼓大又欲其聞之逺也以鼓役事故其長丈有二尺宗廟之樂楹鼓兩端第距六尺六寸者節樂者不欲其聲之過讙况有應鞞助之雖短聞焉可耳鼓前後距六尺六寸面徑四尺中徑六尺周二十版每版中廣一尺兩端廣六寸周禮韗人為臯陶穹者三之一也其所用何木古典無戴大都桑梓楠樟隨其地宜用之中貫方柱徑七寸長一丈二尺上下半之方趺四獸其首外向頂接朱瓶上為翔鷺方盖覆之繚以紅羅銷金雲花雙簷四角有鍍金囚牛如龍首皆銜璧翣垂下與鍾磬虡同詩言􅉧田縣鼔記曰縣鼔在西應鼓在東蓋應與田皆縣而鼔之詩指田鼓為縣鼔而記言縣鼔在建鼔之西應鼔在建鼔之東堂下之樂先西故朔西而應東也先儒謂商人加左鞞右應則縣鼔不始於周未可知也近世别為小鼔架而用之名為搏拊非是擊鼔法凡作樂先鳴鼔以動之所以統衆音也擊鼔之法首以兩槌連雙擊􅀈者三而鼓一擊又兩作俱如之凡三作但末作連兩擊此起鼔也三次共四擊此後不復擊􅀈第以槌擊鼓先後連二者三此為第一通三次共六擊又先後三擊者三此為第二通共九擊又急五擊者三末復連加二擊此為第三通三次帶末二擊共十七擊連前共三十六擊三通既畢則又從容三擊然後柷起而衆樂翕然作焉故曰羣音之首也古樂播鼗鼓􅉧今遵時制未敢輒增每樂奏一句鼓三擊而搏拊三應之搏拊詁司馬遷樂書引子夏弦匏笙簧合守拊鼓之語張守節曰合㑹也守待也拊者皮為之實以穅如革囊也用手撫之鼓也言奏弦匏笙簧之時若欲令堂上作樂則撫拊堂上樂工聞撫拊乃弦歌也若欲令堂下作樂則擊鼓堂下樂工聞鼓乃吹管播樂也言弦匏笙簧皆待拊鼓為節故言合守拊鼓也觀此則拊鼔自是兩物拊之設則堂上用則先歌故周禮言登歌令奏擊拊其制則白虎通謂革著以穅陳祥道禮書謂韋表穅裏狀若鼓然其聲和柔書傳謂以韋為鼓謂之搏拊總之用革類鼓畢竟非鼔面徑七寸其長倍焉座長一尺八寸廣一尺連趺髙一尺趺髙二寸用時置膝用畢置座荀卿曰縣一鍾而尚拊大戴禮曰縣一磬而尚拊蓋拊居鍾磬之間以為之節鍾一擊磬一擊各有八節俱尚拊故文獻通考亦云拊狀如革囊實以穅擊之以節樂近代搏拊之制以木為腔形如小鼔而長冒熟皮或生皮或實以穅或無穅乃是古之雅鼓而以架庋之夫拊在堂上坐奏以節歌雅在堂下立奏以節舞其用不同而今以雅鼓冒搏拊之名且以代應鞞之用非古制也宋儒稱搏拊之搏從旉有父之義焉堂上則門内之樂以拊為之父今不倡而應失其所為父矣是宜改正别以朔鼙應鼙縣建鼓傍庶合古道但頒自禮部未敢輕議云或疑拊置膝上今堂上無坐奏之樂似未可用姑存其舊俟攷古者拊用熟皮縫成袋長一尺四寸面徑七寸實之以穅用時置膝上用畢置座上座長一尺八寸廣一尺連趺髙一尺以桑為􅀈長尺有咫兩端冒以皮徑六寸腹微大彩繪飾之金環二並直釘之以繫襻焉閒則卧置於架擊拊法每奏樂一句將闋聽建鼔一擊此則一拍應之三擊鼓則三拍拊初拍用左手次拍用右手第三拍兩手齊舉以為之節古者小師掌教鼓鼗大祭祀登歌擊拊則用以為登歌之節而琴瑟簫笙諸樂從之其説具琴瑟譜中非第與鼓聲相應而已也一拊也虞書言搏拊周禮言擊拊何也輕則拊重則為搏為擊與擊石拊石同義蓋一搏而間一拊更迭以成音者云木音疏其器柷敔先王之作樂也金石以動之絲竹以行之匏以宣之瓦以賛之革以節之亦既洋洋乎盈耳矣然而始之以柷終之以敔制用於木獨有取於質樸之音者何也禮始於報本樂始於尚徳徳莫崇於質樸質樸而後文生文極而返之乎質以樸始以樸終惡其文之著也故曰椌楬者徳音之音也𫝊曰柷敔者終始之聲樂記曰聖人作為椌楬柷敔椌楬同物而異名柷敔以椌楬為體椌楬以揩擊為用禮言揩擊書言戛擊周官小師掌教鼓鼗柷敔塤簫管瞽矇掌播鼗柷敔塤簫管於此可以徴奏樂之序焉敔亦作圉周頌有瞽鼗磬柷圉是也先儒之説曰柷於衆樂先之而已非能成之也有兄之道焉圉於樂能以反為文非特不失已也有禁過之義焉爾雅曰所以鼓柷謂之止所以鼓敔謂之籈柷以合樂而作之然而鼔之以其止戒之於蚤也敔以節樂而止之然而鼓之以籈者節之於後也然更有説焉在易震起也艮止也先天卦位震東北艮西北聖入則之説柷於東北形如仰盂以始樂象震之所以起也設敔於西北形如伏虎以止樂象艮之所以止也萬物生於春其氣木其方東擊其中虚以成聲聲出乎虚以象雷出地奮而其外飾以山林皆取物生之象其成也以虎西者西方之獸又艮居東北寅位寅為虎也履虎尾不咥人亨盈而持之滿而損之伏虎在旁上有齟齬聖人葢戛戛乎慎焉侑巵欹器亦此物此志也木之屬古有舂牘周禮笙師掌教舂牘應雅以教裓樂葢今世拍板之類二六編聨取象律吕用以節樂今雅樂亦􅆙此器形類板斗厚五分口方二尺四寸底方一尺八寸深如之下有趺髙廣二寸傍有孔圓徑六寸納手於中持椎柄以撞擊椎形如拐首長一尺柄長一尺八寸底中心開一竅僅容椎柄透出底外鐵軸貫之今揺動而拔不出故名曰止柷詁樂出於虚故琴必用桐拊必用穅椌必用空而仰盂以象震陽動於下樂由中出而太和由是乎洋溢矣古樂先擊鍾次擊鼓播鼗擊柷而樂作焉春秋傳曰入門而金作國語曰金石以動之今孔庭雅樂無特鍾特磬亦不播鼗但擊鼓以統之鼓訖而柷動爾雅所以鼓柷謂之止註云柷如漆桶方四尺二寸深一尺八寸中有椎句柄連底句挏之令左右擊文獻通考所載畧同而於柄連底下益以旁有孔句内手於中擊之以舉樂宋仁宗時禮官言鄭康成謂投椎於中撞之撞擊之法宜同康成之法柷外圖時卉則可矣而中設一色非稱也宜依方色以圖瑞物東圖青隱而為青龍南圖赤隱而為丹鳯西圖白隱而為騶虞北圖黒隱而為靈龜中圖黄隠而為神螾從之今制三面繪山一面繪水而已柷用楸木止用梓木陳氏樂書曰隂始於二四終於八十隂數四八而以陽主之所以作樂則以此先之而已非能成之也藻謂二尺四者四六之數隂數也底方一尺八寸則二九陽數也椎亦陽數陽動乎下震象也故居東凡奏樂先以止左右擊共三聲以舉樂形類板箱而覆艮覆椀也長三尺六寸廣一尺八寸髙一尺底向上其下有趺髙廣二寸此其座也髹以硃座上有物形如睡虎身長三尺首髙一尺二寸五分尾髙一尺一寸背上刻二十七鋸齒名曰齟齬繪以白色黒紋其戛擊者曰籈古以木長尺廣寸厚分如界尺今用竹長二尺四寸析其寸為十二莖以莖擊三以柄擽三而樂止敔詁爾雅注云敔如伏虎背上有二十七鉏鋙刻句擽之句籈者其名文獻通考則謂碎竹以擊其首而逆戛之又云宋因唐制用竹長二尺四寸析為十二莖先擊其首次三戛齟齬而止與舊用木擽齟齬者異此今時所承用也而擊首凡三次以柄戛亦三以止樂先儒之説曰齟齬二十七者三九之數也籈則長尺寛寸厚分其數十寸陽極於九而隂以十勝之虎亦隂獸始乎陽卒乎隂隂陽互用以成終始是故氣無滯隂亦無散陽而太和在宇宙之間敔之時用大矣哉敔與籈皆用揪木唐宋以來用竹以籈從竹故也書言戛擊鳴球搏拊琴瑟以詠漢儒以為戛即敔擊即柷皆屬木音鳴球屬石搏拊屬革琴琴屬絲葢四音六器總皆堂上之樂而敔之用戛所以施之鉏鋙其義甚顯至宋儒乃以戛擊傅球磬以搏拊傅琴瑟夫磬何以戛琴瑟何以搏且疑為絲石獨奏堂上而柷以啓之敔以止之搏拊以節之者皆為堂下之樂上聴於卑制乎尊殆非古義古者堂上堂下俱設柷敔晉宋之樂乃至四廂各有柷敔牛𢎞罷之宋仁宗時始從王珪之議設諸堂上今考大明集禮存心錄諸書所載圖式柷敔搏拊設於琴瑟工歌之上麾詁麾於經籍無所考惟周禮巾車掌木路建大麾以田以封非以麾樂者然歴代之樂用之而協律郎執以令樂歌立於樂縣之前稍西唐樂録所謂翬干是也其制用纁帛畫升降螭髙八尺或以絳繒一幅為之濶一尺一寸上下綴版粉質上版繪雲下版繪山中繪金似龍三爪而無珠前升後降輔以雲氣朱竿長八尺五寸顛刻龍首銜而縣之升螭向外降螭向内樂將作司麾者舉麾唱迎神樂奏咸和之曲舉則升螭見而樂作樂闋則偃偃則降螭見而樂止葢所以指麾樂之始終亦雷出地奮之意也毎奏皆次第舉麾偃麾以木為架髹以硃恒植其上一云以置於柷頖宫禮樂疏卷六
