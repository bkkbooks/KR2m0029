body:
  text: 頖宫禮樂疏政書類二儀制之屬提要臣等謹案頖宫禮樂疏十卷明李之藻撰之藻字振之仁和人萬厯戊戌進士官至工部都水司郎中是編首列頖宫祀典次列儀注次列名物器數共成八卷第九卷為啓聖祠及名宦鄉賢祠附以鄉飲酒禮第十卷附以鄉射禮其中如釋奠儀之散齋演樂滌牲諸禮及時祭儀注皆明㑹典及南雍志諸書所未載又迎神樂章謂明制本宋舊一成三成相沿不易其樂章諸譜配以六律者唯填工尺等字頗能得其源流葢樂律自宋仁宗時始省去坐立二部及堂上堂下之分南宋諸儒又以舊樂加平減之制無髙上髙尺之律于是所用者惟中和韶樂明代實沿其制之藻所譜又註明時俗之一凡清凡諸調與舊調相合者分毫不爽又於琴瑟操縵之法别成一譜其琴譜不越松風閣之舊規以數音譜出一字少用鈎剔葢欲近以和緩以和韶樂瑟譜則以六律為主行遲其聲以應節又與元熊朋來瑟譜之一聲一字者逈殊葢律厯皆根於數之藻嫻於算法世所行天學初函即其所刻故因數制律足自為一家之學其末卷載鄉飲酒禮兼及鄉射禮者明初之制猶行射禮於頖宫迨其中葉此禮遂廢故明㑹典及南雍志諸書載之不詳之藻稽古證今考辨頗為賅悉唯褒崇一門僅採史𫝊不及馬端臨學校考之備又儀器圖内犧尊諸制既不本於三禮圖又不以考古博古諸圖證其異同僅以時俗陳設者為凖未免稍略然禮以時王所制為定是亦自有其義焉未可盡非也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀頖宫禮樂疏凡例一頖宫所最重者先師祀典歴代褒崇南宋有輯而其書久亡太常南雍諸志僅及本朝未該異代闕里志則泛及封錫蠲贍葢孔氏一家之書不闗禮樂兹集備考聖祀一切典禮沿革悉從諸史紀志中檢出例取編年提綱分目但有議論足裨悉附載焉其詔令文采可觀者亦為收録惟蕪泛不切者不取一祀典之逮我朝屢經釐正是為不刋之典業已萬世欽遵故凡出詔令即為大書特書用昭尊王大義其有臣工建白儒賢著述或見行或有俟者均于禮樂有裨悉為拈出隨事分註以資考究一辟雍典故自有成書是編所重􅇿國學校故不複載然考據禮樂度數疏綱詁目備儀兼譜頗似詳悉或堪為雍志補遺一從祀先賢先儒嘉言懿行漢唐以後不患無徵其七十子之徒則併姓名齒邑有不可知者矣家語史記自多異同今主家語以其為孔壁遺文故也史記以下但有牴牾悉互存以備㕘考諸不能備厥言行間載前人述賛亦具大略論世者或有稽焉但藏書未博如隋志孔子弟子先儒傳十卷唐志五卷李畋孔子弟子賛傳六十卷至十萬餘言悉非管蠡所及博雅君子肯為采摭發覆執鞭所欣慕焉一賢儒位次載在㑹典率循開元之舊其有増祀改祀更祀向于東西兩廡從便升躋西多東少致有凌躐因仍未改㕘考頒降圖位及闕里志禮樂志諸書自多錯雜似未畫一近瞿布衣論世論齒之說最合典禮今覆訂再具一圖膚見附焉明有所據似可施行一八音次第先儒率謂金石絲竹匏土革木而周禮之序則金石土革絲木匏竹也漢志之序則土匏皮竹絲石金木也初無定序若論樂理則律始截竹應以竹音居先而匏土吹氣成聲音諧簫管皆所謂人籟者也樂重人聲用相比附次則絲音最備奥理非他器比其金石亦按律吕但不過始終條理而已併革木皆所以節也故以鍾磬居後而柷敔終焉一古禮古樂世鮮𫝊習自學宫祀典飲射而外他無從睹古禮聞古樂者然尚不免雅俗相㕘是書所以志也所幸者禮失而義存器失而理存考索講求則文獻于今不乏入廟思問凡禮節禮物禮器樂器樂音樂律一一為詁為圖為辯為譜雖出自管窺未必有當然傳述有自不敢以臆説㕘之一議禮之難擬于聚訟然頖宫頒降已有定制從周不倍又奚贅焉惟是雅樂不傳其理數聲器頗稱奥肆自専門學鮮而儒者徒言其義樂官第習其音茍兼究義審音古學亦非絶學故借大成雅樂切磋究之譜攷諸家間㕘鄙見然亦試之制器合之古經不致勦說􅑆言如律吕元聲諸說者一教化首重弦歌則絲音更為喫𦂳琴瑟之論所以特詳操縵安詩使學者循此津梁亦信為途不逺或者不以弦誦為迂一古樂歌奏必取隂陽相合自旋宫法廢世儒惑于斗建之説牽附惉懘論樂既舛合樂全乖隋唐以來太和絶響太常雅樂此義未究今取大成詩樂配以律吕相生之義另擬一譜附歌譜後世或有知音者審焉一樂器悉遵祀典見用盖自禮部頒行如横笛搏拊鼔皆非古樂今不敢去特鍾特磬管籥舂牘應雅播鼗古樂所有今不敢増大成之舞原自宋化成天下之舞强附三獻樂章今不敢釐其他祼獻之儀歌奏合舞之節考之古經總之不無可議但禮時為大道存講習義無擅更積徳百年其數則過固將拭目待之矣一化民莫先鄉飲觀徳莫重鄉射令甲具載今射禮久廢不舉即飲禮亦漸失其初意矣考據而詮次焉附以雅樂總皆庠序之教故樂與同志習之一鄉飲一嵗兩舉頒有圖式不敢輕議今注古禮諸圖非必謂有司之舉悉遵周道縁古者將射先飲其禮固然亦與時制義理相通慕古者似亦不妨㕘同盖律有廢禮之罰而無増樂之禁故也一鄉射載之㑹典亦有定儀草昧之初未暇備禮備樂故不必盡與古合南雍志㕘考儀禮什得其三然於樂節無徵焉聞徐二學使圖解儀注詳略不同俱不及樂鄭世子頗詳樂舞又不兼及古禮兹悉取衷儀禮而以注附經以儀附圖以射節附詩樂以琴附瑟庶于肄習明備不俟他求大約飲與射相為表裏故自立司正以前旅酬以後飲禮有圖有注者射禮不復重列第釋經義而大㫖已晰焉其飲禮合樂之訛與射樂聽發之節舊說襲舛僣為訂正非以求為新異古樂自爾竊亦附從先之志云頖宫禮樂疏凡例
