body:
  text: 頖宮禮樂疏卷三明李之藻撰祀典名義疏學校之設自德行藝制而外莫重於先師之祀典父師司成名其官曰祭酒蓋以釋奠先師而名載在聖祖誥命可繹焉古者成均之教樂德樂語樂舞以饗以祀大樂正實董正之而王制天子受命於祖受成於學出征執有罪反釋奠於學以訊馘告則學與祖並重云武事之不忘告也而况文德乎哉周禮大胥春入學舍菜合舞注云入學釋菜禮先師也文王世子凡始立學者釋奠於先聖先師適東序釋奠於先老疏云立學為重故及先聖常奠為輕唯祭先師四時釋奠不及先聖諦繹經傳三代之學先聖先師則必有分釋奠釋菜禮有隆殺如云唯釋蘋藻無牲牢幣帛則釋菜禮輕如云奠有牲牢有合樂有獻酬則釋奠禮重長樂陳氏曰學校禮樂之所自出小有釋菜而以食為主大有釋奠而以飲為主其習舞與聲而大合六代之樂則一也然而頒樂合聲無釋菜之文其大胥所云入學舍菜合舞者蓋將習舞乃先舍菜非合舞以行舍菜之禮也釋菜不舞不授器禮有明徵故宋景濓曰釋菜無樂釋奠有樂無尸此其辨也惟其無迎尸以下事故王伯厚曰釋奠釋菜祭之略者也此禮不止用於學顧學校祀典惟此耳周以前封建諸侯國各有學東序之奠先老西學之祀先賢所主皆不可考或云各祀其師如唐虞有夷夔周有周公魯有孔子也孔子沒天下學者宗焉天下萬世師則天下萬世所公祀魯國烏得而私諸遭秦滅學祀秩闕然雖漢髙過魯創祠太牢乃晉魏以前學廟未設太常釋奠肇於正始元嘉權奏登歌北齊乃舞六佾春秋二仲嵗有事焉拜孔揖顔每朔一舉隋備四仲之祭日用上丁其猶古者四時皆祭之意歟貞觀定名先聖開元樂備宫縣而天下諸州配享從祀彬彬盛矣宋初以上丁釋奠東序上戊釋奠西序是時登歌雖備樂止判縣元豐以還禮樂漸賁沿元迄今小有損益而春秋丁祭則釋奠之名無改焉用丁象文明也不用丙者內事用柔也其國學吉月謁廟及州縣之附府者春秋二祭俱行釋菜禮進士釋褐亦釋菜各有頒行定儀設誠致行則有司存焉爾已釋奠儀國學先師釋奠欽遣重臣行禮南雍則祭酒主之是為獻官監屬四員分獻御史監禮祠部監宰鴻臚引班太常贊禮其牲醴祭品皆出太常前期十日移會諸司前四日散齋演樂滌牲禮卿奉常祭酒司業咸往觀焉部寺屬官繼之博士書祝祭前一日致齋奉常乘馬教坊司備樂導送祝文祭品入廟行一拜禮詣彛倫堂填獻官職名是晚詣宰牲所省牲訖回宿齋房祭之日五鼓各官省視陳設先上廟行一拜禮候獻官至以祭其外郡國則以所在長官一員為獻官郡縣佐及教官為分獻官或闕官則以應貢生代贊禮則諸生充之觀樂省牲齋宿皆於祭前一日凡釋奠祭服與社稷同儒士陪祭者深衣幅巾陳設目正壇按會典舊制先師祭籩豆各十成化十二年祭酒周洪謨奏準籩豆各十二嘉靖九年釐正籩豆各十去左籩糗餌右豆􅀈食糝食犢一九體不用外祭羊一五體豕一五體登一實以太羹煮肉汁不用鹽醬鉶二實以和羮以豬腰羊膂肉造籩十實以形鹽藁魚棗栗榛菱芡鹿脯白餅白麵造黑餅蕎麵造豆十實以菁菹芹菹鹿醢韭菹以韭切去本末取中四寸醓醢豬肉鮓用鹽酒料物調造兔醢筍菹魚醢脾析牛羊百葉切細湯熟鹽酒造豚胉豬肩上肉簠二實以黍稷簋二實以稻粱篚一實以制帛壇東南西向共設酒尊三爵三獻饌盤一祝文案壇西罍洗一盥盆二露臺下東西向四配四壇每壇羊一五體豕一五體鉶二爵三簠二簋二籩十豆十今籩豆各八篚一饌盤一十哲東哲五位總一壇西哲五位總一壇每壇共豕一分五體每位一體篚一爵三獻饌盤一每位爵一鉶一簠簋各一籩豆各四東廡西廡同共豕舊一景泰六年增為三解四十八分篚一爵三酒尊一罍洗一盥盆一饌盤一每三位為一壇簠簋各一籩豆各四爵四樂器目鍾十六磬十六柷一敔一建鼓一摶拊二琴六瑟二笛六笙六鳯簫二橫笛六塤二篪二翟籥各四十八麾一引節二共樂生四十一人舞生五十人歌六人儀注祭前一日執事者設香案於牲房外贊引者引獻官常服贊引唱詣省牲所唱省牲執事者牽牲於香案前過贊引唱省牲畢遂宰牲以毛血少許盛於盤其餘毛血以淨器盛貯祭畢埋之是日觀樂并習儀正祭日將行禮起鼓初嚴遍燃庭燎香燭鼓再嚴樂舞生執事者名序立於丹墀兩傍鼓三嚴贊引引各獻官至戟門下立候通贊唱樂舞生各就位樂舞生各以序進立於殿庭奏樂之所司節者分引舞生至丹墀東西兩階各序於舞佾之位司節在東則退至東四班舞生之首在西則退至西四班舞生之首相向立通贊唱執事者各司其事各執事亦各以序進就位訖通贊唱陪祭官各就位衆官就位訖通贊唱分獻官各就位各贊引引各分獻官至拜位各贊引退立東西訖通贊唱獻官就位贊引引獻官至拜位贊引退立於獻官東西兩傍相向立訖通贊唱瘞毛血執事者捧毛血正廟由中門出四配東西哲由左右門出兩廡隨之瘞於坎遂啓爼蓋通贊唱迎神舞生執羽籥麾生舉麾唱樂奏咸和之曲擊柷作樂通贊唱鞠躬拜興拜興拜興拜興平身獻官以下俱拜訖麾生偃麾樂盡擽敔通贊唱奠帛行初獻禮捧帛者各捧帛執爵者各執虛爵贊引詣獻官前唱詣盥洗所引獻官至盥洗所司盥者捧盆贊引唱搢笏獻官搢笏盥畢進巾贊引唱出笏獻官出笏贊引唱詣酒樽所引獻官至酒樽所贊引唱司樽者舉羃酌酒執爵者以爵受酒同捧帛者在獻官前行先聖帛爵由中門入四配帛爵左門入各於神案之側朝上立贊引隨引獻官亦由左門入唱詣至聖先師孔子神位前麾生舉麾唱樂奏寧和之曲擊柷作樂贊引引獻官至神位前唱跪獻官跪唱搢笏獻官搢笏捧帛者轉身西向跪進帛於獻官右獻官接帛贊引唱