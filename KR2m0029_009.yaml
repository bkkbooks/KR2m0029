body:
  text: 頖宫禮樂疏卷九明李之藻撰啓聖祠祀儀疏按叔梁紇氏之封爵自祥符封禪幸宅始其進公而王而稱啓聖也自勝國始其專祠徧天下而祀也則自國朝嘉靖始尊聖師並尊聖師之父蓋報本錫類莫盛乎此矣羲軒堯舜禹湯師也而君祀不及於所生文武周公師也而君而相能追王上祀而不能俾萬世為之祀其追王上祀也而達孝則吾夫子之爲達孝也達乎百世以下者也堯學於君疇舜學於務成昭禹學於西王國湯學於伊尹文王學於鬻熊武學於師尚父未聞推恩自出如是之隆而我世宗肅皇帝誦法遺書祀典之隆若是則我肅皇帝之達孝達乎百世以上者也於乎懿已其木主暨陳設視四配其以顔路曽晳伯魚孟孫氏配也儀視十哲程朱蔡四氏之從祀也儀視配而少殺有程朱蔡則不得不躋周氏錫類之道則然矣主祭或司成或郡守大抵以所在長官之次或學博充之期隨春秋丁祭子夜行禮取不先父食之義云陳設目正壇羊一豕一鉶二籩八實以形鹽藁魚棗栗榛菱芡鹿脯豆八實以菁菹鹿醢韭菹醓醢兎醢筍菹魚醢芹菹簠二實以黍稷簋二實以稻梁篚一實以帛爵三壇東南西向設罍洗盥盆一東西配位豕首二豕肉四塊篚二每位簠簋各一籩豆各四爵三東西從祀豕首二豕肉二塊篚二每位簠簋各一籩豆各四爵各三正壇東配二壇西配二壇東從祀西從祀各設案爐一燭二已上共設酒罇三儀注省牲與前祭同典儀唱執事者各司其事分獻官各就位導引引獻官盥賛引唱詣盥洗所賛搢笏盥手訖賛出笏引至拜位賛就位典儀唱迎神賛鞠躬拜興拜興拜興拜興平身分獻官同四拜典儀唱奠帛行初獻禮執事者各捧帛進爵立於神位前賛引賛陞壇賛詣啓聖公孔氏之位前賛引賛搢笏執事者以帛跪進於獻官賛奠帛執事者以爵跪進於獻官賛獻爵賛出笏賛詣讀祝位讀祝者取祝跪於獻官左賛跪賛讀祝讀訖賛俯伏興平身讀祝者捧祝進於神位前賛詣先賢顔氏之位前賛搢笏執事者以帛跪於獻官賛奠帛執事者以爵跪進於獻官賛獻爵賛出笏賛詣先賢曾氏之位前儀同賛詣先賢孔氏之位前儀同賛詣先賢孟孫氏之位前俱同前禮賛復位典儀唱亞獻禮執事者各捧爵自獻於神位前訖典儀唱終獻禮儀同亞獻禮典儀唱徹饌執事者詣神位前徹饌訖典儀唱送神賛引賛鞠躬拜興拜興拜興拜興平身分獻官同四拜典儀唱讀祝者捧祝掌祭者捧帛饌各詣瘞位典儀唱朢瘞執事各捧祝帛饌由中門出至朢瘞所賛引賛詣朢瘞位禮畢祝文維某年嵗次某甲子某月朔某日某甲子某衙門某官某等致祭於啓聖公孔氏之神曰惟公誕生至聖爲萬世王者師功德顯著兹因仲春秋特用祭告以先賢顔氏先賢曾氏先賢孔氏先賢孟孫氏配尚饗名宦鄉賢祠祭儀疏周禮大宗伯以吉禮事邦國之鬼神示所謂人鬼則宗廟之祭而已矣非其族也其神弗歆乃祭法法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災捍大患則祀之瞽宗之祭設於學校鄉先生之賢者殁而祭之於社諸皆崇德報功示民不忘且以風勵來兹典甚重巳我太祖髙皇帝登極之元年首詔郡縣訪求應祀神祇聖帝明王忠臣烈士久有功於國遺愛及民者載諸祀典明年詔有司祠祀典神祗其不在祀典而嘗有功德於民者即不祭存其祠宇又令天下學校各建先賢祠左祀賢牧右祀鄉賢春秋仲月亦得附祭廟庭後乃更名名宦鄉賢世宗肅皇帝令天下有司學校備查名宦鄉賢果有遺愛在人鄉評有據未經表彰即立祠祀若原祠傾頽及未追戴者聽民間建祠崇祀隆慶六年秋今上登極覃敷恩詔於此亦惓惓焉夫牧先惠政賢重清修必無媿於宫墻斯有光於俎豆若果甘棠思永鴻漸風髙蓋棺論定司風教者自宜亟取而崇祀焉奚俟象賢之陳乞膠序之推揚而後可與於斯位哉今漸不然非有華胄必不易得其得之也不必其賢甚則去思專祠不必良牧鄉賢濫舉或參匪人而祀典幾於不足重此眞教化之所關而有司者奈之何其不留意也儀注名宦鄉賢祠迎送神各再拜獻帛三獻爵讀祝皆立提調官行禮名宦祝文卓哉羣公懋修厥職澤被生靈功垂社稷鄉賢祝文於惟羣公孕秀兹邦懿德卓行奕世流芳鄉飲酒禮疏庠序首善之地尊賢養老行禮於斯以申孝弟之義主之以鄉大夫州長黨正州黨皆統於鄉是故通曰鄉飲其事有四三年興舉賢能飲而賔之其一鄉大夫飲國中賢者其二州長習射飲酒其三黨正蜡祭飲酒其四賔興者三年一飲大比之禮也州則一年再飲春秋習射而飲黨則一年一飲嵗十二月大蜡於學子貢觀蜡是也古者貢士於其君必以正月故今之鄉飲亦用正月其飲之以十月也自漢始也周十二月即夏十月取黨正之文也唐禮樂志季冬之月正齒位百官志縣令每嵗季冬行鄉飲酒禮則仍十二月矣至於鄉貢試已長吏以鄉飲酒禮會僚屬設賔主陳俎豆備管弦牲少牢而歌鹿鳴與耆艾序少長焉蓋猶然賔興鄉飲之遺意乎宋政和遂改鹿鳴宴為鄉飲酒紹興令州縣以科舉年行之庠序則三年一舉之飲至宋尚存也射飲之廢久矣石渠禮論尚有鄉射合樂之說鄭𤣥儀禮注亦稱今郡國行此禮於季春漢而後鮮有行者政和雖定貢士射儀而旋遭喪亂未及施用今之鄉飲一舉於十月之朔而非蜡再舉於正月之朢而非賔賢能其大比别稱鹿鳴不涉鄉飲所謂鄉飲别舉於庠則尚賢尚齒鄉大夫飲賔之禮也嘗合儀禮王制鄉飲酒義而繹之主人就先生而謀賔介選德也主人拜迎賔於庠門之外入三揖而後至階三讓而後升所以致尊讓也盥洗揚觶致潔也拜至拜洗拜受拜送拜既致敬也禮隆於賔主略於介更略於衆賔貴賤之等也設俎豆備禮樂肴熟而不咀酒清而不飲徹俎而後坐稅屨進胾而無算爵無算樂義惠盡也賔主象天地介僎象隂陽三賔象三光讓之三象月之三日而成魄四靣之坐象四時賔者接人以義坐於西北主人接人以德厚坐於東南坐僎於東北以輔主人坐介於西南以輔賔六十者坐五十者立侍以明尊長六十三豆七十四豆八十五豆九十六豆所以明養老皆所謂習鄉尚齒者也他如饗用餚蒸見於毛傳樂縣笙磬籩俎見於應邵注祀聖師牲以犬紀於後漢志則又禮經未載而儀節可以互徵者其事不過飲食之節鄉黨之會而所關乎教化風俗者則甚鉅所以伏湛奏舉於建武田錫獻議於建中鄭樵譔圖於紹興雖古制湮没而朔餼猶存漢唐盛時郅惲得以舉汝南之觥李忠藉以變丹陽之俗裴耀卿行之於宣州歌白華華黍由庚南陔諸詩而民聽之有泣下者蓋禮樂之進物也速而謙讓之服人也深觀祭獻之嚴而知報本睹蘋藻之薦而知貴誠見賢者為主而知懋德之可尊視老者為賔而知髙年之當敬閱揖讓拜起之式而莊敬之志自生聞雅頌和平之音而淫慝之心自息聽南陔白華之詩而父母之孝養自篤窮鄉僻郡之民烏知禮樂惟示之以鄉飲之禮樂而觀感興起覺亦有所不容已者以此知先王之禮真足以移風易俗而所禆於陶世之具非淺也先王之世非特行之有司而已月令孟冬大飲蒸注謂天子諸侯與羣臣飲酒於大學乃至總干袒割執爵執醬屈天子而躬養老之義逮漢之永平晉之泰始咸寧臨雍拜老猶或踵行當時傅𤣥作賦束晳補詩膠庠之儀彬彬如矣晚世雖不行於天子而郡縣長吏一嵗兩行業已著為律令無敢墜曠惟是禮多綿蕞樂曠登歌甚者故事徒修賔選不肅秩秩賔筵而匪人干之志行之賢或鑿坏而羞與為耦有司者亦曰吾以飾吏治完功令而已矣嗚呼此禮教所以不興而民風不免於日澆者乎有宋銳意講求蘇易簡撰樂章三十四具鹿鳴南陔嘉魚崇邱關雎鵲巢諸篇林保修定鄉飲酒矩範其禮有主賔僎介三賔有肅賔序賔祭酒主獻賔賔酬主人主人酬介介酬衆賔脩爵無算沃洗揚觶拜送拜既及約束十九事而當時固未盡行近鄭世子亦譜鄉樂其武舞奏以兎罝文舞奏以羔羊又備帗舞人舞皇舞羽舞旄舞干舞諸圖法上之用以助流教化追隆古始亦未施用令甲所頒僅載其略有司推行不無漸失禮意今考禮經時制論次儀節佐以登歌笙歌間歌合樂要於簡要可行無取繁縟若兼六舞更備聲容賢守相毅然任之亦不難行事似迂而實切禮有剏而實因不曰吾從先進乎哉從之此其始矣賔詁儀禮主人就先生而謀賔介注主謂鄉大夫先生鄉中致仕者賔介處士賢者古者致仕大夫名曰父師士名曰少師常知鄉人之賢者是以大夫就而謀之賢者為賔其次為介又其次為衆賔而與之飲酒然則致仕大夫猶晉魏間之中正操人倫之鑒而評舉大賔非必其躬為大賔者也所謂大賔則年髙德邵之處士平日韜光掩采如祥麟瑞鳳欲望見而不可得至此而鄉大夫物色焉以光盛典蓋尊賢與養老兼焉若謂第延鄉紳則貴有重於齒者所謂一命齒於鄉里再命齒於父族三命不齒豈俟以禮屬民而與之飲酒於序然後正其齒位乎會典洪武十六年刋定大賔以致仕官為之𢎞治十七年改定今後鄉飲酒延訪年髙有德為衆所推服者一人爲賔其次爲介則亦不拘致仕官矣所患處士中或難其選然當虚心延訪崇禮潛德以示風教之原尚齒尚德不兼尚爵有爵之人官評鄉評必已久著豈必臨期延訪而後知其賢哉僎詁僎儀禮作遵注云遵者謂此鄉之人仕至大夫者也來助主人樂賔主人所榮而遵法者據此則僎固鄉先生為之唐制以鄉飲賔興有主賔介而無僎宋髙閎草定其儀僎介之位不盡合古晦庵所定儀位主以州守縣令位於東南賔以里居年髙及致仕者位於西北僎則州以倅縣以丞若簿位東北介以次長位西南學者多從其說大明集禮因之然非古也舊會典所載亦不然洪武六年刋定僎賔鄉里年髙有德之人𢎞治十七年定今後遇鄉飲如本縣有以禮致仕官員主席請以為僎夫謂之僎賔義殊參佐况會典儀注主人率僚屬迎賔庠門之外以入揖讓行禮畢又率僚屬出迎僎夫僚屬即佐貳以下也既率僚屬又迎僚屬於義為贅及其獻賔禮畢又詣僎前獻爵交拜夫守令正官固無率屬以迎僚友之禮况禮名鄉飲而正官與佐貳獻酬交拜於黌序之堂置介置衆賔於度外是何義耶然則佐貳必不可以充僎故僎必致仕鄉紳有齒德可遵法者然後合禮亦不必拘定三人禮有三賔無三僎儀禮經文云若有遵者夫曰若有則僎在或有或無之間疏云以其無常或來或不來夫有無來否之未必而尚何三僎之拘耶會典迎送設席並不及於三僎惟圖式列之當由佐貳充僎佐貳不止一人故編纂者因訛混列遂若以三僎配三賔者不知僎無取於充數多或二人三人所謂諸公大夫舉觶乃入者固非一人如值其乏則一人亦無不可介衆賔司正詁儀禮主獻衆賔繼以介酬衆賔記言五十者立侍聽政後又言少長以齒終於盥沃賈氏所謂鄉人有學識者皆來觀禮皆與堂下之飲則是觀養老之禮者皆得謂之曰賔也經言拜受者三人此三賔之說也衆賔辯有酒脯此衆賔之說也衆賔以齒介則以賢不拘於齒矣唐禮樂志鄉飲禮刺史為主人先召鄉致仕有德者謀之賢者為賔次為介次為衆賔此即古者謀賔介於先生者也而明經秀才進士孝弟旌表者咸與焉則所謂賔者亦衆矣至其季冬正齒位則縣令為主人鄉老六十以上有德望者一人為賔次為介為三賔為衆賔大抵如鄉飲酒禮云唐之所謂鄉飲者為貢士也尚賢也介與衆賔輔賔行禮者也大抵辯賢之意重於序齒惟正齒位於季冬而養老之禮行焉尚齒尚賢重不在爵故賔若介皆得以未仕之耆碩而晉與令長為禮而衆賔亦濟濟焉第所謂司正者不可考矣古者由介以至衆賔禮有詳略主人親速賔及介而衆賔自從至於門外主人拜賔及介而衆賔自入揖讓獻酬繁於賔略於介至於衆賔升授坐祭立飲不酢則又略均賔也而貴賤隆殺則大有辨焉介者介於賔主之間者也僎有巽入之義介有剛辯之義鄉飲有介鄉射無介射賔禮略也鄉飲迎賔一相樂正告備將留賔乃使相為司正者酒清肴乾賔主百拜而怠倦生焉於是乎監之以司正司正者以禮法正人所以使之和樂而不流者也其人則衆所推服者以副主人然而受命於主人以通賔主之情故鄉飲之司正即鄉射之司馬選重而其任則勞兹州縣以學博充焉猶之可也郡以推官可以副不可以命賔筵之肅也而揚觶致辭繩愆示誡或以賛者代焉此其去古道更遠矣古之司正禮行樂備而後設今之司正夙戒而立專官毖專席然而古必舉其職今僅存其名是不若俗飲之酒監立於酣暢之後必欲勝其任而愉快也所謂禮失而求之野者乎今鄉飲之為介者一人為司正者一人三賔之外衆賔無算朱子禮儀相及賛用士之熟於禮者頒行圖例亦用老成諸生必擇容止端詳聲音和暢者讀律一人及賔主賛引亦如之主賔僎介席位詁禮載四靣之坐象四時先儒謂坐有四方者禮不主於敬主欲以尊賢故其位賔主不相對而坐僎於其間以見賔賢之義也所謂主坐東南者坐東近南而靣西記曰主人必居東方東方者春春之為言蠢也産萬物者也主人者造之其所以偏於南者天地温厚之氣始於東北而盛於東南主人者接人以仁以德厚者也故坐於東南也賔坐西北者坐北近西而靣南也記曰賔必南向南方者夏夏之為言假也養之長之假之仁也其所以偏於西者天地嚴凝之氣始於西南而盛於西北此天地之尊嚴氣也賔者接人以義者也故坐於西北也主西向賔南向所謂賔主不相對者此也若主居東南隅向西北賔居西北隅向東北是相對矣是禮主于敬主矣非尊賢之義也介輔賔者也坐賔於西北坐介於西南南者賔之南也坐西靣東非坐西南隅也記曰介必東向介也者間也坐賔主之間所以間之尊賔也僎輔主者也坐主於東南坐僎於東北北者主之北也坐北靣南非坐東北隅也賔象天主象地僎象日介象月經之以天地緯之以日月而可無正歟且夫三賔衆賔司正僚屬俱正向而主賔僎介又各隅向是八靣之坐非四靣以象四時也席不正不坐首善之地而有不正之坐民奚觀焉嘉靖四年蘇守胡公改正其位立榜學堂藻守澶淵亦未敢徇俗隅坐蓋舊刻會典圖式原皆正坐萬厯重刋乃始更之或亦纂修者一時之誤耳又按會典社飲禮設賔席於堂中稍西向南設主席於堂東南向西此亦可以類推今取會典舊圖參酌典禮爲圖附後以俟酌行鄉樂詁獻酬禮畢則進樂以樂賔禮樂不相離也工入升歌三終主人獻之笙入三終主人獻之間歌三終合樂三終賔出至於階奏陔皆所以備樂也其獻之尊先王之樂也升歌者鼓瑟而歌瑟先歌後其升堂之序也歌鹿鳴美嘉賔也四牡辭親從王事於此乎始也皇皇者華將爲天子使也古者賔興而行鄉飲之禮故有四牡皇華之章次則笙入而奏於堂下奏南陔孝子相戒以養也奏白華孝子之潔白也奏華黍時和嵗豐宜黍稷也既乃一歌一吹相間而作歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀魚麗美萬物盛多也嘉魚太平之君子有酒樂與賢者共也南山樂得賢也由庚萬物得由其道也崇丘萬物得極其髙大也由儀萬物之生各得其宜也既乃合而奏周南之關睢葛覃卷耳召南之鵲巢采蘩采蘋而樂於是稱備矣關睢后妃之德葛覃后妃之職卷耳后妃之志鵲巢夫人之德采蘩夫人之不失職采蘋卿大夫之妻能循法度蓋夫婦之道生民之本而王化之端故君卿大夫以及四方之賔燕皆用之以合樂焉用之鄉人用之邦國通上下者也賔出奏陔陔夏也陔之言戒也終日燕飲以戒為節明無失禮也既醉之詩是也或曰即南陔也樂用登歌四人二人瑟二人歌也笙四人三笙一和而成聲三人吹笙一人手舂牘歌而和之磬一人鼓鞉一人摶拊一人合則堂上之歌瑟與夫堂下之笙磬合而奏此二南而舊註以為瑟歌關睢則笙吹鵲巢合之歌葛覃則采蘩合之歌卷耳則采蘋合之夫此數詩者逓奏則不可為合如曰合奏則音調既殊章句亦異何自而合焉蓋堂上堂下並奏謂之合周南召南逓奏亦謂之合而以為取彼詩合此詩則不通之論也惟是升歌三詩十三章笙入三詩九章間歌六詩二十四章合樂六詩十九章音節繁多行禮既久奏樂復遲雖强有力者或將乘以勌心而和敬之有忒儀禮曰鄉樂惟欲注謂周南召南六篇之中惟所欲作義避國君則省鹿鳴魚麗禮存尚齒則皇華四牡之詩不作可焉或於歌笙間合毎詩摘取首章而餘詩用於無算爵無算樂之時量晷之永短客之多寡而酌用之朝不廢朝莫不廢夕夫亦不失古人之意矣登歌間奏漢猶用之廟祀其合奏有鍾磬則謂鄉樂無鍾磬則古房中之樂也今世所行之禮近所號為近古者獨一鄉飲而其儀尚參雅俗又不備樂誠為闕典好古君子加意振舉更取鄭世子樂譜六舞之節擇童子而肄習焉公私燕會俱用雅音風俗當亦丕變且奚必俳優靡曼導欲增悲之具而後足以適耳耶牢醴詁養老用醴設兩壺於房户間以備執爵之酳也設𤣥酒不忘始也祭嚌肺周人尚肺也薦用脯薦脯五挺辯有酒脯尚腵脩也烹狗於東方祖陽氣之發生於東也方氏曰植物皆地産養人之隂動物皆天産養人之陽天産不特狗也烹狗以祖陽氣者陽窮於戌戌屬狗狗者至陽之畜也漢永平郡縣行鄉飲於學校祀先聖先師周公孔子牲以犬則犬之為用有自來矣亦養老所當具也牲體賔用肩主人用臂介用胳者前貴於後尊者俎尊骨卑者俎卑骨也必設俎豆重其禮也徹俎而後坐而後旅酬所以盡賔主之歡也酒則漿人掌之酒人共之然亦有異焉漿人六飲水漿醴凉醫酏而酒正四飲則清醫漿酏不及水醴至其飲於賔客醫酏而外又有糟焉内則醴清糟酏漿醷濫無水凉醫玉藻水漿酒醴酏亦無凉醫鄭氏曰清醴之泲者則酒正之清即漿人之醴也泲曰清不泲曰糟内則稻醴清糟黍醴清糟梁醴清糟則三醴之用皆有清有糟也醫即醷也釀粥為之凉即濫也以糗飯雜水曰凉酏薄粥也水者煮酏為之味薄而澹故謂之水其釋漿謂之酨漿則有不可曉者𤣥酒醴齊用以祀醫酏糟清醴用以燕賔西漢之時尚設穆生之醴今則大官法醖已殊古制賔筵秩秩㮣用市酤成禮而已經言祭酒啐酒不言所用何酒然則與鄉人飲隨其鄉俗亦未甚拘也至於薦脯醢設折俎獻以爵酬以觶祭脯醢祭肺祭酒主賔介禮存隆殺而俎豆之觀坐祭之儀莫之或廢焉禮不甚勞而今皆裁省不知何故疑自近世筵用案酒其俎豆無所用之因而併廢祭禮但禮重報本似宜補入儀注不知可否此禮既以行於學宫飲前一謁先師尤不可已古者將行鄉飲必祀先聖先師朱子禮儀質明主人率賔以下先釋菜於先聖先師退各就次以俟肅賔蓋其徵也儀禮鄉飲古文解主人就先生而謀賔介主人鄉大夫也先生此鄉致仕大夫賔介處士中道藝優者其次為介主人戒賔賔拜辱主人答拜乃請賔賔禮辭句許句主人再拜賔答拜主人退賔拜辱拜辱者以送謝之介亦如之乃席賔主人介句衆賔之席皆不屬焉夙興往戒歸而敷席賔席牖前南靣主人阼階上西靣介席西階東靣衆賔在賔席西不與相聨尊兩壺於房户間斯禁兩壺醴尊也斯禁亦名棜禁所以置尊者有𤣥酒在西設篚於禁南東肆陳之日肆首西向東加二勺於兩壺設洗於阼階東南南北以堂深設洗之所假如堂深二丈則洗去堂亷亦二丈東西當東榮屋翼曰榮水在洗東篚在洗西南肆設酒尊於東房之西室户之東在賔主之間蓋酒雖主人所設而賔亦以酬主人故取賔主共之之義北靣設尊𤣥酒在左是在酒尊之西地道尚右𤣥酒在西貴其質素且教民不忘本也斯禁者切地無足者也設洗於庭當屋翼示主人潔以事賔也水在洗東取水有所歸之義祖夫地之左海也以上紀陳設羮定肉熟也主人速賔賔拜辱主人答拜還賔拜辱介亦如之賔及衆賔皆從之主人一相相者主人之吏擯賛也迎於門外再拜賔賔答拜拜介介答拜揖衆賔拜介揖衆賔皆西南靣主人揖先入揖賔也先入門而靣西賔厭介入門左介厭衆賔入衆賔皆入門左北上推手曰揖引手曰厭今文通作揖主人與賔三揖至於階三讓主人升賔升主人先升者是主人先讓於賔賔不俱升者賔客之道進宜難也主人阼階上當楣北靣再拜賔西階上當楣北靣答拜拜至以上迎賔主人坐取爵於篚降洗將獻賔賔降從主人主人坐奠爵於階前句辭重以巳事煩賔也古人坐以膝着地凡言坐倣此賔對答也主人坐取爵興適洗南靣坐奠爵於篚下盥洗致潔敬也賔進東北靣辭洗進東行示情也初立序南東向今行至東而南向以辭蓋洗在南也主人坐奠爵於篚興對句賔復位當西序東靣主人坐取爵句沃洗者西北靣沃洗者主人之佐助沃盥薦俎者卒洗主人壹揖壹讓升同賔升也賔拜洗主人坐奠爵遂拜賔拜洗故主人答拜降盥再盥賔降主人辭賔對復位當西序卒盥揖讓升賔西階上疑立仡立也主人坐取爵實之賔之席前西北靣獻賔初進酒賔西階上拜主人少退避賔之拜賔進受爵以復位主人阼階上拜送爵賔少退句薦脯醢主人有司薦之賔升席自西方乃設折俎牲體支解節折在俎主人阼階東疑立賔坐坐於席上左執爵祭脯醢奠爵於薦西興將取肺故興少儀云取俎進俎不坐右手取肺卻左手執本坐句弗繚句右絶末以祭大夫繚祭士絶祭言繚祭者以手從肺本循之至於末乃絶以祭絶祭則直絶之禮畧也尚左手嚌之嘗至齒興加於俎坐挩手遂祭酒興席末坐啐酒降席席西坐奠爵拜告㫖執爵興主人阼階上答拜就告㫖時同拜賔西階上北靣坐卒爵興坐奠爵遂拜坐而遂拜不必起執爵興主人阼階上答拜就答卒爵之拜也按此祭薦祭酒敬禮也嚌肺嘗禮啐酒成禮也敬主人之物故祭薦祭酒嚌肺皆在席中啐酒則入於已故在席末也在席上貴禮也在席末賤財也飲食財之類也人所以有爭者無禮而志於財也如知貴禮而賤財先禮而後財則民興敬讓不爭矣啐纔始入口尚在席末言是席之正非專為飲食也卒爵者盡爵中之酒也遠在西階上則愈後愈謙矣郊特牲曰祭肺貴氣也蓋祭貴馨香肺為氣主陽氣所鍾馨香出焉故獨祭之也以上皆主人獻賔賔降洗將酢主人主人降立阼階東西靣賔坐奠爵西階興辭主人對句賔坐取爵適洗南北靣主人阼階東南靣辭洗賔坐奠爵於篚興對句主人復阼階東西靣賔東北靣盥坐取爵卒洗揖讓如初升主人拜洗賔答拜興降盥如主人禮賔實爵主人之席前東南靣酢主人主人阼階上拜賔少退主人進受爵復位賔西階上拜送爵薦脯醢主人升席自北方設折俎祭如賔禮不告㫖薦俎嚌肺啐酒皆與賔同不告㫖酒已物也主人凡升席自北方降自西南方自席前適阼階上北靣坐卒爵興坐奠爵遂拜執爵興賔西階上答拜主人坐奠爵於序端阼階上北靣再拜崇酒賔西階上答拜北靣再拜崇酒崇重也謂賔乃幸崇重已酒不嫌其薄而飲之於其來酬而拜謝也儀禮圖亦曰拜崇酒舊注崇充也非是以上賔酬主人主人坐取觶於篚將以導飲酬賔降洗賔降主人辭降賔不辭洗以其將自飲也立當西序東靣卒洗揖讓升賔西階上疑正立以待主人之自飲主人實觶酬賔句阼階上北靣坐奠觶遂拜執觶興賔西階上答拜與奠觶同拜坐祭主人祭遂飲卒觶興坐奠觶遂拜執觶興賔西階上答拜凡酬賔之禮主人欲酬賔先自飲于阼階上以導之主人降洗賔降辭如獻禮升不拜洗酬殺於獻賔西階上立主人實觶賔之席前北靣賔西階上拜主人少退卒拜進坐奠觶於薦西賔已拜而主人遂奠其觶賔辭以主人復親酬已故辭坐取觶復位主人阼階上拜送賔北靣坐奠觶於薦東復位酬酒奠而不舉不盡人之歡也記言凡奠者于左將舉者于右以上主酬賔主人揖降將獻介賔降立於階西當序東靣主人將與介為禮賔謙不敢居堂上主人以介揖讓升拜如賔禮主人坐取爵於東序端降洗介降主人辭降介辭洗如賔禮升不拜洗介禮殺也介西階上立主人實爵介之席前西南靣獻介介西階上北靣拜主人少退介進北靣受爵復位主人介右北靣拜送爵主人拜於介右降尊以就卑也介少退主人立於西階東薦脯醢介升席自北方設折俎祭如賔禮不嚌肺不啐酒不告㫖禮下於賔自南方降席北靣坐卒爵興坐奠爵遂拜執爵興主人介右答拜以上主人獻介介降洗將以酢主主人復阼階降辭如初介辭主人從已降主人辭介為已洗皆如賔禮卒洗主人盥尊介也當為介酌介揖讓升授主人爵於兩楹之間尊在兩楹之北今授爵於尊南也酒賔主共之賔親酌以酢主人此不親酌介卑也介西階上立主人實爵酢於西階上介右主人自實酒於爵坐奠爵遂拜執爵興介答拜主人坐祭遂飲卒爵興坐奠爵遂拜執爵興介答拜主人坐奠爵於西楹南將以獻衆賔也介右再拜崇酒介答拜以上介酢主人主人復阼階揖降復位介降立於賔南主人西南靣三拜衆賔賔衆故以三拜為禮衆賔皆答壹拜不升拜賤也主人揖升坐取爵於西楹下降洗升實爵於西階上獻衆賔衆賔之長升句拜受者三人賔不止三而拜受惟三則堂下衆賔不拜也主人拜送坐祭立飲不拜句既爵句授主人爵降復位卒爵不拜立飲立授賤也凡坐卒爵者則拜既爵其立卒爵者不拜既爵衆賔獻則不拜受爵坐祭立飲此衆賔乃三人下之賔也禮益簡毎一人獻則薦諸其席衆賔辯有脯醢有獻則隨以脯醢薦之辯今文作徧主人以爵降奠於篚不復用爵揖讓升賔厭揖介升介厭衆賔升衆賔序升即席以上主獻衆賔一人洗升舉觶於賔自此以下皆用觶一人者主人佐吏賛者也舉觶者代主人再行禮實觶西階上坐奠觶遂拜執觶興賔席末答拜拜將受觶坐祭舉觶者祭遂飲卒觶興坐奠觶遂拜執觶興賔答拜降洗升實觶立於西階上賔拜句進坐奠觶於薦西賔辭坐受以興句舉觶者西階上拜送句賔坐奠觶於其所賔奠觶於薦西俟作樂後將取此以酬主人舉觶者降事已以上舉觶大夫若有遵僎者則入門左主人降迎僎賔及衆賔皆降復初位門内東西主人揖讓以大夫升拜至大夫答拜以上迎僎此下四條鄉射禮文以補飲僎之禮此篇不言僎禮者僎不必備下文所云若有遵者是也主人以爵降大夫降主人辭降大夫辭洗如賔禮席於尊東尊東明與賔夾尊也不言東上統於尊也升不拜洗大夫尊故不拜洗主人實爵席前獻於大夫大夫西階上拜進受爵反位主人大夫之右拜送大夫辭加席主人對不去加席大夫禮當再重席故不去加席其辭之者不以已尊加於賔也乃薦脯醢大夫升席設折俎祭如賔禮不嚌肺不啐酒不告㫖西階上卒爵拜主人答拜以上主人獻僎大夫降洗將酢主人也大夫若衆則偏獻長乃酢主人復阼階降洗如初卒洗主人盥將受大夫之爵故盥明不敢䙝揖讓升大夫授主人爵於兩楹間復位主人實爵以酢於西階上坐奠爵拜大夫答拜坐祭卒爵拜大夫答拜主人坐奠爵於西楹南再拜崇酒大夫答拜主人復阼階揖降以上僎酢主人大夫降立於賔南雖尊不敢加賔主人揖讓以賔升大夫及衆賔皆升就席設席於堂廉東上為工設席也西階上少東工四人二瑟句瑟先句相者二人衆賔之少者為相皆左何瑟句後首挎越句内弦句右手相句樂正先升立於西階東工入升自西階北靣坐相者東靣坐遂授瑟乃降工歌鹿鳴四牡皇皇者華卒歌主人獻工不洗工左瑟一人拜不興受爵主人阼階上拜送爵薦脯醢使人相祭工飲句不拜既爵句授主人爵衆工則不拜受爵句祭句飲句辯有脯醢不祭爵雖不洗亦祭脯醢則不祭賤也大師則爲之洗賔介降主人辭降工不辭洗此言若有大師則為之洗尊之也賔介降以從主人笙入堂下磬南北靣立樂南陔白華華黍主人獻之於西階上一人拜盡階不升堂受爵主人拜送爵階前坐祭立飲不拜既爵升授主人爵衆笙則不拜受爵坐祭立飲辯有脯醢不祭乃間句歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀乃合樂周南關睢葛覃卷耳召南鵲巢采蘩采蘋工告於樂正曰正歌備樂正告於賔乃降立西階東北靣以上樂主人降席自南方將燕賔也側降賔介不從作相為司正禮久恐怠故立司正監之相即迎賔之相作使也司正禮辭許諾主人拜司正答拜主人升復席司正洗觶升自西階句阼階上北靣受命於主人主人曰請安於賔留賔司正告於賔賔禮辭許司正告於主人主人阼階上再拜拜賔之許賔西階上答拜司正立於楹間以相拜皆揖復席司正實觶降自西階階間兩階之間北靣坐奠觶退共拱少立少立自正慎其位也坐取觶不祭遂飲卒觶興坐奠觶遂拜執觶興洗北靣坐奠觶於其所退立於觶南洗觶奠之示潔敬立於其南以察衆賔北靣坐取俎西之觶初起旅酬也俎西之觶即前一人所舉之觶阼階上北靣酬主人主人降席立於賔東賔坐奠觶遂拜執觶興主人答拜不祭立飲賔先自飲而禮皆從殺不拜卒觶不洗實觶東南靣授主人主人阼階上拜賔少退主人受觶賔拜送於主人之西賔揖復席以上賔酬主人主人西階上酬介介降席自南方立於主人之西如賔酬主人之禮主人揖復席以上主人酬介司正升相旅助旅也升自西階北靣曰某子受酬受酬者降席司正退立於序端東靣立於西序東靣受酬者自介右衆受酬者自左為首一人由介右其自次二人以下由左拜興飲皆如賔酬主人之禮辯卒受者以觶降坐奠於篚司正降復位觶南之位相旅畢也以上司正旅酬使二人舉觶於賔介將行無算爵也洗升實觶於西階上皆坐奠觶遂拜執觶興賔介席末答拜皆坐祭遂飲卒觶興坐奠觶遂拜執觶興賔介席末答拜逆降洗升實觶皆立於西階上賔介皆拜皆進薦西奠之言皆進者一人至賔所奠觶於薦西一人至介所奠觶於薦南賔辭坐取觶以興介則薦南奠之介坐受以興退皆拜送降賔介奠於其所奠而不飲司正升自西階受命於主人主人曰請坐於賔前此立而行禮人皆勞倦故此請坐於賔賔辭以俎不敢以殺禮當俎之貴主人請徹俎賔許司正降階前命弟子俟徹俎司正升立於席端賔降席北靣主人降席阼階上北靣介降席西階上北靣遵者降席東南靣遵今作僎此鄉之人仕至大夫來助主人樂賔主人之所遵法者也賔取俎還授司正司正以降賔從之主人取俎還授弟子弟子以降自西階主人降自阼階介取俎還授弟子弟子以降介從之皆復就初入東西階之位若有諸公大夫則使人授俎如賔禮以上坐賔徹俎衆賔皆降說屨前此堂上行禮不脫屨今將燕坐乃脫屨揖讓如初升坐乃羞鄭注所羞而進者狗胾醢也郷設骨體所以致敬今進羞所以盡愛也敬之愛之所以厚賢也無算爵爵行無數無算樂或間或合盡歡而止賔出奏陔陔夏主人送於門外再拜以上終飲送賔明日賔服鄉服以拜賜主人如賓服以拜辱主人釋服更服𤣥端乃息司正勞賜之無介句不殺句薦脯醢句羞唯所有徵唯所欲以告於先生君子可也賔介不與鄉樂唯欲徵唯所欲昨日正行飲禮不得召親故今禮食之餘惟所欲召先生君子不以筋骨為禮者此日亦可告而召焉惟昨之賔介則不再預不敢凟也鄉樂者周召二南之樂惟所擇而用也記鄉朝服而謀賔介皆使能不宿戒此下總記儀節若凡例也鄉鄉大夫也朝服冠𤣥端緇帶素韠白屨蒲筵緇布純筵席也藉之曰席鋪陳曰筵純縁也音凖蓋以緇布為之尊綌幂賔至徹之其牲狗也亨於堂東北祖陽氣之所發獻用爵其他用觶爵尊不䙝用薦脯五挺横祭於其上出自左房挺鄉射作膱膱長尺有二寸祭半膱東曰左陽主養也房饌陳處俎由東壁自西階升賔俎脊脅肩肺主人俎脊脅臂肺介俎脊脅胳肺解見牲詁肺皆離㨒離之不絶中央皆右體周人貴右進腠膚理曰腠以爵拜者不徒作拜既爵則不徒起起必酢主人坐卒爵者拜既爵立卒爵者不拜既爵凡奠者於左不飲者不欲其妨將舉於右便其舉飲衆賔之長一人句辭洗如賔禮主人為衆賔降而洗觶三賔中惟一人辭洗其二不辭若堂下衆賔則主人不洗立者東靣北上若有北靣者則東上衆賔立於堂下東靣北上若賔多而東靣不盡即立於門西而北靣以東為上樂正與立者皆薦以齒尊樂正與堂下衆賔齒有飲必薦凡舉爵三作而不徒爵獻賔獻介獻工皆有薦樂作大夫不入獻工與笙取爵於上篚既獻奠於下篚其笙則獻諸西階上磬階間縮霤北靣鼔之縮縱也霤以東西為縱鼔者擊也主人介凡升席自北方降自南方司正既舉觶而薦諸其位薦司正之脯醢於其觶南凡旅不洗不洗者不祭既旅士不入徹俎賔介遵者之俎受者以降遂出授從者主人之俎以東藏於東方樂正命奏陔賔出於階陔作若有諸公則大夫於主人之北西靣主人之賛者西靣北上句不與不獻酒無算爵然後與燕乃及之經文古奥讀者但覺其禮之繁也故畧解之如右其節次不過三段始自迎賔拜至之後主人獻賔賔酢主人主人酬賔主人獻介介酢主人主人獻衆賔而其中拜洗拜受拜送拜既有辭有對或祭薦祭酒嚌肺啐酒或備或否或坐飲或立飲主人酬賔不酬介衆賔不酢主人則其禮有隆殺焉此第一段乃鄉飲正禮也次則舉觶而樂作矣樂有升歌笙入間歌合樂四節為第二段所謂鄉樂次乃立司正以留賔賔又酬主主又酬介司正升相旅酬坐賔徹俎而進羞爵無算樂無算以盡賔主之歡此為第三段禮和而樂更備焉鄉飲之禮只此三段則亦不可謂繁若果繁縟何以謂朝不廢朝暮不廢夕安燕而不亂乎哉第其數拜數坐禮節似繁縁古者席地而坐坐則膝着於席類今之跪維時尊篚在禁爵在篚俎豆在席坐地而俯就之跪拜最便所以終日百拜而不以為勞今則不然踞髙坐而下奠爵於階於篚又下而拜焉其誰能僕僕爾乎故遂謂古禮難行若稍裁拜跪之文但禀獻酬之節坐或為立拜或為揖由今之儀其所宜増亦不過洗爵以致潔薦祭以報本備樂以崇雅旅酬以周惠而其去古道也不遠矣夫使民知敬老尊賢以興孝弟之義而又漸習於古禮古樂之化教成國安而三代之隆可幾故曰觀於鄉而知王道之易易也至於賔以處士則潛德光焉僎以致仕大夫則儀刑肅焉謀賔介於先生則老生濫舉之竇塞焉此尤可以救末流之敝事皆師古而總亦不悖於功令此古禮古樂所以必可復而不爲迂也會典儀注一各府州縣毎嵗正月十五日十月初一日於儒學行鄉飲酒禮酒殽於官錢酌量支辦務要豐儉得宜除僎賔外衆賔序齒列坐其僚屬則序爵前一日執事者於儒學之講堂依圖陳設坐次司正率執事習禮至日黎明執事者宰牲具饌主席及僚屬司正先詣學遣人速僎以下比至執事者先報曰賔至主席率僚屬出迎於庠門之外以入主居東賔居西三讓三揖而後升堂東西相向立賛兩拜賔坐執事又報曰僎至主席又率僚屬出迎揖讓升堂拜坐如前儀僎賔介至既就位執事者唱司正揚觶執事者引司正由西階升詣堂中北靣立執事者唱僎賔以下皆立唱揖司正揖僎賔以下皆報揖執事者以觶酌酒授司正司正舉酒曰恭惟朝廷率由舊章敷崇禮教舉行鄉飲非為飲食凡我長幼各相勸勉為臣盡忠為子盡孝長幼有序兄友弟恭内睦宗族外和鄉里無或廢墜以忝所生讀畢執事者唱司正飲酒飲畢以觶授執事執事者唱揖司正揖僎賔以下皆報揖司正復位僎賔以下皆坐唱讀律令執事者舉律令案於堂之中引禮引讀律令者詣案前北向立唱僎賔以下皆拱立行揖禮如觶儀然後讀律乃讀大誥鄉飲酒禮叙長幼論賢良别姦頑異罪人其坐席間髙年有德者居於上髙年淳篤者並之以次序齒而列其有曾違條犯法之人列於外坐同類者成席不許干於善良之席主者若不分别致使貴賤混淆察知或坐中人發覺罪以違制姦頑不由其主紊亂正席全家移出化外讀畢復位執事者唱供饌案執事者舉饌案至賔前次僎次介次主三賔以下各以次舉訖執事者唱獻賔主席起北靣立執事斟酒以授主主受爵詣賔前置於席稍退賛兩拜賔答拜訖執事者又斟酒以授主主受爵詣僎前置於席交拜如前儀畢主退復位執事者唱賔酬主賔起僎從之執事者斟酒授賔賔受酒詣主前置於席稍退賛兩拜賔僎主交拜訖各就位坐執事者分左右立介三賔衆賔以下以次斟酒於席訖執事者唱飲酒或三行或五行供湯又唱斟酒飲酒供湯三品畢執事者唱徹饌候徹饌案訖唱僎賔以下皆行禮僎主僚屬居東賔介三賔衆賔居西賛兩拜訖唱送賔以次下堂分東西行仍三揖出庠門而退右儀注洪武四年所定鄉飲以禮法會民故先之揚觶讀誥律以肅衆志然後賔主獻酬而就坐焉獻酬在前坐飲在後與古禮尚有合者惟是獻賔之後不及介而及僎亦不及衆賔其三僎充以佐貳然不以輔主而以輔賔酬主則與古異𢎞治更定或者其有嘅於是也方今見行儀注讀律後即坐飲酒三行進饌再讀律再飲徹饌然後賔酬主主酬賔交拜而退此以古禮參證似有安賔以後之酬而無拜至洗爵之獻主不獻賔而賔先酬主終席而若介若僎若衆賔曽無一觶以相加遺也而可乎則其所當議亦非特洗薦啐嚌之文笙磬登歌之樂而已者古人旅酬之惠終於盥沃今日勸酬之禮不徧於介與衆賔况夫行禮於學宫而先聖先師主若賔不一展謁尤為闕典鄙意謂謀賔必於鄉紳大賔必延處士禮必設夫尊俎樂必具夫管弦質明而先釋菜羮定而後迎賔拜至就坐揚觶讀法諸凡令甲所已載者固當恪遵而此後即宜先行獻酬如洪武故事則主人降洗賔拜洗主人奠爵賔拜爵主人拜送賔祭酒脯啐酒於席末卒爵於西階固皆主人獻賔所未可或廢之禮也而賔之酢主主之導飲以酬賔與夫獻介獻衆賔一一皆當按據儀禮始雖覺煩久習自便况係朝廷盛典儻亦不必以遵古為勞否獻酬已畢乃始迎僎鄉射禮文固可考據而洪武舊禮先迎賔次迎僎則賔僎原非同至亦非率僎迎賔何得混舉衆官出迎令主伯亞旅之無别耶獻僎之禮與獻介同僎既酢主再申律誥于是乎揖讓就坐而登歌而笙入而間歌而合樂可次第而作焉鄉飲之樂有瑟無琴有笙無簫篴塤篪有磬無鍾其磬有特縣無編縣樂之畧者也瑟二人歌二人笙歌四人工之易備者也而先之以播鼗繼之以應鞞堂上節以拊堂下節以舂牘奏雅頌之音於興賢尚齒之地蓋既舉古禮則亦宜具古樂禮與樂均之不可斯須去身者也進湯供饌具有常儀獻工獻笙禮不遺賤登歌三終笙入三終而司正安賔相拜此其會矣于是繼以間歌司正舉觶為奏魚麗賔酬主人為笙由庚主人酬介為歌南有嘉魚主人酬僎為奏崇丘主人酬衆僎為奏由儀而堂上堂下合樂以後則司正相旅二人舉觶至於徹俎皆似有自然之節族寓焉禮既綢繆樂依操縵全詩俱用日恐不給故毎詩先及首章餘俟留賔進羞無算爵無算樂之頃而更迭奏之其必更迭奏之者晷短則止賔勌則止鄉樂惟欲非必俟其篇之竟也而禮成樂備于既醉之詩則威儀之儆錫類之澤又申之以景福景命君子萬年之頌以延祝于吾君教孝教忠此鄉飲酒禮所以通極乎王道而首善之地所必不可茍焉以塞者乎不揣竊取儀禮列圖附注與同志共講求焉抑亦習射于庠先行鄉飲者之所必用至于孟冬之朔孟春之朢原有頒行定規不當輕議顧未知其可采與否也羮定禮生奉命速賔賔介衆賔及門擯者報賔至擯報訖退立東階下西向通賛唱迎賔主人與擯一人出門外迎賔賔西主東對立此儐者即通賛其賔主介各有引賛二人通唱主拜賔隨唱賔答拜引唱鞠躬拜興拜興平身通唱王拜介隨唱介答拜引唱鞠躬拜興拜興平身引唱揖衆賔主與衆賔揖訖稍先入門左靣西賔揖介介揖衆賔俱入門由右靣東相對引唱揖至中道引唱揖及階引唱揖三讓賔主介衆賔三次揖訖主讓賔云請賔云不敢如是者三引唱升階主先升一等賔皆隨之至堂上楣前俱北靣通唱拜至引唱鞠躬拜興拜興平身賔主交拜介以下西序靣東立俟以上迎賔遵見行儀注則此後即當立司正揚觶讀誥律俟學禮者酌之通賛唱主人獻賔引唱降洗引主人取爵由東階降亦引賔從西階降主辭賔云免降賔答云不敢不降引主人適盥洗所南靣立洗爵賔就盥洗之南北靣立辭云免洗主答云不敢不洗賔退就西階東靣立俟主人洗訖引唱揖升階賔主一揖一讓同升通唱拜洗引唱鞠躬拜興平身賔主各原位一拜訖引唱降盥主人奠爵於篚下階盥手賔亦降主辭云免降賔立於西序東靣主盥手訖揖讓如前賔西階上靣東立通唱主人進爵引主人取爵於篚司尊者斟酒引唱詣賔席前引主人西北向賔席奠爵賔西階上北靣拜手進受爵主人退東階上亦拜手送爵通唱薦脯醢設折俎執事者進豆進俎引唱坐祭賔就席跪左手執爵右手取豆中之醢以祭又奠爵於席左手取俎中之肺右手摘少許以祭引唱嚌肺賔左手取肺嚌之還於俎挩手又唱祭酒祭訖又唱啐酒