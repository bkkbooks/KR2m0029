body:
  text: 頖宫禮樂疏卷八明李之藻撰樂舞疏吕覽隂康氏之始隂多滯伏民氣鬱閼故作舞以宣導之後世聖人因而用之乎樂配之以五聲八音以享以祀樂記曰詩言其志也歌咏其聲也舞動其容也葢聲可以聽而知容藏於心難以貌睹聖人假干戚羽旄以表其容發揚蹈厲以見其意盡筋骸之力以要鐘鼓拊㑹之節然後聲容選和而樂備焉而亦用以教育學校之人材故古者成均學政四術四教非不具備而大司樂以樂舞教國子樂師教國子小舞大胥掌學士之版以待致諸子小胥掌學士之徵令而比之巡舞列而撻其怠慢者籥師掌教國子舞羽吹籥小樂正學干大胥贊之樂師學戈樂師丞贊之葢設官若是之備云凡舞宗廟帗舞社稷羽舞旱暵皇舞辟雍旄舞兵事干舞星辰人舞又有雲門大卷大咸大韶大夏大濩大武之舞與夫來鼓臯舞射夫弓矢舞旄人教舞散樂夷樂而所舞葢無遺樂焉大胥春入學舍采合舞月令孟冬命樂正入學習舞仲春亦命樂正習舞釋菜文王世子曰凡學世子及學士必時春夏學干戈秋冬學羽籥内則曰十有三年學樂誦詩舞勺成童舞象二十而冠始學禮舞大夏是其舞殆無曠時也而至釋菜習舞天子乃帥三公九卿諸侯大夫親往視之祭統君執干戚就舞位樂記武王冕而總干則王太子王子與夫羣后之太子卿大夫元士之適子國之俊秀又不足言蓋無人不從事於舞矣而獨卑者之子不得舞宗廟之酹載在漢大樂律者可考焉當時除吏二千石到六百石及闗内侯到五大夫子先取適高七尺以上年十二到年三十顔色和順身體修治者以為舞人至隋而尚以品子為之號二舞郎葢典樂之教雖亡而胄子之選猶在也降至大觀乃詔罷雲門生舞而舞人皆菆陋屠沽或用羽流俚雜者混跡其間貴介志行之士於是乎羞與為伍而先王教化之道殆不可復行於叔季之世矣嗟乎先王之教所以必從事於舞者何也人生而成童血氣筋骨漸以充實而憤盈其嬉笑跳躍動於手足舞蹈之間如熊經鶴舞獅攫猨騰機自有所不容遏禁之鬱縱之蕩聖人因而導之曰來吾教爾舞進而示之以盤躃顧盼之容束之以俯仰進退之節而又鐘鼓悦其耳羽旄快其目而習之者亦相率而以為便不自知其閑於節範於正而㓜志之潛消也故曰聽雅頌之聲志意得廣焉執其干戚習其俯仰詘信容貌得莊焉行其綴兆要其節奏行列得正焉進退得齊焉古者之教灑掃應對以禁傲詩書羽籥以導和若夫動而有節則莫舞若矣固以動陽氣導萬物其於成就人才則尤親切焉由小學之書而進之以瞽宗之禮樂由瞽宗之禮樂而成之以東序之舞則聖王之教可想也三代而後新聲代變舞容從之於是乎有鞞舞鐸舞巾舞拂舞鞶舞幡舞鼔舞輪舞城舞師子舞白紵舞公莫舞巴渝舞渾脱舞景雲舞紫極舞柘枝舞清商舞伎舞毋論節族淫雜抑亦冠飾匪倫雲翹建華芙蓉鴝鵒矞嵬奇衺大抵皆俳優雜㺯羌胡蹀躞燕享恣其淫褻清廟寧復居歆所謂内則致疾損夀外則亂政傷民馴致大雅淪滅教化陵夷何怪乎士流厭薄置不屑講迨至身心性命之學興而此道益絶殆已逾千載矣孰知夫古人之於舞也童而習之既以治身亦以事人而終其身焉於是故有臣為君舞者大司樂王大射詔諸侯以弓矢舞是也有君為臣舞者食三老五更於太學天子冕而總干漢高帝置酒沛宫酒酣上自起舞是也有孫為祖舞者冕而總干率其羣臣以樂皇尸是也有子為親舞者老萊子著斑爛衣而舞是也有弟子為其師舞者子路援戚而舞是也有兄弟相舞者武帝時長沙定王起舞是也有賔主相舞者灌夫舞屬丞相張磐舞屬陶謙謝安舞屬桓嗣周武帝與梁明帝宴周主親彈琵琶梁主起舞是也而其用之祭祀則以事生之道事鬼神葢音者生之所聽舞者生之所睹故樂必有歌有舞以備觀聽之美而後神人之交始洽因而昭其德焉象其功焉歴代不沿舞名遞變然而總其大端不出文武二舞武舞亦名干舞文舞亦名羽舞又名籥舞古者雲門大咸大韶大夏是皆文舞而韶則文德之隆大濩大武是皆武舞而武為武烈之盛是故夫子論樂而美善獨評韶武無他舉其最焉耳已三代而降漢曰文始魏曰大韶晉曰正德宋曰凱容梁曰大觀唐曰治康曰九功而石晉觀象宇文崇德趙宋文德元崇德皆所謂文武也秦曰五行漢曰武德晉曰大豫宋曰宣烈梁曰大壯唐曰凱安曰七德以至石晉講功宇文象成宋曰武功元曰定功皆所謂武舞也文舞謙恭揖讓武舞蹈厲發揚文舞夏翟葦蘥武舞朱干玉戚容不同而器亦異焉至於進退疾徐變態離合周旋中規折旋中矩整齊嚴肅動應節奏則二舞同之干戚羽旄左右開闔亦各皆有其義凡總干持戚者左手干右手戚未開舞時干外而戚内干縱而戚横葢左屬仁右屬義義以待敵仁以自衛故左干而右戚仁統四端恩常掩義故干外而戚内干仁好生戚義果斷故干縱而戚横也凡執籥秉翟者皆左手籥右手翟未開舞時籥内而翟外籥横而翟縱葢左屬陽右屬隂陽主聲音主容故左籥而右翟和順積中英華發外故籥内而翟外籥象衡運準平翟象表端繩直故籥横而翟縱也此干戚羽籥之容也然古舞定立四表三進三退武取六伐止齊文取六爻變化文俯取諸隂武仰取諸陽文先舉左手足武先舉右手足文則左旋武則右旋諸皆揖遜征伐擬諸形容動盪迴旋以奮至德之光以動四氣之和以著萬物之理而後神明感通亦洋洋乎如臨其上近世失傳太常雅舞立定不移微示手足之容殆與古異今孔廟大成之舞即宋朝化成天下之舞元祐間命樂正開封葉防所撰義取揖遜彰宋受命之自不知何故輙以用之孔庭而至今仍之無改焉近世有私擬舞曲者固未見之實用藻伏思之夫子之樂不同百王惟是道德尊崇刪述垂憲非有揖讓征伐可為摹擬終難杜撰所以國初儒彦不敢輕有更易但與其遵用宋樂不如上取韶舞聞韶忘味葢聖心有獨契焉周制雲門之舞用之圜丘咸池之舞用之方澤九㲈之舞用之宗廟之中凡祭祀皆用古樂即歴代不相沿襲然名異而實則同非必其剏為之也矧㲈之為用更廣以祀四望亦以禮人鬼孔祀用㲈於古未悖雖其笙鏞綴兆不詳載籍然可考求潤飾略存古意至於有文無武近於婦人無武事者之樂夫子却萊夷墮三都奚為而不武乎韶兼干羽於德甚合於義甚允唐猶兼用文武宋乃罷武存文迄今沿之蓋闕典也節詁爾雅云和樂謂之節葢樂之聲有鼓以節之而其舞之容亦有節以節之故先代之舞皆有執節二人前引文舞以節武舞以旌宋享晉侯舞師題以旌夏旌夏者大旌也大射禮舉旌以宫偃旌以商今其詳不可考矣大抵武舞象成故旌參焉文舞則或用羽葆幢或析朱繒三重為節或謂之纛或謂之翿陳風宛丘值其鷺翿解者曰舞者所建則又以鷺為之也今制蔟紅纓七層下垂或用五色相間以象五聲每蔟用緑斜皮刻花為葢上銳下廣狀如偃鍾而以紅皮内托表而出之覆於纓上為飾顛之最鋭處皮金縁口貫以紅絨縧長七尺竿長八尺五寸朱髹塗金龍首銜節舞者當就列時雙節前引行列綴兆則執節者分立於東西兩階舞生之前以節其舞閑則植於架上籥詁周禮籥師掌教國子舞羽吹籥籥章掌土鼓豳籥文王世子秋冬學羽籥明堂位土鼓葦籥詩曰左手執籥右手秉翟夫籥者竹音之一器耳而執之以舞何也聲音之本於是乎寓焉命之曰籥以黍龠之法在是也説文龠者樂之竹管三孔以和衆聲龢龤字皆從龠旁而俗乃加竹為籥龠即律也黄鍾之律萬事根本體有長短檢以度物有多少受以量量有輕重平以權衡倍律所容謂龠通長二尺容黍二合稱重二兩而於律則具二均是謂五聲主宰八音領袖故文舞尚焉舜作大韶執籥秉翟周人舞象亦倣其制季札觀韶箾象箾箾即籥之别名古人舞則吹籥春秋萬入去籥杜註以為内舞去籥惡其聲聞可見文舞吹籥非如近世之不復成聲也爾雅大籥謂之産其中謂之仲小謂之箹或曰籥有緩吹急吹三孔以和衆聲禮書所謂主中聲而上下之律吕於是乎生葢一孔具三音故有上生下生之别非有三器然而既已有三名矣則亦安得無三器乎或謂黄大太夾為大龠姑仲蕤林為中籥夷南無應為小籥亦未可曉今亦只用黄倍為準足矣形制吹口類篴鄭注周禮郭注爾雅咸云三孔獨詩簡兮之注以為六孔皆出古傳宜並存之其開孔也有法取籥身勻作二十寸以墨界之自下而上至三至五至七之界各開一孔孔徑各如倍律内徑之半如黄倍内徑五分則孔開二分五釐足也若於三孔籥每孔之下各増一孔即為六孔之籥凡吹三孔者全閉之則緩宫急徵啟下一孔則緩商急羽啟中下二孔則緩角急清宫啟上下二孔緩為清宫急為清徵也吹六孔者全閉之則緩為黄鍾急為林自下啟第一孔緩為大急為夷啟第二孔緩為太急為南啟第三孔緩夾急無啟第四孔緩姑急應啟第五孔緩為仲急為清黄啟第六孔緩為蕤急為清大吕也但今舞者右手秉翟既難按管調律且兩手開合上下皆不暇於吹籥竊疑古舞三進三退别有吹籥之節與堂下八音相和而今不可攷矣翟詁周禮大司樂教六舞注謂帗舞析五采繒羽舞雜采羽如鳳凰色人舞無所執以手袖為威儀也一謂帗舞者全羽羽舞者析羽皇舞者以羽覆冒頭上衣飾翡翠之羽旄舞者氂牛之尾也社稷以帗宗廟以羽四方以皇辟雍以旄兵事以干星辰以人𤣥謂四方以羽宗廟以人山川以干旱暵以皇今孔庭之舞用翟為飾説文山雉曰翟江淮之間謂雉青質而五色皆備者謂翟其執之以舞者何休所謂以象文德之風化疾也古人舞大夏之器籥曰夏籥翟曰夏翟徐州厥貢羽畎夏翟夏大也文舞之最先者也九雉之名備於爾雅釋鳥一鸕雉二鷂雉三鷮雉四鳪雉五鷩雉六海雉七山雉是之曰翟葢長尾者其八雗雉其九鵫雉其雉絶有力曰奮素質五采成章曰翬青質五采成章曰鷂南方曰􅔧東方曰鶅北方曰鵗西方曰鷷此四方雉名也雉身有文章其性耿介故先王貴而用焉用於五玉三帛二生一死之屬貴其性也用於山龍華蟲藻火貴其文也用之於舞則取其耿介而文章類士德也故詩言右手秉翟書紀舞干羽於兩階率皆用之堯之大章舜之韶禹之夏周之象文舞則無非是者特載籍所稱其配不同有以羽配旄者記稱飾以羽旄是也有以旄配翟者記稱旄翟以舞之是也有以翟配籥者簡兮之詩是也然而言羽則皆是翟羽自陳風有植其鷺羽之句先儒遂云用鷺易繫鴻羽為儀之爻先儒遂云用鴻殊不知鴻鷺之羽素質無文何以當於文舞哉其用翟之制亦有二説一謂柄長三尺其端刻龍口中植翟三莖一謂柄長五尺其端龍項下垂雉羽五層然惟引舞所持其名為節或用綵繒之帗或用彩羽之旌或用白羽之翿或用紅纓之旄自漢以降所尚不同翟則一而已矣前説今所遵用朱柄而龍首髹以金彩舞人章服詁古稱𦙍之舞衣以其制作之善故歴代傳以為寳今不可考矣太常之制舞人蟬冠服朱團領衫革帶皂雲履國學欽遣行禮用此則宜在外郡邑必遵集禮所載儒巾斕衫為當也蔡邕月令章句曰每佾八人各服冕而執戚有俯仰張翕之容然質之禮經冕而舞大武皮弁素積而舞大夏乃天子所以樂皇尸飬老更之服也即諸侯尚不敢僣矧今之舞人羽流猥雜而可為不衷之服乎藻守澶淵遵制為孔廟樂舞時未請於學使即衣巾亦不敢用權用民巾青衫皂縧如江南應試儒士之服諸皆能文通經子弟然亦一時權制後考禮記集説深衣可以為文可以為武可以擯相可以治軍旅方氏曰端冕則有敬色所以為文介胄則有不可辱之色所以為武然端冕不可為武介胄不可為文兼之者惟深衣而已深衣之制諸侯大夫庶人上下同之文舞武舞均之可用然則郡邑學校舞於孔庭者惟深衣最為古雅矣制用紅絹團領無襬如公服之製胷背繪大朶紅花緑葉扶疏不設邊襴以别補子其帶以革為鞓裹以青布上綴黑角為飾如朝祭之革帶夏布為之黑漆如梁冠樣梁上不設金線惟前抹額上下塗金飾邊中繪金蟬取義高潔可以交於神明也冠纓用青絲為之履用皁帛前後有雲縁面縫紃以白線以皮為底右舞人冠袍今郡學通用然近於僣姑存其製深衣冠服則性理大全及陳氏禮書俱載世所通知也舞佾詁左傳衆仲曰舞所以節八音而行八風故自八以降天子用八諸侯用六大夫用四士二傳曰天子舞行八佾諸侯舞行六佾大夫舞行四佾士舞行二佾晉悼公女樂二八賜魏絳以一八其可據者故服䖍注謂天子八八諸侯六八大夫四八士二八而杜預則以為六六三十六人宋太常傅隆辯之曰舞必以八人為列自天子至士降殺以兩減其二列預以為一列又減二人至士止餘四人豈復成樂乃鄭世子又從杜説以開方為舞位夫使立定不移苐如今之雅舞開方誠亦無礙若如古舞立表三進三退當從服説方成行綴也孔庭之舞自宋以來六佾我朝成化増用八佾嘉靖仍用六佾葢從諸侯之禮樂也六八用四十八人右舞儀俱遵時制然自宋元相沿非令甲曽有所裁定者也考之宋史葉防撰朝㑹二舞儀其文舞曰化成天下之舞第一變舞人立南表之南聽舉樂則蹲再鼓皆舞進一步正立再鼓皆稍前而正揖合手自下而上再鼓皆左顧左揖再鼔皆右顧右揖再鼓皆開手蹲再鼓皆舞進一步正立再鼓皆少卻身初辭合手自上而下再鼔皆右顧以右手在前左手推後為再辭再鼓皆左顧以左手在前右手推出為固辭再鼔皆合手蹲再鼓皆舞進一步正立再鼓皆俛身相顧初謙合手當胷再鼓皆右側身左垂手為再謙再鼓皆左側手右垂手為三謙再鼓皆躬而授之遇節樂則蹲第二變聽舉樂則蹲再鼔皆舞進一步轉面相向再鼓皆稍前相揖再鼔皆左顧左揖再鼓開手蹲正立再鼔皆舞進一步復相嚮再鼓皆卻身為初辭再鼔皆舞辭如上儀再鼓皆再辭再鼓皆固辭再鼓皆合手蹲正立再鼓皆舞進一步再鼔相嚮再鼓皆顧為初謙再鼓皆再謙再鼓皆三謙再鼓皆躬而授之正立遇節樂則蹲第三變聽舉樂則蹲再鼓皆舞進一步兩兩相嚮再鼔皆相趨揖再鼔皆左揖如上再鼓皆右揖再鼔皆開手蹲正立再鼔皆舞進一步復相嚮再鼓皆卻身初辭再鼔皆再辭再鼓皆固辭再鼓皆合手蹲正立再鼓皆舞進一步兩兩相嚮再鼓皆相顧初謙再鼓皆再謙再鼓三謙躬而授之正立節樂則蹲其舞節如此每變皆具三揖三辭三謙之儀以明宋有天下本於揖遜協律郎陳沂按視以為節奏詳備遂以用之朝㑹范鎮楊傑譏之其用之孔庭三獻則稍有増損以就歌章實與歌義毫不相蒙也古者不以舞配歌奏凡樂先登歌次歌奏合作次文武二舞或别有舞曲今制歌奏舞一時並作亦與古異學校禮樂之地似當彷彿古樂更定其儀即成均之教未易驟復然使青衿士子肄雅有階觀感而興深闗教化固不可視為迂濶而終置不講也頖宫禮樂疏卷八
