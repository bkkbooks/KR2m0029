宫也一均七律諸調悉具隔八相生不舍瑟而道存焉大弦之縷八十一小弦之縷七十二大弦者十二中聲小弦者十二清聲益一弦以為黄鍾半聲邉弦二中弦一皆黄鍾也十二律各具二均而黄鍾則正倍半有三焉黄鍾君也星有三帝座厯有履端舉正歸餘鼔中則清應鼓清則半應不與衆律若是班也尊君也小笙十三簧律準十三弦皆於十二律外閠一焉以為黄鍾清聲瑟之末弦猶是也而俗樂黄其中弦虛而不用而以内外二十四弦分十二律之中清夫既以中為君又設而不作是無君也不祥莫大乎是杜氏通典曰二十五弦盡用之陳𤾉樂書馬氏通考皆以第一弦為黄鍾中聲第十三弦為黄鍾清聲十三弦即中弦也第二第十四弦為大吕三與十五為太蔟四與十六為夾鍾五與十七為姑洗六與十八為仲吕七與十九為蕤賓八與二十為林鍾九與二十一為夷則十與二十二為南吕十一與二十三為無射十二與二十四為應鍾其第二十五弦雖不明言何律然貞下起元當屬黄鍾無疑以管色定之黄鍾中律為合清律為六半律則取其子聲為四大吕為背四太蔟為正四夾鍾為背一姑洗為正一仲吕為上蕤賓為勾林鍾為尺夷則為啞工南吕為工無射為啞凡應鍾為凡一弦各具一律不相假借只以清中互應今太常以合上尺單彈單應而大太之四夾姑之一南夷之工無應之凡皆雙彈雙應潘巒又以林鍾之尺配蕤賓之勾為雙彈以義揆之夫其中清相應有合之義雙聲相叶相得之義分别七音苐取諧適亦何不可但四弦並鼓未免繁聲亂雅斷非古法至其分别單雙之義以單鼓黄鍾為尊君似也以仲吕之實為黄鍾之實所自出而亦單鼓以尊之牽合無謂惟謂六五變音借用右手以嚴正變其説近理葢鼓合而六應則右合而左六若鼓六應四自不得不右六而左四以至清大太之五原不與中聲之四相應暫借右手别之自無不可柱非可膠指亦可換固不得謂右手專鼓中聲左手專鼓清聲而為是拘拘者也瑟音最雅而世鮮習之浸成絶響獨使䝉筝阮筑箜篌之屬啁哳喧豗以導慾増悲於世良可深悼幸而孔庭侑食餼典猶存膠庠士子尚或可以講求故具述其大凡其弦雖繁指法甚簡較琴更易衿佩雅士固不可以不時習也姜夔瑟柱别以五色五五相次蒼為上朱次之黄次之素與黝又次之使肄習者便於擇弦弦八十一絲而朱之是為朱弦尺用漢尺凡琴弦具五聲五聲為均凡五均其二變之聲則柱後抑角羽而取之五均凡三十五聲十二律六十均四百二十聲瑟之能事畢矣以黄鍾全律算瑟身通長九尺首長九寸廣二尺尾長一尺八寸廣一尺六寸兩岳中間六尺三寸岳崇一寸七分腹下迎首對岳圓越一徑三寸横四寸尾對岳方越一徑四寸長五寸首尾兩越使其音條達腹中貼施九梁梁下相通使其聲沖融首通足中髙四寸傍髙三寸尾通足中髙五寸傍髙二寸五分尾下兩傍垂雲各六兩岳外小孔各二十五以系弦弦長一丈色用朱每弦一柱柱崇二寸七分其制面桐背梓紫漆飾之繪雲氣以象雲和兩端繪錦承以架用琴音定瑟弦法將弦通解畢新布拂拭尾端用錦一幅襯之先上中弦空彈散聲令與琴第三弦散聲相同就從中挨次上之上弦聽音俱用散聲不須設柱第一弦第二弦散聲比琴第一弦散聲㣲低第三第四弦散聲與琴第一弦散聲同第五弦第六弦散聲比琴第二弦散聲㣲低第七弦第八弦與琴第二弦散聲同第九弦第十弦比琴第二弦散聲㣲髙第十一十二弦比琴第三弦散聲㣲低自第十三弦起至第二十五弦散聲皆與琴第三弦散聲相同如是聽畢然後安柱裏外兩近邉之弦皆去岳山一肘餘弦斜排如鴈陣只作一行勿作兩行吹笙定瑟弦法排簫及笙俱可用之定瑟而笙為更近即俗笙亦可也用新㸃合律者先吹合字定第一弦為黄鍾中聲又吹合字定第十三弦即中弦為黄鍾之清聲復吹六字定第二十五弦為黄鍾之子聲次吹四字定第三弦及第十五弦是為太蔟其隔第二弦不先定者以俗笙無背四故也次吹一字定第五弦及第十七弦為姑洗隔第四弦不先定者以俗笙無背一故也次吹上字定第六弦及第十八弦為仲呂次吹勾字定第七弦及十九弦為蕤賓次吹尺字定第八弦及廿弦為林鍾次吹工字定第十弦及廿二弦為南呂次吹凡字定十二弦及廿四弦為應鍾隔夷則無射而不先定者恐俗笙無啞工啞凡二音故也俗笙雖無此音但先定所有者而無者可推故求大吕在於合四兩音之間比合微清比四微濁求夾鍾在於四一兩音之間比四微清比一微濁求夷則在於尺工兩音之間比尺微清比工㣲濁求無射在於工凡二音之間比工微清比凡微濁俗呼背四背一啞凡啞工是也俗樂不用此音古樂旋宫有之今太常瑟無此四律者旋宫法久廢故也是以合字上字尺字獨彈獨應四字一字工字雙彈雙應總之非古法也一弦黄中以下用琴定之對十徽按一弦實音定用笙吹合字定二弦大中九十兩徽間按一弦實音定背四三弦太中對十徽按二弦實音定吹四字定四弦夾中兩徽間按二弦實音定背一五弦姑中對九徽按二弦實音定吹一字定六弦仲中對十徽按三弦實音定吹上字定七弦蕤中兩徽間按三弦實音定吹勾字定八弦林中對十徽按四弦實音定吹尺字定九弦夷中兩徽間按四弦實音定啞工十弦南中對十徽按五弦實音定吹工字定十一弦無中兩徽間按五弦實音定啞凡十二弦應中對九徽按五弦實音定吹凡字定十三弦黄清以下即用瑟定之彈第一弦黄中定吹合字定十四弦大清彈第二弦大中定背四十五弦太清彈第三弦太中定吹四字定十六弦夾清彈第四弦夾中定背一十七弦姑清彈第五弦姑中定吹一字定十八弦仲清彈第六弦仲中定吹上字定十九弦蕤清彈第七弦蕤中定吹勾字定二十弦林清彈第八弦林中定吹尺字定二十一弦夷清彈第九弦夷中定啞工二十二弦南清彈第十弦南中定吹工字定二十三弦無清彈第十一弦無中定啞凡二十四弦應清彈第十二弦應中定吹凡字定二十五弦小黄清彈第十三弦黄清定吹六字定上弦法先將弦穿入岳傍竅内以手探越取出將弦頭繫以絨條令抵竅隙緊抽貼岳即以弦尾穿入尾岳傍竅又以手探越取出纒於食指之端自掌内繞小指外著力緊拽繞瑟尾而上以止機按定然後將餘弦纒繞本弦或三纒五纒大多不過七纒以不動為度止機之形如阮首瑶簪觚稜銳表其端平方用麫漆粘薄軟皮於端取其澀滯上弦之際用以頂之則弦止而不走以便煞尾故曰止機鼓瑟操縵法凡學瑟者兩手十指皆伸切忌屈其小指與筝手不同也其指法擘托抹挑勾剔打摘俱與琴同而雅音惟用擘抹勾三法此外尚有厯撮輪帶等三十法俱出淫聲非雅頌之音所有十三字正應正和同正和同正應正和同􅪯􅪰十六字正應正和正應正和正應正應正和正應􅪯􅪰正者中聲右手中指鼓圓印朱書應者清聲左手中指彈方印朱書和者隔八右手大指擘方印朱書同者專壹兩手聲一般圓印墨書黄中隔八下生林中勾黄擘林林中隔六上生太中擘林抹太太中隔八下生南中勾太擘南南中隔六上生姑中擘南抹姑姑中隔八下生應中勾姑擘應應中隔六上生蕤中擘應抹蕤蕤中隔六上生大中擘蕤抹大大中隔八下生夷中勾大擘夷夷中隔六上生夾中擘夷抹夾夾中隔八下生無中勾夾擘無無中隔六上生仲中擘無抹仲仲中隔八下生黄清勾仲擘黄黄清隔八下生林清勾黄擘林林清隔六上生太清擘林抹太太清隔八下生南清勾太擘南南清隔六上生姑清擘南抹姑姑清隔八下生應清勾姑擘應應清隔六上生蕤清擘應抹蕤蕤清隔六上生大清擘蕤抹大大清隔八下生夷清勾大抹夷夷清隔六上生夾清擘夷抹夾夾清隔八下生無清勾夾擘無無清隔六上生仲清擘無抹仲仲清隔八下生小黄清勾仲擘小黄下生順行隔八相和以右手中指勾大指擘上生逆行隔六相和以右手食指抹大指擘勾抹以大弦為正者則必以小弦為應和擘托以小弦為正者則必以大弦為應和今太常之瑟右手不鼓小弦左手不鼓大弦則専以大弦為正小弦為應矣操縵琴瑟合譜上瑟必合琴故並譜以便肄習迎神樂奏咸和之曲右仲吕之羽太蔟起調太蔟畢曲奠帛初獻樂奏寜和之曲右仲吕之羽太蔟起調太蔟畢曲亞獻樂奏安和之曲右仲吕之羽太蔟起調太蔟畢曲頖宫禮樂疏卷五
