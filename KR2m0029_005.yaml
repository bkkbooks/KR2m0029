body:
  text: 頖宫禮樂疏卷五明李之藻撰絲音疏其器琴瑟八音以絲為君絲以琴為君琴出乎器入乎覺而瑟亦類之琴者禁也禁止其邪以正人心瑟者閉也所以懲忿窒慾正徳也朱襄之世遲春而黄落盛夏而痁枯乃命士達作五弦之琴以來隂氣伏羲氏斵桐為七尺二寸之琴其弦二十有七命之曰離以操辯駕之曲絙桑為三十六弦之瑟以修身理性以合天人之和女皇氏用五弦之瑟於澤丘動隂聲極其數為五十弦聽之極悲乃破為二十五弦而或謂神農制洞越練朱五弦之瑟或謂瞽瞍有十五弦之瑟而舜益之為二十三弦至郭璞又有二十七弦之説陳𤾉論琴專取五弦以為倍之則十弦四之則二十弦而其論瑟也又以五弦十五弦為小瑟二十五弦為中瑟五十弦為大瑟大傳亦曰大琴練弦達越大瑟朱弦達越爾雅大琴謂之離大瑟謂之灑明堂位曰大琴大瑟中琴小瑟四代之樂器也然則琴瑟之有大小也自古記之大都琴音易良瑟音静好兩者必相須而為用亦異制而同音而聲應欲其相保細大欲其不踰是故大琴必以大瑟配之中琴必以小瑟配之所以使大不陵細不抑而和平之韻從是乎出也樂有五聲七始十二律正變倍半備樂備制取數參差非特琴瑟為然鍾磬之縣笙竽之管多寡亦各不等要於中正之道和平之音則大琴小琴總之不過七弦大瑟小瑟總之不過二十五弦然而律度理數無不具備少固不可多亦奚為即所謂雅琴頌琴雅瑟頌瑟者以義揆之雅以用之燕享或從簡便頌以用之郊廟制取靚嚴豈必以弦之多寡定琴瑟大小之等乎雅樂失傳賴有琴笙二者尚在雖於古律有間然以歌聲髙下協之則人聲即是律凖雖百世可知也以笙定琴以琴定瑟以琴瑟協歌詠則八音俱定而雅樂可興是故琴必配瑟君子鼓琴鼓瑟必以配歌虞書琴瑟以咏周禮瞽矇掌敎琴瑟用以養性情美敎化動天地格鬼神端必由之風雨動於師曠寒暑變於師襄伯牙鼓而六馬仰秣賀令鼓而防風夜舞非其驗歟聲之靈變神與之協心之精微聲亦與之通孔子鼓瑟於室而聲變於貍之摶䑕閔子知之鄰客彈琴於屏而聲動於螳之向蟬蔡邕訝之入耳而㑹心聆音而徹理有其理斯渉其境豋聖師之庭囘琴㸃瑟形而上者夫固有所待也音律之數樂其可知窮樂之趣莫妙於琴瑟是故入廟思問弦歌六奏不可不繹其㫖為作琴瑟譜琴詁古者造琴削以嶧陽之桐絙以檿桑之絲徽以麗水之金軫以昆山之玉其名則有臨岳承露龍池龍齦鳯沼鳯翅咮舌鴈足其品則有綠綺焦尾玉牀響泉韻磬清音其調則有縵角清商正調縵宫𦂳羽其曲則堯有神人暢舜有思親操禹有襄陽湯有訓佃文有拘幽周公越裳成王儀鳯孔子之將歸猗蘭曽子之歸耕殘形以至詩三百篇大抵皆可弦可歌之詩也其制以律為尺通長五尺五寸合於河圖全數齦岳中間五尺以當大衍首廣九寸為太陽數尾廣六寸為太隂數肩廣一尺為中央全數刳其中則太虚之理具弦其外則妙應之用該而陳𤾉樂書謂長三尺六寸六分象朞日也廣六寸象六合也弦有五象五行也腰廣四寸象四時也前廣後狹象尊卑也上圓下方象天地也徽十有三象十二律也餘一以象閏也其形象鳯天文朱鳥南方之禽樂之主也五分其身以三為上二為下參天二地之義也葢聖人之制其義廣大無所不可附而合焉至謂中琴三尺六寸六分大琴八尺一寸然則前所比象謂何況中琴不及大琴之半而音律安協耶彼葢不知大者黄鍾之尺中者大蔟之尺小者姑洗之尺各用正律之管為度周禮所謂以十二律為之度數是也維瑟亦然明乎律度之尺而三等琴制大抵不甚相逺是故中聲可求而諸調皆可和也弦有七以五音兼二少肇自太古而揚雄謂陶唐氏始加二弦以㑹君臣之恩桓譚謂文王加少宫少商釋知匠謂文武各加一弦為文武弦又有謂頌琴十弦蔡邕九弦孫登一弦郭璞二十七弦乃至有宋郊廟燕享増以兩儀弦十二律弦益復樊然異制總之非誕則迂不足具論惟是舜歌南風琴取五弦太音希聲亦自一時之制而李照陳𤾉遂欲去二弦只存五弦然則七音八十四聲將安寄乎有七弦故有七音七乘十二故有八十四聲理數自然未可擯為塞曲輒棄不用至於七弦宫位遷史謂居中央世俗則謂一弦為宫次弦為商三弦為角而徵而羽而少宫少商以次序列五音清濁大抵其序如是然而旋宫之法固不可以若是拘也音以弦分律隨徽定雖體無陵犯大律常在大弦小律常在小弦然而旋宫無定位則黄鍾亦無定在俗謂一弦黄鍾二弦太蔟三弦姑洗而蕤林南應以次列之又不可以若是拘也琴有大中小三等律有正倍半三律調有正平清瑟四調雖改弦而調可換顧宫旋而律不旋黄鍾者萬事之根本亦諸調清濁髙下之權衡也故定律正調先求黄鍾為本轉弦緩急審定其聲漢志有之弦以緩急清濁然而清濁之序協律最難吹律以定弦古人之本法也按笙以定弦今人之捷法也雖有八十四音而笙之七簧足以定之此執簡馭繁之道也律有十二當用惟七是為七始不用有五是為五降孰為均主而以相生之法推之其數可得此正雅者所必究也乃徽則更有可論者矣自宋以來以自齦至中徽為濁聲中徽至四徽為中聲上至一徽為清聲故姜夔有上中下準之說以配黄鍾正倍半律之度而每準各具十二律聲按弦附木取之求中聲於七徽以為一弦七徽中聲之始以定黄鍾不知絲音尚宫古樂和緩所謂中聲乃在十徽九徽之間葢有說焉十徽於琴體得四之一九徽得三之一黄鍾損益上下相生此其正位是以琴道尚之必求黄鍾於此七徽以左正合正律七徽以右乃合半律七徽者正半之中非黄鍾之所寓也左氏曰先王之樂以節百事故有五節遲速本末以相及中聲以降五降之後不容彈矣琴從十徽至五徽凡五節亦曰五降降也者自濁漸清之謂也十而九九而八八而七七而六六而五此謂五節五節而外濁益濁清益清中聲不寓焉雖有餘徽非雅樂之所用也唐人紀琴先以管色合字定宫弦乃以宫弦下生徴徴上生商上下相生終於少商下生隔二上生隔一而朱子亦取其說分定十二律五聲之位吹管傳琴先吹黄鍾以琴合之聲合無差以次徧合諸聲又謂七弦隔一調之六弦皆應於第十徽惟第三弦獨應於十一徽備論其理今以相生位置依法推求有瞭然於指下者按十徽彈一弦吹笙以求黄鍾之律而得焉其散音即林鍾是黄鍾之子也按九徽則林鍾之子所謂太簇者也而黄鍾之本位固在第三弦之散聲是故三弦散聲嘗與初弦十徽實音應三弦當五音琴中為君弦故七弦之音不易焉三弦按十徽吹上字即仲吕是為黄鍾母按九而得所生之林鍾故黄林二律一弦與三弦相應也二四之相應亦然三弦按十為太簇按九為姑洗散聲為南吕四弦散聲為太簇按十為林鍾按九為南吕故求太南者多於三四之間鼓之皆應而三與五則不相應五弦散音姑洗也二弦按九亦姑洗也弦改三而用二徽改十而用九一為宫二為商三為角凡角音必按九而後叶也而姑洗之母南吕則五弦按十姑洗之子應鍾則五弦按九故姑洗南吕皆於二五求之至于太夾蕤夷無五律則又在十九兩徽之間一大吕二夾鍾三蕤賓四夷則五無射而其散音則大吕三應鍾同夾鍾四蕤賓五仲吕同夷則六無射七皆相應也而又有緊其弦以十一徽定者一弦實黄散夷二弦同二弦實太散無三弦實仲散大四弦同四弦實林散夾五弦實南散仲皆下一律而六與一七與二同焉所謂一合二四三上四尺五工六合七四者皆吹笙可定者也而又有仍取十徽苐更吹管色定之者一五吹凡皆實應而散蕤二三吹一皆實姑而散應調有髙下故弦有𦂳縵而協律者因焉總其大端以自一至七次第定之則十徽之序黄太仲林南黄太也九徽之序太姑林南應太姑也十九之間大夾蕤夷無大夾也小弦中則大弦倍大弦中則小弦清其大較也八徽以下十二徽以上倣此皆可推定而十二以上過濁歌則聲咽七徽以下過清歌則漸焦是故雅音不用焉譜色有十六然太常所恒用者則黄鍾之合太蔟之四姑洗之一仲吕之上蕤賓之勾林鍾之尺南吕之工應鍾之凡清黄之六清太之五而已其餘設而不用猶隋之所謂啞鍾也然而太古琴音併勾六五鮮用絙而尚清繁而有節大聲不喧譁而流漫小聲不湮滅而不聞其要歸於雅澹平中使人聽之而慾心平躁心釋故足術也黄鍾大吕之均正調也三弦十一徽實音與五弦之散音應者也取琴二張一按十徽一按十一徽每弦依前吹笙定之下者即黄鍾髙者即大吕林鍾夷則之均縵角調也一六按十一徽與三散應三為角也黄鍾調縵三弦即林鍾調大吕調縵三弦即夷則調太蔟夾鍾之均縵宫調也四弦按十一徽與一六散聲應一六為宫也林鍾調縵一六即太蔟調夷則調縵一六即夾鍾調姑仲蕤三均𦂳羽調也五弦按十一徽與二七散聲應五為羽也黄鍾調𦂳五即仲吕調大吕調𦂳五即蕤賓調别定一琴每弦九徽實音與蕤賓十徽實音同即姑洗調南無應三均清商調也二七按十一徽與散四應二七為商也姑洗調𦂳二七即南吕調仲吕調𦂳二七即無射調蕤賓調𦂳二七即應鍾調而黄大二均宫在三弦散聲太夾二均宫在四弦散聲姑仲蕤之宫在五弦林夷之宫在六弦南無應之宫在七弦皆取散聲以為均主而一弦二弦則苐取實音應和而已不取散聲故不名為均主也大抵琴主散聲實音次之泛音鄭聲君子弗貴是以左手綽注吟猱右手疾徐輕重雅樂禁焉琴理雖淵雅音尚簡指法大畧可得而論右中指向内為勾向外為剔食指向内為抹向外為挑大指向内為托向外為擘一勾一挑同聲為撮抹擘同聲亦為撮上生者撮三弦中隔一弦名小間勾下生者撮四弦中隔二弦名大間勾遞互鼓之散實相應若散聲在大弦按聲在小弦則左大指按之散聲在小弦按聲在大弦則左中指按之而其要在於習操縵學記曰不學操縵不能安弦操縵者操持歌聲令極緩縵歌永言聲依永是也聲不依琴瑟則不永絲音短促無操縵之法以為之節且不能逐匏竹何以永歌聲永歌聲則未有不尋操縵者矣古操縵法有十六字者有十三字者皆以二段為之章以一章為歌聲之準每段以首字為金聲為玉振以提其綱又間字而為之節節有八象八卦也段有二象兩儀也總為一章隂陽一太極也金以鍾玉以磬節以摶拊摶拊不欲其有聲是故韋表而穅裹凡十六字者倍之三十二凡十三字者倍之二十六而八節無改焉歌於是乎永矣依也者依此節也操縵二段配歌一聲衆樂從之記所謂嘽諧縵易之音其法如是而俗琴乃一字為一彈吟揉擽擘倫齪綽璅之音出而雅道逺矣此可登歌清廟與金石並奏乎哉今取十三字譜著於篇俟初學者習焉張鶚樂譜乃謂按徽聲短莫若散彈則聲洪而長夫散音之長也與有幾不與按徽實音相應則意味索然况所謂散音亦似是而非者乎桐木為之脣以梓髹以硃漆古穪氷弦玉軫漆質金徽身通長五尺五寸首廣九寸尾廣六寸肩廣一尺齦岳中間五尺首通足中髙二寸七分傍髙二寸尾通足中髙二寸傍髙一寸五分岳以棗鴈足以黄楊腹下龍池八寸鳯沼四寸中藏天地二柱天柱圓厚七分居四五徽界地柱方厚六分居八九徽界若定位小差近上則損上聲近下則損下聲初學琴依此法用紙三條第一條黄太仲林南對十徽下諸弦貼之第二條太姑林南應對九徽下第三條太夾蕤夷無對十徽九徽之間各貼之按弦彈之其第六弦與第一弦同第七弦與第二弦同鼓琴定弦法鄭世子論琴專以十徽九徽為主其說曰凡各弦散聲為本律之正音第十徽為散聲之母能生本律第九徽實音為散聲之子本律所生也惟此兩徽雅樂尚之不用餘徽者惡其亂雅也一弦十徽實音為宫二弦十徽實音為商三弦十一徽實音為角四弦十徽實音為徵五弦十徽實音為羽六弦十徽實音為少宮七弦十徽實音為少商此古所謂正調也俗以散聲為正調非也解弦更張吹律定之不能得合律之管當以笙代俗笙取新㸃者亦可拔出笙簧而单吹之朱子曰每疑七弦隔一調之六弦皆應於第十徽而第三弦獨應於第十一徽調之乃應及思而得之七弦散聲為五聲之正而大弦十二律之位又衆弦散聲之所取正也故逐弦之五聲皆自東而西相為次第其大弦㑹於十徽則一與三者角與散角應也二與四者徴與散徵應也四與六者宫與散少宫應也五與七者商與散少商應也其第三第五弦㑹於十一徽則羽與散羽應也義各有當初不相須故不同㑹於一徽也旋宫諸調之法古人隨月用律今乃謂不必轉軫促弦但依旋宫法抑按之恐難如此泛論當每宫指定各以何聲取何弦為倡各以何弦取何律為均乃見詳實又以禮運正義推之則每律各為一宫每宫各有五調而其每調用律取聲亦各有法此為琴之綱領而説者罕及乃闕典也按此所論十徽十一徽與旋宫轉弦最切琴理特以四弦為宫則取七弦之中然七弦琴之宫即是五弦之宫當在三弦也蔡元定之律亦取第四弦為宫此古夾鍾調俗呼清徵調者也老者歌之則掲不起失之太髙冷謙改用第二弦為宫音乃古無射調俗呼清商調者也童子歌之則拽不出失之太下今以第三弦為宫音比冷髙一律比蔡低一律古之正調俗呼清角調欲求軒轅之樂當必由此不拘老幼皆可歌也試之自見吹合字上第一弦按第十徽彈之令與笙音同是為黄鍾其散音即林鍾次吹四字上第二弦按第十徽彈之令與笙音同是為太簇其散音即南吕次吹上字上第三弦按第十徽彈之令與笙音同是為仲吕散音即黄鍾次吹尺字上第四弦按第十徽彈之令與笙音同是為林鍾散音即太蔟次吹工字上第五弦按第十徽彈之令與笙音同是為南吕散音即姑洗若按十一徽彈之與笙音同實音為南吕散音為仲吕今大成樂皆以仲吕為角此弦宜按十一徽求之其第六弦散聲與第一弦散聲相應第七弦散聲與第二弦散聲相應此五聲為均之琴也吹笙定位畢復照調弦法再詳定之操縵譜周禮鍾師掌金奏磬師敎縵樂縵樂即操縵也操縵引乃古曲名操之為言持也縵之為言緩也其譜擬弦音而作然有其義定當逹理定者言定弦之人當達定弦之理而後弦可定也下二句咏歎之前後二段合此二段方成歌之一聲歌之所由永也十三字操縵前段名曰金聲定當達理定達理定定當達理定後段名曰玉振定當達理定達理定定當達理定正應正和同正和同正應正和同學操縵者學節奏為至要每段句首有圏是其總節每句字傍有㸃是其細節總節前段擊鍾為金聲後段擊磬為玉振此謂始終條理其細節不欲有聲只以摶拊節之或㸃識亦可也二段一章配歌一聲歌彼一字弦此二段二段既畢一字方終勿令歌聲先盡而弦聲未盡勿令弦聲先終而歌聲未終弦與歌相依以永此操縵安弦博依安詩之㫖也朱子曰古樂有倡有歎倡者發歌句也歎者繼其聲也詩辭之外應更有疊字散聲以歎發其趣曰弄曰引曰疊字曰散聲皆操縵之别名也此操縵古引有四義曰正曰應曰和曰同正者本弦散聲定達二字是也應者别弦實音與本弦同聲相應者當字是也和者散聲相生理字是也同者齊撮兩弦成音句尾定字是也定當二聲為同達理二字為和相生者宫生徴徴生商商生羽羽生角黄生林林生太太生南南生姑姑生應應生蕤蕤生大大生夷夷生夾夾生無無生仲仲又生黄陽律隂吕互相倡和者是也以律應律以吕應吕曰應以律和吕以吕和律曰和兩陽兩隂同而不和隂陽倡和和而不同琴瑟譜中皆有正應和同四義具此四義謂之操縵其定律之法只取十徽為母十徽尋不見方去九徽尋假如正調十徽按一而散三應為宫按二而散四應為商至按三則不與散五相應須按二弦九徽乃與五應至四與六五與七則仍按十徽矣上生者用小間勾下生者用大間勾遞互而彈散實相應散聲在大弦按聲在小弦則大指按之散聲在小弦按聲在大弦則中指按之俗惟禁小指古亦禁無名指法從簡以省繁聲葢鄭衛之聲貴泛音而尚吟猱雅頌之聲貴實音而尚齊撮是以古樂用撮十居其三笙不能以獨簧成音必合三兩簧琴不能以獨弦成音必撮兩弦先王之樂琴瑟笙簧未有不相合者雜比曰音單出曰聲若琴瑟之專一誰能聽之是所以尚和同也俗曲則不然吟猱多齊撮少繁弦凄急衰世之音切宜忌之操縵二譜之節十三字正應正和同正和同正應正和同十六字正應正和正應正和正應正應正和正應右操縵二譜後譜増三字然每段俱只八節字可増節不可増其十三字者有正應和同十六字者只正應和葢十三字者弦聲有間斷故用齊撮十六字者弦聲無間斷不暇齊撮也今取十三字操縵為譜如左琴樂章譜迎神樂奏咸和之曲仲吕之羽太蔟起調太蔟畢曲奠帛初獻樂奏寜和之曲仲吕之羽太蔟起調太蔟畢曲亞獻樂奏安和之曲仲吕之羽太蔟起調太蔟畢曲終獻樂奏景和之曲仲吕之宫仲吕起調仲吕畢曲徹饌樂奏咸和之曲仲吕之宫仲吕起調仲吕畢曲送神樂奏咸和之曲仲吕之羽太蔟起調太蔟畢曲宗太蔟為羽􅭝􅹱􅭝􅫨􅭝􅫨􅭝􅹱􅭝􅫨􅪯􅪰恪黄鍾清澂􅭞􆂾􅭞􅤸􅭞􅤸􅭞􆂾􅭞􅤸􅪯􅪰恭南吕為角􅪄􅹰􅪄􅥛􅪄􅥛􅪄􅹰􅪄􅥛􅪯􅪰祀林鍾為商􅤸􅳫􅤸􅥛􅤸􅥛􅤸􅳫􅤸􅥛􅪯􅪰事仲吕為宫􅩗􅵎􅩗􅭞􅩗􅭞􅩗􅵎􅩗􅵎􅪯􅪰威南吕為角􅪄􅹰􅪄􅥛􅪄􅥛􅪄􅹰􅪄􅥛􅪯􅪰儀林鍾為商􅤸