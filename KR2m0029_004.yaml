body:
  text: 頖宫禮樂疏卷四明李之藻撰樂律疏殷薦之用樂也以聲感也聲出乎氣氣盈乎天地之間虛豁而不見其形是謂至陽有物坱軋則發而為聲人與鬼神形不接而氣接氣之寥廓其接也莫或通之故樂之為道以聲音號呼感召於天地之間庶幾神明聞焉因而來格乎所以祭必求諸陽商人之祭先奏樂以求神於陽也次灌地求神於隂達於淵泉也周人尚臭祭先灌地則先求之於隂然而成均之教祭祀之禮其於樂制綦備典同掌六律六同之和以辨天地四方隂陽之聲以為樂器凡為樂器以十有二律為之數度以十有二聲為之劑量大司樂以五聲八音六舞大合樂以致鬼神示以和邦國王制命典禮考時月定日同律宣八風之氣順五行之軌其效則聲和氣和而天地之和應焉五聲者宫主周覆聲宏以舒徵主合驗聲貶以疾商主商度聲徹以明羽主翕張聲散以虛角主善觸聲防以約宫動脾而和正聖商動肺而和正義角動肝而和正仁徵動心而和正智羽動腎而和正禮萬籟之聲不越五者五聲之變不可勝窮於是乎金石以動之絲竹以行之匏以宣之瓦以贊之革木以節之鍾磬取其燥濕之不改琴瑟取其繁簡之不雜塤篪取其溫柔而不焦簫管取其從容而不迫籥笛取其同聲而相合笙竽取其同類而相和革木無當於律吕律吕不得則不節故八物者備而後謂之大合樂夫此八物者或堅或脆或徑或韌或實或虛或沈或浮皆天地間至相戾之物而聖人調之以五音金尚羽石尚角瓦絲尚宫匏竹尚議大不踰宫細不踰羽俾之倡和清濁迭相為經而細大不踰聲應相保純然出於至和而絶無凌犯之迹惉懘之音八者既和而天地間固無一物之不和然後太和洋溢而天神地示人鬼可得而禮也然而和出於中不中則不和爰命神瞽考中聲吹律以求黃鍾而損益相生六律六吕出焉六律謂之六始六吕謂之六間隂陽取其相配故律娶妻其義有合母子取其相生故吕生子其禪不窮而總之以隂陽消長升降之機叶律吕髙下清濁之度是故律之成也則以聲召氣律之肇也則因氣審聲黃鍾陽氣始踵於黃泉也大吕隂氣旅助陽也太蔟萬物湊地生也夾鍾隂夾助陽出種物也姑洗陽氣洗物辜潔之也仲吕隂徵始起未成於其中旅助姑洗宣氣齊物也蕤賓蕤繼也賓導也陽始導隂使繼養物也林鍾隂氣受任種物使茂盛也夷則陽氣正法度而使隂氣夷當傷之物也南吕南任也隂氣旅助夷則任成萬物也無射陽氣無餘也應鍾隂氣應陽種物也以律應氣以器肇聲凡十二正律之聲雖清濁有差皆合隂陽沖和之氣所謂中聲者也倍律則過濁半律則過清然有時而用之則旋宫之法亦隂陽老少自然之變所寓不可得而廢者也律隔八而後諧故均以七而成調七始之説肇於帝舜非必有周受命自鶉及駟而後以七列七同為之證也是隂陽賡和自然之文也聖人本隂陽别風聲審清濁而不可以文載口傳是故鑄金而作鍾以主十二月之聲又以鍾難分别故截竹為管謂之律律也者清濁之率法也律具而聲該又恐律失而聲忒故以律生度生量生衡因而借度量權之三物以訂律而又為秬黍為算數為璧羡為泉布為籥為釜為斛多方以傳其度量衡之制而律亦賴以俱傳是故無形之聲音寄之乎有形之法物而倫夔曠摯其人雖逝樂理尚可知也後世儒者知持論不知制器知究度數不知審音律絫黍吹灰八風卦氣之説甚辨而可味而聲音之道茫然聲失而求尺尺失而論算泥於三分損益隔八相生之語苐知二因三歸四因三歸之法至於仲吕而其算窮焉則以為往而不返因而妄增六十律自執始至於南事竟復不合彌益其疏錢樂之又演京房之律為三百六十強附嵗周然而於律終無當也豈知三分損益乃約略之辭八十一分亦捷取之算精密推求惟河圖用十之數可以乘除損益周轉皆通仲吕何嘗不生黃鍾黃鍾亦可逆推仲吕試取黃鍾正律化數十億長生短五億乘之短生長十億乘之從母求子則以仲吕之率除之從子求母則以蕤賓之率除之仲吕之率七億四千九百一十五萬三千五百三十八蕤賓之率七億七百一十萬八六千七百十一又自黃鍾循大吕而左皆以長生短五億乘之以應鍾之率除之自黃鍾半律循應鍾而右皆以短生長十億乘之以大吕之率除之應鍾之率五億二千九百七十三萬一千五百四十七大吕之率九億四千三百八十七萬四千三百一十二而上生下生逆取順取無不合焉者不離三分損益不泥三分損益不離隔八相生不拘隔八相生求徑求周亦復如是元聲元韻固可坐而得焉惟算術之鹵莽致音律之無慿即度以軒轅之律確乎不差猶懼得之黃鍾或失之他律何況所用之尺率非古制蔡元定襲劉歆荀朂王朴之舊蓋用新莽泉貨之尺而以夾鍾為黃鍾則髙三律矣李照之樂范鎮邢昺魏漢津大抵因之而所用者宋太府之鐵尺所謂黃鍾乃古無射之倍律也則下二律矣今太常律乃國初冷謙所定顧其黃鍾類古南吕倍聲而微髙則較之李照之律或恐無以相非而所云聲氣之元亦不在是也故曰因聲定尺庶幾協律任尺定聲無自而可所以虞書周禮皆有聽律之官而無算律之法樂由音生詎度算之謂哉自古樂既逺而談鍾律者大抵知音而不知樂則有謂四清為鄭聲者有謂二變為夷音者有以喉牙齒舌唇定五音為譜者有以黃林太南姑應相生之序為譜者有謂黃鍾以下無濁聲應鍾以上無清聲者有謂黃鍾三寸九分妄為隂陽增損之法者原夫四清之設専為旋宫令無四清則無射應鍾之均商與宫犯夷則南吕之均角與宫犯所以子律清聲適濟其窮俾細大無奪倫臣民無凌僭而乃以鄭衛擬之何也變宫變徵之聲亦為隔位而設如宫與商商與角徵與羽皆隔一律而羽與宫角與徵則隔二律逺則不諧須以近宫稍髙近徵稍下者諧屬其間而况宫為君君不可執以一方徴為事事不可滯以一隅變亦何妨於義而必欲去之乎以喉牙齒舌唇定五音者是不知切韻之五音有定而律吕之五音固無定也如必切字而譜其音或將數字而連一律而何以謂之和聲以律吕相生之序為譜者不知旋宫有每章換調之法譜曲無逐句換宫之理如必宫次徵而徵次商將稱誰調宫而誰調角是凡詩皆共一譜而風雅頌不復可辨尚可謂之樂否乎以黃鍾為最濁應鍾為最清蓋不知宫音雖濁而半律則清羽音本清而倍律則濁以應黃為清濁之極則倍半無安頓之所滯於不變之常而不能諧於無常之變試之歌聲將必不可通矣以黃鍾為三寸九分妄意增損盡變古法者不知全律十二總為百二十分吕覽原文乃謂就全數內斷去三寸九分則餘八十一分為黃鍾而非以三寸九分為黃鍾也且明謂三分損一以下生三分益一以上生矣果如三寸九分之説則算至應鍾止長一寸八分有竒而何以成律漫謂隂陽進退增損於九分六分之間豈不亦杜撰可哂之甚乎而又有謂孔庭之樂不宜用清黃之六者不知工與合音不相諧則黃正必受南倍而南正必禪黃清第取和聲豈惟黃清之六即濁工小五何嘗不入黃鍾之調而又奚正半之為拘焉彼泥仲吕黃鍾之宫正律已足七均至於倍半變化律協聲諧思議未及則亦何怪乎其談之易也紛紜衆論病在乎不制器不審音而雜能旁魄角勝於議論文字之間以自是嘗試與之考鍾擊石吹竽比竹而後乃信學士大夫之説良不足以服伶人賤工之心辨之固不可勝辨耳今世學者視鍾律為極難不復講究乃古者成均養士此為正業夫令人人習樂􅈺鏗鏘舞蹈之節躬中和秖庸孝友之範毋論變化氣質涵養性情反情以和志廣樂以成教其裨益治化者何若要以實究聲容精解器數遊六藝之途以綴六經之闕安有實體之而不得其音曹習之而可欺以誕者漫曰管弦綴兆為觀而已矣聽和視正為適而已矣登雅頌之壇騁雲韺之辨為博而已矣談性命則禮樂為粗習詞章則㲈武為贅然則樂德樂語樂舞之教真迂濶而無當而司徒大司樂之屬設官二十皆贅員也周公之志已荒而反魯正樂吾夫子又汲汲焉謂之何哉士所習聞惟孔庭之大成樂舍此無可窺古樂者聊著其概於此俾初學有考焉律始截竹故首竹樂貴人聲故竹之後匏土繼之樂理莫備於絲而金石為始終條理革木者苐所以節也故次絲次金石而以革木終焉十二律配嵗月八風八卦圖黃鍾其建子其月辜其候冬至其嵗困敦其風廣漠其卦乾初九下生林鍾大吕丑塗大寒赤奮坤六四下生夷則太蔟寅陬雨水攝提條乾九二下生南吕夾鍾卯如春分單閼明庶坤六五下生無射姑洗辰寎榖雨執徐乾九三下生應鍾仲吕已余小滿荒落清明坤上六上生黃鍾蕤賓午臯夏至敦牂景乾九四上生大吕林鍾未且大暑協合坤初六上生太蔟夷則申相處暑涒灘涼乾九五上生夾鍾南吕酉壯秋分作噩閶闔坤六二上生姑洗無射戌玄霜降閹茂乾上九上生仲吕應鍾亥陽小雪大淵不周坤六三上生蕤賓陽律歸乾始於內卦隂律從坤始於外卦依次列之舊説黃鍾乾之初九下生林鍾為坤初六林鍾下生太蔟為乾九二太蔟下生南吕為坤六二南吕上生姑洗為乾九三姑洗下生應鍾為坤六三應鍾上生蕤賓為乾九四蕤賓下生大吕為坤六四大吕上生夷則為乾九五夷則下生夾鍾為坤六五夾鍾上生無射為乾上九無射下生仲吕為坤上六同位者象夫妻異位者象子母所謂律娶妻而吕生子也此雖附會然亦近理一説黃鍾在子大吕在丑子與丑合太蔟在寅應鍾在亥寅與亥合姑洗在辰南吕在酉酉與辰合蕤賓在午林鍾在未午與未合夷則在申仲吕在己申與巳合無射在戌夾鍾在卯戌與卯合蓋取斗與月合今以厯法考之固未見其合也牽合無義然自漢有此二説儒者恆言故附於此下規係律吕相生次第上規係五音相生次第以五音小規與六律六吕大規同心以考樂章是屬某調其法將小輪旋於大輪之上以求五音在於某律要見譜內所用之律於此五音俱備否如或不合則不係此調更推至一位求之但備五音即其所屬本調律尺詁昔者聖王作樂首定黃鍾謂之萬事根本其長為度其容為量其重為衡其聲則人之中聲合乎天地之正氣亘古不變故名曰律而副之以六吕吕也者侣此者也度量衡失當以黃鍾校之黃鍾失亦以度量衡求之而其要先於審度黃帝之度取黃鍾之律均而九之九九八十一分九分為寸九寸為尺舜同律度量衡更而十之十分為寸十寸為尺而夏后氏因焉傳曰夏禹十寸為尺即此尺也八十一分之尺縱黍為之者也百分之尺橫黍為之者也而其為黃鍾之度則未之有改也蓋尺可改黃鍾不可改因而九之則為律因而十之則為尺也聖人無改於律而或改于尺何哉數究於九協於十顯乎河圖洛書乃天地自然之數書數九故黃鍾律長九寸九九八十一分與縱黍之長相合圖數十故黃鍾度長十寸十之得百分與橫黍之廣相合河圖洛書太和之氣所呈也黃鍾太和之聲所寓也竒偶錯綜呈竒著瑞二數合而律度於是乎備矣朱子所謂與先天圖一般者此也理有自然聖人雖欲不然而不可得班氏漢書乃謂黃鍾九寸加一寸為一尺夫度量權衡所以取法黃鍾以其出於自然與天地之正氣相應耳必加一寸以為尺而何取於黃鍾此尺一謬而千數百年無復正律正聲今為考定斷以舜律為準立算損益黃鍾協而衆律無所不協焉厯代尺度不同大都五種商尺四其黃鍾之度而益其一當夏禹尺之一十二寸五分周尺五其黃鍾之度而損其一當夏禹尺之八寸至如九其黃鍾之度外益一者漢尺也八其黃鍾之度外益二者唐尺也八十一其黃鍾而益之以一十九者宋尺也唐尺即商尺也宋尺之分即黃帝之尺之分也而寸則異焉漢尺之寸即黃帝之尺之寸也而分則異焉後世尺度之長也掊克巧取者之為也三代則不然隨時損益姑以示改革之義云爾夏之尺商之咫也夏之咫周之尺也用夏之尺商之咫用周尺而加之以其四之一皆黃鍾之度也然則舜律安據必絫黍乎哉曰難言之地有肥瘠時有水旱農有勤惰則黍生大小自不得齊而於度當不盡合合於度未必合於量與衡也胡瑗定樂用羊頭山黍取其中等用之律不可成或曰秬黍中者謂選其中式者非中等之中也繹秬黍之義黍宜取巨巨則尺長而聲濁細則尺短而聲清黃鍾宫音最長最濁故黍當用巨然須參求古律尺疑似之間多截律管先以人聲審定然後絫黍參伍復以量衡相較乃得其真古璧羡及大小泉錯刀契刀開通錢世多有之可以參驗今世寶鈔尺度尤為合古鄭世子以今營造尺潔寶鈔之外墨邉而又以古錢及絫黍相與考較以為工部營造尺去二寸當大泉九枚當開元錢十枚當縱黍八十一當橫黍百為真黃鍾而李照以大泉十枚為黃鍾冷謙從之所失者長劉歆荀朂以貨泉九枚為黃鍾王朴蔡元定從之所失者短語多不載今取所定黃鍾尺用九用十凡兩式列圖於左其算法諸家不同大略四種以黃鍾為九寸每寸十分者京房律準及後漢志也以八十一分為八寸一分不作九寸者淮南子及晉宋二書也以八十一分為九寸每寸九分者周禮注疏律吕新書也惟史記則生鍾分用十寸為尺共百分者為算其律數用九寸每寸十分者為算蓋兼用二法其文古其義顯較勝諸家生鍾分之分字去聲所云子一分者全得一尺也丑三分二者子乘母除以生諸律之法二為子三為母也而注皆誤解致晦其義然亦未為精密以算至仲吕皆不能生黃鍾故也故今専取律吕精義推定者以為律凖三十六律橫黍定算每律十寸每寸十分倍律正律半律黃鍾長二尺長一尺長五寸林鍾長一尺三寸三分四釐八毫長六寸六分七釐四毫長三寸三分三釐七毫太蔟長一尺七寸八分一釐七毫長八寸九分八毫長四寸四分五釐四毫南吕長一尺一寸八分九釐二毫長五寸九分四釐六毫長二寸九分七釐三毫姑洗長一尺五寸八分七釐四毫長七寸九分三釐七毫長三寸九分六釐八毫應鍾長一尺五分九釐四毫長五寸二分九釐七毫長二寸六分四釐八毫蕤賓長一尺四寸一分四釐二毫長七寸七釐一毫長三寸五分三釐九毫大吕長一尺八寸八分七釐七毫長九寸四分三釐八毫長四寸七分一釐九毫夷則長一尺二寸五分九釐九毫長六寸二分九釐九毫長三寸一分四釐九毫夾鍾長一尺六寸八分一釐七毫長八寸四分八毫長四寸二分四毫無射長一尺一寸二分二釐四毫長五寸六分一釐二毫長二寸八分六毫仲吕長一尺四寸九分八釐三毫長七寸四分九釐二毫長三寸七分四釐五毫右算皆止於毫其自毫以下除黃鍾外皆有竒零不盡之算棄之以目力所及至毫而止也然依此制律足矣後倣此算法從倍律起黃鍾倍律通長二尺容黍二合稱重二兩律度量衡皆從倍起故算法當從黃鍾倍律起手若夫正律於度雖足一尺於量秖容半合於衡秖重半兩非全數也然用之於樂則以正律為主律吕周徑詁古稱黃鍾空圍為九分其長之一蓋取黃鍾之管九分之一以為內周而鄭康成謂凡律空圍九分蔡雍月令章句亦曰律雖有大小圍徑無增減孟康注漢志則曰黃鍾圍九分林鍾圍六分太蔟圍八分倣佛得之而隋志不以為然唐宋諸議律者悉從隋志胡瑗更定林鍾以下諸律圍徑而蔡元定又譏其失今依蔡説為之大抵聲調不協試取黃鍾一律較之截取半律林鍾以與黃鍾同吹音宜相合然半律之音雖清反下與正律聲不相應推尋其故清由管短下緣氣寬其聲自宜有異衆律皆然固未有圍徑相同而正半諧音母子互應者今依古法推之凡律九分其律之長以其一為之內周用句股求弦之術即得外周二十分其律之長以其一為之外徑用弦求句股之術即得內徑圓中取方方中取圓內外周徑皆出自然之數律有定度而清濁髙下咸應焉不惟正倍半相應凡相生者皆相和使一人吹黃鍾又一人吹林鍾其聲相合又吹林鍾與太蔟應吹太蔟與夷則應其諸正律半律聲亦俱協諸儒漫謂圍徑相同抑何舛也然吹律氣欲極細聲欲極微方得其妙太史公曰細若氣微若聲其言可味若軒昻掩抑氣猛聲焦即乖正音非所以調律也三十六律內外周定算倍律外周正律外周倍律內周正律內周半律外周半律內周黃鍾寸分釐毫二二二二寸分釐毫一五七一寸分釐毫一一一一分釐毫七八五大吕二一五八一五二六一七九七六三太蔟二九七一四八三一四八七四一夾鍾二三七一四四一一八七二姑洗一九七九一三九九九八九六九九仲吕一九二三一三六九六一六八蕤賓一八六八一三二一九三四六六林鍾寸分釐毫一八一五寸分釐毫一二八三分釐毫九七分釐毫六四一夷則一七六三一二四七八八一六二三南吕一七一三一二一一八五六六五無射一六六四一一七七八三二五八八應鍾一六一七一一四三八八五七一三十六律內外徑定算倍律外徑正律外徑倍律內徑正律內徑半律外徑半律內徑黃鍾分釐毫七七分釐毫五分釐毫三五三分釐毫二五大吕六八六四八五三四三二四二太蔟六六七四七一三三三二三五夾鍾六四八四五八三二四二二九姑洗六二九四四五三一四二二二仲吕六一二四三二三六二一六蕤賓五九四四二二九七二一林鍾五七七四八二八八二四夷則五六一三九六二八一九八南吕五四五三八五二七二一九二無射五二九三七四二六四一八七應鍾五一四三六三二五七一八一徑求周者徑自乘得數折半為實開平方除之得數以四十乘之九歸得周周求徑者九因周數以四十除之得數自乘加倍為實開平方除之得徑周徑互求還原以周徑求面羃者內周折半內徑折半相乘得面羃以面羃求實積者以本律通長乘面羃得積此有舊法今不詳載竹音疏其器鳯簫笛橫笛篪凡四種學樂先絲造樂先竹古人非弦不歌非歌不弦學歌必先琴瑟故曰不學操縵不能安弦不學博依不能安詩弦在詩前相須為用故學樂先絲音也然弦有緩急非管莫定管之長短大小而十一律吕賴焉黃帝使伶倫取竹嶰谷以生而空竅厚薄均者斷兩節間而吹之制十二筒以聽鳯鳴其雄鳴六雌鳴亦六以比黃鍾之宫五音正變由此而生是謂律本故知造樂之先竹也編竹而比之律長者聲濁短者聲清其狀鳯翼其音鳯聲名曰鳯簫即律管也吹之以候氣奏之以和聲舜典所謂律和聲月令所謂律中某皆指律管而言律形而上者也管形而下者也律猶法律易曰師出以律管則所以攝之俾毋相凌亂而樂音樂理胥於是乎寄焉詩言磬管將將嘒嘒管聲禮言下管新宫下而管象與夫孤竹孫竹隂竹之管皆是物也八音之中惟竹與匏土用口吹之餘五者則否朱子曰音律只是氣人亦只是氣故相關氣之感通六馬秣而遊魚聽風雨至而鳯凰儀然而不有律管孰肇其先有律而後度量權衡由此乎生而可忽乎哉周禮笙師掌教吹籥簫篪笛管皆竹音也凡竹單吹無孔謂之管編吹無孔謂之簫吹處類簫謂之籥吹處類楚謂之笛四器周徑長短皆同惟篪不同吹法亦異管以協律畢一律則更一管大音雅淡非有繁管促節可適於聽也故後世失傳其洞簫篪笛鑽竅成聲以比諸律繁聲易逐故世俗騖焉要於審音正律必以簫管為本鳯簫詁釋名簫肅也其聲肅肅而清也世本曰舜所造其形參差以象鳯翼簫然清亮以象鳯鳴原本黃帝使伶倫自大夏之西昆侖之隂取竹之解谷生其竅厚均者斷兩節間而吹之宣揚六氣而成天道是謂律管管有長短周徑有大小而聲之清濁髙下因焉編集衆律一管一聲又名排簫朱子云今呼簫管乃是古之笛雲簫乃是古之簫雲簫者排簫也排簫有二爾雅釋樂云大簫謂之䇾小簫謂之筊而管之多寡諸家説異郭璞曰簫大者編二十三管長尺四寸小者十六管長尺二寸一名籟又引風俗通云簫參差象鳯翼十管長二尺今本風俗通作一尺隋書樂志亦言簫十六管長二尺而無二十三管之簫竊謂長二尺者倍律也䇾也一尺者正律也筊也大小皆十六管大簫用倍律十二而以黃大太夾四正律配之小簫用正律十二管而以黃大太夾四半律配之長短周徑皆如前算古稱孤竹之竒禮天神孫竹之衆禮地示隂竹之幽禮人鬼今不可别苐用紫竹斑竹或天門山竹江浙筆竹皆佳擇取天生兩端圓勻合外徑之數者用之而內徑或稍按度修治上開吹口一一試之令於律合然後編之編法黃鍾居左餘以次列除左右編管外餘管兩傍略削使平加鰾粘聨上加二束束用象牙隨器大小狀類腰帶銅釘間之口用朱漆竹之佳者勿傷其皮而存其本質文選所謂帶以象牙掍其會合絳唇錯雜羅鱗捷獵者也若無佳竹則以金漆塗之元史樂志排簫有牘黑漆搶金鸞鳯今用朱漆其狀類蓋簫字竒篆作象形籥字從會意廟祀之簫崇飾無害苐用之於燕賓飲射則傷雅耳劉濓曰簫乃十二律之本體虞廷最重之器故曰簫韶長短並列有似鳯翼故曰鳯簫一管一音無事假借其十二管長短俱如本律或用加倍此言是矣而又曰或長俱如黃鍾以蠟次第實之則又何以似鳯翼耶蔡雍亦謂簫有底以蠟實之增損則和陳暘簫圖長短一般而蠟塞以分清濁謂之底簫大抵襲雍之謬又一種通底洞簫十二律皆清聲自夷則以上至夾鍾即次第開竅此與底簫參用而皆從右起蓋宋太常樂也大明集禮所載用之然非古制大簫用十二倍律加四正律小簫用十二正律加四半律各二架長短周徑悉照前本律之算其吹口縱橫俱廣一分七釐六毫乃黃鍾正律內徑之半也律有長短廣狹吹口無異勿過不及不及則濁過則清矣凡算律長連吹口在內有謂黃鍾吹口在九寸正數外者非是鳯簫編竹按律次序譜色大簫小簫第一管黃鍾倍濁合黃鍾正合第二管大吕倍濁亞四大吕正亞四亞亦云下第三管太蔟倍濁四太蔟正正四正亦云上第四管夾鍾倍濁亞一夾鍾正亞一第五管姑洗倍濁一姑洗正正一第六管仲吕倍濁上仲吕正上第七管蕤賓倍濁勾凡蕤賓正勾第八管林鍾倍濁尺林鍾正清尺第九管夷則倍濁亞工夷則正亞工第十管南吕倍濁工南吕正清工第十一管無射倍濁亞凡無射正亞凡第十二管應鍾倍濁凡應鍾正清凡第十三管黃鍾正合黃鍾半六第十四管大吕正亞四大吕半亞五第十五管太蔟正正四太蔟半正五第十六管夾鍾正亞一夾鍾半緊五琴瑟鍾磬塤篪笙簫管籥皆分大小二等或加半律為三等李文察論備器曰備也者合大與小之謂也小者合律吕之本數大者合律吕之倍數本數聲清倍數聲濁單清失之輕單濁失之重輕重之間乃天地之所以合德四象之所以合氣中聲之所以妙用故必合大小器而並奏之合於律吕之和而不見其乖戾此樂之大成所以為妙若夫單器者小成之用也今製鳯簫二架一倍一正吹者兩手捧之按律次第輕吹以調衆音大成樂所用只合四上尺工六共五字云張鶚改作十五管左八音右八音而中為黃鍾其管獨長吹之為合左右比者為四為一為上為尺為工為凡為六為五皆兩兩相應杜撰可哂抑不知吹時何以能一口兩音左右相應耶笛詁自唐以來通名長簫共橫笛附今之簫古之笛也通作笛音義並同風俗通曰笛者滌也所以蕩滌邪穢納之於雅正也周禮笙師掌之經傳自笙師條外不多見故儒者疑笛非雅器因指橫笛為笛不知雅音之笛與籥同類古人通呼為籥廣雅曰籥七孔謂之笛毛詩傳曰籥六孔其或曰七孔者連吹孔而言也然籥制自是三孔所謂三竅成籥三才之和寓焉注疏解籥者曰如笛三孔而短然則如籥六孔而長者非笛也耶古無橫笛馬融云羌人所造翰注笛本四孔京君加一為商音而許慎云羌笛三孔則又似與今笛異也風俗通云笛七孔漢丘仲造其於古者笙師所習未知合否今太常樂以橫吹之笛為笛而呼笛為長簫誤也其器納氣發聲度與律合以孔逺近分音清濁按律翕氣八十一分為黃鍾宫又上翕氣七十二分為太蔟商次上翕氣六十四分為姑洗角次上翕氣五十四分為林鍾徵下三分為蕤賓變徵次上四十八分為南吕羽四十二分為應鍾變宫此依古法九分為寸推之義當如是而俗以三竅為仲吕四竅為林鍾五竅為南吕背竅為應鍾者蓋自宋以來認無射倍聲為黃鍾故仲吕為徵林鍾為羽南吕為變宫應鍾為變徵知音者審協正聲而又不敢明指黃鍾為商故遷就兩均而兼用之其變徵迫徵則背竅移近以取子聲所謂變宫比於正音為和變徵不比於正音為謬者也若論黃鍾均主則變徵乃蕤賓也而曰應鍾宫徵不易位乎然六竅俱啓低吹亦得蕤賓大抵旋宫之法宫商原無定位又在隨管審定以諧各調也晉荀朂以五聲十二律還相為宫之法制十二笛其説曰周禮調樂金石有一定之聲造鍾磬者先依律調之然後施於廂垂諸音受鍾磬之均即為悉應至於燕享無廂垂鍾磬諸弦歌從笛為正笛猶鍾磬宜合律吕是則鑽孔以盡旋宫與古之管籥略同也今鄭世子樂圖亦有此器又有三孔者六孔者但今孔廟樂無旋宫不備可耳正義云簫是樂器之小者一器而具十二律謂即笛者是亦名洞簫洞與筒其音相近原本截竹為筒而或謂以其形如洞門故名洞簫其義逺矣今長簫遵制存用而正其名曰笛若橫笛則漢唐以來用之已久亦備其器不敢輒廢制竹音者須擇圓徑合度竅厚適均之管而以合徑圓鑽修治其內之周徑令圓中規直中繩竅中律度其聲乃協不則流入别調難合雅音矣所以算取倍律之長者竹音清激配以倍律然後協於中正竹尚議蓋謂是也吹笛法紫竹長二尺五分以二尺合黃鍾倍律此際橫鑽兩孔相通以達黃鍾之聲而繫之以紅縧自此而上俱照算定倍律分中鑽孔前五孔後一孔共六孔各徑二分口開半竅名山口直吹之其法在口脣之俯仰吹氣之緩急脣仰急吹則聲清脣俯緩吹則聲濁最下相通之孔乃黃鍾律凡吹黃鍾六孔皆閉調氣俯脣而輕吹之則合字應仰而急吹則為清黃鍾六字應全閉低吹濁尺亦合林鍾倍聲所謂下徵黃生林也自下而上第一孔太蔟律俯脣輕吹則四字應仰而急吹則五字乃清太蔟也凡吹四字五字只開此孔餘皆閉其半竅為大吕低吹濁工亦合南吕倍聲所謂下羽太生南也次第二孔姑洗律以一字應凡吹一字開此孔及下一孔餘皆閉其半竅為夾鍾低吹濁凡亦合應鍾倍聲姑生應也次第三孔仲吕律以上字應凡吹上字開此孔併下二孔餘皆閉低吹則濁亞凡無射倍聲是仲吕之母第四孔為林鍾以尺字應凡吹尺字開此孔并下三孔餘皆閉其半竅為蕤賓低吹則四字亦太正蓋林生太第五孔為南吕以工字應凡吹工字開此孔并下四孔餘皆閉其半竅為夷則低吹一字亦姑正蓋南生姑後一孔兼應鍾清大二律輕吹之為應鍾以凡字應重吹之為清大吕以亞五應如吹凡字開此孔并尾上第二與第三孔餘皆閉如吹亞五只開此一孔餘皆閉一云此孔為黃清蓋黃清止下應正一律其聲相近故誤認之其實非也此竅與仲吕雙發為應鍾六孔俱開低吹勾字亦蕤賓凡協律必自下而上象陽氣之自下升也凡藝是者宜平其氣緩取其音雖清激而不失悠徐之韻乃為雅樂若促拍弄巧則淫哇俗樂而已古賦云剪雲夢之霜筠法龍吟之異韻協律雅笛可和琴瑟之弦也然竹之伐取率以期嵗為候過期不伐則音窒未期而伐則音浮凡四管長二尺外加五分制法如前吹口徑二分深一分餘孔皆徑二分吹橫笛法漢制雅笛七竅以五聲加二變也蔡雍曰形長尺圍寸無底有穴唐制尺有八寸亦取黃鍾倍律為義雖非古樂然而近於正矣紫竹為之共七孔上一大孔徑三分乃吹竅也下六孔徑各二分橫而右輕吹之譜法大抵與長簫同六孔皆閉為黃鍾律以合字應低吹濁尺為林倍尾第一孔太蔟律輕吹之以四字應重吹為清太蔟五字也凡吹四字五字只開此孔惟以輕重别之餘皆閉低吹濁工為南倍次第二孔姑洗律以一字應凡吹一字開此孔及下孔餘皆閉低吹濁凡為應倍次第三孔仲吕律以上字應凡吹上字開此孔并下一孔餘皆閉低吹濁亞凡為無倍第四孔林鍾律以尺字應凡吹尺字開此孔併下二孔餘皆閉低吹四字亦太正第五孔南吕律以工字應凡吹工字開此孔併下三孔餘皆閉低吹一字亦姑正第六孔應鍾律以凡字應凡吹凡字開此孔併尾上第二第三孔餘皆閉若重吹則為清黃鍾只開此孔俗以六字應低吹勾字亦蕤賓凡聲過則淫中則和實像鳯簫故吹簫必以笛和之太常譜云按上五孔得四空下五孔得工按上二孔得上按下二孔得六上下俱合得合吹簫笛減字譜六孔俱按俯而輕吹六孔俱按仰而急吹啓後一孔啓下第一孔輕吹啓一急吹啓下二孔啓下三孔啓下四孔啓下五孔啓第六孔簫笛樂章譜橫笛同惟清黃之六則輕吹啓後一孔與簫笛異迎神樂奏咸和之曲大太四哉南工孔林尺聖仲上太四德仲上尊林尺崇仲上維南工持林尺王仲上化太四斯林尺民仲上是黃合宗太四典黃合祀太四有仲上常林尺精南工純林尺並太四隆仲上神黃六其南工來林尺格仲上於林尺昭仲上聖黃合容太四奠帛初獻樂奏寧和之曲有舞自太四生仲上民林尺來仲上誰