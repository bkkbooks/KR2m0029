body:
  text: 頖宮禮樂疏卷七明李之藻撰豋歌節奏疏樂辭曰詩詩聲曰歌登歌在前貴人聲也清廟之歌所以美盛徳之形容長言之不足故嗟歎之嗟歎之不足故詠歌之詠歌之不足不知手之舞之足之蹈之於是乎叶之以五聲八音而樂始大備焉五聲者宮謂之重商謂之敏角謂之經徵謂之迭羽謂之抑凡聽宮如牛鳴窌中全出自喉殷殷隆隆凡聽商如離羣羊出齒張口朗朗鏘鏘凡聽角如雉登木自牙而發喔喔局局凡聽徵如負駭豕自舌振起倚倚靡靡凡聽羽如鳴鳥在樹自脣撮集揚揚詡詡此五聲者盈乎天地之間氣相軋物相戛大而雷霆細而蠛蠓無之非是而人聲尤為親切五聲遞變是之謂歌徒歌則謂之謠故必和以八音然而金聲舂容失之重石聲温潤失之輕絲聲纎微失之細竹聲清越失之髙匏聲崇聚失之長土聲函胡失之下革聲隆大失之洪木聲無餘失之短惟人含天地之中故聲調隂陽之節所以八音從律尤以人聲為凖吕覽葛天氏之樂三人摻牛尾投足以歌八闋山海經帝俊八子實始為歌八闋九序嗣後黄帝駕辯帝堯大唐舜歌南風禹有康歌暨周乃歌九徳九夏而其教綦備樂師帥學士而歌徹大師大祭祀帥瞽登歌小師大祭祀登歌擊拊祭統曰聲莫重於登歌此周道也然而歌之妙盡於虞書命䕫所云詩言志歌永言聲依永律和聲者蓋聲不永不成其為歌律不和無所依以永知歌所以永永所以依律所以和而聲歌之能事無餘藴矣單出曰聲一字一聲也雜比為音數聲合音也字有喉唇齒舌之用融入歌中歌逐宫徴羽角之音妙出字表雖旋宮均主以此起必以此終乃轉宫作商聲從律不必從字如關關之互用姑蕤洋洋之參差林仲悟清濁髙下之相次知律學字學之殊科要於字字舉皆輕圓塊磊俱化然後聲聲俱有吞吐意味乃長故曰善歌者聲中無字字中無聲不善歌者無抑揚謂念曲無含韞謂呌曲此永言法也乃聲之依永何也不學操縵不能安弦不學博依不能安詩詩何以安依而後能安歌何以永安而後能永依何以博諧以八物之音而後博瑟先歌後依於絲也下而管象依於竹也鼔缶而歌依於土也舂牘應雅以教裓樂依革木也笙鏞以間依金匏也戛擊鳴球摶拊琴瑟以詠依於木石絲革大合樂也聲依於器器協夫聲猗那何賀味歎濴廻疊字散聲連綿嘽緩其氣安舒不迫其韻安穏不佻其神安定不浮其狀安詳不躁而後其發之為歌也詩安而聲永然而專事乎聲又恐圓融而易蕩故悉舉而和諸律律也者率也清濁髙下有一定之率率不易定南北殊乎勁曼男女判乎雌雄老稚别乎洪細彼各就其氣之所禀以自成其為聲則亦各成其為調而未必盡協於中則亦無當於律聖人者聲既為律又多方以求之截竹為筩範金琢玉以為琯而猶未已也又為之命神瞽考中聲量之為制以度律均鍾於是乎一定之率出焉所咏者中聲所道者中徳用以理性情興教化和邦國通神示胥必由之自古樂既邈世謂中聲難求不知人之中聲與天地之中聲應天地廖廓其中聲他無可驗驗之人聲其清濁髙下有出乎自然而髙引之不至於伉深抑之不至於窒者是謂中聲即名正律中聲以上則為半律清者愈清中聲以下則為倍律濁者愈濁凡十二律之聲黄鍾濁也掲之漸清黄大太夾姑仲蕤林夷南無應皆自然也繼以半律黄大太夾雖清可歌至於姑仲則過髙而掲不起或强掲起非自然矣應鍾清也低之漸濁應無南夷林蕤仲姑夾太大黄皆自然也繼以倍律應無南夷雖無可歌至於林蕤則益低而咽不出或强歌出亦不自然矣是故十二正律樂凖也亦歌則然而必㕘之以半以倍者何也試舉黄鍾一均言之黄鍾為宫則濁俗呼合字半律則清俗呼髙六南呂為羽則清俗呼工字倍律則濁俗呼低工移宫換羽倡和清濁大抵迭相為經要於繩續珠聨則倍半雖非中聲有時不得不用非此則聲抝而不和亦出於理勢自然莊周所謂調之以自然之命者也所謂律和聲者此也凡歌中於宫彰於商觸於角驗於徵宇於羽而其妙盡之乎永惟永可以徵人之所飬自非心氣和平則不能永非嫻習有素亦不能永師乙曰寛而静柔而正者宜歌頌廣大而静疏達而信者宜歌大雅恭儉而好禮者宜歌小雅廉而謙者宜歌風則歌豈易言哉氣異異聲聲異異歌歌異異宜音協於徳可以徵徳故成均之教用是以成徳大司樂以樂語教國子興道諷誦言語大胥頒學令聲春誦夏弦大師教之其教六詩以六徳為之本以六律為之音瞽矇掌九徳六詩之歌以役大師而洙泗之間弦歌之教彬彬如也參歌商頌㸃詠舞雩憲弦蓬户雖子畏於匡而尚謂子路汝歌子和既祥十日而成笙歌焉以至列國之大夫玉帛燕享之間莫不賦詩示意庚唱迭酬總之禮樂不斯須而去身則聲歌亦隨事而弗輟何况俎豆之間升歌之重誠慎其選必致其慤又可知矣夫歌非難知也窮經之士求之乎經而自足引長歌聲是為永言絃必操縵是為依永龡聲極長是為和聲衆聲相合是為克諧起柷合奏是為翕如音不凌犯是為純如清明象天是為皦如始終象四時是為繹如而其妙極形容者則又有曰上如抗下如墜曲如折止如藁木倨中句句中鉤纍纍乎如貫珠夫上如抗者掲音極髙而其餘聲漸下髙如抗手然而不至於太髙也下如墜者由髙漸下如物之墜有湫底而無留滯曲如折者轉折之際或上而折下或下而折上柔和頓挫如折枝然止則聲之定也自上而下煞句安穏如枯木勁截不揺拽也倨中矩者其聲平出直上停折方如用矩句則周轉圓滑似鉤之肖規也端則吞吐圓融相續不絶如珠之聨貫下垂然凡夫一章之詩必兼衆妙一句之内數者處一乃至一字吐納當亦具美使其曲直繁省廉肉節奏一一咸中於法而後謂之能永而後謂之歌而善也大凡學者且先静養真氣其氣出自丹田至喉乃噫抗墜之節可以意㑹而分塗山歌於候人有娀謠於飛燕夏甲歎於東陽殷整思於西河五方之歌固殊六律之用則一無他繆巧一本静定之功儻於學問無關后䕫詎以教胄若無中和之飬輒謂可交神明是周官九變之説真誕而儀舞允諧聖人亦欺我耳昔者秦青歌而行雲遏舒氏歌而雙魚起虞公之聲動梁塵馮乗之音傳林藪廬陵之響窮九陌夏統之大風隨至韓娥之餘響繞梁彼其一伎專長或性之者也非飬之者也然而猶若是矣况徳音之音動天地格鬼神豈足異哉今譜聖祀樂章備考肄焉清濁抑揚覽此思過半矣從子至巳律呂皆長故有半而無倍倍之則太長從午至亥律呂皆短故有倍而無半半之則太短然半律雖六而清聲只用四律過此以上太髙歌聲掲不起倍律雖六而濁聲亦只用四律過此以下則太低歌聲咽不出旋宮歌奏相配疏周禮大師掌六律六同以合隂陽之聲典同掌六律六同之和以辯天地四方隂陽之聲以為樂器而大司樂掌成均之灋分樂而序之以祭以享以祀祀天神則奏黄鍾歌大呂而舞雲門祭地示則奏太蔟歌應鍾而舞咸池祀四朢則奏姑洗歌南呂而舞大㲈祭山川則奏蕤賔歌函鍾而舞大夏享先妣則奏夷則歌小呂而舞大濩享先祖則奏無射歌夾鍾而舞大夏大率以祀典之尊卑為樂舞之次第而奏陽律則歌隂呂以合之所以致隂陽之和也然惟姑洗之生南呂夾鍾之生無射取義母子聲協隂陽而其餘天神地示山川先妣之所奏所歌殊不相配音亦不調先儒為之説曰黄鍾子大呂丑日躔在子則斗建在丑日躔在丑則斗建在子子丑合也大蔟寅應鍾亥日躔在亥則斗建在寅日躔在寅則斗建在亥寅亥合也其蕤賔在午函鍾在未則午與未合小呂在巳夷則在申則巳與申合而姑洗辰南呂酉夾鍾卯無射戌其義亦然竊嘗疑之樂和神人不惟其和而第惟斗建日躔之為拘於義末矣矧歲差漸逺而今冬至建子日躔乃退於箕安得子丑之合而周公聖人識不及此而附㑹矯誣以凟上帝山川百神之祀必其不然嘗試更互推求以黄鍾合小呂以夷則合大呂以太蔟合函鍾以蕤賔合應鍾而奏其子為陽聲之律歌其母為隂聲之同母子同調隂陽同聲而後乃可謂合隂陽之聲則竊意斗建之説漢儒固求其説而不得而竄易其文迂其解以惑後世者乎及讀鄭世子律呂精義其説正同以為泥於仲呂黄鍾往而不返算術不精之所致因為推演旋宮歌仲呂則奏黄鍾歌林鍾則奏太蔟歌南呂則奏始洗歌應鍾則奏蕤賔歌大呂則奏夷則歌夾鍾則奏無射而後乃今六律六同一一相合而始信周禮之書為後儒所亂者誠多也今孔庭之樂歌與奏俱用仲呂一調有隂無陽未合古義或者當年初撰歌詞行之學宮即以填譜播樂不知仲呂第是登歌樂貴人聲故以歌為之主至於被之金石管絃仍宜配以黄鍾之均起止仍用羽調則以南呂羽和太蔟羽然後隂陽方協聲和氣和而天地之和應人神之交合耳此詎可沿襲襲謬而以茍且從事焉者但今頒行已久未敢擅更故前譜悉遵時用苐照旋宮之法别為黄鍾樂譜如左俟知樂者擇焉或曰若是則奏黄鍾歌仲呂天神之樂也而以祀孔子不已僣歟曰自生民以來未有孔子也孔子上律天時其祀典配天非過也然而舞非雲門則其於祀天也固已殺矣曰歌用仲呂之羽奏用黄鍾之羽羽起調羽畢曲何也曰大雅宫調小雅徵調國風角調頌羽調周制也宮為君大雅朝廷之樂故用宮音起調畢曲徵為事小雅周爰諮諏皆事也是以用徵角為民歌謠採風風屬木是以用角羽為物周樂一變而致羽物六變而致象物及天神夫神祗非可目見可見者物耳故用羽音起調畢曲也春秋孔演圖孔子曰丘援律吹命隂得羽之宫然則其樂之用羽也不亦宜乎擬黄鍾調衆樂合譜迎神樂奏咸和之曲頖宮禮樂疏卷七
