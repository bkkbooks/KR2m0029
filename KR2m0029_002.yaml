body:
  text: 頖宫禮樂疏卷二眀李之藻撰從祀沿革疏古者功臣與祭大蒸未聞弟子而從祀於師者其從祀何也聖人之徒親炙私淑不必同然躬任斯道羽翼紹眀夫皆有功後學列諸祀典亦崇德報功之義也元和過魯兼祀羣賢正始臨雍配専顔子自唐以降率躋經師至於禮備義嚴則於今為盛焉與從祀者子思孟子暨及門七十四子而外春秋迄漢共十人隋唐各一人宋十八人元一人皇明四人共一百九人而顔路曾晢伯魚别祀啓聖嗣漢章帝元和二年二月幸魯祀孔子及七十二弟子按此及光和鴻都門畫像皆稱七十二弟子考王肅本家語所載弟子前目七十二後目七十五其中間所列姓名自顔回至顔柤計七十六彼此互異史記載孔子之言曰受業身通者七十有七人北齊顔之推稱仲尼門徒升堂入室者七十有二顔氏居八唐顔真卿自敘家譜亦稱孔門達者七十二人顔氏有八今肅本顔氏止七人而史記有顔何字冉索隱證之曰家語字稱然則家語原有顔何肅本漏耳所云七十七人者是也家語無公伯僚秦冉鄡單史記無琴牢陳亢懸亶或謂懸亶即鄡單蓋字畫之誤云文翁石室圖七十二人比家語少公西輿懸亶原桃公肩公夏守勾井強邽選顔何八人多蘧瑗秦冉林放三人蘇子由古史兼收論語家語史記凡七十九人唐贈典禮樂志及會要所載俱七十七人姓名與史記同獨杜氏通典所載除十哲外自計七十三人係增入蘧瑗林放陳亢申棖琴牢琴張六人也夫蘧瑗林放公伯僚未必弟子而琴張即是琴牢申黨即是申棖自應去此五人今祀典又黜顔何秦冉二人共得七十七人漢人苐謂七十二弟子不知何據魏主芳正始二年使太常釋奠孔子於辟雍以顔淵配按此顔子配享之始歷晉宋齊梁陳隋無改北魏主宏太和十九年如魯城祠孔子改封二十八葉靈珍為崇聖侯拜孔氏四人顔氏二人官按此顔子録後之始國朝景泰三年録顔孟嫡孫世五經博士六年録朱熹裔孫梴七年録周敦頥裔孫冕𢎞治六年録衢州孔氏孫彥繩俱五經博士正德元年設子思書院博士以衍聖公嫡次子孫為之嘉靖改元又録婺源朱氏孫墅十八年録曾氏孫質粹于是四配俱世博士而朱氏乃有兩博士云北齊制每月朔祭酒率諸生拜孔揖顔郡學亦每月朝唐太宗貞觀二十一年二月壬申以左丘明卜子夏公羊髙穀梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆賈逵杜子春馬融盧植鄭康成玄服子慎虔何休王肅王輔嗣弼杜元凱預范寧二十二人代用其書垂於國胄自今有事於太學與顔子俱配並為先師按此諸儒配享之始也丘濬曰諸儒從祀孔子皆其有功於聖人之經者卜子夏毛萇有功於詩左丘明穀梁赤公羊髙有功于春秋伏勝孔安國有功於尚書髙堂生戴聖有功於禮王輔嗣有功於易劉向鄭衆杜子春馬融盧植鄭康成服子慎王肅賈逵則通有功於諸經者何休杜元凱范寧則又有功于三傳者然子夏在十哲之列而此又列之者是時七十二子雖列像廟堂未得享祀惟子夏以有功於詩得在從祀之列髙宗永徽中制改先聖孔子為先師降顔回左丘明從祀顯慶二年詔仍以孔子為先聖左丘明等二十一人與顔回俱配享于太學總章元年贈顔回太子少師曽參太子少保並配享孔廟此弟子追贈及曾子配享之始至開元八年李元瓘復請從享僅得坐次十哲當時舉廢之故載籍無徵二十七年孔子正南向位獨配顔淵一人十哲贈侯而曾子苐贈以伯禮從貶殺然則顔曾並配在唐無定典也至宋咸淳復與思孟同為四配而迄今遂為永制矣睿宗太極元年二月加贈顔回太子太師曾參太子太保玄宗開元八年詔十哲為坐像悉從祀曾參坐十哲之次圖七十弟子及二十二賢於廟壁司業李元瓘言孔子廟顔淵配其像立祀凖禮授坐不立授立不跪請據禮文合從坐侍又四科弟子閔子騫等雖列像廟堂不參享祀謹按祠令何休等二十二賢猶霑從祀豈有升堂入室弟子獨不霑配享之餘望請春秋釋奠列享於二十二賢之上又七十子之像文翁之壁尚不闕如豈有國庠遂無圖繪請命有司圖形於壁兼為之贊又曾參孝道可崇獨受經於夫子並塑從享乃詔顔子等十哲為坐像悉從祀曽參坐次之圖繪七十子及二十二賢上以顔子亞聖親為贊書刻於石仍令當朝文士分為諸贊題其壁焉曰按此十哲曽子坐像及親製御贊之始以馬端臨聖作之者也師述之者也述夫子之道親炙言之則莫如十哲七十二賢以傳授言之則莫如子思孟子必是而後可以言先師可以繼先聖今舍是不録而皆取於釋經之諸儒姑以二十二子言之左丘公穀猶曰受經於聖人至於髙堂生以下則謂之經師可矣非人師也如毛鄭之釋經於名物同為該洽而義理間有差舛至王輔嗣之宗旨老莊賈景伯之附會讖緯則其所學已非聖人之學矣又况戴聖馬融之貪鄙固當見擯於洙泗今乃俱在侑食之列而髙第弟子除顔回之外反不得與李元瓘雖懇懇言之而僅能升十哲曾子儕於二十二子之列而七十二賢俱不霑享祀蓋拘於康成之注而以專門訓詁為盡得聖人之傳也二十七年八月贈顔回兖國公配享又贈閔損費侯冉耕鄆侯冉雍薛侯冉求徐侯仲由衛侯宰豫齊侯端木賜黎侯言偃吳侯卜啇魏侯曾參郕伯顓孫師陳伯淡臺滅眀江伯宓不齊單伯原憲原伯公冶長莒伯南宫適郯伯公晢哀郳伯曽點宿伯顔無繇杞伯商瞿蒙伯髙柴共伯漆雕開滕伯公伯寮任伯司馬耕向伯樊須樊伯有若卞伯公西赤邵伯巫馬施鄫伯梁鱣梁伯顔辛蕭伯冉孺郜伯曹恤豐伯伯虔鄹伯公孫龍黃伯冉季東平伯秦祖少梁伯漆雕哆武城伯顔髙琅琊伯漆雕徒父須句伯穰駟赤北微伯商澤睢陽伯石作蜀郈邑伯任不齊任城伯公夏首亢父伯公良孺東牟伯后處營丘伯秦冉彭衙伯奚容葴下邳伯公肩定新田伯顔祖臨沂伯鄡單銅鞮伯句井強淇陽伯罕父黑乘丘伯秦商上洛伯申黨召陵伯公祖句兹期思伯榮旗雩婁伯縣成巨野伯左人郢臨淄伯燕伋漁陽伯鄭國榮陽伯秦非汧陽伯施常乘氏伯顔噲朱虛伯步叔乘淳于伯顔之僕東武伯原亢藉萊蕪伯樂咳昌平伯廉潔莒父伯顔何開陽伯叔仲會瑕丘伯狄異臨濟伯邽巽平陸伯孔忠汶陽伯公西輿如重丘伯公西葴祝阿伯按此從祀者封爵之始一公九侯六十七伯爵依唐書次序一本有蘧瑗衛伯林放清河伯陳亢頴伯申棖魯伯琴牢南陵伯多五人後唐明宗長興二年以顔子配坐閔損等十哲從祀堂上又準太常禮院言勑四壁圖畫英賢各陳脯醢以祭宋太祖建隆元年親製兖國公贊餘先賢先儒侍臣分贊真宗大中祥符二年五月乙卯詔進封孔子弟子顔回以下閔損琅琊公冉耕東平公冉雍下邳公宰豫臨淄公端木賜黎陽公冉求彭城公仲由河內公言偃丹陽公卜商河東公曾參瑕丘侯顓孫師宛丘侯淡臺滅明金鄉侯宓不齊單父侯原憲任城侯公冶長髙密侯南宫適龔丘侯公晢哀北海侯曾點萊蕪侯顔無繇曲阜侯商瞿須昌侯髙柴共城侯漆雕開平輿侯公伯寮夀張侯司馬耕楚丘侯樊須益都侯公西赤巨野侯有若平隂侯巫馬施東阿侯陳亢南頓侯梁鱣千乘侯顔辛陽穀侯冉孺臨沂侯冉季諸城侯伯虔沭陽侯公孫龍枝江侯秦冉新息侯秦祖鄄城侯漆雕哆濮陽侯顔髙雷澤侯漆雕徒父髙苑侯穰駟赤上邽侯林放長山侯商澤鄒平侯石作蜀成紀侯任不齊當陽侯申棖文登侯曹恤上蔡侯奚容葴濟陽侯申黨淄川侯公祖句兹即墨侯榮旗厭次侯縣成城武侯左人郢南華侯燕伋汧源侯鄭國朐山侯秦非華亭侯施之常臨濮侯顔噲濟隂侯步叔乘博昌侯句井強滏陽侯公西輿臨朐侯顔之僕寃句侯蘧瑗內黃侯叔仲會博平侯顔何堂邑侯狄黑林慮侯公良孺牟平侯邽巽髙唐侯孔忠鄆城侯申棖文登侯公西葴徐城侯琴牢頓丘侯仍命宰執兩制館閣撰贊初帝閲崇文院撿定七十二弟子案史記唐會要几七十七人今曲阜廟惟七十二人帝曰何故不同王旦曰國學七十二弟子經太祖定議曲阜準國學畫像七月戊寅封左丘明瑕丘伯公羊髙臨淄伯穀梁赤龔丘伯伏勝乘氏伯髙堂生萊蕪伯戴聖楚丘伯毛萇樂夀伯孔安國曲阜伯劉向彭城伯鄭衆中牟伯盧植良鄉伯杜子春緱氏伯馬融扶風伯鄭玄髙密伯服虔滎陽伯賈逵岐陽伯王弼偃師伯何休任城伯范寧新野伯贈蘭陵亭侯王肅司空當陽侯杜預司徒命羣臣為贊仁宗眀道元年八月詔國子監修七十二賢堂左丘明以下二十二人並以本品衣冠圖之神宗熙寧七年令諸州釋奠通祀十哲京兆府教授蔣夔請以顔淵為衮國公毋稱先師而祭不讀祝儀物一切降殺而進閔子騫九人亦在祀典禮官以孔子顔子稱號歷代各有據依難輒更改儀物祝獻亦難降殺所請九人已在祀典熙寧祀儀十哲皆為從祀惟州縣釋奠未載請自今二京及諸州春秋釋奠並凖熙寧祀儀詔封孟軻鄒國公元豐元年五月壬戌封孟軻鄒國公塑像同顔回配享又封荀况蘭陵伯揚雄成都伯韓愈昌黎伯並從祀先是熙寧中判國子監常秩等請立孟軻楊雄像於廟廷仍賜爵號又請追尊孔子以帝號下兩制禮官詳定以為非是而止至是晉州教授陸長愈請春秋釋奠孟子宜與顔子並配議者以謂凡配享從祀皆孔子同時之人今以孟軻並配非是禮官言唐貞觀以漢伏勝髙堂生晉杜預范寧之徒與顔子俱配享至今從祀豈在同時孟子於孔門當在顔子之列至於荀况楊雄韓愈皆發明先聖之道有益學者久末配食誠闕典也請自今春秋釋奠以孟子配食荀况楊雄韓愈並加封爵以世次先後從祀於左丘明二十一賢之間自國子監及天下學廟皆塑鄒國公像冠服同兗國公仍繪荀况等像於從祀荀况左丘明下楊雄劉向下韓愈范寧下冠服各從封爵詔如禮部議按此孟子配享之始當宋盛時講明聖道者甚盛孔道輔况聖裔也然而兖州五賢之繪孟軻之次即列荀况楊雄次以王通韓愈夫以道輔且爾而元豐諸臣抑又奚責乎荀楊今黜顧法言之楊雄又非劇泰美新之楊雄也胡正甫辨證甚晰當黜者似獨荀耳八年二月命學士院撰鄒國公及荀楊韓子贊徽宗崇寧元年二月追封孔鯉泗水侯伋沂水侯大觀二年詔繪子思像從祀從通仕即侯孟請繪像從祀於左丘明二十四賢之間四年九月追封公夏首巨平侯后處膠東侯公肩定梁父侯顔祖富陽侯鄡單聊城侯罕父黑祈鄉侯秦啇馮翊侯原抗樂平侯樂咳建成侯廉潔胙城侯議禮局言史記弟子傳曰受業身通六藝者七十有七人自顔回至公孫龍三十五人顯有年名及受業見於書傳四十二人姓名僅存家語曰七十二弟子皆升堂入室者按唐會要七十七人而開元禮止七十二人又復去取不一本朝議臣斷以七十二子之説取琴張等五人而去公夏首等十人今以家語史記參定公夏首后處公肩定顔祖鄡單罕父黑秦商原抗樂咳廉潔唐會要開元禮亦互見之皆有伯爵載於祀典請追贈侯爵使預祭享從之政和元年詔改從祀封爵之犯先師諱者於是改封曽參武城侯顓孫師頴川侯南宫縚汶陽侯司馬耕睢陽侯琴張陽平侯左丘明中都伯穀梁赤睢陵伯戴勝考城伯三年以王安石配享封舒王子雱從祀封臨川伯新儀成以孟春元日釋菜仲春仲秋上丁日釋奠以顔孟安石配享俱東坐西向殿上閔損冉耕冉雍宰豫端木賜並西向冉求仲由言偃卜商曽參並東向東廡顓孫師以下至楊雄四十九人並西向西廡林放以下至王雱四十八人並東向五年春詔樂正子克配享孟廟公孫丑至子叔十七人從祀各加封爵封樂正子克利國侯公孫丑夀光伯萬章槫興伯告子不害東阿伯孟仲子新泰伯陳臻蓬萊伯充虞昌樂伯屋廬連奉符伯徐辟仙源伯陳代沂水伯彭更雷澤伯公都子平隂伯咸丘蒙須城伯髙子泗水伯桃應膠水伯盆成括萊陽伯季孫豐城伯子叔承陽伯靖康元年罷王安石配享猶從祀右諫議大夫楊時言安石學術之謬請追奪王爵明詔中外毁去配享之像使邪説詖行不為學者之惑詔落配享猶從祀又以尚書傳墨卿言禮饌依元豐祀儀陳設其五禮新儀勿復遵用孝宗淳熙四年去王雱畫像從趙粹中言也理宗淳祐元年正月幸太學詔贈周惇頥汝南伯張載郿伯程皓河南伯頥伊陽伯與徽國公朱熹並從祀孔子廟庭黜王安石按此周程張朱從祀之始先是紹興中胡安國請追爵二程張邵從祀不報慶元中李道傳請取朱熹論語孟子集注大學中庸章句或問頒之太學仍請以周惇頥及二程張邵從祀嘉定末李心傳亦乞以司馬光周惇頥邵雍張載程皓程頥朱熹七人從祀皆未施行至是詔曰孔子之道自孟子後不得其傳至我朝周惇頥張載程皓程頥真見力踐深探聖域千載絶學始有指歸中興以來又得朱熹精思明辨表裏渾融使大學中庸語孟之書本末洞徹孔子之道益以大明於世其令學官列諸從祀以示崇奬尋以王安石謂天命不足畏祖宗不足法人言不足惜為萬世罪人不宜從祀其黜之景定二年贈張栻華陽伯吕祖謙開封伯俱從祀皇太子既謁孔子廟還奏曰乾淳間文公朱熹與宣公張栻成公吕祖謙志同道合切思講磨如義利之辨如近思録之書擇精語詳開牖後學誠有功於聖門今熹已秩從祀而栻祖謙尚未奉明詔臣竊望焉故有是詔度宗咸淳三年以顔回曾參孔伋孟軻並配享進封參郕國公伋沂國公定十哲位改封閔損費公冉耕鄆公冉雍薛公宰豫齊公端木賜黎公冉求徐公仲由衛公言偃吳公卜商魏公躋顓孫思進陳公祀泗水侯鯉位於鄆城侯忠之次贈邵雍新安伯與溫國公司馬光俱從祀御筆邵雍天挺人豪英雄蓋世司馬光有德有言有功有烈朱熹贊之與周程張俱雍述經世書發先天奧旨而內聖外王之學實關吾道光著通鑑貽後世治法而真履實踐為時儒宗兹豈前代諸儒或以章句文詞得祠于學者比朕將臨辟雍因思朱熹所贊已祠其四而尚遺雍光非闕歟其令學官列諸從祀以示崇奬又御筆惟孔子獨稱顔回好學固非三千之徒所同也而其學不傳獨曽子傳子思子思傳孟子忠恕兩語深契一貫之旨中庸一篇丕闡前聖之藴而孔子之道益著向非顔曾思孟相繼演繹著書垂訓中更管商楊墨佛老幾何其不遂泯哉今顔孟侑食曾思不預尚為闕典其令禮官學官議可升曾思侑食併議可升十哲者以聞又詔泗水侯以先聖為之父以子思為之子而聞詩禮周南召南之學其在魯論著明如此鄆城侯忠其昆也亦在祀列伯魚可列于鄆城侯之次按此顔曽思孟配享之始先是端平中禮部尚書李􅐉請以子思升祀堂上列在十哲之間至是乃定為四配居正位之東面西向其十哲少次殿上東西對列俱北上祠丘濬曰古者祭祀几筵在西神皆東向漢帝幸魯帝升廟西面再拜唐開元禮亦謂先聖東向先師南向三獻官皆西向猶有古意自尊孔子為王之後始改從南面而配位則西向獻官序立東廡前而行禮執事者升降必由東階以神道尚右西乃迎送神之所避右不敢當尊故也宋人以顔孟配享俱列在神像之東其後因王安石配享乃以坐對顔子西坐東向其後革去安石從祀增入曾子子思俱坐於東此姚燧所以有江左進曾子子思並顔孟之説然謂之並南面則不知何據也熊禾謂顔曾思孟所在學校皆東坐西向十哲兩廡從祀皆左右列則是宋末元初其制已如此矣今則四子者配享皆左右列不知始於何時意者宋金分治宋人之制如熊禾所云金人之制則以顔孟與孔子並列其後平宋又加以曾思因而不改歟燧之所見蓋北方廟像歟鄭曉曰近世多議從祀諸儒而不及十哲十哲直取陳蔡一時遇難之賢非孔門定論自開元及今無敢議者夫冇若之言四見於論語大類聖人公西赤志於禮樂有為邦之才其為言語政事不優於宰冉乎我求言行不必微諸史傳論語中多有之視二子優劣何如宜進祀二子於殿上改求我廡中潘府曰溫公宋之儒者孝友忠信恭儉正直其學無所不通一時師儒賴之領袖其居政府尤有旋乾轉坤之功惜乎所見略偏不能無可議者如非孟子而好楊雄則扶持聖教之功有歉矣黜蜀漢而帝曹魏則羽翼聖經之功有愧矣俾之從祀孔廟豫恐其進無顔以見孟子退則諸葛亮文天祥之徒皆以無功著𫐠不得同享焉其心亦將有不安者矣嘗張朝瑞曰按鄭玄稱周公孔子俱為先聖故唐初並祀之至顯慶中以周公作禮樂當同王者之祀乃以周公配武王而孔子獨為先聖夫周公象周易制禮作樂非無學術乃祀在彼不在此蓋各有所重也光功在社稷無愧周公以之配享哲宗廟庭可也况學尚可議何必從祀于孔子之廟哉王新建似亦當援此例開藻按司馬公學術事功尚在歐陽之上而於繼往來固未敢以輕許故存潘張二氏之論陽明闡發良知一匡俗學雖流趨超悟弊或近禪然卓爾儒宗又在司馬之上比例未允况周公自是先聖既已尊崇孔子自當别祀與後儒侑享之義自有不同元仁宗皇慶二年以許衡從祀宋濂曰衡嗜學如飢渴夜思晝誦身體而力踐之言動必揆諸義而後發從栁城姚樞得伊洛程氏及新安朱氏書益大有得尋居蘇門與樞及竇默相講習凡經傳子史禮樂名物星厯兵刑食貨水利之類無所不講而慨然以道為己任嘗語人曰綱常不可一日而亡于天下苟在上者無以任之則在下之任也又善教人其言煦煦雖與童子語如恐傷之故所至無貴賤賢不肖皆樂從之隨其才昏明大小皆有所得可以為世用所去皆哭泣不忍舍服念其教如金科玉律終身不敢忘或未嘗及門傳其緒餘而折節力行而名世者往往有之聽其言雖武人俗士異端之徒無不感悟者丞相安童一見衡語同列曰若輩自謂不相上下蓋十百與千萬耳翰林承旨王磐氣概一世少所與可獨見衡曰先生神明也大德二十年贈榮祿大夫司徒諡文正至大二年加正學垂憲佐運功臣太傅開府儀同三司封魏國公皇慶二年詔從祀孔子廟庭延祐初又詔立書院京兆以祀衡給田奉祠事名魯齋書院文宗至順二年加封顔回為兖國復聖公曽參郕國宗聖公孔伋沂國述聖公孟軻鄒國亞聖公國朝太祖髙皇帝洪武三年黜孟子祀踰年又奉聖旨我聽得孟子辨異端闢邪説發明先聖之道今後依還祭祀二十九年春三月罷楊雄從祀進董仲舒追封江都伯從行人司副楊砥議也宣宗章皇帝宣德十年四月壬戌追封元吳澄為臨川郡公從祀時慈利教諭蔣明建議楊士竒胡濙等覆從之英宗睿皇帝正統元年閏六月丁卯考正兩廡從祀名爵位次頒圖於天下學校用忠州訓導宋廣言也二年二月以宋儒胡安國蔡沈真德秀從祀憲宗純皇帝成化二年春正月改封董仲舒為廣川伯又封從祀諸未有爵者胡安國為建寧伯蔡沈為崇安伯真德秀為浦城伯孝宗敬皇帝𢎞治元年冬十月議釐正文廟從祀不果行禮科右給事中張九功請罷荀况馬融楊雄進禮部侍郎兼學士薛瑄下禮官集議尚書周經等言楊雄已黜於洪武時而薛瑄嘗與元儒劉因並欲從祀楊士竒謂其無著述而止自餘皆有羽翼聖經之功宜仍舊從祀馬少詹事兼侍讀學士程敏政奏曰臣考歷代正史融初應鄧隲之召為祕書歷官河郡太守以貪濁免官髠徙朔方又不拘儒者之節前授生徒後列女樂為梁冀草奏殺忠臣李固作西第頌以美冀為正直所羞衆醜備於一身五經為之掃地劉向初以獻賦進喜誦神仙方術嘗上言黃金可成鑄作不驗下吏當死所著洪範五行傳最為舛駁使箕子經世之微言流為隂陽術家之小技賈逵以獻頌為郎不修小節附會圖讖以致貴顯蓋左道亂政之人王弼倡為清談注易専祖老莊范寧以為罪深桀紂何休則止有春秋解詁一書黜周王魯又注風角等書班之於孝經論語蓋異端邪説之流也戴聖為九江太守治行多不法懼何武劾之而自免後為博士毁武於朝及子賓客為盜繫獄而武平心決之得不死則又告謝不慚身為贓吏子為賊徒王肅在魏以女適司馬昭當是時昭篡勢已成肅為世臣封蘭陵侯官至中領軍乃坐觀成敗及毌丘儉文欽起兵討賊肅又為司馬師畫策以濟其惡若好人佞已乃其過之小者杜預所著亦止有左氏經傳集解其大節蓋無可稱如守襄陽則數饋遺洛中貴要伐吳之際因斫癭之譏盡殺江陵之人以吏則不廉以將則不義凡此諸人其於名教得罪非小而議者謂能守其遺經轉相授受不為無功夫守其遺經若左丘明公羊髙榖梁赤之於春秋伏勝孔安國之於書毛萇之於詩髙堂生之於儀禮后蒼之於禮記杜子春之於周禮可以當之以之從祀可也若融等不過訓詁此九人所傳者耳况其書行於唐故唐姑以備經師之數今易用程朱詩用朱子書用蔡氏春秋用胡氏又何取於不正之人使安享天下之祀哉至于鄭衆盧植鄭玄服虔范寧五人雖若無過然其所著亦未能以發聖學若五人從祀則漢唐以來當預者尚多臣愚乞將戴聖劉向賈逵馬融何休王肅王弼杜預八人禠爵罷祀鄭衆盧植鄭玄服虔范寧五人各祀於其鄉后蒼在漢初説禮數萬言號后氏曲臺記戴聖等皆受其業禮記非后氏不傳乞與左丘明等一體從祀又孔子弟子見於家語自顔回而下七十六人家語之書出於孔子當得其實而司馬遷史記所載多公伯寮泰冉顔何三人文翁成都廟璧所畫又多蘧瑗林放申棖三人先儒謂後人以所見增益殆未可據臣考宋邢昺論語注疏申棖孔子弟子在家語作申續史記作申黨其實一也今廟庭從祀申棖封文登侯在東廡申黨封淄川侯在西廡重復無稽一至於此且公伯寮訴子路以沮孔子乃聖門之蟊螣而孔子稱瑗為夫子決非及門之士林放雖嘗問禮然家語史記邢昺注疏朱子集注俱不載諸弟子之列秦冉顔何疑亦為字畫相近之誤如申棖申黨者但不可考耳臣愚以為申棖申黨位號宜存其一公伯寮秦冉顔何蘧瑗林放五人既不載於家語七十子之數宜罷其祀若瑗放二人不可無祀則乞祀瑗於衛祀放於魯或附祭於本處鄉賢祠仍其舊爵以見優崇賢者之意緇何孟春曰七十弟子門人有公孫尼子者作樂記衣矣吐詞為經宜列從祀敏政乃不之及何耶進敏政又曰洪武二十九年司副楊砥建議黜揚雄董仲舒矣然荀况楊雄實相伯仲而况以性為惡以禮為偽以子思孟子為亂天下以子張子夏子遊為賤儒故程子有荀卿過多揚雄過少之説今言者欲並黜况之祀宜也漢儒莫如董仲舒唐儒莫如韓愈而尚有可議者一人文中子王通是也通之言行先儒之論已多大約以為僭經臣請斷以程朱之説程子曰王通隱德君子也論其粹處殆非荀楊所及朱子曰文中子論治體處髙似仲舒而本領不及爽似仲舒而純不及又曰韓子原道諸篇不免文士之習利達之求若覽觀古今之變措諸事業恐未若通之精到懇惻而有條理也至於河汾師道之立出於魏晉佛老之餘逮今人以為盛則通固豪傑之士也今董韓並列崇祀而通不預疑為闕典臣又按宋儒自周子以下九人同列從祀而尚有可議者一人安定胡瑗是也瑗之言行先儒之論已詳大約以為少著述臣亦請斷以程朱之説程子看詳學制曰宜建尊賢堂以延天下道德之士如胡瑗張載邵雍使學者得以矜式朱子小學書亦備載瑗事以為百世之法臣以為自秦漢以來師道之立未有過瑗者况宋端平二年議增十賢從祀以瑗為首若以為瑗無著述則元之許衡亦無著述臣考之禮有道有德於教於學者死則為樂祖祭於瞽宗通瑗兩人師道百世如新得加封爵使與衡同祀于學官最得禮意部議皆不從人國初王禕從祀議曰孔子廟庭從祀者凡百有五自淡臺滅明至孔鯉七十一人皆受業聖人之門而承聖人之教者也自左丘明至許衡三十四人皆傳注聖經尊崇聖學而有功於聖人之道者也蓋自唐貞觀二十一年始以左丘明至范寧等二十一人從祀及宋元豐七年復增荀况楊雄韓愈以世次先後從祀左丘明二十一人之間淳祐元年又以周惇頥程皓程頥張載朱熹列於從祀景定二年又增張栻吕祖謙咸淳三年又增邵雍司馬光及元皇慶二年乃以許衡繼宋九儒居從祀之列所謂三十四人者也以今論之漢儒之從祀者十四人而猶闕者一人董仲舒是也唐之從祀者一人而猶闕者一人孔頴逹是也宋之從祀者九人而猶闕者四人范仲淹歐陽修真德秀魏了翁是也元之從祀者一人而猶闕者一人吳澄是也自夫孟軻既往聖學不明邪説盛行異端並起歷秦至漢諸儒完經翼傳局于顓門之學而於聖人之學莫或有聞惟董仲舒號稱醇儒其學博通諸經於春秋之義尤精所以告其君者如天人性命仁義禮樂以及勉強遵行正誼眀道之論皆他儒之所不能道至其罷黜百家表章六經以隆孔子之教使道術有統異端息滅民到于今賴之功殆不在孟子下以荀况之言性惡楊雄之事新莽猶獲從祀而仲舒顧在所不取何也秦焚之後聖經闕逸漢儒收拾散亡各為箋傳而偏學異説各自名家晉宋以來為説滋蔓去聖既逺莫可考證唐初孔頴達受詔撰定諸經之疏號曰正義自是以來著為定論凡不本於正義者謂之異端誠學者之宗師百世之取信也何休注公羊而黜周王魯王弼注易而専尚清虛害道已甚然在祀列胡獨至於穎達而遺之聖人之道或著事功或載文章用雖不同實則一致三代以下人牙莫盛於宋東都其間慨然以聖人之道為己任而著之行事者范仲淹而已其言先憂後樂雖伊尹之任無以尚之况當其時天下學術未知所宗尚而仲淹首以中庸授張載以為道學之倡蓋其為學本乎六經而其議論無不主於仁義雖勳業未究而事功所及光眀正大實與司馬光相上下自聖道不行世儒徒知章句以為事而孰知聖人經世之志固不専在是也歐陽修與仲淹同時明聖賢之學而著之文章其易春秋諸説詩本義等書發揮經學為精至其欲刪諸經正義讖緯之説一歸於正尤有功於聖道至于本論等篇比之原道何愧而世之淺者每日之為文人夫文以載道雖經天緯地者亦謂之文而顧可少之哉然則如范仲淹之立功歐陽修之立名皆可謂有功於聖道者韓愈司馬光既列從祀則此二人固決在所當取者也自周惇頥接聖賢千載不傳之緒而程頥兄弟承之朱熹有作五經四子皆有傳注論述統宗會元集聖賢大成中更學禁真德秀魏了翁力以尊崇朱學為己任而聖賢之學乃復明真氏所著有大學衍義讀書記魏氏所著有九經要義大抵皆黜異端崇正理質諸聖人而不謬足以纘朱氏所傳之緒此二人者當繼朱氏而列於從祀者也及元興許衡起於北方尊用朱氏之學以教人吳澄起於南方孝經大學中庸易詩書春秋禮皆有傳注􅕍括折衷於禮經尤多刪正凡以補朱氏之未備而其真修實踐蓋無非聖賢正大之學則其人又可謂有功聖人之道宜與許衡同列從祀按祀法有功於聖道則祀之是七人者其有功於聖人之道如此而從祀闕焉此甚不可又按聖孫孔伋故列孔鯉之下而曾參亦在曾哲後咸淳三年始升配為四侑東坐而西向父祀廡下子配堂上尊卑舛逆莫此為甚聖人之道在於明人倫而先自廢亂何以詔後世借曰曾子子思以傳道為重然子必當為父屈昔魯祀僖公躋之閔公之上傳者謂子雖齊聖不先父食以為逆祀今孔氏曾氏父子之失序非逆祀乎是故曾參孔伋今當降居於曾晢孔鯉之下又司馬光於程皓程頥為先進張載於二程為表叔而位次皆在下其先後次序亦不可不明咸淳從祀徒依朱子六贊以周二程邵張司馬為序而不知朱子之贊特以形容六君子道德之盛初未嘗定其先後之次胡可遂據以為準乎是故司馬光張載今當升居於程皓程頥之上若夫荀况楊雄何休王弼之徒有不當與於從祀者兹又未敢以遽數也嗟乎天下之禮有似緩而急似輕而重者以有關於名教也况乎禮文之事自儒者出則於有功聖道之人禮宜與祀而未稱於禮者固不得置之而不議列之如右庶議禮君子有所採擇云藻按子充此議欲正曾子子思祀位居其父下果爾則曽晢伯魚廡祀可安而啓聖配可已也嘉靖諸議禮者似未睹此抑子淵之配非自宋始不可降而又無以處顔路故為是委曲耶罷楊雄進董仲舒事在洪武而子充死節在前惜未之見程敏政之議嘉靖中多采行之荀况何休等祀今俱罷吳沈則增祀而復罷王通歐陽修胡瑗真德秀今已俱祀特公孫尼子孔頴達范仲淹魏了翁似有所待然而可祀者尚不止于此也八年八月追封宋楊時為將樂伯從祀先是祭酒魏鐸言楊時息邪放淫不愧南軒所稱繼往開來吾道南矣實衍晦翁之𣲖雖其晚節一出不克盡從其言而新經之闢誠足以衛吾道吳澄生長於淳祐貢舉於咸淳受宋之恩已如此其久為國子司業為翰林學士歷元之官乃如彼其榮迹其所為曾不及洛邑之頑民何敢望首陽之髙士乞升時以上祔宋諸賢之位斥澄以下從莽大夫之列尚書傳瀚詆之且力稱前人之請為有見不可遽易焦芳曰所謂前人蓋楊士竒也今天下方議其當柄用之際雖從祀大事猶得私庇同鄉可又襲其非耶瀚曰有其舉之莫敢廢也澄竟從祀仍舊至是少傅徐溥復言時雖由蔡京薦起然入朝首請黜安石配享廢其新經又乞罷綱運以收人心斥和議以張國勢竄權臣以正邦憲培主德以崇治本胡安國謂當時若能聽用決救得一半時值洛學黨禁之餘指示學者以大本所在體驗之功轉相授受朱子得聞其指訣則見於何鎬之書朱子於理一分殊之説稱其所見益精則見於西銘之跋則以著述見少者亦未考之過也又按元史至正間因杭州路照磨何瑜建言已將時與李侗胡安國蔡沈真德秀並加封爵列從祀以世變不及遍行天下今躋於從祀實合公論遂躋時世宗肅皇帝嘉靖十三年釐正祀典以申黨即申棖存棖去黨罷公伯寮秦冉顔何荀况戴聖劉向賈逵馬融何休王肅王弼杜預吳澄十三人祀其林放蘧瑗鄭衆盧植鄭玄服虔范寧七人各祀於其鄉增后蒼王通歐陽修胡瑗陸九淵從祀張璁議曰歐陽修乃有宋一代人物所著本論實有翊衛聖道之功蘇軾曰自漢以來道術不出於孔氏而亂天下者多矣五百餘年而後得韓愈學者以配蓋氏蓋庶幾焉愈之後三百有餘年而後得歐陽子其學推韓愈孟子以達於孔氏故天下翕然師尊之曰歐陽子今之韓愈也夫韓愈既已從祀歐陽修豈可闕哉於是進修其餘稍采張九功程敏政之議及王世貞議曰四科十哲孔子偶追陳蔡之厄思不門之士而記者追列其名耳不然何傳道若曾子者而不與也宰我冉求濫竽其間朽木糞土之誚見鄙聖門短喪自便之私得罪名教鳴鼓之攻非徒之責凛乎霜鉞乃使偃然於大聖一堂之上與顔閔比肩宜降置兩廡必欲補十哲之缺則有有若南宫適二子其言行蓋為純媺可從顓孫師之例進補臣又考得嘉靖所進歐陽修者文章士也其行誼政術亦在中上嘗議易繫非聖無法而驟貴之臣秪以其所著濮議微合新禮遽登從祀臣以為登歐陽修不如登范仲淹仲淹力振綱常首扶神氣又能於戎馬倥偬之際以中庸誨引張載俾成大儒視修何啻倍屣而陸九淵從行人薛侃議入其疏曰宋儒陸九淵生清明學術純正自孟子沒而心學晦至宋周惇頥程皓追尋其緒九淵繼之心學復明當時吕祖謙張栻輩莫不恱服今諸子皆祀而九淵獨未從祀蓋以蚤嵗嘗與朱熹論説不合故其徒擠之為禪臣考九淵赴荆門時朱熹延入白鹿洞講喻義利之旨聽者流涕熹亦嘆服又為之跋以為不迷於入德之方則其非禪眀矣夫禪空寂其心遺人倫棄物理九淵之學如曰惟天下之至一為能處天下之至變曰先立乎其大者曰學莫先於義利之辨則皆孔孟之旨豈空寂其心者哉曰某何嘗不理會文字但理會與人别耳曰人情事勢物理上用功曰已德明然後推其明以及天下此豈遺棄物理者哉况荆門之政可驗躬行之效則見於賢相之稱超然獨契乎本心以俟聖人百世則見於名儒之贊而宋朝議諡文安亦極尊美之辭及先儒吳澄許衡國朝名臣程敏政席書皆有撰述每稱其學之純獨陷於記誦詞章而莫自覺者乃以躬行實踐為近禪則世學之誤也請以九淵從祀穆宗莊皇帝隆慶五年以本朝薛瑄從祀成化初監臣李紳始請祀瑄嗣是屢有議及不果行至是給事中韓楫雒遵御史馬三樂皆以為請乃躋瑄二霍韜議曰謹按歷代從祀孔庭之儒若孔門七十賢則親炙聖化者也漢儒則搜輯聖經者也唐儒則疏注聖經者也宋儒則闡明聖經者也薛瑄生當聖學大明之時實能誦法孔子雖不如七十二子親炙孔門原其精神心術無頃刻不師孔子之教雖不必如漢儒搜輯遺經實自童丱至沒齒無頃刻忘聖經之言雖不如唐儒宋儒疏注闡明遺經觀其讀書録平易親切非身心體驗不能及蓋其造詣不及董仲舒而篤實似之頴悟不及韓愈歐陽修而篤行過之粹精淵微不及程皓而渾厚似之出處不改其操禍患不易其節貧賤不移其介身為世師言為世訓動為世式晦而彌彰抑而彌光非真誠積纍之素不能也今上萬厯十二年以本朝王守仁陳獻章胡居仁從祀嘉靖初行人薛侃始請獻章從祀隆慶初御史耿定向始請守仁從祀至是御史詹事講請並祀二人祭酒張位又請並祀居仁乃下廷議禮部尚書沈鯉請獨祀居仁大學士申時行等仍請並祀三人其疏曰仰惟皇上重道崇儒德音屢下今該部覆議乃請獨祀布衣胡居仁臣等切以為未盡也彼詆訾守仁獻章謂各立門户者必離經叛聖如老佛莊列而後可守仁言致知出于大學言良知本于孟子獻章言主靜沿于宋儒周惇頥程皓皆祖述經訓羽翼聖真豈其自創一門户耶事理浩繁茫無下手必于其中提示切要以啓關鑰宋儒曰仁曰敬亦各有主獨守仁獻章為有門户哉其謂禪家宗旨者必外倫理遺世務而後可今孝友如獻章出處如獻章而謂之禪氣節如守仁文章如守仁功業如守仁而謂之禪可乎其謂無功聖門者豈必著述而後為功孔子刪述六經然曰豫欲無言曰吾無行而不與二三子顔淵最稱好學然曰於吾言無所不恱曰退而省其私亦足以發夫聖賢於道有以身發明者比於以言發眀其功尤大也其謂崇王則廢朱者不知道固互相發眀並行不悖朱與陸辨盛氣相攻兩家弟子有如讐隙今並祀學官朱學不以陸廢今獨以王廢乎大抵近世儒者褒衣博帶以為容而究其實用往往病於拘曲而無所建樹博物治聞以為學而究其實得往往狃於見聞而無所體驗習俗之沉錮久矣今誠祀守仁獻章一以眀真儒之有用而不安於拘曲一以眀實學之自得而不専於見聞斯於聖化豈不有裨若居仁之純心篤行衆議所歸亦宜併祀我國家二百餘年理學名臣先後輩出不減宋朝至于從祀乃止薛瑄一人殊為闕典請益三賢以昭熙代文運之隆是時議祀儒臣尚有陳真晟羅倫章懋黃仲昭吳與弼鄒守益王良七人廷議以祀典隆重如宋儒遊酢吕大臨謝良佐羅從彥李侗胡宏之倫殆勝今儒而未能盡祀姑以俟諸他日四十一年以宋儒羅從彥李侗從祀福建提學僉事熊尚文疏請崇祀羅李侍讀學士何宗彥等博議禮部覆疏曰謹按宋儒羅從彥者少鄙言語文字之學長絶利祿仕進之心從遊龜山之門有幾虛一生之嘆信道敦篤築室羅浮山中端坐行吟充然自得學者仰之如泰山北斗又按李侗語治道先崇廉恥節義明學術嚴辨儒釋正邪受業豫章之門潛心顔子之學默坐澄心看喜怒哀樂未發氣象體認天理表章聖經先儒鄧迪稱其如氷壺秋月當時著述在羅則有春秋解及指歸毛詩解中庸語孟説又遵堯録八卷行于世在李則有延平問答要説録此皆緒接真傳有功道統我朝稱道術必曰孔孟必曰程朱然孔子倡道于洙泗冇曾子子思相繼發明而後孟子接其傳程氏倡道于伊洛得羅豫章李延平相承衣鉢而後朱子衍其緒羅李之功與曾子子思等宜將二賢列宋儒楊時之下入廟崇祀從之藻按羅李二儒位列龜山之下似也但元晦受業於延平之門伯恭仲默亦皆後輩而位躐羅李併躐龜山分義尚乖必須更定其王陳胡三公亦似但以顯晦為序考其年次陳胡實在王前議禮者抑未深考歟配享從祀位次兩廡位次重修會典及禮樂志諸書所列參差不一此遵嘉靖祀典四配復聖顔子東一位回字子淵魯人漢元和二年配享孔廟唐總章元年贈太子少師開元二十七年加贈兖國公元至順二年加兖國復聖公嘉靖九年釐改今稱巷宋太祖御製贊生值衰周爵不及魯一簟藜藿陋環堵德冠四科名垂千古沒表萬邦遂封東土以髙宗御製贊德行首科顯冠學徒不遷不二樂道居食埃甚忠在陋自如宜稱賢哉豈止不愚實理宗御製贊學冠孔門德行科首聞一知十若虛有樂道簞瓢不易所守步趨聖人瞪若其後用王旦贊賢哉子淵惟仁是好如愚屢空鄰幾覩奧行舍藏與聖同道封岱丁辰益兹榮號宗聖曾子西一位參字子輿魯人唐總章元年追封太子少保大極元年進大子太保開元二十七年封郕伯宋祥符進瑕丘侯政和改武城侯咸淳三年進郕國公配享元至順二年加宗聖公嘉靖中改今稱宋髙宗御製贊夫孝要道用訓羣生以綱百聖以通神明因子侍師答問成經事親之實代為儀刑張齊賢贊孝乎惟孝曾子稱焉唐虞比德洙泗推賢服膺授旨終身拳拳封巒飾贈永耀青編明陳鳳梧贊守約而博學恕以忠聖門之傳獨得其宗一貫之旨三省之功格物誠正萬世所宗述聖子思子東二位伋字子思伯魚之子宋崇寧元年追封沂水侯咸寧三年進沂國公配享元至順二年加述聖公嘉靖中改今稱孜宋理宗御製贊閉居請膺世業克昌可離非道孜立行發揮中庸體固有常入德樞要治道權衡亞聖孟子西二位軻正義作字子輿漢書作子車鄒人宋元豐六年追封鄒國公配享次顔子元至順二年加亞聖公嘉靖中改今稱生宋理宗御製贊道術分裂諸子為書既極而合篤真儒詆訶楊墨皇極是扶較功論德三聖之徒十哲先賢閔子東一位損字子騫魯人唐開元二十七年贈費侯宋大中祥符二年加封琅琊公咸淳三年改封費國公其稱先賢某子係嘉靖中釐改後同間宋髙宗御製贊天經地義孝哉閔騫父母兄弟莫其言汙君不仕志氣軒軒復我汶上出處休焉人王旦贊子騫逹者誾誾成性德冠四科孝先百行無間言道亦幾聖公衮增封均乃天慶先賢冉子西一位耕字伯牛魯人唐開元贈鄆侯宋大中祥符加封東平公咸淳改封鄆國公宋髙宗御製贊德以充性行以澡身二事在躬日躋而新並驅賢科德顔與鄰不幸斯疾命也莫伸王欽若贊聖門逹者德行為先洙泗來學顔閔差肩天封展禮公衮褒賢生則命蹇沒而道宣先賢冉子東二位雍字仲弓魯人唐開元贈薛侯宋大中祥符加封下邳公咸淳改薛國公宋髙宗御製贊懿德賢行有一則尊子也履之成性存存騂角有用犂牛莫論刑政之言惠施元元王欽若贊不佞之仁具體之賢登彼堂奧用之山川代逢偃革禮畢升禋錫之三壤賁兹九泉先賢宰子西二位豫字子我魯人唐開元贈齊侯宋大中祥符加封臨淄公咸淳改齊國公宋髙宗御製贊辨以飾詐言以致文苟弗執禮宜莫釋紛朽木糞墻置不足云言語之科瞱然有聞馮拯贊綽彼宰子服膺宣父學洞堂奧名揚鄒魯再期設問五常垂矩遇我慶成增封茅土先賢端木子東三位賜字子貢衛人唐開元贈黎侯宋大中祥符加封黎陽公咸淳改黎國公宋髙宗御製贊謙德知二器實瑚璉動必幾先孰並其辨一使存魯五國有變終相其上譽處悠逺馮拯贊賜之望坰獨云知二器稱瑚璉在禮斯譽服道稱師名垂萬世公爵尊崇時追肆類先賢冉子西三位求字子有魯人唐間元贈徐侯宋大中祥符加封彭城公咸淳改封徐國公宋髙宗御製贊循良之要在於有政可使為宰千室百乘師門育材治心扶性退則進之琢磨之柄陳堯叟贊謙謙令德少著嘉聞敏於從政治於斯文垂鴻報本道遇明君永錫徽稱載揚清芬先賢仲子東四位由字子路史記卞人家語一字季路唐開元贈衛侯宋大中祥符改河內公咸淳改衛國公宋髙宗御製贊升堂惟先千乘惟權陵暴知非委贄可賢折獄言簡結纓禮全惡言不入仲尼賴焉陳堯叟贊猗歟魯哲義勇無儔獨立不懼從政惟優欽屬仁聖勒封介丘褒賢進號載顯英猷先賢言子西四位偃字子遊吳人唐開元贈吳侯宋大中祥符加封丹陽公咸淳改封吳國公宋髙宗御製贊道義正己文學擅科為宰武城聊以絃歌割雞之試牛刀謂何前言戲耳博約則多趙安仁贊魯堂登科覩輿將聖武城之小可以觀政淡臺之舉行不由徑追建上公素風逾盛先賢卜子東五位商字子夏衛人唐開元贈魏侯宋大中祥符加封河東公咸淳改封魏國公宋髙宗御製贊文學之目名重一時為君子儒作魏侯師不可後禮始可言詩假蓋小嫌聖亦不疵趙安仁贊詩動天地起子者商溫柔立教文學升堂雅頌得所治亂攸彰慶成加增其道彌芳先賢顓孫子西五位師字子張陽城人唐開元贈陳伯宋大中祥符改封宛丘侯咸淳改陳國公躋十哲宋髙宗御製贊念昔顓孫商德與鄰學以干祿問以書紳參前倚衡忠信是遵色取行違作戒後人張齊賢贊堂堂張也商德與鄰尊賢容衆崇德依仁入趨函丈退而書紳升中有贈道與名新東廡四十九位內先賢三十三位先儒十六位先賢淡臺子一位滅明字子羽武城人唐開元贈江伯宋大中祥符加封金鄉侯宋髙宗御製贊惟子有道天與異容狀雖云惡德則其豐南止江沱學者雲從取士自兹貌或非公溫仲舒贊不曰徑行其真可貴不私見人其公可畏擊蛟既勇毁璧且義紀號益封旌厥賢士先賢原子二位憲字子思宋人檀弓作仲憲唐追封原伯宋大中祥符加封任城侯宋髙宗御製贊軾彼窮閻達士所賓邦無道穀進退孰倫敝衣非病無財乃貧賜雖不懌清節照人向敏中贊賢哉子思介然清淨貧惟固學道乃非病衣冠志敝草澤遂性升中進秩乘芳尤盛先賢南宫子三位適字子容魯人史記作南宫括家語作南宫韜一作縚唐追封郯伯宋大中祥符加龔丘侯政和改封汶陽侯乃宋髙宗御製贊先覺既位簪履並馳尚德君子爾兼之羿奡可慚禹稷可師三復此道載觀白圭言寇準贊南容君子尚德聖門有道不廢危行遜白圭三復執慎思存慶成旌善作壤佳藩先賢商子四位瞿字子木魯人唐追封蒙伯宋大中祥符加封須昌侯宋髙宗御製贊易之為書彌綸天地五十乃學師則有是子能授受洗心傳世知幾其神宜被厥祀朝逈贊易之為書窮理盡性瞿也親受抗心希聖韋編靡釋素風允競展禮封侯千載輝映先賢漆雕子五位開家語字子若蔡人史記漆雕開字子開魯人唐追封滕伯宋大中祥符加封平輿侯宋髙宗御製贊仕進之道要在究習具臣而居咎欲誰執斯未能信謙以有立闕里説之多士莫及李宗諤贊闕里之堂邈矣難造猗歟子若實覩其奧學優當仕非乃攸好明祀益封式稽古道先賢司馬子六位耕字伯牛宋人家語作司馬黎耕與史記俱字子牛唐贈向伯宋大中祥符加封楚丘侯政和改封睢陽侯乃宋髙宗御製贊手足甚親志異出處魋將為亂子脫去在汚能潔危而有慮內省若斯何憂何懼旁楊億贊仁逺乎哉其言也訒虛往實歸耽思訊違難迷邦奚虞悔吝疏爵丁辰寵名以峻先賢有子七位若史記字子若魯人家語作子有唐追封卞伯宋大中祥符加封平隂侯宋髙宗御製贊人稟秀德氣貌或同而子儼然溫溫其容兩端發問未答幾鋒以禮節和斯言可宗先賢巫馬子八位家語期字子期陳人史記作巫馬施字子旗鄭玄云魯人唐封鄫伯宋大中祥符加封東阿侯宋髙宗御製贊天清日明密雲曷有師命持蓋子亦善叩惟夫子博三才允究學者之樂所得遂茂趙昌言贊英英子施受天和氣名登魯堂位沈周季猶勤戴星庇民為治讓德進封名垂永世先賢顔子九位家語辛字子栁魯人史記作顔幸唐追封蕭伯宋大中祥符加封陽穀侯宋髙宗御製贊孰封於蕭實惟子栁夙飫格言克遵善誘明德斯馨賢業所就以侑於儒傳芳逾茂周起贊增封雲嶺詔驆魯堂顯允君子令儀有章英概如挹德音不忘橫亘千古淳風載揚先賢曹子十位恤字子循蔡人唐贈曹伯宋大中祥符加封上蔡侯宋髙宗御製贊肅肅曹伯王室之裔積習學道切磋明義惟善則主爾德是類史筆有煥令名永紀笙楊紳贊三千孔徒七十賢者子循服道聖門之下簧經籍輔翼儒雅爵為蔡侯名器匪假先賢公孫子十一位龍史記字子石鄭云楚人孟云趙人家語作公孫寵衛人唐贈黃伯宋大中祥符加封枝江侯宋髙宗御製贊黃伯著祀公孫是云彌縫中道協輔斯文藏修方異漸漬其勤史詞不忘播為清芬王曾贊子石巨賢探微博古稟粹荆衡從師鄒魯令聞不已儀刑始覩展義疏封遂侯故土先賢秦子十二位商史記字子丕家語字丕兹魯人左作不慈鄭云楚人一云秦人唐贈上洛伯宋大中祥符加封馮翊侯與宋髙宗御製贊孔父秦父相尚以力俱生賢嗣相以德是父是子致詰疇克會辨儒林令名無極先賢顔子十三位史記髙字子驕家語作顔刻魯人唐追封琅琊伯宋大中祥符加封雷澤侯宋髙宗御製贊琅琊之伯其惟子驕微言既彰德音孔昭已觀舞雩同聽齊韶歷千百祀跂思髙標戚綸贊魯國諸生顔氏為盛達者升堂是以希聖龍章載加侯服輝映名著遺編人師往行先賢穰駟子十四位赤家語字子從史記作壤駟赤字子徒鄭云秦人唐封北微伯宋大中祥符加封上邽侯宋髙宗御製贊式是壤伯昭乎聖徒執經請益載道若無詩書規矩問學楷模得時而駕領袖諸儒陳彭年贊猗歟壤駟信而好古趣駕咸秦摳衣鄒魯言必成文動不踰矩成禮介丘追榮社土先賢石作子十五位史記蜀字子明家語作石子蜀秦人唐贈郈邑伯宋大中祥符加封成紀侯宋髙宗御製贊在昔石邑能知所遵懋依有德克述無言鼓篋槐市揚名里門此道久視彼美長存陳充贊宣尼日月無得而踰粵有哲士嘗為學徒登封偶聖至德崇儒以地進爵斯文乃殊先賢公夏子十六位守字子乘史記作公夏首字乘鄭云魯人唐贈亢父伯宋大觀四年加封巨平侯聖門人物志贊洙水汪濊吸者滿腹子乘參之雅言攸服學以適道弗雕其朴庶幾斯文令終有俶先賢后子十七位史記后處字子里齊人家語作石處字里之唐贈營丘伯宋大觀加封膠東侯宋髙宗御製贊溫溫子里入聞至聖攬道之華秉德之柄深造閫域不乖言行全齊之封竹素榮盛先賢奚容子十八位蒧家語字子偕史記字子晢古史字晳文翁圖魯人正義衛人唐贈下邳伯宋大中祥符加封濟陽侯宋髙宗御製贊雍容子晢已望堂室幼則有造成則祖述文彩日化儒效力弼永觀厥成德音秩秩楊紳贊雍容子晳服勤儒墨闕里橫經魯堂師德昔從遊聘今逄檢勒皇賜信圭洙泗改色先賢顔子十九位史記祖字襄家語作顔相又作柤字子襄魯人唐贈臨邑伯宋大觀加封富陽侯聖門志贊武公崇基魯國益昌追迹好學熙有子襄探賾索隱識微知彰闕里茂才松檜蒼蒼先賢句井子二十位家語勾井疆字子疆闕里志字野山東志字子孟史記作句井正義作鈎井鄭云衛人唐贈淇陽伯宋大觀加封滏陽侯編宋查道贊衛之君子達者比肩服勤鼓篋學慕韋升中覃慶儒術攸先徹侯疏爵闕里之賢先賢秦子二十一位祖字子南魯人鄭云秦人唐贈少梁伯宋大中祥符加封鄄城侯宋髙宗御製贊秦有子南贊聖述作守道之淵成德之博範若鑄金契猶發藥歷世明祀少梁寵爵先賢公祖子二十二位史記句兹字子之家語作公祖兹魯人唐贈期思伯宋大中祥符加封即墨侯宋髙宗御製贊惟彼子之錫伯期思與賢並進得聖而師彬彬雅道翼翼令儀一日至焉廟食不隳梅詢贊子之生魯從師尼父恂恂闕里峩峩章甫非聖勿言惟道是與千古而下俾侯齊土先賢縣子二十三位史記縣成字子祺家語作懸成字子橫魯人唐贈巨野伯宋大中祥符加封武城侯宋髙宗御製贊至聖立教子祺安雅擅譽魯邦啓祚巨野煒矣風猷時哉用舍出倫離類後學是假石中立贊異能之士孔徒實繁恱服至德祖述微言富稟天爵遊乎聖門追崇之典胙以侯藩先賢燕子二十四位級字子思史記作伋字思秦人唐贈漁陽伯宋大中祥符加封汧源侯宋髙宗御製贊師席髙振大成是集至道克傳賢達斯執善教云袤儒風可立漁陽之士得跂而及陳知微贊八九之徒俱傳大義賢哉子思道本無愧鐘靈咸鎬浴德洙泗增封汧源皇澤斯被先賢顔子二十五位之僕家語字子叔魯人史記字叔唐贈東武伯宋大中祥符加封宛句侯宋髙宗御製贊賢行顔叔親承尼父志鋭所期道尊是輔泥在鈞陶木就規矩終縻好爵揚名東武崔遵度贊洙水悠悠子叔優優及肩等賜升堂並由元后時邁禮成介丘旌此達者爵為列侯先賢樂子二十六位咳史記字子聲正義魯人家語作樂欣秦人唐贈昌平伯宋大中祥符加封建成侯宋髙宗御製贊樂氏子聲錫爵昌平信道之篤見善乃明引領髙節載微思誠先賢聿集出為時英先賢狄子二十七位黑家語字晳之一作子晳史記字晳衛人唐贈臨濟伯宋大中祥符加封林慮侯宋髙宗御製贊仰止狄晳抱負淵通遊泳德化揚厲素風偉識既異持教乃隆厥志茂焉毖祀無窮薑嶼贊矯矯子晳來學有臧依仁遊藝攝齊升堂羽儀先聖物色上庠林慮錫壤百世之光先賢子蔑子二十八位忠子蔑其字史記孔子兄孟皮之子家語作孔弗唐贈汶陽伯宋大中祥符加封鄆城侯宋髙宗御製贊惟子挺生道德之門佩服至論鯉則弟昆三得三亡所問殊溫君子歸宓義不掩恩陳咨贊賢哉先生聖闕夫子道貴希聖闕斯行已闕里服膺國庠從祀載享侯封式昭德美先賢公西子二十九位蒧字子尚史記作子上魯人唐贈祝阿伯宋大中祥符加封徐城侯宋髙宗御製贊猗爾子尚魯邦之望以德則貴惟道是唱師聰師明友直友諒伯於祝阿儒風斯暢劉筠贊魯多學者服勤逰聖祝惟肖蒧也成性溫有餘裕是亦為政追侯於徐用均天慶先賢施子三十位之常字子常史記字子恆魯人唐贈乘氏伯宋大中祥符加封臨濮侯宋髙宗御製贊開國乘氏有德斯彰參稽百行贊理三綱自拔行間䇿名甚光在史藹藹歷久彌芳王隨贊懿彼施常學深儒雅魯國上賢孔堂達者迹晦名彰德髙言寡封侯是邦昭錫純嘏先賢秦子三十一位非字子之魯人唐贈汧陽伯宋大中祥符加封華亭侯宋髙宗御製贊樂善哲士伯於汧陽傳道克正垂名允臧執德以𢎞用心必剛袤廣業履式贊素王王隨贊七十之賢皆傳聖道彼美子之學臻堂與珍席圭璋儒宫黼藻列爵華亭令名長保先賢申子三十二位棖見論語鄭云即申續史記申黨字周家語申績字子周文翁圖作申堂後漢王政碑有羔羊之節無申棠之欲史記以棠為黨家語以續為績皆傳寫之誤固知申棖申黨總是一人唐贈棖為魯伯又贈黨邵陵伯宋大中祥符加封棖文登侯黨又加淄川侯豈宋髙宗御製贊剛毅近仁志操莫渝性非祝鮀靣子都有一於此剛名可圖云欲則柔蓋生之徒時張智贊洙泗之秀橫經魯堂名亞十哲道尊五常巡駐驆闕里增光封侯錫命闕先賢顔子三十三位噲字子聲魯人唐贈朱虛伯宋大中祥符加封濟隂侯宋髙宗御製贊褒錫朱虛在器輪輿儒室振領聖門曳裾賢業得藴美才以攄百世不刋載觀成書張象中贊回也庶幾諸賢近之洙泗受業汶上從師輔翊儒道經營德基俾侯於濟君子攸冝先儒穀梁子三十四位赤字元始魯人尸子曰名俶顔師古曰名喜作春秋傳唐貞觀中從祀宋大中祥符追封襲丘伯政和改雒陽伯嘉靖中釐改稱先儒後同出宋理宗贊仲尼作經獲麟絶筆赤也發揮奧義斯立學名家道隆聖日列爵疏封式崇儒術先儒髙堂子三十五位生魯郡人索隱曰字伯傳儀禮十七篇后蒼戴慶等明其業唐貞觀從祀宋大中祥符追封萊蕪伯宋周起贊秦厯告窮炎靈啓祚篤生令人允貞王度名教斯宗禮文有素勒封告成或昭餘裕先儒毛子三十六位萇趙人漢河間獻王博士大毛公享之子受詩號小毛公著毛詩故訓二十卷詩傳十卷馬融賈逵鄭康成皆宗之孔頴達為之傳唐貞觀從祀宋大中祥符追封樂夀伯宋王曾贊孔徒受業商也言詩研精詁訓誰其嗣之毛公興學永代師資疏封錫命禮治禎期先儒后子三十七位蒼字近君東海剡人漢宣帝博士從孟卿受禮説禮數萬言號后氏曲臺記授聞人通漢慶普戴聖又事夏侯始昌通齊詩著齊詩故訓二十卷詩傳三十九卷授翼奉匡衡蕭望之傳師丹伏理嘉靖九年從祀其聖門志贊東海通儒孟氏髙弟淹中古文獨詮祕三家傳業曲臺揚厲禮教珍崇褎然博士先儒杜子三十八位子春東漢河南人受周禮於