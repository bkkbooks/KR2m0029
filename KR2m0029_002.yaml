寓志農圃以暌仁義學稼之辭豈姑舍是楊億贊學優乃仕齒于家陪戎車為右誓衆靡回質疑辨問仁智既該建侯追榮垂裕方來先賢公西子六位赤字子華魯人唐追封郜伯宋大中祥符加封巨野侯宋髙宗御製贊學者行道敝緼亦稱使齊光華偶為肥輕周急之言君子所令答問允嚴理著先經王嗣崇贊翊聖賢者徂徠之英謙言小相終成大名立朝儒雅出使光榮佐佑禮法諸侯作程先賢梁子七位鱣史記注云一作鯉字叔魚家語齊人唐追封梁伯宋大中祥符加封千乘侯宋髙宗御製贊室家壯年無子則逐見於信史全齊之俗原本厥初師言可復以學則知揆之宜篤周起贊玄聖舊邦森然精爽於惟子魚式瞻遺像紀號停鑾侯封錫壤儒道有光百王所仰先賢冉子八位孺史記字子魯一作曾家語作冉儒魯人字子魚唐追封紀伯宋大中祥符加封臨沂侯宋髙宗御製贊紀伯子魯聖學是務勵已斯約好問乃裕周旋中規容止可度允矣昔賢後世所慕李維贊聖人之道一以貫之允矣子魯堂奧斯窺惟帝登岱克陳上儀追封侯社沂水之湄先賢伯子九位虔家語字楷一作子析史記字子折魯人唐追封聊伯宋大中祥符加封沭陽侯宋髙宗御製贊有懷子折全魯之彥儒行既名聊伯乃建兢兢受道奕奕峩辨懿選嘉封世享馨薦王曾贊肅肅魯堂侁侁闕里伯氏達者克肖夫子運偶慶成禮崇追美後學式瞻髙山仰止先賢冉子十位季字子産魯人唐追封東平伯宋大中祥符加封諸城侯宋髙宗御製贊東平子産姓著盛時奉師於孰講道之微答問甚敏淵妙以思升降陛廉尚想英姿李維贊冉子挺生鍾是純粹遊聖之門切磨道義時邁升中禮成肆類錫壤諸城式昭遺懿先賢漆雕子十一位史記哆字子斂鄭云魯人家語作漆雕侈唐追封武城伯宋大中祥符加封濮陽侯宋髙宗御製贊子斂受封爰居武城亹亹其聞翩翩其英摳衣時習願學日明誕敷孔教爵里疏榮戚綸贊闕里稱賢哆也其一學以適道名參入室昔為逹者今逢聖日俾侯濮陽膺兹寵秩先賢漆雕子十二位史記徒父家語作漆雕從字子文髙宗贊作子期魯人唐追封須句伯宋大中祥符加封髙苑侯宋髙宗御製贊遐思子期挾䇿聖帷涉道是嗜微爵可縻在德可賢在名乃垂洋洋之風逮今四馳陳彭年贊受教聖人服勤墳籍如彼時術故能日益元封慶成介圭近錫圖形繪素鏤美金石先賢商子十三位澤家語作字子秀史記作子季魯人唐追封睢陽伯宋大中祥符加封鄒平侯宋髙宗御製贊邈矣子季睢陽是伯屏息受業延教登席未踐四科固涉六籍祀典載之好是正直刁衎贊子季從師服膺儒雅闕里垂名同於逹者昔寵睢陽今旌鄒野運偶登封薦臻純嘏先賢任子十四位不齊家語字子選史記字選楚人唐追封任城伯宋大中祥符加封當陽侯宋髙宗御製贊任城建伯其表曰選淑問雅馳才華清逺競仁力行曖日黽勉孔教崇崇令緒顯顯陳充贊荆山誕粹賢生其中服膺數仞誠明感通地邇長坂爵加素風虔遵祀典列在儒宫先賢公良子十五位儒字子正史記作孺張智贊稱子幼陳人唐追封東牟伯宋大觀加封牟平侯宋張智贊子幼真賢從師尼父服膺大猷希迹好古詩書災畬仁義干櫓匡蒲之役展也孔武先賢公肩子十六位家語公肩定字子仲史記作公堅定字子中文翁圖亦作子中鄭云魯人或曰晉人唐追封新田伯宋大觀加封梁父侯繩聖門志贊及門受業率稱異能子中樂道左凖右賜墻可跂由堂同升致志景迹外彪中弸先賢鄡子十七位史記鄡單字子家徐廣曰一云鄡單唐追封銅鞮伯宋大觀加封聊城侯按史記有鄡單無懸亶家語有懸亶無鄡單疑即一人以姓名相近而誤也其字則史記曰子家家語曰子象字亦相類何孟春以為宜補贈懸亶爵號别諸從祀張朝瑞以為宜從家語祀懸亶而罷鄡單存其説以俟考亶一作豐聖門志贊子家學孔容與不忒思以誠凝行將道翼涉彼玄津馳於聖域逴哉偉器惟陶斯埴先賢罕父子十八位史記罕父黑字子索家語作宰父黑字索一字子黑魯人唐追封乘丘伯宋大觀加封祈鄉侯按氏族略無罕父氏止有宰父氏其注云孔子弟子有宰父黑則宜從家語稱宰父子聖門志贊懿彼名胄因官為姓敬以束行鋭然希聖四教不騫六藝惟競庶幾逹者有道就正先賢榮子十九位史記旗字子祺家語作祈魯人唐追封雩婁伯宋大中祥符加封厭次侯宋髙宗御製贊伯兹雩婁務學實著三千之徒七十是預匪善莫行惟德乃據紀於前書式彰厥譽梅詢贊聖人之門學者侁侁彼美子祺行修志淳異端兹害微言服勤格於我宋侯封是新先賢左人子二十位史記左人郢字行家語作左郢字子行魯人唐追封臨淄伯宋大中祥符加封南華侯宋髙宗御製贊伯彼臨淄左行稱賢晞蹤十哲秀頴三千心恱誠服家至户傳樂只君子文聲益宣先賢鄭子二十一位史記鄭國字子徒正義曰家語薛邦字徒史記避髙祖諱薛字與鄭字誤也然則當稱先賢薛子矣今未敢擅改也魯人唐追封滎陽伯宋大中祥符加封朐山侯宋髙宗御製贊伯夫滎陽實惟令德優入聖門過不留迹道以目傳妙則心識猗歟偉歟後代之則陳知微贊懿彼子徒挺生闕里日逰聖門躬授微告德音孔昭令聞不已疏爵朐山式旌遺美先賢原子二十二位亢字子抗見闕里志家語作原桃字子籍文翁圖字籍史記作原亢籍正義亢作冗魯人唐追封萊蕪伯宋大中祥符加封樂平侯造聖門志贊不學將落聞道貴早斯人頴異動輒有身遊馨渚志契閫奧名誰與偕洋洋聖道先賢廉子二十三位潔史記字庸家語字子庸一作子曹鄭云衛人唐追封莒父伯宋大觀加封胙城侯宋髙宗御製贊兄弟之邦士有廉庸涵泳素教表揭儒宗杏壇探賾洙泗從容作興一時莒父其封先賢叔仲子二十四位會字子期文翁圖作噲家語魯人鄭云晉人唐追封瑕丘伯宋大中祥符加封博平侯宋髙宗御製贊瑕丘祚邑子期是為親訓有日廣業於時四教允隆五常以持比肩傑俊聞望斯垂劉鍇贊斯文有宗吾道不窮執筆迭侍惟賢比崇少成習慣函文順風東巡駐驆霈澤儒宫先賢邽子二十五位史記邽巽字子斂家語作邦選文翁圖作國選蓋亦避漢諱當稱曰先賢邦子然未敢擅改也魯人唐追封平陸伯宋大中祥符加封髙唐侯陛宋髙宗御製贊彼美邽子先聖是承墻仞已及堂將升良玉斯琢寒水必氷錫壤平陸茂實騫騰斯陳咨贊展矣子斂孔門髙弟模範將聖博約六藝謂達者顯於當世追封列侯流芳永裔先賢公西子二十六位公西輿字子上魯人家語及子由古史皆同史記作公西輿如唐追封重丘伯宋大觀加封臨朐侯宋范睢贊鍾美齊疆從師魯國展矣斯人道臻聖域禮墨金繩慶敷文德薦享侯封永光廟食先賢陳子二十七位亢字子亢一字子禽陳人唐追封潁伯宋大中祥符加封南頓侯宋髙宗御製贊惟禽之問從容其鯉求以異聞詩禮云爾請一得三誠退而喜且知將聖不私其子趙昌言贊於美子禽伏膺尼父問一得三垂訓千古名由實賔德以位序運屬封巒爵封介土先賢琴子二十八位牢家語字子開一字張文翁圖一字子張衛人唐追封南陵伯宋大中祥符進封頓丘侯政和改封陽平侯以宋髙宗御製贊多能鄙事聖人曲意惟其知之是不試宗魯雖友弔必以義尚師嘉言祀亦罔替攸宋綬贊反魯之始從師去里不仕故藝善言紀非義罷弔崇仁為美銘嶽益封用旌君子先賢步叔子二十九位乘字子車齊人唐追封淳于伯宋大中祥符加封博昌侯宋髙宗御製贊勉勉子車封邑淳于親炙避席唯諾趨隅發微既博雅道是扶抑可尚也不亦美乎張象中贊聖人之門子車服勤學以時習道宜日新數仞爰處函文是親追封遺烈旌美儒臣先儒左丘子三十位明魯人傳春秋杜預以為受經於仲尼唐貞觀從祀宋大中祥符贈瑕丘伯政和改中都伯嘉靖中釐改稱先儒後同旨宋理宗御製贊猗歟左氏聞道素王依經作傳微用彰詞有餘韻人希末光慶封錫壤廣魯之疆先儒公羊子三十一位髙齊人傳春秋或云子夏門人唐貞觀從祀宋大中祥符追封臨淄伯宋眺迥贊髙也解經辨惑咸服學宫所傳齊名左穀追奬肇封衆心允屬闕典彌縫斯文載郁先儒伏子三十二位勝字子賤鄒平人正義云即子賤之後為秦博士壁藏尚書至漢初傳鼂錯後有大小夏侯之學唐貞觀從祀宋大中祥符追封乘氏伯齒宋楊億贊伏生明經為泰博士祖習微言流離耊壁藏其文口授厥旨建號旌儒錫爵仁里先儒子國子三十三位安國字子國孔子十一世孫漢臨淮太守傳尚書古文授都尉朝又訓古文論語作孝經傳及集孔子家語唐貞觀從祀宋大中祥符追封曲阜伯永宋錢惟演贊顯顯臨淮聖人之系訓傳遺文克示世繪像廟庭聿章善繼東巡受封是為褒異先儒董子三十四位仲舒廣川人漢江都膠西王相其學推明孔氏抑黜百家所著有春秋繁露數十篇天人三䇿及上疏條教百二十三篇元至順元年從祀後廢洪武二十九年封江都伯從祀成化二年改封廣川伯聖門志贊嬴秦灰燼炎精始然奮業下帷志不窺園天人方對江都遂遷一代醇儒世濟其賢先儒王子三十五位通字仲淹龍門人隋文帝仁夀中逰長安奏太平䇿不用隱居河汾纍徵不就著禮論樂論各十卷續書二十五卷續詩贊易各十卷元經十五卷中説十卷門人私諡曰文中子嘉靖九年從祀聖門志贊稟靈博逹濳心典墳䇿上太平教洽河汾憂厪皇綱羽翼斯文房魏繩之有光龍門先儒周子三十六位惇頥字茂叔道州營道人宋虞部郎中廣南東路提點刑獄著太極圖通書二程受其學學者稱濂溪先生嘉定諡元淳祐封汝南伯從祀元至順加封道國公宋朱熹贊道喪千載聖逺言湮不有先覺孰開我人書不盡言圖不盡意風月無邉庭草交翠先儒歐陽子三十七位修字永叔廬陵人宋參知政事太子少師贈兖國公諡文忠所著有易童子問二卷詩本義十二卷唐本紀表志七十五卷五代史七十四卷及文集雜著行世嘉靖九年從祀聖門志贊畫荻受學黜浮崇雅道契孟韓文追班馬朋黨有辨史筆豈假龍圖元老命世長者先儒張子三十八位載字子厚郿人宋同知太常禮院著東西銘正蒙學者稱橫渠先生嘉定諡明淳祐封郿伯從祀宋朱熹贊蚤脫孫吳晚逃佛老勇撤臯比一變至道精思力踐妙契疾書訂頑之訓示我廣居先儒程子三十九位頥字正叔皓弟宋崇政殿説書著易傳春秋傳學者稱伊川先生其門人著者有謝良佐遊酢吕大臨大鈞尹焞楊時嘉定諡正淳祐追封伊陽伯從祀元至順二年加封洛國公宋朱熹贊規圓矩方繩直準平允矣君子展也大成布帛之貴文菽粟之味知德者希孰識其先儒胡子四十位瑗字翼之泰州海陵人宋太常博士天章閣侍讀諡文昭蘇湖學規為世所稱其遺書有胡氏口義學者稱安定先生嘉靖九年從祀領宋范仲淹贊天地儲精山川育秀孔孟衣鉢蘇湖袖道學正傳體用善誘雅飭化風澤流于後先儒朱子四十一位熹字元晦婺源人學於李侗習諸儒大成所著有易本義啓蒙蓍卦考誤詩集傳論孟集注學庸章句或問太極圖通書西銘解楚辭集注辨證韓文考異所編次有論孟集議孟子指要中庸輯略孝經刋誤通鑑綱目名臣言行録家禮小學近思録程氏遺書伊洛淵源儀禮通解其門人著者黃幹李燔劉爚張洽陳淳李方子黃皓輔廣蔡沈仕宋煥章閣待制嘉定諡文贈寶文直學寶慶贈太師信國公紹定改徽國淳祐從祀元至正改封齊國公髙元吳澄贊義理玄微繭絲牛毛心胸開豁海濶天豪傑之才聖賢之學景星慶雲泰山喬嶽先儒吕子四十二位祖謙字伯恭婺州人宋南渡倡道東南所著有春秋博議讀詩紀易説書説閩範官針辨志録大事記宋朝文鑑世稱東萊先生仕終著作郎嘉泰諡成嘉熙改諡忠亮景定二年追封開封伯從祀聖門志贊敏才睿質博學宏詞祕獵千古和鬯四時朱張則友關洛我師中原文獻東浙蔡先儒蔡子四十三位沈字仲默建陽人元定次子學於晦痷隱居不仕所著有書傳及洪範皇極內篇世稱九峰先生正統元年從祀成化三年追封崇安伯諡文正篇聖門志贊近述父師逺崇聖賢洪範衍數洛誥著探賾索隱發微鈎玄帝典王謨匪公誰詮先儒羅子四十四位依部文置此别有考定從彥字仲素南劒州人受學於楊時仕博羅主簿所著有遵堯録春秋解及指明毛詩解中庸語孟説學者稱豫章先生淳熙七年諡文質萬厯四十二年從祀李之藻贊聞道汗浹不虛此生任重詣極濳思力行羅浮髙隱山斗並欽遵堯有録周孔之心先儒真子四十五位德秀字景元更字希元浦城人宋參知政事諡文忠其學宗朱子所著有大學衍義讀書記文章正宗唐書考疑心政二經西山甲乙稿對越甲乙集經筵講義端平廟議獻忠集江東救荒録清源雜志星沙集志學者稱西山先生正統元年從祀成化三年追封浦城伯聖門志贊玉立長身鐘吕大器骯髒詞翰沉濳仁義黨錮既開善彚復熾斯文正宗千秋赤幟先儒薛子四十六位瑄字德溫河津人國朝禮部侍郎兼閣學諡文清所著有讀書録河汾集學者稱敬軒先生隆慶五年從祀誰楊廉贊本朝理學實始於公求之于宋若濂溪翁得其傳欲考無從復性之教最為有功孔孟程朱平生所宗讀書有録無理不窮大露天機豁我顓蒙先儒王子四十七位守仁字伯安餘姚人兵部尚書新建伯贈侯諡文成學以致良知為宗所著有傳習録及文成全集學者稱陽明先生萬厯十二年從祀覺聖門志贊蠖屈龍場獄究性術一脈良知千載先武戡濞戊學幟虔吉傳習有訓斯文彀率先儒陳子四十八位獻章字公甫新會人聘授翰林檢討不就學者稱白沙先生所著有白沙集萬厯十二年從祀楊廉贊有評象山吾嘗竊識儒以為禪佛謂無是公學所期自得為至箋經著書非其所事平生議論詩以見意此即語録無所隱祕堯夫法門懷卷遁世右西廡前朝之祀凡五十三位共十三壇今四十八位分十六壇舊有公伯寮秦冉戴聖賈逵馬融何休王弼今俱黜而蘧瑗林放鄭玄范寧及宣德間增祀之吳澄俱改祀於鄉顔無繇改入啓聖祠配享又去申黨共損十四人益董仲舒歐陽修胡瑗羅從彥吕祖謙真德秀薛瑄王守仁陳獻章九人家語衛將軍文子問於子貢曰吾聞孔子之施教也先之以詩書導之以孝弟説之以仁義觀之以禮樂然後成之以文德升堂入室者七十餘人其孰為賢子貢曰夫能夙興夜寐諷誦崇禮行不二過稱言不苟是顔回之行也在貧如客使其臣如借不遷怒不深怨不録舊罪是冉雍之行也不畏強禦不侮矜寡其言循性材任治戎是仲由之行也恭老恤幼不忘賔旅好學博藝省物而勤是冉求之行也齊莊而能肅志通而好禮擯相兩君之事篤而有節是公西赤之行也滿而不盈實而若虛過之如不及其德敦其於人無所不信其驕人也常以浩浩是曾參之行也美功不伐貴位不喜不侮不佚不傲無告是顓孫師之行也送迎必敬上交下接若截焉是卜商之行也貴之不喜賤之不怒苟利於民矣廉於行已是淡臺滅明之行也先成其慮及事而用之故動則不忘是言偃之行也獨居思仁公言仁義其於詩也一日三復白圭是南宫縚之行也自見孔子出入於户未嘗越履往來過之足不履影啓蟄不殺方長不折執親之喪泣血三年未嘗見齒是髙柴之行也又史記令尹子西謂楚昭王曰王之使使諸侯有如子貢者乎輔相有如顔回者乎將率有如子路者乎官尹有如宰豫者乎其他評隲大氐載在論語而其顯有年名事迹者自遷史所紀三十五人而外亦不多見緣夫尼山誕聖英哲飈從化雨春風鼓鑄自異諸皆出為國華潛為士楷宫牆俎豆有其舉之庸可得而廢乎又考孔叢子載孔子四友顔回胥附端木賜奔走顓孫師先後仲由禦侮尸子云仲尼志意不立子路侍儀服不修公西華侍禮不習子貢侍辭不辨宰我侍忘忽古今顔回侍節小物冉伯牛侍則皆功資聖學所謂七十子鑄孔子者殆非虛語而諸賢其尤為表表者所以十哲之祀視之兩廡稍存差别然而宰我冉有與夫補入子張之祀世猶得而議焉南宋咸淳升躋顔子議者欲晉有若以補十哲祭酒某獨持異議遂躋子張夫孔子殁子夏子遊子張欲事有若兹令張也升堂而回視所欲北面之有若乃在廡下於義或不安乎蔡氏清亦云然且謂晉子張抑有若崇冉求未服萬世士人之心而鄭氏曉王氏世貞亦不滿於求我堂上之祀鄭謂宜晉有若及公西赤王謂宜晉有若及南宫適其言各有所據雖然十哲亦何為者是乃陳蔡共難一時之目非聖門定評也聖門定評則家語子貢之論殆庶幾焉而開元君臣初不深考第祀所謂十哲旋附曾子位於十哲之次以與二十一賢並祀其餘弟子有繪無祀五代因之逮宋通祀諸賢於兩廡而十哲名目似可母設乃復因仍舊貫堂廡區分晉哲於配晉廡於哲欲取盈於十人之數夫唐增曾子既已溢為十一宋躋顔子何妨額儉九人要之據禮參詳哲廡不須強别並是千古師儒欽崇秩祀而後學更評優劣榮辱施之神其歆此否乎惟是弟子闕遺有可議者左傳昭公七年孟僖子屬説與何忌於夫子而學禮焉故孟懿子與南宫敬叔師事仲尼則何忌固弟子也論語注孺悲嘗學士喪禮於孔子是悲亦弟子無疑而家語懸亶張氏朝瑞謂即史記之鄡單一字子家一字子象字亦相類宜從家語祀亶而去單理或宜然秦冉顔何以不見於家語故裁然顔裔之推真卿俱稱孔門顔氏有八若去顔何則繇回刻辛噲僕柤僅得七人不滿八人之數又史記載顔何字冉索隱注引家語字稱此則家語原有顔何不當黜祀明也其秦冉顔何疑為字畫相訛亦屬臆度不可為據至於公孫尼子作樂記緇衣篇業已吐辭為經而廡祀未暨是可不謂闕典乎哉又鄉飲禮又序點公罔之裘與子路比肩揚觶或亦弟子之列併論語所載孟武伯林放孟子所述牧皮似皆及門之士而歷代封祀率未詳及其近世儒先屢議未決者在唐有孔頴達宋有范仲淹遊酢謝良佐吕大臨胡宏魏了翁楊簡元有劉因金履祥國朝有陳真晟章懋羅倫曹端吳與弼羅洪先鄒守益湛若水王艮大都尚需論定兹不具述又有謂諸葛亮文天祥亦堪從祀者夫文山成仁取義不愧孔孟武侯淡泊寧靜學術無疵但於承先啓後之功未知何若而武侯輔蜀戎馬劻勷其於儒術表章曾不若黃初一詔猶知毖祀以此而觀侑祀孔庭恐其心尚有所未安也考定兩廡位次疏藻按四配十哲兩廡其祀分為三則似以道德為之甲乙夫十哲之必賢於兩廡也非末學所敢深論矣至於同在兩廡考其次序固宜德同論世世同論齒然而亦不盡然史記所載有子少孔子十三嵗蓋自顔路而下年似最長乃在東第七位居其上者尚有十二人公孫子石少孔子五十三嵗年似最少乃在東第十一位居其下者尚有四十人此猶云史有年嵗者僅三十五人其餘不可得而考也淡臺子羽東第一位少孔子三十九嵗宓子賤西第一位少孔子四十九嵗其年皆少次東二位原思西二位公冶長東三位南宫子縚西三位公晳哀史不載年姑置弗論至東四位商子木則少孔子二十九嵗西四位髙子羔則少孔子三十嵗其年固皆長於第一人也而倒置乃爾此類甚多是又未盡論齒不審位次終奚據也如以為據家語七十二子之序則家語首子羽次子羔子賤樊遲有子子華原思如以為遵闕里志則其志首子羽次子賤南宫公冶原思公晳如以為循史記則自子羽至子開同者不過九人此後亦復更置且史記所載自子石以右三十五人顯有年名聞見於書傳者為一列自冉子産以後不見書傳者四十二人又為一列固未可據其先後即以定諸賢之位次如謂稍以德業差序則尚論二千年以上載籍湮滅嘉言懿行大率無徴意自開元從祀之初原未加意考定亦不依據何書漫入祠令遂爾歷代相沿今則載之令典又經嘉靖重頒為下不倍聞貴闕疑惟有肅遵祼將誰敢意為更正但以兩廡會同校其朝代先後之概則其序置舛錯終亦有不安於心者如公羊乃周末齊人而居西三十一則躐東三十二之申棖伏勝秦人而居西三十二則躐東三十三之顔噲孔安國仕於漢武而在周末穀梁之前董仲舒亦仕武帝而在漢初髙堂生之上文中子隋人也而躐毛萇周茂叔歐陽永叔皆宋儒也而周躐后蒼歐躐杜子春是西漢降於隋宋矣橫渠又躐韓昌黎是唐降於宋矣永叔為安定作墓表稱為先生而越居其上者六位康侯生於熙寧距安定之卒十五年而禮樂志改定位次安定之主反下康侯七位又永叔乃濂溪前輩而濂溪之位會典先歐二位禮樂志先歐十一位君實亦二程前輩而會典乃反遜程四位又伊川之越明道則以弟先兄元晦之越司馬則以南宋先汴宋薛敬軒生於洪武而越宋寧時之陸子靜陽明生當嘉靖而越勝國之許平仲近年躋祀羅仲素李願中部議位次亦不深考漫云列楊時下頓使朱元晦吕伯恭蔡仲默皆以後學躐踞其上而朱則親受業於李者也其他稍稍倒置尚不具論令諸先生在廟之靈幸或陟降而生則服膺其訓殁乃僭躐其祀能晏然於此否耶大都議祀典者初既鮮所考訂後皆習於因循凡有移祀改祀革祀增祀苐以原列東西兩廡為定東則躋東西則躋西曽不考世論年東西遞互升祔故東廡二十八位之顔何點即以其次狄黑居之不復移西二十八位之叔仲會以補其位西廡第六位之公伯寮黜即以其次樊遲居之不復移東七位之司馬牛以補其位東廡之移祀改祀革祀者僅曾晢顔何荀况劉向鄭衆盧植服虔王肅杜預九人而西廡則顔路蘧伯玉林放秦冉申黨公伯寮戴聖賈逵馬融鄭玄何休王弼范寧吳澄凡十四人多寡之數既懸東西之列一定循次魚貫即古今世代之凌躐亦不復計蓋泥於殷周宗廟之制昭常為昭穆常為穆不以南北遞遷以為禮煩則亂遵古為簡不知諸儒從祀率皆隔世寥逺初無祖孫父子之親寧拘昭穆即以昭穆論明道伊川兄弟亦何不同昭同穆而東西相望又復長幼易序吾不知於古禮有合否也古禮先聖東嚮先師一位配之南嚮三獻官皆西嚮開元王祀孔子始改其位南嚮而以顔子西嚮獻官序立東廡前行禮至宋漸增孟子及曽子子思為四配然而四配亦皆東坐西向也朱子滄洲精舍釋奠儀亦然蓋西為先聖舊位避不敢居今四配東西對列非其舊矣禮時為大則兩廡亦以對列為敘而尊卑從此定焉東西遞互遷躋復又何疑今既不可較量爵秩以傷尚德之雅又不敢軒輊德行以恣月旦之評獨有論世論齒於義為允秦漢隋唐其世可考宋元以來譜傳更詳不揣稍為校正以待將來誼存齒學或亦可行惟七十二子之齒載籍舊多遺脫即載在家語史記者彼此亦有互異如子遊子羽子羔樊遲各差十年有子差二十年叔魚差七年大抵難據自施子以上應姑仍舊但改祀黜祀者東西通融移補其東三十一位之秦非冝晉二十九位而以申顔次之以列秦漢諸儒之前其餘序列如左兩廡對列考定位圖東一位淡臺子滅明西一位宓子不齊東二位原子憲西二位公冶子長東三位南宮子適一此下改祀位曽點西三位公析子哀此下改祀一位顔無繇東四位商子瞿西四位髙子柴位此下黜一公伯寮東五位漆雕子開西五位司馬子耕東六位樊子須西六位有子若東七位公西子赤西七位巫馬子施東八位梁子鱣西八位顔子卒東九位冉子孺西九位曹子恤東十位伯子虔西十位公孫子寵東十一位冉子季西十一位秦子商東十二位漆雕子哆西十二位顔子髙東十三位漆雕子徒父西十三位穰駟子赤東十四位商子澤西十四位石作子蜀東十五位任子不齊西十五位公夏子首東十六位公良子孺西十六位后子處東十七位奚容子蒧西十七位公肩子定東十八位顔子柤西十八位鄡子單東十九位勾井子強西十九位罕父子黑此下黜一位申黨東二十位秦子祖西二十位公祖子句茲東二十一位榮子旗西二十一位縣子成東二十二位左人子郢西二十二位燕子伋東二十三位薛子邦西二十三位顔子之僕東二十四位原子亢西二十四位樂子咳此下黜一位顔何東二十五位廉子潔西二十五位叔仲子會東二十六位狄子黑西二十六位邦子選東二十七位子蔑子忠西二十七位公西子輿如此下改林放祀二位蘧瑗東二十八位公西子蒧西二十八位施子之常東二十九位秦子非西二十九位陳子亢東三十位申子棖西三十位琴子張東三十一位顔子噲此下改杞一位孔鯉黜一位荀况西三十一位步叔子乘以上先賢但仍舊東西遞進不敢更東三十二位左丘子明此下位次更注定故改黜不悉西三十二位公羊子髙東三十三位榖梁子赤上周末以西三十三位伏子勝東三十四位髙堂子生上秦漢間人以西三十四位董子仲舒帝博士漢景東三十五位子國子安國西三十五位毛子萇上武帝時人以東三十六位后子蒼帝時人宣西三十六位杜子子春至明帝時人哀平東三十七位王子通人隋西三十七位韓子愈人唐東三十八位胡子瑗宋太宗淳化癸巳生西三十八位歐陽子修真宗景德丁未生東三十九位邵子雍大中祥符辛亥生西三十九位周子惇頥禧丁巳生天東四十位司馬子光天禧己未生西四十位張子載天禧庚申生東四十一位程子皓仁宗明道壬申生西四十一位程子順明道癸酉生東四十二位楊子時皇祐癸巳生西四十二位胡子安國宗熙寧甲寅生神東四十三位羅子從彥豐生元西四十三位李子侗哲宗元祐癸巳生東四十四位朱子熹髙宗建炎庚戌生西四十四位張子栻紹興乙卯生東四十五位呂子祖謙興丁巳生紹西四十五位陸子九淵興己未生紹東四十六位蔡子沈孝宗乾道丁亥生西四十六位真子德秀東四十七位許子衡宋寧宗嘉定生西四十七位薛子瑄皇明洪武己巳生東四十八位陳子獻章德戊申生宣西四十八位胡子居仁德甲寅生宣東四十九位王子守仁化壬辰生成從祀先賢辨仲尼弟子子貢擬於辨士貽亂齊霸越之譏宰我溷於闞止蒙作亂見誅之謗以彼誼存宗國忠衛其君乃受厚誣若此抑或者賜不受命豫訿何誅聖人固豫卜其後而教敕之若所擬於行行之由者乎然才辨所使義激之過固當異於中行觀過知仁不足深辨前人亦曽辨之其姓名承誤者以薛邦為鄭國以邦選為邽巽考之家語薛邦字徒邦選字子斂紀載甚明而司馬貞史記索隱亦為之辨曰漢人諱邦為國也又曰文翁圖作國選亦避諱也以字繹之訛薛為鄭緣以左􅎧作右邑𨽻文之誤今兩廡未改尚稱鄭邽業有知其誤者亦不足辨獨是公孫子石家語稱公孫寵衛人史記則稱公孫龍俱不詳其事實然俱載少孔子五十三嵗史記孟軻傳附及趙有公孫龍為堅白同異之辨而繼之云或曰並孔子時或云在其後則堅白同異之公孫龍亦未敢信謂受業孔氏之公孫龍也至索隱則直以為仲尼弟子矣而又曰此云趙人弟子傳作衛人鄭玄云楚人各不能知其真似猶有傳疑之意焉乃宋人不復置疑大加排詆近儒尊宋遂謂當黜其祀以理論之堅白同異俶詭不倫盜名惑世允為吾道之賊但子石躬事聖人身通六藝不應任誕乃爾循循善誘亦豈其無所取裁而置不屑教以至於是即流弊不同如吳起初事曾子荀卿𣲖出子夏誠不可知然亦聖逺言湮壞於再傳數傳之後未有身親受業而末路詼邪詖淫畔道如白馬非馬之談者又孔子玄孫穿與公孫龍論臧三耳龍不能屈既與玄孫同時其去孔子必逺何緣得及門牆而與遊夏之徒並稱弟子乎於稽其年龍少孔子五十三嵗孔子生於周靈王二十一年庚戌則龍生敬王二十二年癸卯距周赧王之立已一百八十四年而龍為趙公子平原君之客平原君以赧王五十七年合楚魏之師以存邯鄲而龍於是時沮虞卿之請封夫使其為仲尼弟子子石也者夀殆二百四十餘嵗恐無是理家語弟子籍出孔子古文當可信所紀公孫寵衛人者良是寵與龍其名既異衛楚又異春秋戰國又異明係先後兩人而以遷史一字之謬索隱因合為一人以誤後學事之可哂莫過於此即云子石少事孔子晚年及與穿遊然孔子殁於敬王四十年壬戌距是時亦二百餘年子思孔子問答儒者尚疑未信而况穿又七世之孫哉抑或彼子石者延齡久視有出常理之外亦安得龍鍾垂暮之年而尚曳裾侯門與後生輩競其齒吻若謂子石實龍非寵家語誤載然古今人同名者亦自不乏漫焉訛以傳訛正如詭篡夏之羿於陶唐詫殺人之參於曾母疑叩馬之伯夷復典禮於虞廷稱堯命之羲和經迎策於黃帝流言止於智者此之謂矣猶幸嵗月不磨史册可據如法言之揚雄畢竟非劇秦美新之揚雄士人忽考究輕詆訿又易隨聲附會遂使吾孔氏之徒與衍奭尸恔慎到淳于髠之流同類而蒙詬者一千六百餘年豈不悲哉張守節正義公孫龍子十四篇顔師古云即為堅白之辨者蓋亦未敢執為仲尼弟子也蓋其誣自小司馬始啓聖祠原始宋真宗大中祥符元年十一月封泰山幸曲阜謁文宣王廟幸叔梁紇堂命官分奠追封齊國公顔氏魯國太夫人伯魚母幵官氏鄆國夫人封文宣王父母詔曰朕以祇陟岱宗親巡魯甸永懷宣聖之德躬造闕里之庭奠獻周旋欽崇􅊀至惟降靈之所自亦錫羡之有初像設具存名稱斯闕宜加追命以煥典章叔梁紇宜追封齊國公顔氏宜追封魯國太夫人遣都官員外郎王勵精虔祭告封鄆國夫人詔曰朕時巡魯郡躬詣孔堂顧風教之所尊舉典章而既渥眷惟令淑作合聖靈載籍簡册之文尚闕封崇之數屬兹咸秩特示追崇垂厥方來式昭遺範幵官氏宜追封鄆國夫人仍令兖州遣官詣曲阜廟祭告元仁宗延祐三年七月追封孟子父為邾國公母為邾國宣獻夫人文宗至順二年九月加封叔梁紇啓聖王顔氏啓聖王太夫人幵官氏為大成至聖文宣王夫人詔曰闕里有家系出神明之胄尼山請禱天啓聖人之生聿觀人文敷求往哲維孔氏之有作集羣聖之大成原道統則堯授舜傳至周文王論世家則契至湯下逮正考父其明德也逺矣故生知者出焉有開必先克昌厥後如太極之生天地如巨海之有夲源雲仍既襲于上公之封考妣宜視夫素王之爵於戲君子之道考而不謬建而不悖於以敦典而敘倫宗廟之禮愛其所親敬其所尊於以報功而崇德尚篤其慶以相斯文齊國公叔梁紇加封為啓聖王魯國太夫人顔氏加封啓聖王太夫人加封大成至聖文宣王夫人詔曰我國家惇典禮以彌文本閨門而成教乃眷素王之廟尚虛元嫓之封有其舉之斯為盛矣大成至聖文宣王妻幵官氏來嬪聖室垂裕世家籩豆出房自流風於殷禮琴瑟在御存燕樂于魯堂工言邈若於遺聞儀範儼乎其合德作爾褘衣之像稱其命鼎之名窗秩秩彜倫吾欲廣關雎鵲巢之化皇皇文治天其興河圗鳳鳥之祥可特封大成至聖文宣王夫人順帝元統三年五月贈顔子父無繇為杞國文裕公母齊薑氏為齊國端獻夫人妻宋戴氏為兖國貞素夫人改塑杞國公像冕九旒服九章杞兖二夫人各建殿祀於曲阜國朝世宗肅皇帝嘉靖九年令兩京國子監及天下學校通建啓聖祠祀孔子父叔梁紇以先賢顔無繇曾點孔鯉及孟子父激公宜配享堂上宋儒程珦朱松蔡元定俱從祀兩廡先是𢎞治元年吏部尚書王恕請立祠廟祀啓聖王以杞國公顔無繇萊蕪侯曾點泗水侯孔鯉邾國公孟孫氏配享永平伯程珦獻靖公朱松從祀大扺因侍講學士程敏政之議禮官持不可遂已十四年侍郎魯鐸復議如前亦不合至是從輔臣張璁之請詔天下學校俱建啓聖祠其配享從祀俱如前疏又用桂華議併蔡元定從祀程桂議見前釐正疏今上萬厯二十二年增周輔成從祀啓聖祠從湖廣撫按郭惟賢等議也藝藻按孔庭從祀賢儒蓋有三等親炙聖門身通六其一道德著聞人倫師表其二綜述遺經發明聖教其三即今見在祀典諸儒固無論已罷祀若鄭玄鄭衆盧植服虔范寧皆經師也吳澄人師也而嘉靖釐正惠罷而祀於其鄉周氏輔成品概經術視諸子不知何如而從祀啓聖乃遍於天下之學校議禮者似嚴於孔庭之侑食而稍寬於啓聖之錫類也末學不敢妄議苐謂人師經師若康成草廬者而已祀復罷又如唐之孔頴達宋之遊吕胡楊國朝之吳曹羅湛諸君子允為一代儒英率能闡翼遺經紹明聖統然而不得與程朱周三子之父共歆秩祀萬世學者儻亦有入廟興感而致疑於軒輊之未審者乎位次正祀啓聖公孔氏叔梁紇鄹大夫黃帝之後至帝嚳生契封於啇賜姓子氏以帝乙之長子微子啓受周封為宋公四傳至湣公共生弗父何讓國於弟而世為宋卿其曽孫正考父三命滋益恭者也生孔父嘉始以孔為氏嘉生木金父避華督之難奔於魯金父生祈父祈父生孔防叔為防大夫是生伯夏伯夏生叔梁紇紇九女而無子其妾生長子曰孟皮有足疾不任繼祀乃求婚於顔氏顔氏禱於尼山以魯襄公二十二年十一月庚子生孔子即周靈王之二十一年也宋大中祥符元年封孔子父叔梁紇為齊國公元大德十一年加封啓聖王國朝因之嘉靖九年改今稱書聖門志贊水精慶祚勇力長驅神監尼阜瑞吐玉丹山威鳳滄海明珠啓聖百代天壤與俱配享先賢顔氏東一位史記顔無繇字路家語作顔繇字季路為魯卿士孔子始教於闕里而受學焉娶齊薑氏生子回為聖門髙弟唐開元贈杞伯從祀孔庭宋大中祥符加封曲阜侯元元統加封杞國公諡文裕嘉靖九年改今稱祀啓聖祠為宋髙宗御製贊人誰無子爾嗣標竒行為世範學人師請車誠非顧匪其私千載之下足以示慈請丁謂贊素王將聖實為我師顔子殆庶趨庭學詩車無愧陋巷安卑追榮侯服逢此上儀先賢曾氏西一位家語曽點曽參父字子晢史記作曾蒧字晢唐贈宿伯從祀孔庭宋大中祥符加封萊蕪侯嘉靖改從今祀膺宋髙宗御製贊惟時義方有子誠孝怡怡聖域俱是道暮春舞雩詠歌至教師故與之和恱宜紹冉丁謂贊侍坐魯堂各言其志舍瑟而對超乎季浴乎舞雩詠歌道義遇我慶成錫壤進位先賢孔氏東二位鯉字伯魚孔子年十七娶宋之幵官氏二十仕魯委吏生伯魚適昭公以鯉魚賜孔子遂名鯉榮君賜也先孔子卒宋崇寧贈泗水侯咸淳從祀孔庭嘉靖改從今祀聖門志贊商王啓祚微子開先周召是訓詩禮並傳父作至聖子述上賢天倫慶殖奕葉萬年先賢孟孫氏西二位激公宜魯公族也娶仉氏生軻三嵗而孤母有三遷之教今鄒縣孟廟有斷機堂祠焉元延祐中封亞聖父邾國公母邾國宣獻夫人嘉靖從祀孟孫氏於啓聖祠髙士傳孟母贊母何聖善能教則然墓市學宫非可屢遷女士若休示學靡全成此名儒莫由已焉兩廡從祀先儒程氏東一位珦字伯溫洛陽人皓頥之父也克己為義內行惇飭崇正闢邪倅南安軍識周茂叔於獄掾而友之使二子受學焉熙寧時以詆新法罷仕終大中大夫贈永年伯嘉靖九年祀明張朝瑞贊束身飭行嗇已寵義歷官一介成子兩驥清節表世新法抗議甲會熙恬公參其四先儒朱氏西一位松字喬年婺源人熹父也嘗師羅從彥紹興官吏部員外郎兼史館校勘以詆和議出補旋卒學者稱韋齋先生元至正追諡獻靖尋封齊國公嘉靖九年祀聖門志贊早挾才思尋酣道腴追宗河洛抗直權輿授子三友為世大儒標美父鵠蔚然華荂先儒蔡氏東二位元定字季通建陽人沈之父也薦召不仕事晦菴以黨禁死道州所著有律吕新書燕樂原辨皇極大玄潛虛指要洪範解八陳圖説大衍詳説嘉定中贈迪功郎諡文節學者稱西山先生嘉靖九年祀聖門志贊學嘗啖薺行不愧影説理精瑩涉道要領腹笥百家情田萬頃箕裘者三丹青彪炳先儒周氏西二位輔成道州營道人惇頥父也仕桂嶺令萬厯二十二年以楚中撫按言列從祀張朝瑞贊周族繁衍營道為盛昆友聯翩諫議獨敻六舉成名花封試政篤生碩儒爼豆啓聖祀典存疑藻按宋以來顔曾子思配享堂上顔路曾晳伯魚從祀兩廡自洪邁姚燧以為崇子抑父而熊禾遂謂宜别設一室祀叔梁紇遷三子以配焉我朝程敏政亦主其説嘉靖釐正業已通行無庸異議然而尚有疑者孔庭從祀四配尚矣十哲次之兩廡漸降至啓聖祠推及所生似又降焉以曾晳學見大意欲修禮教夫子善之顔路魯之卿族少夫子六嵗而能折節受業子淵之死至不能具槨以請子車此其羔羊素絲之節與夫師友一體之誼有可想見然則二賢之在聖門固俱所謂髙足弟子也維子之故而俾之侑享别祀曽不得躋於公夏句井諸公以寓目於金聲玉振之樂似與近世貤封之貴若是班者他弗具論曾子之孝也而忍逺其親以已之賢而降其祀躬侑乎四配之列以為榮殆必不然即顔氏一姓廡祀六人安知其中不更有父兄在而獨遷顔路此亦顔子之心所未安也唐以前苐配顔子固以好學不惰殆庶之詣獨冠羣賢故耳其餘有繪無祀暨貞觀乃列子夏於經師開元漸躋十哲元豐咸淳漸增四配而兩廡賢儒之祀遂遍天下於是乎子祀堂上父祀廡下之議興焉而抑孰知子祀廟庭父配别祠禮之隆殺非特堂上廡下之判而已乎王子充曰曽子子思仍宜降居父下是也然而無可以處顔子者顔子配食自曹魏正始迄今固不可降而曽思孟又皆聖道嫡傳四百年來與顔並配天下莫或以為非藉苐令配顔而降曾子降思孟萬世學者之心必不謂慊惟是配之為義則有可得而論者配者神之主也郊特牲云大報天而主日方氏以為天尊而無為故以日為之主猶之王燕飲則主以大夫王嫁女則主以諸侯是則所謂主也祭義云大報天而主日配以月陳澔以為有其祀必有其配猶祀社必配以勾龍氏祀稷必配以后稷氏是則所謂配也祭必有主所謂自外至者非主不止也主無二配所謂郊廟之尊明不敢瀆也有虞氏禘黃帝而郊嚳殷人禘嚳而郊冥周人圜丘之禘以帝嚳配感生之祭以后稷配曲禮疏云后稷為天地之主文王為五帝之宗則祀皆一配而已故西漢惟以髙祖配天東漢惟以光武配帝唐初三祖迭配至乾封並配而韋縚非之宋初二祖二宗迭配至皇祐以太祖太宗並配而楊畋非之開元嘉祐卒定一配之制我國朝諸大享祀恪遵古典亦僅一配而孔庭沿宋四配制獨異焉夫謂吾夫子之居歆藉諸賢為之主也將必不爾抑謂禮隆聖師誼同天道由卑達尊有取於配如祀天之必配以祖者乎則一之已足禮不貴多貞觀二十二賢開元十哲與夫進曾子於十哲之次當時第名從祀不謂配享殆猶行古之道而未可謂為未備之禮也竊思配之有四大抵以道統論自顔子而外曽思孟遞演宗傳是故祖仲尼而宗四配禮同宗廟制異郊丘則夫堂上之配自是後學隆道之懷非關昔賢展親之典敬有所專七十子俱望下風路晳伯魚即抑在兩廡亦無所拘必欲拘以分誼豈惟路之於回晳之于參伯魚之于伋彼七十子者大抵以子思視之皆父執以孟子視之皆前輩也而儼然躐踞其上雖倫殊父子而禮存齒胄則師友淵源之漸充類至義亦必有柅而今不盡論固知重在道統則廡祀俱可相安不必崇其子而故逺其父也且夫路晳伯魚以視激公宜則又有間矣觀孟母三遷之教於今為烈即激公宜刑家之範亦自可思躋祀非濫然而可以配啓聖未必可以班三子三子者品髙狂簡人為升堂入室之英學嗣箕裘祀有同堂異室之典以賢以齒兼以子為大賢即升之四配之上俾父子祖孫衎饗一堂以昭千古獨盛之典似不為過或者更可以妥聖賢之靈乎但配義無取於多而溢祀反嫌於瀆故昔宋景濂之議以為天下學校宜祀顔曾思孟其餘各及邦之先賢雖七十二子之祀在所當罷而苐於國學設之引唐開元禮國學通祀七十賢諸州但配先師顔子為證亦一義也苐有其舉之終莫敢廢今之配享既殊古典頗類宗祊而祭止春秋上丁亦非古者學官四時釋奠之禮竊謂宜倣景濂之意稍增飾之而春秋苐配顔曽思孟嵗卜一日進七十子於堂而通祀之如古者祫祭之禮而以路晳位於子淵子輿之上還伯魚於舊位暫以思孟居七十子之次餘儒仍祀兩廡祀畢則别為一室以藏其主誼或兩全顧不知其可行否也若疑復聖宗聖述聖亞聖之尊不宜更以先賢加乎其上則封號本自勝國聖賢亦豈以是為輕重哉每思兩廡羣賢自論語家語記載而外嘉懿泯滅師儒秉鬯大抵憶姓名於倣佛所稱几筵榱桷如見其人入戶愾然如聞嘆息者總不可強顧不如唐人僅祀經師誦其書修其祀典猶或申如在之敬也國朝崇儒議禮屢有損益欲妥三子之祀故增啓聖之祠實借啓聖之尊以見三子雖配他祠禮無貶於兩廡抑亦祀海先河明教天下以孝故與其增躋配位而道統不專母寧推尊叔梁而聖孝益廣廟謨淵微或者為是要於其當孔子萬世師也故天下學校可以通祀漢諸帝立廟郡國則議者率以為瀆啓聖之有祠有配有廡也以為隆吾孔孟程朱之道也歟哉乃孔孟程朱之道即羲軒堯舜湯文之道羲軒堯舜湯文此數聖人者實開道統之傳然自帝王廟一祀之外禮不推及所生即皇師帝師王師祀在文華殿亦非太常所領而獨以素王之徒當此推崇曠典蓋當年議禮諸臣一切推恩自出有不覺錫類之太廣焉者莊誦聖諭僭王號則削僭八佾十二籩豆則減雖禮意務極褒尊顧制節謹度其防不假而惜乎諸臣之仰承德意其稽考猶有所未盡也凡天下所以遍祀孔氏之徒者重其道也重道則必其纎悉之不違而道近瞿布衣亦不安於三賢啓聖之配又謂林放公孫尼琴張牧皮孟懿子武伯俱弟子當祀顔冉顔何不當黜王元美謂八佾十二籩豆不當減大成殿之名不當改與宋景濂位向庭燎獻醋諸議皆鑿鑿乎有據者存其概俟秉禮者審焉頖宫禮樂疏卷二
