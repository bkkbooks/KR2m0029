body:
  text: 頖宫禮樂疏卷十明李之藻撰鄉射禮疏六藝之教禮樂為急而射即次焉射者丈夫之所有事也古人祈子而帶弓韣生子而懸桑弧成童而教以射貢士而試以射一藝之細而自未孩以至旄期自士庶以至諸侯天子盡人殁齒以從事乎其間而聖人因而教之令其容體必比于禮節奏必比于樂戢其飛揚遠騖之志而束之以揖讓擎跽之儀又悅之以和平雅正之節俾其規規焉德是務究而憤盈之血氣常有所斂約而不得逞養德於是選士於是藝進於道力化於德武止於文而天下亦遂囿於禮陶樂和之化而非心驁志漸革而不自知竊謂成周之以射教也猶唐之詩賦宋之經義而今日制舉之文也皆所以籠馭英雄而弓旌辟致之使之屈志以就吾用而至其辨賢愚明長幼厚人倫美風俗則射之于教化也更為親切而其義更廣大而精深射與禮樂相比而行而庠序之教急焉彼御也書也數也均之為藝然而教化則緩故不以程士不以命有司聽有志者之自習之而已矣周禮鄉師正嵗稽鄉器黨共射器州長春秋以禮會民射于州序鄉大夫以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞和者六德之終容者六行之首主皮則射和容則禮興舞則樂六德之中惟問和六行之中惟問容六藝之中惟問禮樂射則聖王所以陶世範俗之旨固可思也益稷云侯以明之太甲云若虞機張往省括于度則釋盤庚云若射之有志蓋射藝自古重之而成周其制大備朝廷之上躬以習射倡焉將祭祀則射將養老則射諸侯來朝則射諸侯相朝則射燕使臣或與羣臣飲酒則射而總名則大射賓射燕射三等皆禮射也大射之禮不及於士燕射賓射士皆有之射人云射犴侯二正是士有賓射也鄉射記曰士布侯畫以鹿豕是士有燕射也而鄉射之禮又在三射之外其官則鄉大夫州長主之禮則皆士禮也是故隨處而可行也將大射必行燕禮將鄉射必行鄉飲酒禮燕禮所以明君臣之義鄉飲所以辨長幼之序燕飲則有恩明君臣辨長幼則有義恩聯義篤而後與之射焉以觀其德行而後人樂而趨焉則先王之教亦可謂委曲而多術者矣鄉飲之禮樂彬彬如也逮射而上耦下耦比其才力上物下物畫其尺寸舉旌偃旌中其宫商侯乏楅中辨其等威其行有左右其升降有先後其進退有當階及階及物之揖其司馬司射有誘射揚弓鉤楹搢撲之式其取矢于楅也始進揖當楅揖取矢揖退與將進者揖其取矢也有橫弓郤手兼弣順羽之節其卒射而飲也有勝者袒決執張弓不勝者襲説決拾加弛弓之異有升飲相揖之文而又比耦而釋獲不以一人勝不以一人負勝者無所露其矜能長傲之念而不勝者不至于獨露其短然而內愧自反亦不得掩其拙于儕耦蓋於易爭之地特教之以不爭而其憍吝刻忌與夫粗浮邪戾之氣無一得以干乎其間而又節之以騶虞貍首采蘋采蘩之樂使其持弓審固何以射何以聽循聲而發發而中乎正鵠而非志正體直養定而習素者固必不能故曰射可以觀德行也德行未修則教之以習射習射即習禮樂也夫禮樂之於德行也固不可以道藝岐矣古之選士以射今之選士以文文與射皆所謂藝也而文以傳聖賢之神射以比禮樂之節徒以文則能言之鸚鵡徒以射則野外之綿蕞然而具眼者自能識焉故古今取士異制而得人則同但古人試貢士于射宫更有深意凡人之賢不肖于威儀揖讓間嘗露其倪而其好惡趨舍之情于行同能耦間更驗其實故節之禮樂以觀其德比之以耦以觀其類而人之材品將有所不能廋者以此言之試射之顯徵校文之暗索其將誰優乎哉是故射禮雖廢而古道不可以不講也兹采儀禮所載注為射儀此禮與鄉飲相合而行事在于合樂之後旅酬之先故凡前篇所悉兹不重出所小異者飲或無僎射有大夫飲必有介射則無介而飲詳于樂射詳于射其義固各有攸當焉會典儀注甚略雍志稍詳聞徐兩學憲皆有射儀然各不相襲總非畫一之禮事必師古其義則竊取云然素木瓠葉古之人有行之者不自知其迂也弓詁荀子倕作弓史記揮作弓書曰和之弓山海經少昊生般始為弓矢弓者射疏及遠之器丈夫所有事也考工記弓人為弓取六材必以其時六材者幹角筋膠絲漆也取幹之道七柘為上檍檿桑橘木瓜荆次之竹為下而相幹相角相筋相膠各有其法漆欲測絲欲沈六材參均九和而後稱良焉凡弓以木為身以角為靣筋所以為深絲所以為固張則筋外而角內弛則角外而筋內把中曰弣弓端曰簫曲處曰隈弣或作柎一曰質旁曰撻中曰敝簫或作弰亦曰弭曰彆方結反曰峻廣雅柎柄也康成曰茭讀為骹茭解謂接中也賈公彥曰隈簫角接處也杜子春曰隈弓之淵許愼曰彆弓戾也司農云敝弓人所握持者詩曰象弭魚服爾雅曰弓無緣者謂之弭左傳左執鞭弭曲禮凡遺人弓者張弓尚筋弛弓尚角右手執簫左手承弣而射禮橫弓兼弣卻手覆手亦各有一定之儀焉凡為弓方其峻而髙其柎長其隈而薄其敝茭解中有變焉故校挺臂中有柎焉故剽蓋弓簫宜方側骨宜髙隈曲勿促敝手勿厚引弓而臂有力放矢而簫有力則變換而去疾側骨堅強又能助弓為力則矢之發也必剽此為弓之要法也而又因人志慮血氣以别其柔徑豐肉而短寬緩以荼若是者為之危弓危弓為之安矢骨直以立忿藝以奔若是者為之安弓安弓為之危矢而又因人之形體長短以定其矢之尺寸上制六尺六寸中制六尺三寸下制六尺弓必劑之性情又與形體適矢又與弓適弓矢與心手適其於射也思過半矣弓有往體寡來體多者王弓弧弓也有往體多來體寡者夾弓臾弓也有往體來體若一者唐弓大弓也材強則往體寡故利射革與質材弱則往體多故利射侯與弋強弱中則體若一徑緩之中其射必深故利射深王弧王弓也唐大諸侯弓也夾臾大夫弓也往體寡故合九而後成規往體多故合五而成規體若一故合七而成規天子雕弓諸侯彤弓大夫黑弓士弓謂之弊弓又在六弓之外合三成規勾者謂之弊也大抵天子諸侯大夫士之弓強弱辨乎其等華質異乎其物安危稱乎其躬稱躬所以利用也異物所以防僭也辨等則臣禮從殺以示不敢敵尊之意所謂禮射固然義取造士不以力所難勝強之致乖尚德之教至於學射則先弱後強必用唐弓大弓取其強弱適中無拘六弓之等不然一以等威為限將強材逸徑不以習士庶而左射貍首右射騶虞聖人殆教弱以愚黔首乎哉其必不然矢詁釋名矢指也又謂之箭前進也荀卿云浮遊作矢夷牟作矢皆黃帝之臣也藁人弓六物矢八物皆三等矢與弓相將有上中下之制隨人身以為之度而其大較則矢藁三尺云弓材謂幹矢材謂藁禹貢荆州貢杶幹栝柏惟箘簵楛考工記荆之幹妢胡之笴爾雅東南之美有會稽之竹箭焉左傳云董澤之蒲可勝既乎此皆矢材之佳者也八物者枉潔殺鍭矰茀恆庳也殺矢鍭矢參分一在前二在後則其達遲故用諸近射田獵枉矢潔矢五分二在前三在後則其達遠故利火射用諸城守車戰矰矢茀矢七分四在前三在後則其行髙故用於弋射恆矢庳矢八分四在前四在後則其行平故用諸散射考工五矢其兵矢即枉矢潔矢也田矢即矰矢也鍭合于茀而其矢異也殺不言鍭而其用同也鄭氏謂茀當為殺殺當為茀是也然則考工五矢即周禮之八物文有詳略故也矢人為矢參分其長而殺其一令趣鏃也五分其長而羽其一令不搖也以其笴厚為之羽深量力而受也水之以辨其隂陽夾其隂陽以設其比權輕重也夾其比以設其羽置羽于四垂也參分其羽以設其創創長寸圍寸鋌十之重三垸鋌則金之入藁者也羽三之一創宜二寸鋌不宜十寸其垸之多寡于經無見若以今制揆之矢重四錢為中等則經文有不可盡拘者鏃有金有骨有石爾雅金鏃剪羽謂之鏃骨鏃不剪羽謂之志君子志于中不志于殺故禮射習射之矢皆謂之志射不剪羽尚疾也志不剪羽尚舒也尚疾則以金鏃而必其入尚舒則以骨鏃而防其傷方言箭自關而東謂之矢關西曰箭江淮之間謂之鍭詩曰四鍭既鈞序賔以賢是也矢鋒為鏑亦謂之鉸廣薄而長者曰錍音卑亦謂之耙二孔而鳴者曰錍爐石則荆梁貢砮及肅愼之矢皆石為之凡矢以鏃為首以括為末鏃而礪之括而羽之書曰若虞機張往省括于度故射之所為入者鏃也而其所為中者括也括即比也故云設其比亦謂之拔故曰舍拔則獲然必心平體正持弓審固而後矢發命中巧從出焉保氏六藝三曰五射一曰白矢矢貫侯過見其白鏃也二曰參連前放一矢後三次連續而去也三曰剡注羽頭髙鏃低去剡剡然今所云水平箭也四曰襄尺臣與君射不並君立讓退一尺也五曰井儀四矢貫儀如井之容儀也此皆所謂枝也而禮樂寓焉則進乎技矣四矢曰乘象有事四方也搢三挾一左旋右抽也設楅拊矢設中釋算取矢則上耦取之弓下下耦取之弓上命射則無射獲無獵獲又不貫不釋範之以進退威儀節之以騶虞貍首非不亦分曹角勝而雍雍德讓之雅終不以斯須而去身習之而禮陶樂和試之而選德尚賢聖王之行射于鄉也直一矢加遺而已乎唐人射訣有四戒三謹五善五難二合三開五病遊藝之暇亦當旁覽物詁射時所履者謂物畫地作十字形大射納射器時梓人升自北階兩楹間疏數容弓若丹若墨度尺而午鄉射記射自楹間物長如笴其間容弓距隨長武序則物當棟堂則物當楣此所謂物猶言事也君子之所有事也凡射必于楹間故物畫于楹其左曰下物其右曰上物兩物相離六尺故其間容弓也笴者矢之幹也其長三尺物南北之度應之距隨長武則東西橫距之畫縱橫交互縱長而橫短鄭注云始前足至東頭為距後足來合西南面為隨武迹也尺二寸蓋兩足相合得尺二寸橫畫如之容足之限也其長三尺亦應跬步蓋尺寸不容越焉當棟當楣以堂之深淺為節凡五架之屋正中曰棟次曰楣前曰􅔑序深故當棟堂淺則當楣司射升當誘射豫則鉤楹內堂則由楹外鄭注讀豫為榭州學有堂無室謝如宣榭之榭榭無室則其容深故由楹內鄉學則堂室備焉堂內容室而其堂淺矣故由楹外此當棟當楣之異也當物則揖及物則揖敬其事也誘射者左足履物不方足還視侯中俯正足射者左足履物還視侯中合足而俟其視侯以志中也然而正足合足繩趨尺步必範之以物焉內志正外體直一舉足不容茍也侯中方一丈上下躬各二丈上個四丈下躬三丈個讀作幹以絹繫之於幹也中參之一名正上下聨之以綱侯詁侯者所以射之凖也侯之制有三大射賔射燕射周官司裘王大射則共虎侯熊侯豹侯設其鵠諸侯共熊侯豹侯卿大夫共麋侯皆設其鵠此大射之侯也梓人所謂張皮侯而棲鵠則春以功是也射人以射法治射儀王射三侯五正諸侯射二侯三正孤卿大夫射一侯二正士射犴侯二正此賔射之侯也梓人所謂張五采之侯則逺國屬是也鄉射記曰凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以麋豕此燕射之侯也梓人所謂張獸侯以息燕是也大射王侯三等王射虎侯諸侯射熊侯卿大夫射豹侯諸侯之侯二等君射熊羣臣射豹卿大夫第設麋侯則君臣共射焉凡大射賔射之侯俱以虎熊豹麋之皮飾其側又方制之以為􅀢準而大射則用皮謂皮侯所謂棲皮之鵠賔射則畫五色雲氣五正之侯中朱次白次蒼次黃而玄在外皆取相克三正損玄黃二正去白蒼而畫朱緑所謂畫布之正其正鵠大小之制則考工記曰梓人為侯廣與崇方句參分其廣而鵠居一是此鵠制也詩箋云正所以設于侯中天子五正諸侯三大夫二士一皆居侯中參分之一此正制也則正之衰與侯同矣乃鄭衆馬融釋周禮則謂十尺曰侯四尺曰鵠二尺曰正四寸曰質又引爾雅皮謂之侯侯中謂之鵠鵠中謂之正正方二尺至王肅則改質為六寸賈逵又謂四尺為正正五重鵠在其內而方二尺夫鄭馬王皆謂正在鵠內賈謂鵠在正內其説不同今不可考揆厥名義則鵠取鳱鵠正取題肩皆鳥之捷黠難中者故以中為雋耳要之大射之侯棲鵠賔射之侯設正燕射之侯畫獸以象正鵠則熊麋虎豹豕之畫通為正鵠而所畫非正鵠之鳥也鄉射之侯即燕射之侯士侯以正畫以麋豕其制有中有躬有舌有綱有縜中其身也上下其躬也左右出者舌也持舌者綱也籠綱者縜也下綱不及地武未射中掩束之將射繫之既射脫而釋之獲者祭之服不氏之祝曰惟若寧侯毋或若女不寧侯不屬于王所故抗而射女強飲強食詒女曾孫諸侯百福此天子之禮也諸侯而下其文不載于經而其度則皆取之侯道侯道五十弓弓二寸以為侯中二寸者弓弣把中側骨之處也其博二寸每弓取二寸則五十弓取十尺廣與崇方則平方一丈而為侯中凡布幅廣率二尺則五幅也倍中以為躬則中之上下橫接一幅各二丈也倍躬以為左右舌下舌半上舌倍躬者上個讀作幹五尋用布四丈接于躬上左右各舒一丈若人舒舌者然下舌半之則左右各舒五尺用布三丈矣蓋侯象人形上個象臂下個象足中人張臂八尺張足六尺五之以為衰故康成云鄉射之侯用布十六丈數起侯道五十弓以計道七十弓之侯用布二十五丈二尺道九十弓之侯用布三十六丈道近則侯痺道侯則侯崇所以景人巾車張三侯大侯之崇見鵠于參參見鵠于干也凡畿外諸侯之射用大侯參侯干侯三侯之中熊侯為大故稱熊侯為大侯參者大夫之侯與天子諸侯參而三也干即士之犴侯也干不及地者武則犴侯上綱去地丈九尺二寸其參侯崇增七尺二寸其大侯崇又增七尺二寸故三侯遞逺二十弓而其鵠皆見焉虎九十弓熊七十弓豹麋五十弓而列國之諸侯大射其大侯亦九十弓糝七十弓豹五十弓白虎通曰天子射百二十步蓋自諸侯九十弓者推之未盡然也所以張侯逺近有不同者君服逺故射逺臣避君故以漸而降然而道近侯小則中之難易均焉五十弓以下不復可降矣故鄉射侯道五十弓也凡弓下制六尺與步相應亦云貍步貍善射其發必獲故司射以貍步張三侯而其樂亦節以貍首易步為弓者近取射器義從其類也杠髙二丈一尺翿長一丈六尺士載物雜帛為物中絳色白緣之首加羽葆故名翿旌詁獲者執旌以唱方其未射則以旌倚侯將射則舉旌負侯而俟舉旌以宫偃旌以商旌者射之標也君卿大夫士之旌各以其物周禮司常掌九旗之物日月為常交龍為旗通帛為􅎶雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌而國之大閲贊司馬頒旗物王建太常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旌中秋治兵所不同者軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟蓋通謂之物而大夫士鄉遂命之曰物則又特有専屬焉日月交龍熊虎鳥蛇畫絳帛也通帛大赤周尚赤也雜帛以素帛飾其側也全羽析羽染五采羽繫于旞旌之上所謂注旄于干首者也有虞氏之緌夏后氏之綢練商之崇牙周之璧翣蓋以漸而文焉一命而上各有其物鄉射之禮諸侯之州長主之士不命則無物無物則以白羽與朱羽糅扛長三仭韜上二尋謂之翿旗凡羽注之干首為旄注之旄首為旌太常而下皆有旄羽此則析羽下垂鍾氏染羽以朱湛丹秫三月而熾之淳而清之此其用也爾雅長尋曰旐繼旐曰斾王之太常齊地諸侯之旗齊軫卿大夫齊較士齊肩此云韜上二尋則去地五尺亦與肩齊者矣記言君國中射用翿旌獲鄉射亦用翿旌中必别有等威而今不可考也國中燕射也於郊大射也於竟賔射也郊以旌竟以龍旜者翿旌之羽白與朱不若旌之備文旌之備文不若龍旜之備德故與羣臣燕射則用翿旌擇士而大射則用旌而與鄰國之君射乃用龍旜此隆殺之等也詩曰左執翿爾雅曰翿纛翳也郭璞曰翿葆幅也蓋皆指竿首之翿此翿宜用絳帛二尋而首加羽葆與引舞之節不同形如曲屏可以容身避矢其髙下隨宜用之乏詁侯各有獲獲各有容容謂之乏所以容身禦矢者也王三侯三獲三容諸侯二侯二獲二容卿大夫士一侯一獲一容謂之容以獲者所厞也謂之乏矢至此力匱乏也以革為之正北面乏南面故文反正為乏亦名防爾雅曰容謂之防郭璞曰如小曲屏唱獲者所以自防大射設乏西十北十鄉射乏參侯道居侯黨之一句西五步其云西十北十以步計也西五步相離三丈侯道三十丈參居其一則當侯北十丈去堂二十丈唱獲之聲相聞也獲者賔黨弟子為之楅長三尺博三寸為交蛇取措地而安也其中韋當所以承矢髙二尺廣三尺一寸六孔孔容四矢飾以彩色鄉射司射請射降自西階命弟子納射器楅俟于堂西大射請射有司亦總弓矢楅適次至于三耦卒射設楅中庭取矢委楅北括南鏃司馬坐于楅南左右撫矢而乘之則鄉射大射皆同也鄉射記曰楅長如笴博三寸厚寸有半龍首其中蛇交韋當楅髤橫而奉之南面坐而尊之南北當洗蓋兩端龍首所以限矢也其中蛇交所以安矢也龍蛇象君子也韋當以韋為之而丹其色置于楅上當心鄭謂直心背之衣曰當蓋當其中央所以分矢也大射三耦既拾取矢捆之所以齊矢也鄉射大夫之矢則兼束以茅尊之異乎衆賔大射之耦大抵皆卿大夫故捆之以委于韋當既委而司馬左右四四數之分委于當之兩旁以委司射之失算鄭注訓楅為幅謂以承笴齊矢猶布有邊幅也陳祥道曰楅之楅矢猶楅衡之楅牛也設之則南當洗而東肆焉統于賔也其器則著地而無足故奉楅者坐奠委矢者坐委乘矢者坐撫取束矢者坐脫則楅卑無足可知舊圖有足者誤皆鑿圓孔可容八籌飾以赤黑色前足跪象教擾獸也籌長一尺四寸中者所以置算也君燕射則皮樹中大射則閭中於竟則虎中大夫兕中士鹿中鄭注云皮樹獸名今文繁豎獸人面能立者閭如驢一角或云如驢而岐蹄兕似牛青色其中制則莫考矣鄉射記曰鹿中髤前足跪前背容八算則皮樹虎兕之制蓋亦然也屈足象馴服也請射之初以納于堂及其三耦卒射而司射以釋獲請乃命設中以教釋算于是釋獲者執鹿中而一人執算以從之焉其奉之也先首其設之也必坐南當楅西當西序其位置也北面受算東面實算坐實八算于中橫委其餘于中西南末以俟司射之命既命而取中八算既射而為之釋算每一個釋一獲上射于右下射于左若有餘算則反委于中之西別取八算以俟俟射衆射皆遍委獲視算先賔後主賔黨之算自地數之以實于手主黨之算自手數之以委于地此其釋獲之節次也八算者乘矢四算一耦二入則共八算雖八矢未必盡中然而不敢以不中期之算籌八十則十耦全數與射賔衆不止三耦故也然而釋獲者先實八算執之則改實八算既釋又委其餘算則中之所容惟八算耳其籌長尺有握握素握布四指指一寸則籌尺有四寸公羊傳曰膚寸而合投壺禮曰室中布五扶先儒謂側手為膚鋪四指為扶則握與膚扶一也握素者刋其本以便握也惟君有射于國中而燕射大射賔射其中異大夫士射必于郊而燕射賔射其中同玉篇音禮上聲正韻一東內豐注酒器也平聲並存之高一尺五寸豐詁豐所以承觶者釋獲既畢以勝負告而司射乃命設豐弟子奉豐升設于西楹之西勝黨洗觶酌酒坐奠于豐司射命張弓命弛弓遂作升飲勝者先升少右不勝者升而坐取立飲焉此第一耦之飲也其次飲者不必勝黨弟子酌之主人使人代為實爵而不勝者升飲如初惟大夫當飲則執爵者奠之席前以優尊者其耦不升示不敢敵然亦立飲以示受罰至于衆賔飲遍則徹豐與觶而獻獲繼焉此衆耦遍飲之禮也終射之後亦復設豐豐象人形跪足兩手承柈于首以俟置觶舊説豐國之君嗜酒亡國狀之以為酒戒也燕禮君尊有豐注豐形似豆卑而大此不言大則承觶之豐或視承尊者較小也鄭注豐所以承爵然射飲不勝以觶不以爵其承爵者乃反玷也投壺之禮賜灌行觴其酌以角俱不以觶則亦無事于豐而鄭云酌奠于豐於經無見若公食大夫禮飲酒實于觶加于豐燕禮有豐幂用綌若錫長三尺其一尺刋而㨊之以便手持撲詁司射既誘射乃適階西取撲搢之凡升堂告賔則去撲降反位則搢撲記言楚撲長如笴刋本尺射者有過則撻之注云射者中人則撻之于中庭此雖禮射然而衆之所聚非威莫制古者閭胥于鄉小胥于學有觥撻司市于市有撲罰司徒于誓田亦有撲書稱朴作教刑則用之于學而禮云夏楚二物收其威也則以禮合民者不有所以督責之整攝之教必不行此撲之所由不可已也降而搢撲威衆也升則去朴敬尊也袒決遂詁凡射袒左以便持弓袒則拾拾斂也所以蔽膚斂衣也以韋為之亦曰射韝著于左臂射時用以遂弦謂之曰遂其非射時謂之曰拾拾也遂也一也射則必袒若尊卑共耦則卑者袒尊者不袒故大夫與士射士袒以拾蔽膚大夫以纁襦斂衣君與大夫射大夫袒以拾蔽膚君以朱襦斂衣鄉射記大夫袒纁襦燕禮記君袒朱襦者此也決著于右巨指以鉤弦者鄭注決猶闓也象骨為之賈疏取其滑也大夫用骨不必以象士決用棘又有著于右三指者曰極大射朱極三以朱韋為之冒于食指中指名指以之釋弦亦謂之韘所云童子佩韘者此也遂亦曰捍內則所謂佩決捍者此也蓋以捍臂袒則捍之事已釋袒則説拾而襲射耦詁射人以射法治射儀王以六耦射三侯諸侯四耦射二侯孤卿大夫三耦射一侯士以三耦射犴侯分曹校藝之謂耦所以為射法者也易氏曰大射則大司馬合諸侯之六耦賔射則諸侯與王射而合卿大夫為六耦此以周禮證之鄉射則弟子為三耦矣諸侯二侯四耦蓋畿內之侯也畿外諸侯大射賔射皆三侯三耦近尊則屈于侯伸于耦遠尊則屈于耦伸于侯此康成之説然又有謂畿外諸侯設三侯則用六耦者不可考矣尊者法詳故耦多卑者法略故耦少卿大夫以下總皆三耦一侯侯可減耦不可減故鄉射必三耦而成禮也至于燕射天子諸侯例同三耦一侯蓋燕私之禮其所常習不必備多耦之觀故從殺與鄉射同焉凡鄉射主與賔耦大夫與士耦而堂下三耦皆使弟子充之司射前期戒之及其當射又掄比之鄭謂選次其才賈謂選次其力大抵所比似在衆耦若三耦則俱素習射儀容體節奏可為觀法之人既戒于先臨事又加整飭如是而已至衆耦則必各以才力比之凡人才力相近素自以類為耦至此復比次焉令于同方合志之中共射以觀優劣即此內正外直比禮比樂就是學問而教誘全在司射司射誘之三耦繼之初射設楅再射設中而後主賔大夫士以及衆賔相與次第射焉堂上三賔堂下之賔無數故曰歌騶虞若采蘋射無算也但堂上三賔亦有不與射者不射者不降禮容尚肅不以無事亂有事也籌數八十備十耦之全數者蓋習民于射苟無怍于矍相之觶者皆得入而習禮于射此以知射不止三耦而三耦所以示之法也倍之則六耦矣法詳者官備故大射之禮三耦射畢然後公射又三耦射畢然後公再射乃獲飲觶此諸侯六耦之證而燕射不然然而不三耦不足以成禮昔者魯侯之饗范宣子也射者三耦公臣不足取于家臣夫以家臣取盈則三耦成禮終不可以乏才減也此知卿大夫士凡射之必三耦也射樂詁周禮大師率瞽而歌射節笙師饗射共其笙鍾之樂樂師鍾師凡射王以騶虞諸侯以貍首大夫以采蘋士以采蘩為節而射人王以騶虞九節諸侯貍首七節孤卿大夫采蘋士采蘩皆五節節者鼓節射者拾發必與鼓節相應故曰不鼓不釋射以應節為難節奏比樂比此者也凡節以侯道為差侯道九十弓者樂九節七十弓者樂七節五十弓者樂五節各以等辨凡奏樂一句一節詩章原有定句而節之多寡以尊卑異則用時各為之節鄉樂以五節聽五句聽畢然後發矢諸侯七節天子九節亦如之尊者聽詳卑者聽略節有餘詩不足則咏嘆後韻以畢節節不足詩有餘則重歌一句以終詩如騶虞一詩天子鄉人同用其節不同應有活法而發矢則先擊􅉧上射一發擊應下射一發次擊鼓上射再發次擊應下射再發又次擊鼓擊應者各再而上下射拾發乘矢終焉具詳後譜先儒釋鄉射五節而謂四節四拾其一節先以聽非也四節四拾則唱獲聲與樂相間豈可謂節必詩終而􅉧應鼓凡八擊於時遞發八矢不先不後中且合節乃所謂節奏比樂耳射義云騶虞者樂官備也貍首樂會時也采蘋樂循法也采蘩樂不失職也蓋一發五豝則得賢衆多故取備官為節史記設射貍首漢書郊祀志萇𢎞設射不來故鄭注貍之言不來也言諸侯不來朝則射之故取朝會之時為節采蘋則卿大夫妻能循母教猶仕者能行素履乃可以與國政也采蘩敬共祭祀不失夫人之職士之事君亦然則循法不失職卿大夫士之節也然騶虞一國之風而通之天子既為天子之節而用之鄉射何也義重仁賢理通王國鄉射樂賢亦所以充貢於王所故節異而詩則同焉貍首之詩載在射義今並譜以備樂節必行終射禮而後樂作者射之難在於比樂禮先樂後亦習射之序也主賔遵士衆賔司正司馬司射獲者釋獲者弟子詁漢家郡縣饗射皆假士禮而行樂縣笙磬籩俎皆如士制見于服虔應劭禮儀志注緣儀禮古文所載皆諸侯州長之禮士禮也系射於鄉者鄭注以為鄉大夫或在焉不改其禮故曰鄉射周制五州為鄉其大夫或處一焉則亦大夫主之記云大夫兕中為行之於鄉者言也若天子畿內州長亦中大夫故知所為主者不必其皆士也賔者此邦年高德劭之處士也所重習射非為賔興故主不謀賔賔不拜辱亦不設介雖行鄉飲而禮與專飲者有異焉衆賔則堂上三賔以齒為序堂下或來習射或來觀禮凡其幼壯孝弟耆耋好禮好學不倦好禮不變稱道不亂者皆在此位惟賁軍之將亡國大夫與為人後者不入焉顧州長是時方以五物詢衆庶以備將來賔貢之選則來觀之人自不必嚴為限制竊意矍相揚觶所云在此位者特指賔位言之彼其習民于射有過則撻豈其人人德藝全備尚楚撲而教諸庠序之內乎遵今文作僎致事大夫􅈺于禮樂可遵法者士則在官之士居衆賔之列者一命齒于鄉故士來習禮觀禮皆與堂下衆賔為齒而司射比耦就中擇焉以耦大夫大夫或不止于一人然而必與士耦不自相耦者嫌自尊别居鄉則禮然也將射則司正為司馬射畢則司馬轉為司正司正涖酒政者也司馬則涖射事鄉射號令所自出者也故命張侯命倚旌命執旌負侯命去侯命取矢當楅撫矢獻獲者命脫侯皆屬司馬而其出入升降必繞司射之南以其為紀綱之僕令衆人得屬目焉司射則熟于射禮者一人充之始則升堂請射命納射器次則比耦誘射揖升乘矢以為衆耦法式降而搢撲作射已而去撲告射及其弟子取矢則又請射于賔于大夫而比耦取矢作射如初焉繼之以請釋獲命設中北面視算設豐作飲逮至司馬獻獲則司射亦獻釋獲以成次射之禮其終射也又有以樂樂賔之請三耦賔主遵士衆賔應節而射以比于樂而視算作飲如初則司射無復事矣司射司馬互為政者也其升降嘗相左于階前射則司射勞多而射前獻酬射後旅酬則司馬身兼司正事任亦劇但司射有射司馬無射是故司馬袒決遂而司正袒執弓不決拾也獲者則倚旌負侯去侯就乏及以旌指示取矢惟司馬之所命之既射而司馬獻之三祭于侯釋獲者則設中實算辨左右别純奇以其勝負告于賔其職事率與司射相應而比獲者釋獲者則皆弟子充之此外有納射器者有張侯設獲者有取矢加楅者有執算者有設豐實觶飲不勝者有終射脫侯者有相工升降者有徹俎授從者各有司存而莫非弟子之職也統計凡射主一人賔一人堂上衆賔三人遵若士若堂下之賔皆無常數三耦六人司射一人司正司馬共一人其執事則張侯脫侯共二人獲者釋獲者司射器者設楅執算執中設豐奠觶實觶執爵各一人舉觶于賔者先後三人通贊二人共十六人而賔大夫士之弟子引禮者相工升降者亦無常數俱就弟子員中擇才而任旅酬交錯飲亦遍焉禮必逮賤所謂少長有序及於沃洗者也樂則樂正而下有播鼗者舂牘者搏拊者司磬縣者楹鼓者塤者篪者各一人瑟與歌共四人無瑟則代之以琴三笙一和通前共二十人此於膠序彥秀不為難具有能春秋舉行先期肄習俾古道彬彬復睹者乎博奕猶賢何况禮樂當仁不讓其殆此類昔者馬遷習射于鄒嶧劉昆備典于陳留秦彭饗射于山陽鮑永闢荆于魯郡伊何人哉而逢掖搢紳至今侈為美談則亦存乎其人勿謂一握為笑而古禮終不可行也會典儀注洪武三年定學校射儀前期戒射定耦選職事充司正副司正司射司射器請射舉爵收矢執旗樹鵠陳設訖至日執事者入就位請射者引主射正官及各官員子弟士民俊秀者各就品位司射器者以弓矢置於各正官及司射前請射者詣正官前圓揖畢引詣司射器前受弓矢訖復位司正執算入立於中後請射者詣司射前曰請誘射引司射二人耦進各以三矢搢于腰帶之右以一矢挾於二指間推年齒相讓年長者為上射年幼者為下射上射先詣射位向鵠正立發矢司正書中投算置於中舉旗者如所射應之射畢退立於傍讓下射者詣位射訖請射者俱引復位收矢復於射者司正取所中算請射者次請士民俊秀射次請官員子弟射次請品卑至品髙者射其就射位發矢取算書中舉旗收矢復位皆如前儀既畢司正副司正各持算白中於主射正官舉爵者酌酒授中者飲之中的者三爵中采者二爵飲訖請射者請屬官以下仍捧弓矢納於司射器還詣主射正官前相揖而退附南雍志合射位設凡設位以灰畫之賔位設堂中西衆賔位繼序于西俱南靣遵位設堂中東南靣主位設遵位之南少東西靣士位設衆賔之東少北南靣並賔而立射物位設堂中少南左右相去容一弓俱南靣鹿中位設西階之西南去階五尺許東靣司射位繼序鹿中位南少西司馬位繼之俱東靣三耦士衆賔堂西之位設堂下西北東上南靣射位謂之物畫十字長三尺設司馬之南少西東靣楅位設兩階中少南豐位設堂西楹之西布侯位去射位五十弓北靣乏位設于布侯位之西少北樂生歌生位設阼階之東南西靣去楹五尺許樂正位設樂生之南少西北靣洗位設樂正之南西靣設樽于賔席之東兩壺斯禁左玄酒皆加勺篚在其南東肆設洗于阼階東南洗東篚西南肆懸磬于洗盆東北西靣賔遵司馬士衆賔三耦之弓矢并旌豐楅鹿中籌俱序陳堂外東空處主人之弓矢亦如之司射之弓矢與朴倚于西階之西鍾鼓笙磬簫琴瑟俱陳堂上東空處布侯乏俱陳前所設之位其弓矢旌豐楅鹿中籌決遂俱待司射命納射器然後各次第納于堂西空處通贊立堂東楣下唱序立主人先立本位贊者立主後少南西靣司鼓者立鼓後西靣其餘樂正歌生樂生司樽洗觶者俱于洗盆之南相去四五尺許西靣序立司馬司射三耦揚觶設豐設楅司中釋獲執旌張侯執射器約矢者俱于衆賔射位西南東靣與東班樂正等相對序立賔一人遵一人主一人士一人衆賔四人三耦六人司射一人司馬一人擯者一人揚觶一人釋獲一人約矢四人樂正一人歌詩六人弟子代賔等執弓矢各一人通贊二人賔遵主引贊各二人司尊一人設豐一人設楅二人設中一人洗觶一人張侯二人執旌一人司鍾鼓及磬各一人司簫笙各一人司琴瑟各一人皆諸生善良敏達者為之其器數則弓一十六決遂如之矢六十四布侯一乏一旌一撲一楅一鹿中一豐一篚一觶一尊一洗一籌八十斯禁一鼓鍾磬琴瑟各一簫笙各二矢宜多備以防損壞按古禮無鍾琴簫有三笙一和和非小笙乃執舂牘者歌只二人塤篪二人無則可以簫笛代之搏拊一人司磬者可兼播鼗斯禁可以卓代其揚觶必須二人衆賔隨時多寡固無定數右國初射儀頒之學宫載之會典至今各處多有射圃我聖祖朴棫作人之化於射禮蓋惓惓焉天造草昧百務未遑以禮習民蠲繁尚簡第以二人誘射不具三耦其衆耦先卑後尊其卒射但飲勝者中的中采又復人人而差等之古以飲罰今以飲勸古今不相襲禮矣二百五十年來文盛教洽士大夫漸思復古故南雍志稍考儀禮節為合射之儀國子習焉亦猶行古之道者乎然而意存行簡尚遠周文兹不備録録其位設大凡仍取儀禮古文節略解之演為圖注以俟肄習其興其廢在衡教者夫六藝於人其必非絶德明矣射可廢也禮樂不可斯須去身復古禮變今樂其猶以鄉射為前茅也哉儀禮鄉射古文解主人戒賔賔出迎再拜主人答再拜乃請賔禮辭許主人再拜賔答再拜主人退賔送再拜主人州長或鄉大夫也不言拜辱此為習民以禮樂非專為賔已也此戒賔與射同日無介主于射不備賔乃席賔南靣東上衆賔之席繼而西席主人於阼階上西靣尊於賔席之東兩壺斯禁左玄酒靣北而設尊故以西為左皆加勺篚在其南東肆設洗於阼階東南南北以堂深東西當東榮水在洗東篚在洗西南肆縣於洗東北西靣縣磬懸也縣於東方避射位乃張侯下綱不及地武侯所射布也綱所以繫侯于植者武足迹也中人之迹尺二寸不繫左下綱中掩束之射事未至故西半不繫而中掩左廂向東以俟乏參侯道居侯黨之一西五步容謂之乏所以為獲者御矢也侯道五十步此乏去侯北十丈西三丈以上言設席樂縣張侯之事羮定主人朝服乃速賔賔朝服出迎再拜主人答再拜退賔送再拜朝服冠玄端緇帶素韠白屨賔及衆賔遂從之及門主人一相出迎于門外再拜賔答再拜揖衆賔主人以賔揖先入賔厭衆賔衆賔皆入門左東靣北上賔少進主人以賔三揖皆行及階三讓主人升一等賔升以上迎賔主人阼階上當楣北靣再拜賔西階上當楣北靣答再拜主人坐取爵于上篚以降賔降主人阼階前西靣坐奠爵興辭降賔對主人坐取爵興適洗南靣坐奠爵于篚下盥洗賔進東北靣辭洗主人坐奠爵于篚興對賔反位主人卒洗一揖一讓以賔升賔西階上北靣拜洗主人阼階上北靣奠爵遂答拜乃降賔降主人辭降賔對主人卒盥一揖一讓升賔升西階上疑立主人坐取爵實之賔席之前西北靣獻賔賔西階上北面拜主人少退賔進受爵于席前復位主人阼階上拜送爵賔少退薦脯醢賔升席自西方乃設折俎主人阼階東疑立賔坐左執爵右祭脯醢奠爵于薦西興取肺坐絶祭尚左手嚌之興加于俎坐挩手執爵遂祭酒興席末坐啐酒降席坐奠爵拜告旨執爵興主人阼階上答拜賔西階上北靣坐卒爵興坐奠爵遂拜執爵興主人阼階上答拜以上獻賔賔以虛爵降主人降賔西階前東靣坐奠爵興辭降主人對賔坐取爵適洗北靣坐奠爵于篚下興盥洗主人阼階之東南靣辭洗賔坐奠爵于篚興對主人反位賔卒洗揖讓如初升主人拜洗賔答拜興降盥如主人之禮賔升實爵主人之席前東南面酢主人主人阼階上拜賔少退主人進受爵復位賔西階上拜送爵薦脯醢主人升席自北方乃設折俎祭如賔禮不告旨自席前適阼階上北靣坐卒爵興坐奠爵遂拜執爵興賔西階上北靣答拜主人坐奠爵于序端阼階上再拜崇酒賔西階上答再拜以上賔酢主人主人坐取觶于篚以降賔降主人奠觶辭降賔對東靣立主人坐取觶洗賔不辭洗卒洗揖讓升賔西階上疑立主人實觶酬之阼階上北靣坐奠觶遂拜執觶興賔西階上北靣答拜主人坐祭遂飲卒觶興坐奠觶遂拜執觶興賔西階上北靣答拜主人降洗賔降辭如獻禮升不拜洗賔西階上立主人實觶賔之席前北靣賔西階上拜主人坐奠觶于薦西賔辭坐取觶以興反位主人阼階上拜送賔北靣坐奠觶于薦東反位以上主人酬賔主人揖降賔降東靣立于西階西當西序主人西南靣三拜衆賔衆賔皆答一拜主人揖升坐取爵于序端降洗升實爵西階上獻衆賔衆賔之長升拜受者三人主人拜送坐祭立飲不拜既爵授主人爵降復位衆賔皆不拜受爵坐祭立飲每一人獻則薦諸其席衆賔辨有脯醢主人以虛爵降奠于篚揖讓升賔厭衆賔升衆賔皆升就席以上主人獻衆賔一人洗舉觶於賔升實觶西階上坐奠觶拜執觶興賔席末答拜舉觶者坐祭遂飲卒觶興坐奠觶拜執觶興賔答拜降洗升實之西階上北靣賔拜舉觶者進坐奠觶于薦西賔辭坐取以興舉觶者西階上拜送賔反奠于其所舉觶者降以上舉觶大夫若有遵者則入門左主人降賔及衆賔皆降復初位主人揖讓以大夫升拜至大夫答拜以上迎僎主人以爵降大夫降主人辭降大夫辭洗如賔禮席于尊東升不拜洗主人實爵席前獻于大夫大夫西階上拜進受爵反位主人大夫之右拜送大夫辭加席主人對不去加席乃薦脯醢大夫升席設折俎祭如賔禮不嚌肺不啐酒不告旨西階上卒爵拜主人答拜以上主人獻僎大夫降洗主人復阼階降辭如初卒洗主人盥揖讓升大夫授主人爵于兩楹間復位主人實爵以酢于西階上坐奠爵拜大夫答拜坐祭卒爵拜大夫答拜主人坐奠爵于西楹南再拜崇酒大夫答拜以上僎酢主人主人復阼階揖降大夫降立于賔南主人揖讓以賔升大夫及衆賔皆升就席以上升賔席工于西階上少東樂正先升北靣立于其西工四人二瑟瑟先相者皆左何瑟靣鼓執越內弦右手相入升自西階北靣東上工坐相者坐授瑟乃降笙入立于縣中西面縣中者磬縣之東也笙與磬俱在洗東北而靣西堂下樂相從也乃合樂周南關睢葛覃卷耳召南鵲巢采蘩采蘋工不興告于樂正曰正歌備樂正告于賔乃降主人取爵于上篚獻工大師則為之洗賔降主人辭降大夫不降尊也工不辭洗卒洗升實爵工不興左瑟一人拜受爵主人阼階上拜送爵薦脯醢使人相祭工飲不拜既爵授主人爵衆工不拜受爵祭飲辨有脯醢不祭不洗遂獻笙于西階上笙一人拜于下盡階不升堂受爵主人拜送爵階前坐祭立飲不拜既爵升授主人爵衆笙不拜受爵坐祭立飲辨有脯醢不祭主人以爵降奠于篚反升就席亦揖讓以賔及衆賔就席以上作樂獻工獻笙主人降席自南方側降作相為司正司正禮辭許諾主人再拜司正答拜主人升就席司正洗觶升自西階由楹內適阼階上北靣受命于主人西階上北靣請安于賔賔禮辭許司正告于主人遂立于楹間以相拜主人阼階上再拜賔西階上答再拜皆揖就席司正實觶降自西階中庭北靣坐奠觶興退少立進坐取觶興反坐不祭遂卒觶興坐奠觶拜執觶興洗北靣坐奠于其所興少退北靣立于觶南觶南者其故擯位未旅旅酬則禮畢此時將射故未旅以上言立司正三耦俟于堂西南靣東上司正既立司射乃選弟子之中德行道藝之髙者為三耦於此俟射司射適堂西袒左免衣也決象骨為之著右大指以鈎弦闔射遂射韝也韋為之亦謂之拾拾斂也所以蔽膚斂衣也取弓于階西兼挾乘矢四矢升自西階階上北靣告于賔曰弓矢既具有司請射賔對曰某不能句為二三子許諾司射適阼階上東北靣告于主人曰請射于賔賔許司射降自西階階前西靣命弟子納射器弟子賔黨之年少者賔黨東靣故司射西靣命之射器弓矢決拾旌中籌楅豐也乃納射器皆在堂西賔與大夫之弓倚于西序矢在弓下北括衆弓倚于堂西矢在其上上者堂西廉也主人之弓在東序東兩序皆在堂上矢皆北括司射不釋弓矢遂以比選也三耦於堂西三耦之南北靣命上射曰某御於子命下射曰子與某子射司正為司馬涖酒為司正涖射為司馬兼官也司馬命張侯弟子説脫束遂繫左下綱繫于植將射也司馬又命獲者倚旌于侯中獲者弟子為之射者中則舉旌唱獲此為下文負侯張本獲者由西方坐取旌倚于侯中乃退樂正適西方命弟子贊工遷樂于下避射也弟子相工如初入左何瑟靣鼓內弦同前降自西階阼階下之東南堂前三笴矢幹曰笴笴三尺是去堂九尺西靣北上坐樂正北靣立于其南司射猶挾乘矢以命三耦各與其耦讓取弓矢拾三耦皆袒決遂有司在執弣右執弦而授弓有司司射器者遂授矢三耦皆執弓搢三插三矢于帶右而挾一個司射先立于所設中之西南東靣三耦皆進由司射之西立于其西南東靣北上而俟司射東靣立于三耦之北搢三而挾一個將誘射揖進當階北靣揖及階揖升堂揖豫則鉤楹內堂則由楹外豫序也讀如榭鉤楹者行繞楹也序無室可以深物近北故由楹內北過而東記云序則物當棟故也庠則有堂有室物近南故由楹外東行記云堂則物當楣故也當左物物事也有事于射所履之矩也梓人畫之北靣揖及物揖左足履物不方足還視侯中俯正足方併也志在于射左足至右足旋故不併足先南靣視侯之中而後正足以立不去旌擬唱獲也誘射誘教也將乘矢將者發也執弓不挾矢發盡故不挾右執弦南靣揖揖如升射降出于其位南適堂西改作一個挾之别挾一矢示有事也遂適階西取撲搢之以反位撲所以撻犯教者以上誘射司馬命獲者執旌以負侯令射者見侯與旌以志于中獲者適侯執旌負侯而俟司射還當上耦西靣作上耦射還左旋而東也當對也上耦位在司射西南東靣故此旋向而使之射司射反位上耦揖進上射在左並行當階北靣揖及階揖上射先升三等下射從之句中等猶間等也上射升堂少左讓下射路下射升上射揖並行皆當其物北靣揖及物揖皆左足履物還視侯中合足而俟司馬適堂西不決遂因不射故不備袒執弓出于司射之南升自西階鉤楹由上射之後西南靣立于物間鉤楹者繞西楹而北東行由上射後當物間取向侯揚弓之便也右執簫弓末南揚弓命去侯獲者執旌許諾聲不絶以至于乏坐東靣偃旌而俟司馬出于下射之南還旋其後既繞上射亦繞下射明為二人命去侯也降自西階反由司射之南適堂西釋弓襲反位立于司射之南司射進與司馬交于階前相左司馬由北而西行司射由南而東行交于西階之西各以左相近故云相左由堂下西階之東北靣視上射命曰無射獲毋射人也無獵獲獵矢從旁上射揖司射退反位乃射上射既發挾弓矢而后下射射拾發以將乘矢獲者坐而獲舉旌以宫偃旌以商獲而未釋獲唱獲之聲中于宫商然此時報獲而已未及算也卒射皆執弓不挾南靣揖揖如升射上射降三等下射少右從之中等並行上射於左句與升射者相左交于階前相揖由司馬之南適堂西釋弓説決拾襲而俟于堂西南靣東上三耦卒射亦如之司射去撲倚于西階之西不敢將撲而近尊者升堂北靣告于賔曰三耦卒射賔揖以上堂下三耦之射乃第一畨射也司射降搢撲反位司馬適堂西袒執弓由其位南進與司射交于階前相左升自西階鉤楹自右物之後立于物間西南靣揖弓推弓而揖命取矢獲者執旌許諾聲不絶以旌負侯而俟俟弟子取矢以旌指導之司馬出于左物之南還其後句降自西階遂適堂前北靣立于所設楅之南命弟子設楅楅以承笴齊矢乃設楅于中庭南當洗東肆司馬由司射之南退釋弓于堂西句襲句反位弟子取矢北靣坐委于楅句北括句乃退司馬襲進當楅南北靣坐左右撫矢而乘之以左右手拊矢四四數之若矢不備則司馬又袒執弓如初升命曰取矢不索不盡弟子自西方應曰諾乃復求矢加于楅以上取矢加楅以俟再射甫畢初射之事司射倚撲于階西升請射于賔如初賔許諾賔主人大夫若皆與射則遂告于賔適阼階上告于主人主人與賔為耦遂告于大夫大夫雖衆皆與士為耦士謂賔之在下及羣士來觀禮者大夫雖衆不自以其爵為耦嫌于自尊别也以耦告于大夫曰某御于子西階上北靣作使衆賔射司射降搢撲由司馬之南適堂西立比衆耦大夫耦及衆賔也衆賔將與射者皆降由司馬之南適堂西繼三耦而立東上大夫之耦為上若有東靣者則北上衆賔無常數若賔少則以南靣為正若多則有立於西邊者東靣而以北為上也賔主人與大夫皆未降司射乃比衆耦辨衆賔與射者降則比耦乃遍遂命三耦拾取矢司射反位反位以俟袒決三耦拾取矢皆袒決遂執弓進立于司馬之西南司射作上耦取矢還當上耦如前使射之儀司射反位上耦揖進當楅北靣揖及楅揖上射東靣下射西靣上射揖進坐橫弓南踣弓郤手自弓下取一個句兼諸弣句順羽且興句執弦而左還退反位東靣揖揖下射使取矢下射進坐橫弓覆手自弓上取一個興其他如上射上射覆左手執弓背故郤右手在裡取矢下射仰左手向上執弓故用右手向下取矢皆從便既拾取乘矢揖皆左還南面揖皆少進當楅南少南行也皆左還北面搢三挾一個揖皆左還上射於右將復庭位故皆左旋西行也並向西行下射南則上射北故云右與進者相左由進者之北三耦拾取矢亦如之後者遂取誘射之矢兼乘矢而取之以授有司于西方而後反位有司司射器者以所取誘矢者之四矢西靣授之而後反東靣之位衆賔未拾取矢楅矢已盡故不拾取矢皆袒決遂執弓搢三挾一個由堂西進繼三耦之南而立東靣北上大夫之耦為上司射作射如初一耦揖升如初司馬命去侯獲者許諾司馬降釋弓反位司射猶挾一個去撲與司馬交于階前升請釋獲于賔賔許降搢撲西面立于所設中之東北面命釋獲者設中遂視之視以教釋算釋獲者執鹿中一人執算以從之釋獲者坐設中南當楅西當西序東面執中與算從堂西來故東面坐設興受算旋向北面受算坐實八算于中回向東面實之橫委其餘于中西南末興共而俟司射遂進由堂下北面命曰不貫不釋布侯射中則貫故以中為貫也不貫布則不釋算上射揖司射退反位釋獲者坐取中之八算改實八算于中興執而俟人四矢則一耦八矢雖不知中否要須一矢則一算改實八算擬後來者用之乃射若中則釋獲者坐而釋獲每一個釋一算上射於右賔黨下射於左主黨若有餘算則反委之委于地合後釋又取中之八算改實八算于中興執而俟三耦卒射賔主人大夫揖皆由其階降揖主人堂東袒決遂執弓搢三挾一個賔於堂西亦如之皆由其階階下揖升堂揖主人為下射皆當其物北面揖及物揖乃射卒南面揖皆由其階階上揖降階揖賔序西主人序東皆釋弓説決拾襲反位升及階揖升堂揖皆就席大夫袒決遂執弓搢三挾一個由堂西出于司射之西就其耦大夫為下射揖進耦少退不並行尊大夫也揖如三耦及階耦先升卒射揖如升射耦先降降階耦少退皆釋弓于堂西襲耦遂止于堂西大夫升就席衆賔繼射釋獲皆如初司射所作唯上耦賔主人射則司射不請以上主賔僎士衆賔繼三耦而習射卒射釋獲者遂以所執餘獲不中之餘算升自西階盡階不升堂告于賔曰左右卒射降反位坐委餘獲于中西興共而俟司馬袒決執弓升命取矢如初獲者許諾以旌負侯如初司馬降釋弓反位弟子委矢如初大夫之矢則兼束之以茅上握焉司馬乘矢如初司射遂適西階西釋弓去撲襲進由中東立于中南北靣視算釋獲者東面于中西坐先數右獲二算為純全也隂陽耦為全一純以取實于左手十純則縮而委之每委異之以東面釋算觀之東西為縱南北為橫縮縱也異之易于校數有餘純則橫於下一算為奇奇則又縮諸純下興自前適左東面坐句兼斂算句實于左手一純以委十則異之右則一一取之于地實于左手此則總斂于左手一一取于左手委之于地也所謂禮以變為敬餘如右獲謂所縮所橫司射復位釋獲者遂進取賢獲勝黨之算執以升自西階盡階不升堂告于賔若右勝則曰右賢於左若左勝則曰左賢於右以純數告若有奇者亦曰奇若左右鈞則左右皆執一算以告曰左右鈞降復位坐兼斂算實八算于中委其餘于中西興共而俟將為第三畨射故豫設之以上釋算司射適堂西命弟子設豐豐以承爵設之將飲不勝者弟子勝黨之年少者弟子奉豐升設于西楹之西乃降勝者之弟子洗觶升酌南面坐奠于豐上降袒執弓反位司射遂袒執弓挾一個搢撲北面于三耦之南命三耦及衆賔勝者皆袒決遂執張弓執張弓言能用之不勝者皆襲説決拾郤左手右加弛弓于其上遂以執弣兩手執弣弓弛辱其不能用司射先反位三耦及衆射者皆與其耦進立于射位北上司射作升飲者如作射一耦進揖如升射及階勝者先升堂少右不勝者進北靣坐取豐上之觶興少退立卒觶進坐奠于豐下興揖不勝者先降與升飲者相左交于階前相揖出于司馬之南遂適堂西釋弓襲而俟俟第三畨射有執爵者前使弟子設豐此則主人使人代之酌于豐上以卒飲執爵者坐取觶實之反奠于豐上升飲者如初三耦卒飲賔主人大夫不勝則不執弓執爵者取觶降洗升實之以授于席前優尊者受觶以適西階上北靣立飲受罰卒觶授執爵者反就席大夫飲則耦不升若大夫之耦不勝則亦執弛弓特升飲衆賔繼飲執爵者辨乃徹豐與觶設豐者反豐于堂西執爵者反觶于篚者以上飲不勝司馬洗爵升實之以降獻獲者于侯薦脯醢設折俎俎與薦皆三祭侯之右左中凡三祭獲者負侯北面拜受爵司馬西靣拜送爵獲者執爵使人執其薦與俎從之適右個侯之右幹設薦俎獲者南面坐左執爵祭脯醢執爵興取肺坐祭遂祭酒興適左個中亦如之左個之西北三步東西設薦俎獲者薦右東靣立飲享侯之餘不拜既爵司馬受爵奠于篚復位獲者執其薦使人執俎從之辟設俎祭乏避其正靣凡祭皆當正靣此獨避之避舉旌偃旌也設于乏南獲者負侯而俟俟第三畨射以上獻獲者司射適階西釋弓矢去撲説決拾襲適洗洗爵升實之以降獻釋獲者于其位少南避中薦脯醢折俎有祭釋獲者薦右東面拜受爵司射北面拜送爵釋獲者就其薦坐左執爵祭脯醢興取肺坐祭遂祭酒興司射之西北面立飲不拜既爵司射受爵奠于篚釋獲者少西辟薦句反位以上獻釋獲者此以上皆第二畨射事司射適堂西袒決遂取弓于階西挾一個搢撲以反位為將復射司射去撲倚于階西升請射于賔如初賔許司射降搢撲由司馬之南適堂西命三耦及衆賔皆袒決遂執弓就位司射先反位三耦及衆賔皆袒決遂執弓各以其耦進反于射位司射作拾取矢三耦拾取矢如初反位賔主人大夫降揖如初主人堂東賔堂西皆袒決遂執弓皆進階前揖及楅揖拾取矢如三耦卒北靣搢三挾一個揖退反位賔堂西主人堂東皆釋弓矢襲及階揖升堂揖就席大夫袒決遂執弓就其耦揖皆進如三耦耦東靣大夫西靣大夫進坐説矢束將射興反位而后耦揖進坐兼取乘矢尊大夫不敢與之拾也順羽而興反位揖大夫進坐亦兼取乘矢如其耦北靣搢三挾一個揖退耦反位大夫遂適序西釋弓矢襲升即席大夫不序于下尊也衆賔繼拾取矢皆如三耦以反位司射猶挾一個以進作上射如初一耦揖升如初司馬升命去侯獲者許諾司馬降釋弓反位司射與司馬交于階前去撲襲升請以樂樂于賔賔許諾司射降搢撲東靣命樂正曰請以樂樂于賔賔許樂正位東階東南北靣大師位東北西靣故司射東靣命樂正司射遂適階間堂下北靣命曰不鼓不釋不與鼓節相應不釋算也鄉射歌五終凡五節其四節先以聽也最後一節應􅉧鼓凡八擊應節以將八矢上射揖司射退反位樂正東靣命大師曰奏騶虞間若一騶虞一發五豝喻得賢之多故以為節曰間若一者所重在節也大師不興許諾樂正退反位乃奏騶虞以射三耦卒射賔主人大夫衆賔繼射釋獲如初卒射降衆賔升射于堂射畢而降釋獲者執餘獲升告左右卒射如初司馬升命取矢獲者許諾司馬降釋弓反位弟子委矢司馬乘之皆如初司射釋弓視算如初釋獲者以賢獲與鈞告如初降復位司射命設豐設豐實觶如初遂命勝者執張弓不勝者執弛弓升飲如初司射猶袒決遂左執弓右執一個兼諸弦靣鏃適堂西以命拾取矢如初司射反位三耦及賔主人大夫衆賔皆袒決遂拾取矢如初矢不挾兼諸弦弣以退不反位不反射位事畢也遂授有司于堂西辨拾取矢揖皆升就席取矢既遍主人以賔升大夫衆賔從升立時少退于大夫司射乃適堂西釋弓去撲説決拾襲反位不復射故司馬命弟子説侯之左下綱而釋之脫侯中掩左下綱如初張時尚未全去備旅酬之復射命獲者以旌退命弟子退楅司射命釋獲者退中與算而俟諸所退皆俟堂西備復射也鄭云獲者釋獲者亦退其薦俎以上三畨射畢司馬反為司正退復觶南而立當監旅酬樂正命弟子贊工即位弟子相工如其降也升自西階反坐樂正反自西階東北面賔北面坐取俎西之觶興即前一人所舉奠于薦西者阼階上北面酬主人主人降席立于賔東賔坐奠觶拜執觶興主人答拜賔不祭卒觶立飲不拜不洗實之進東南面主人阼階上北靣拜賔少退主人進受觶賔主人之西北靣拜送同階拜送禮殺也賔揖就席以上賔酬主人主人以觶適西階上酬大夫大夫降席立于主人之西如賔酬主人之禮主人揖就席以上主酬僎若無大夫則長受酬亦如之主酬三賔鄉射無介故即及三賔司正升自西階相旅作受酬者曰某酬某子受酬者降席司正退立于西序端東面衆受酬者拜興飲皆如賔酬主人之禮辨遂酬在下者皆升受酬于西階上卒受者以觶降奠于篚司正降復位監旅酬訖以上旅酬使二人舉觶于賔與大夫二人主人之贊者舉觶為無算之始舉觶者皆洗觶升實之西階上北靣皆坐奠觶拜執觶興賔與大夫皆席末答拜席西靣南舉觶者皆坐祭遂飲卒觶興坐奠觶拜執觶興賔與大夫皆答拜舉觶者逆降洗升實觶皆立于西階上北靣東上賔與大夫拜舉觶者皆進坐奠于薦右坐奠之不敢親授也將飲者奠于右賔與大夫辭坐受觶以興舉觶者退反位皆拜送乃降賔與大夫反奠于其所興奠而不舉者不盡人之歡若無大夫則唯賔司正升自西階句阼階上受命于主人適西階上北靣請坐于賓賓辭以俎反命于主人主人曰請徹俎賔許司正降自西階階前命弟子俟徹俎弟子賔黨也司正升立于序端賔降席北靣主人降席自南方阼階上北靣大夫降席席東南靣賔取俎還授司正司正以降自西階賔從之降遂立于階西東靣司正以俎出授從者主人取俎還授弟子弟子受俎降自西階以東主人降自阼階西靣立大夫取俎還授弟子弟子以降自西階遂出授從者大夫從之降立于賔南衆賔皆降立于大夫之南少退北上以上徹俎主人以賔揖讓説屨乃升大夫及衆賔皆説屨升坐乃羞無算爵使二人舉觶賔與大夫不興取奠觶飲卒觶不拜執觶者受觶遂實之賔觶以之主人大夫之觶句長受句而錯實賔觶以之主人實大夫之觶以之三賔之長實主人之觶以之次賔勸酬交錯皆不拜辨卒受者興以旅在下者于西階上衆賔之末飲而酬主人之贊者大夫之末飲而酬賔黨亦錯焉長堂下之長受酬酬者不拜乃飲卒觶以實之受酬者不拜受辨旅皆不拜執觶者皆與旅卒受者以虛觶降奠于篚執觶者洗升實觶反奠于賔與大夫無算樂賔興樂正命奏陔賔降及階陔作賔出衆賔皆出主人送于門外再拜明日賔朝服以拜賜于門外主人不見如賔服遂從之拜辱于門外乃退主人釋服乃息司正無介句不殺句使人速句迎于門外不拜句入升不拜至不拜洗薦脯醢無俎賔酢主人主人不崇酒不拜衆賔既獻衆賔一人舉觶遂無算爵無司正賔不與徵唯所欲以告於鄉先生君子可也羞唯所有鄉樂唯欲記大夫與則公士為賔鄉飲以處士無爵者為賔雖有大夫不易賔此則用公士焉公士者在官之士不敢使鄉人加尊于大夫也使能不宿戒句其牲狗也狗取擇人亨于堂東北祖陽氣之所發尊綌幂賔至徹之蒲筵緇布純西序之席北上獻用爵其他用觶以爵拜者不徒作薦脯用籩五膱祭半膱橫于上醢以豆出自東房膱長尺二寸籩宜乾物豆宜濡物膱猶脡也古文為胾俎由東壁自西階升賔俎脊脅肩肺主人俎脊脅臂肺肺皆離皆右體也進腠凡舉爵三作而不徒爵獻賔獻大夫獻工皆有薦凡奠者於左將舉者於右衆賔之長一人辭洗如賔禮若有諸公則如賔禮大夫如介禮無諸公則大夫如賔禮樂作大夫不入樂正與立者齒三笙一和而成聲獻工與笙取爵于上篚既獻奠于下篚其笙則獻諸西階上立者東靣北上司正既舉觶而薦諸其位三耦者使弟子賔黨少者司射前戒之司射之弓矢與撲倚于西階之西司射既袒決遂而升司馬階前命張侯遂命倚旌明其並時而舉凡侯天子熊侯白質諸侯麇侯赤質大夫布侯畫以虎豹士布侯畫鹿豕凡畫者丹質射自楹間物長如笴從長三尺其間容弓上下射相離六尺距隨長武距隨者物橫畫也長一尺二寸中人之武也始以前足至東頭為距後足來合而南靣為隨序則物當棟堂則物當楣五架之屋正中曰棟次曰楣前曰庪命負侯者由其位司馬之命負侯也在已位遙命之以其賤也凡適堂西皆出入于司馬之南唯賔與大夫降階遂西取弓矢旌各以其物大夫五仞士三仞隨其所建不同無物士未命則無物則以白羽與朱羽糅雜而為之翿旌也杠長三仞以鴻脰韜上二尋杠橦也七尺曰仞八尺曰尋其旌之項如鴻脰凡挾矢於二指之間橫之左擘指拓弓右擘指鉤弦故挾矢以第二第三指司射在司馬之北司馬無事不執弓始射句獲而未釋獲句復句釋獲句復句用樂行之此總言三畨射節上射於右於右物射楅長如笴博三寸厚寸有半龍首其中蛇交句韋當當中也直心背之衣曰當以韋為之楅髤赤黑漆橫而奉之南靣坐而奠之取向也弟子持矢北靣故南靣奠之南北當洗與洗相當見東西之節射者有過則撻之衆賔不與射者不降取誘射之矢者既拾取矢而后兼誘射之乘矢而取之賔主人射則司射擯不使司馬擯者以其不主射事升降卒射即席而反位卒事鹿中髤句前足跪句鑿背容八算釋獲者奉之先首大夫降立于堂西以俟射大夫與士射袒纁襦不肉袒殊于耦耦少退于物以下大夫也既發則然司射釋弓矢視算與獻釋獲者釋弓矢視算及獻釋獲者獨此二事釋弓矢然則擯升降不釋矣禮射不主皮主皮之射者勝者又射不勝者降禮射雖三畨不中仍復升射主於習禮樂也主人亦飲于西階上獲者之俎折脊脅肺臑東方謂之右個釋獲者之俎折脊脅肺皆有祭大夫説矢束坐説之不自尊也歌騶虞若采蘋皆五終射無算此指衆賔故無數也堂上衆賔惟三人凡射每耦歌五終為節古者於旅也語今人言語無節古者旅而後語凡旅不洗不洗者不祭既旅士不入大夫後出下鄉人不干其賔主之禮主人送於門外再拜鄉侯上個五尋上個最上幅也用布四尺中十尺中方一丈應用布五尺侯道五十弓弓二寸以為侯中侯中大小取數于侯道弓弣把中側骨之處博二寸以侯道五十弓計之得一丈矣倍中以為躬中之上下幅謂躬倍中得二丈倍躬以為左右舌上個之左右出者謂之舌倍躬得四丈下舌半上舌箭籌八十十耦數長尺句有握句握素握本所持處也素謂刋之一作膚側手為膚膚四寸則籌長一尺四寸楚撲長如笴刋本尺刋其可持處君射則為下射上射退于物一笴既發則答君而俟對君以俟君樂作而后就物君袒朱襦以射小臣以巾執矢以授君尊不搢矢挾矢若飲君句如燕句則夾爵君在不勝之黨賔飲君如燕賔媵觚于公之禮君既卒爵復自酌謂之夾爵君國中射燕射則皮樹中句以翿旌獲句白羽與朱羽糅皮樹獸名以翿旌獲尚文德也於郊大射則閭中以旌獲閭獸名如驢一角析羽為旌於竟賔射則虎中龍旜通帛為旜大夫兕中各以其物獲唯君有射於國中其餘否大夫鄉射在國外君在大夫射則肉袒右鄉射儀禮古文其司正舉觶以前及旅酬以後俱與鄉飲酒禮大同小異故不重釋中間所次射禮文古似繁禮惟三射初畨請射先之司射之誘以樹射儀次之三耦之射以示耦法主賔遵士以下觀射而未親射也三耦訖射而設楅取矢以待次舉則初射之事畢矣次再請射而後賔與主耦遵與士耦遍比衆耦三耦復射而賔主人繼之大夫士衆賔又繼之委矢于楅釋算于中設豐以飲不勝于是乎獻獲獻釋獲而再射卒焉次又請射則奏貍首間若一所重在于射節而三耦衆耦節奏思比于樂矣而釋獲而設豐而立飲悉如前儀三射大略不過如斯記所謂始射獲而未釋獲復釋獲復用樂行之者也第其中登降節目紀載周詳其升射也當階北靣揖及階揖升堂揖當物揖及物揖其卒射也南靣揖階上揖降階揖與升射者交于階前相揖其取矢也揖而後進當楅北靣揖及楅揖取矢揖既拾取乘矢揖而左還南靣揖與進者相左相揖其升飲也進揖如升射立飲卒觶坐奠興揖與升飲者相左亦相揖其有所請于賔有所命于有司也司馬出于司射之南司射又由司馬之南其揚弓于物間也升自西階鉤楹由上射之後而出于下射之南旋其後其至于物間命取矢也又鉤楹自右物後而命之乃出左物之南而旋其後其命納射器也侯五十步乏參侯道三之一西五步旌設于侯西物在兩楹間楅當洗西中設于楅西豐設于西楹之西賔遵之弓在西序矢在弓下衆弓倚于堂西矢在弓上主弓在東序射則搢三挾一不射則釋弓脫決拾而襲取矢不挾兼諸弦弣其授弓矢也有司左執弣右執弦以授弓遂授矢其就楅橫弓取矢也上射卻手自弓下取矢下射覆手自弓上取矢其升飲也勝者張弓負者弛弓其張侯也未射則不繫左下綱中掩束之將射則繫綱脫束倚旌侯中誘射則旌不去侯耦射則命旌去侯取矢則以旌負侯飲觶則獲者祭侯三射訖則脫侯一器一物有品有式一進一退中矩中規禮所宜有經必載之經所已載禮無可易總之各有至義存焉其命射也初射則曰無射獲無獵獲以教三耦教三耦即所以教衆耦也再射則曰不貫不釋必貫鵠期中也貫鵠露鏃五射之所謂白矢也終射則曰不鼓不釋鼓為樂節即為射節魯鼓薛鼓是也不應鼓不釋算貴比樂也三命而射法滋益詳矣肄習有節次其教不可躐也其比耦也初射比三耦再射乃比衆耦三射第作上耦而已不比耦其耦仍舊貫也其再取矢也三耦取矢于楅主賔以下則執弓搢挾于堂西其時楅無餘矢故有司者授之再射卒則矢皆集楅矣故終射者皆取矢于楅也鹿中八籌籌具十耦一個一算釋獲司之上射釋右下射釋左先右後左二純一奇十純異委餘數則橫右先實手左先委地乃取賢獲告而設豐然而左右為朋不以一耦論勝負同而異和而不爭之道也統此三射儀節亦有異同設射設楅初射所獨也獻獲祭侯獻釋獲者再射所獨也以樂樂賔終射所獨也而賔主遵士衆賔皆射設中以算設豐以飲則再射終射同之比耦則初射再射同之揖讓升降之文則三射同之故經文初射詳再射更詳三射則略義備于前故文節于後也以其委微備著似覺禮繁然言之則緒分彼此行之則或舉並時如司射袒決遂而升則司馬遂命張侯命倚旌此已明載鄉射記中引類推之如初射之時樂正遷樂則三耦便可讓取弓矢如再射之時司射作耦取矢則主賔衆耦便可袒決搢挾又如司射命及不貫不釋則釋獲便可改實八算他如釋獲視算則弟子不妨設豐於西楹獲者就祭則司射不妨即獻於釋獲彼其司馬司射交錯於階前射者飲者相揖于登降各循所務禮不多端間習致行好古者當不以繁勞為病夫事莫不憚於先難而恬於熟習洪武頒降射儀維時天下初定民未知禮不得不姑從節略重熙纍洽禮樂當興是以南雍志重訂其儀然而有射無飲圖解儀注諸編亦既彬彬質有其文然亦有禮無樂鄭世子譜述樂舞却於儀禮亦未詳究今取鄉射古文略解大意列為圖説附之儀注若古之坐今之跪今之揖古之拜手不相襲禮稍為參會變通然取儀禮為凖樂章併訂義附願學俟精研禮樂者衷焉右陳設位次所與飲禮異者飲有介射無介飲無士射有士士位于衆賔中若遵非一人其耦亦非一士主賔遵衆賔位設皆同飲禮也張侯設乏畫物與夫弓矢決拾旌中籌楅豐納之設之各有定所其樂則飲禮歌瑟在堂磬在堂下笙入在磬南此射禮則磬縣在堂東南當洗東北靣向笙在磬縣之東以避射也歌與瑟初時亦在堂上及射遷於堂下當磬縣西飲禮登歌笙入間歌合樂凡四變射略于樂第合奏周南召南六詩而已先儒謂擊鼓作歌與射為節不必大合諸樂亦一説也通贊唱行鄉射禮又唱鳴鼓執事者擊鼓三通又唱司馬以下各就位立如圖通唱司射請射司射適堂西袒決遂乃取弓于階西左執弣右執弦挾四矢左鏃升自西階及楹北靣疑立司射告賓弓矢既具有司請射賔對云某不能為二三子許諾司射適阼階司射告主人請射于賔賔許告訖主人舉手揖司射西階降通唱命納射器司射從西降西靣向賔之弟子命納射器命訖司射復位弟子執事者過堂東各執射器降自阼階升自西階納于堂西內二人執丹堊畫物于堂上兩楹間其賔大夫之弓倚于西序矢在弓下北括主人之弓仍在東序之東衆弓倚于堂下西廉矢在其上及設決拾旌中籌楅豐于西方通唱比三耦三耦先俟于堂西南靣而立以東為上此時司射不釋弓矢往選次之就三耦之南北靣而立命上耦某御于子命訖相揖命下耦子與某子射命訖相揖次耦三耦以次比之命訖復位通贊唱司馬命張侯司馬出位至兩階間南向司馬命張侯侯去堂五十弓先時雖張侯于植然未繫左下綱而中掩左廂向東以俟至此執事者解脫其東將左下綱繫之于植司馬命獲者獲者係旌於侯執事者由西方取旌倚于侯中退立乏南通唱司馬延射司馬南靣立命唱僨軍之將亡國之大夫與為人後者不入其餘皆入延訖復位通唱揚觶一人取觶下篚升自西階北靣而立揚觶云幼壯孝弟耆耄好禮不從流俗修身以俟死者不句在此位揚訖賔以下皆揖揚觶者西階降又一人升如前揚觶云好學不倦好禮不變旄期稱道不亂者不句在此位揚訖揖如前西階降通唱樂正命遷樂樂正適西階靣西命弟子云遷樂于堂下執事者相工遷堂上之樂于阼階東南九尺磬縣之西先歌次瑟北上樂正立于其南北靣通贊唱司射誘射司射挾弓矢北靣向三耦立命三耦各與耦讓取弓矢拾司射退立于將設中位之西南東靣立三耦皆袒決遂執事者以弓矢次第授之三耦各執弓搢三矢挾一矢進由司射之西立于其西南是為射位東靣北上而俟贊唱司射揖進升射司射東靣搢三挾一由三耦之北進當階北靣揖及階揖升堂揖當左物北靣揖及物揖先以左足履物次足未並旋視侯中俯正其足乃以兩足並立于物橫畫之上通唱發矢司射連發四矢左執弓右執絃南靣揖階上向西及西階向南揖降階揖出于其位南轉西揖乃北適堂西改取一矢挾之適階西取撲搢之司射之弓矢及撲先時倚于西階之西以上比耦揚觶誘射通贊唱行初射禮司馬就于本位轉身南向命獲云獲者執旌負侯獲者適侯執旌負侯而俟通唱司射作射司射又轉身西向對上耦舉弓矢命之云三耦以次升射命訖相揖反位上耦乃揖而進上射在左與下射並行當階北靣揖及階揖上射先升三等下射隨之間一等上射升堂少左下射亦升與上射揖並行皆當其物北靣揖及物揖皆以左足履物旋視侯中合足而俟如誘射者通唱司馬揚弓命侯司馬適堂西執弓繞出司射之南自西階升鉤楹由上射之後立於物間西南向右手執弓弰左手執弓弣南揚弓命之云去侯獲者執旌應曰諾聲不絶以至于乏司馬出下射之南轉東旋于其後降自西階反由司射之南上至堂西釋弓而襲以復其位其獲者將至于乏通贊即唱命射通唱司射命射司射進與司馬交于階前相左揖由堂下西階之東視上射而命之云無射獲無獵獲上射揖司揖反位右言負侯者令射者得見之有志于中也言去侯者將射故令獲者離去侯位以避之通贊唱發矢上耦乃射遞發四矢每中一矢則獲者舉旌唱曰獲其聲皆舉旌以宫偃旌以商射訖皆執弓南靣而揖如升射之禮上射先降階下射出上射之後進而西居其右並行遇升射者相交于階前則揖于是南出司馬之南轉而北適堂之西釋其弓脫其決拾襲而俟皆南靣以東為上二耦三耦升降亦如之司射去撲倚堂西升堂告賔云三耦卒射賔揖司射乃降搢撲反位通唱命取矢司馬適堂西袒執弓聽司射告卒射即自其位南進與司射交于階前相左升自西階鉤楹自右物之後立于物間西南靣揖弓以命云取矢獲者執旌應諾其聲不絶以旌負侯而俟通唱命設楅司馬出左物之南繞其後降自西階遂適堂前北靣立于所設楅南命云設楅執事者自堂西橫舉楅出于司射之南適司馬所立之北南靣設楅于中庭司馬亦由司射之南而北釋弓于堂西襲而反位執事者取矢由侯道進至楅前北靣委矢于交蛇韋當之上矢羽向北乃揖而退立于西方司馬襲進當楅北靣跪左右手撫矢四四分之置于韋當興若矢不備則執弓仍升鈎楹立于物間云取矢不索執事者自西方應諾復求矢加于楅以上再射通贊唱行再射禮司射將撲倚于階西升階請射于賔云有司請再射賔許云某雖不能願學禮樂乃相揖司射適阼階告主人云請再射于賔賔許揖訖復靣遵請云敢請再射遵答如賔答訖相揖復以告主云遵賔皆與射請與賔射請訖相揖復告賓云主與賔為耦請訖相揖復告遵云士某御于遵請訖相揖復告衆賓云衆賔繼射西階告之告訖揖降而搢撲衆賔皆降立堂西司射由司馬之南適堂西立比衆耦命士云子與遵射命衆賓云某子與某子為耦衆耦皆執弓矢繼三耦而立南靣以東為上遵之耦在于上主賔遵皆未降司射比耦已遍遂命三耦云三耦以次取矢命訖相揖復位三耦袒決遂執弓以次繼立于司馬之西南射位司射又左旋向上耦命之云取矢于楅司射反位上耦揖當楅北靣揖及楅揖左右轉身上射東靣下射西靣上射揖進坐橫弓却手自弓下取一矢兼諸弣興執弦而左旋退反位東靣以揖下射令取矢下射進坐橫弓覆手自弓上取一矢餘如上射乃相繼遞取四矢相揖左旋南靣而揖少進當楅南左旋北靣揖搢三挾一揖左旋南行上射在右轉而西與進者相左相揖反位三耦以次取矢亦如之後耦取誘射之矢兼乘矢而取之以授有司于西方而後反位衆賔亦袒決遂執弓搢三挾一由堂西進繼三耦之南而立東靣北上遵之耦為上司射命上耦云升射命訖揖復位一耦揖升履物立定司馬如前升至物間揚弓而命云去侯獲者諾執旌退立乏南偃旌俟司馬降反位司射告賓請釋獲以校勝負司射挾一矢去撲與司馬交于階前乃請釋獲賔答云别賢否昭賞罰揖司射降司射搢撲西靣立于中位之東北靣命釋獲者云設中遂視而教之釋獲者執鹿中一人執籌以從俱自堂西繞司馬之南而北至中位釋獲者跪而設中東首南當楅西當西序東靣興旋北靣受算于執籌者反東靣坐實八籌于中其餘橫置于中西南末興拱而俟司射遂進由堂下北面而命上射云不貫不釋上射揖司射反位釋獲者坐取中之八籌右手改實八籌于中興執所取之籌而俟通唱發矢乃發矢每中一矢則釋獲者置一籌于地上射于中之南下射于中之北若有餘籌則反委于中之西改實八籌于中興而俟通贊唱賔主降射三耦射訖請賔主射司射去撲升西楹間揖云請降遂前導降西階賔主僎皆揖各由其階降主人就堂東袒決遂有司授弓搢三矢挾一矢賔就堂西亦如之皆由其階階下揖升堂揖主人為下射賔為上射當物北靣揖及物揖乃射射訖南靣揖皆由其階階上揖降階揖賔于序西主人于序東皆釋弓脫決拾而襲反位升及階揖升堂揖皆就席通唱僎士衆賔行射司射適堂西靣遵而揖云請射大夫止于西階袒決遂執弓搢挾由堂西出于司射之南就其耦大夫為下射揖而進其耦少退以讓大夫揖如三耦及階則耦先升既卒射揖如升射耦先降降階耦少退皆釋弓于堂西襲耦則止于堂西大夫則升就席以上皆司射相之既就席司射降搢撲反位衆賔繼射升降釋獲皆如三耦射訖釋獲者以所執餘獲升自西階盡階不升堂告賓云左右卒射揖降反位坐委餘獲于中西興拱而俟通唱司馬約矢司馬袒執弓命取矢如初獲者許諾以旌負侯如初司馬釋弓反位弟子委矢如初惟别束大夫矢以茅司馬乘之如初通贊唱司射視算通贊唱飲不勝者司射適堂西命子弟云設豐執事者奉豐升設于西楹之西南靣乃降司射在堂西命勝黨云洗觶升酌執事者南行東轉洗觶由阼階升酌酒于觶適豐南靣坐奠于豐上興司射降自西階袒執弓反位遂挾一矢搢撲北靣于三耦之南命三耦及衆賔云勝者執張弓不勝者執弛弓衆耦皆降執張弓者袒決遂執弛弓者脫決拾而襲司射先反位衆射者耦耦同進南立于射位北上司射西靣命云勝者揖不勝者升飲命訖復位一耦進揖如射揖及階則勝者先升堂少右北靣立于觶東不勝者進北靣跪左執弓右手取豐上之觶興少退立飲卒觶仍跪奠觶于豐興揖不勝者先降勝者稍後與升飲者相左交于階前相揖出司馬南適堂西襲而俟執爵者再實觶奠于豐上升飲者如初三耦卒飲若賔主大夫不勝則不執弓執爵者取觶降洗升實之授于席前當飲者受其觶仍適西階上北靣立飲卒觶授執爵者反就席若大夫飲則耦不升若大夫之耦不勝則亦執弛弓特升飲衆賔繼飲訖設豐者反豐于堂西執爵者反觶于篚通贊唱司馬獻獲者司馬洗爵升酌酒降自西階從侯道南行獻獲者于侯獲者受爵北靣拜司馬西靣拜通唱薦脯醢設折俎三祭獲者負侯北靣受爵司馬西南送爵俱揖獲者遂執爵適侯右介其設薦俎者執薦與俎從之設籩在東豆在西俎在北獲者南向跪左手執爵右手祭脯醢執爵興取肺跪祭遂祭酒興次就左個祭次就中祭皆如其儀又于左個西北三步東靣設薦俎獲者就其薦右立飲司馬受其爵以奠下篚復位獲者執其薦設俎者從之避于乏南獲者負侯而俟通唱司射獻釋獲者司射適階西釋弓矢去撲脫決拾襲適洗洗爵升酌酒降自西階獻釋獲者于其位隨唱獻脯醢設折俎設訖釋獲者薦右東靣受爵司射北靣送爵俱揖釋獲者跪祭同獲者而立飲于司射之西北靣司射受其爵奠下篚釋獲者稍西避薦反位按此獻獲者古禮也今時不用俎豆亦不祭肺則此禮可省以上皆再射之事通贊唱行終射禮司射適堂西袒決遂取弓于階西搢三矢挾一矢搢撲反位倚撲于階西升堂告賔云有司請終射賔曰某雖不能願習禮樂揖司射適阼階告主人云請射于賔賔許揖降由司馬之南適堂西命三耦及衆賔命云衆耦皆袒決遂執弓就位命訖先反位三耦及衆賔皆袒決遂執弓各與其耦進復立于射位司射轉向上耦命云拾取矢取矢儀如初取訖反位司射去撲升自楹間揖云請降司射遂相賔主遵降揖如初主人于堂東賔于堂西皆袒決遂執弓皆進階前揖及楅東西對揖遞取矢如三耦儀取四矢訖北靣搢三挾一揖退主人堂東賔堂西皆釋弓矢襲及階揖升堂揖就席遵亦降詣堂西袒決遂執弓就其耦于射位相揖同進如三耦之儀耦東靣遵西靣遵進至楅坐脫矢束以俟其耦之遞取也耦進不敢遞取遂總取四矢揖遵進亦總取四矢如其耦皆北靣搢三挾一個揖而退其耦反位遵則詣序西釋弓矢襲升即席其衆賔相繼拾取矢皆如三耦之儀取訖各反位司射命上耦升射司射挾一個進命之一耦揖升履物如初司馬命獲者去侯獲者諾而就乏如初司馬降釋弓矢反位通唱司射請樂司射就堂西倚撲襲與司馬交于階前升階告賓云請以樂樂于賔賔對曰惟命揖司射適阼階上告主人云請樂于賔賔許揖降階搢撲東靣命樂正云請以樂樂於賔賔許樂正北靣應曰諾司射遂適階前堂下北靣對上射命云不鼓不釋上射揖司射反位樂正轉身東靣命樂工云奏騶虞間若一樂工皆應曰諾乃作樂先播鼗三通節以舂牘摶拊每八節為一通如後譜乃歌奏樂每句一節每節皆先擊􅉧鼓次擊應鼓繼擊鼓次擊應鼓又一鼓一應一鼓一應為一終之節此五節皆以聽不發矢又奏一句而擊􅉧一聲上射一發擊應一聲下射一發次擊鼓上射發次擊應下射發如是遞發四矢皆與鼓聲相應應節而中則獲者舉旌而唱曰獲釋獲者置算如初三耦射訖司射相賔主遵揖降升射作樂發矢釋獲卒射皆如初衆賔繼射釋獲如初通射訖釋獲者執餘獲升告云左右卒射司馬命取矢獲者諾司馬降釋弓反位弟子委矢司馬乘之皆如初通唱視釋算獲者釋算司射視之皆算訖以賢獲告如再射之儀通唱飲不勝者司射命賓弟子設豐命勝黨云洗觶升酌命三耦衆賓云勝者執張弓不勝者執弛弓又勝者揖不勝者升飲升飲之禮皆如再射司射尚袒決遂左執弓右執一個并矢于弦而上其鏃適堂西北靣命拾取矢如初乃反位去撲升堂告賔主人及僎云請降司射遂相賔主僎降及衆賔皆袒決遂拾取矢于楅如初其矢不挾以一矢兼弦三矢兼弣以鏃向上退不反位遂授有司于堂西賔主東西階前對立俟衆耦俱拾取矢揖賔主遵及堂上之賔皆升就席司射乃適堂西釋弓去撲脫決拾反位司馬出本位至中階南靣命弟子云釋侯執事者應諾脫侯之左下綱而釋之命獲者云退旌獲者諾以旌退司馬轉身向北命弟子云退楅執事者奉楅退司馬反位司射退立于鹿中之南北靣命云退中與算凡退皆俟于堂西備復射也獲者釋獲者亦退其薦俎以上皆終射之事通贊唱行旅酬禮又唱司馬反為司正司正退復階上觶南立以監旅酬樂正命工就位工升自西階稍東北靣立先歌次瑟俱北靣東上合樂無算通唱賔酬主自此以後其儀俱同鄉飲其酬大夫之禮與飲禮酬介相同二人舉觶徹俎坐飲勸酬錯旅在下者執觶者皆與旅卒受者以虛觶降奠于篚執觶者洗升實觶反奠于賔與大夫樂奏無算爵亦無算醉乃止賔出奏陔以上儀注及迎賔至立司正合行禮節皆與鄉飲相同故不重及鄉射樂譜儀禮有瑟無琴今併琴入譜蓋瑟久失傳無瑟即代以琴可也初耦進射儀禮經文明云奏騶虞間若一而南雍志但譜采蘩蓋泥于大夫之節未繹經義故也今改正悉譜諸詩樂正倡贊奏騶虞間若一五節牘搏拊牘搏拊牘搏拊牘搏拊播牘鞉第牘一通牘止牘搏播拊鞉搏第拊二搏通拊止搏拊牘搏拊牘搏拊牘搏拊牘搏拊播鞉第三通止第一節牘搏拊牘搏拊牘搏拊牘搏拊􅉧牘牘應牘牘搏鼓拊搏拊搏應拊搏拊牘搏拊牘搏拊牘搏拊牘搏拊鼓牘牘應牘牘搏鼓拊搏拊搏應拊搏拊第二節牘搏拊牘搏拊牘搏拊牘搏拊􅉧牘牘應牘牘搏鼓拊搏拊搏應拊搏拊牘搏拊牘搏拊牘搏拊牘搏拊鼓牘牘應牘牘搏鼓拊搏拊搏應拊搏拊第三節牘搏拊牘搏拊牘搏拊牘搏拊􅉧牘牘應牘牘搏鼓拊搏拊搏應拊搏拊牘搏拊牘搏拊牘搏拊牘搏拊鼓牘牘應牘牘搏鼓拊搏拊搏應拊搏拊第四節牘搏拊牘搏拊牘搏拊牘搏拊􅉧牘牘應牘牘搏鼓拊搏拊搏應拊搏拊牘搏拊牘搏拊牘搏拊牘搏拊鼓牘牘應牘牘搏鼓拊搏拊搏應拊搏拊第五節已上五牘搏拊牘搏拊牘搏拊牘搏拊節先聽􅉧牘牘應牘牘搏鼓拊搏拊搏應拊搏拊牘搏拊牘搏拊牘搏拊牘搏拊鼓牘牘應牘牘搏鼓拊搏拊搏應拊搏拊牘搏拊牘搏拊牘搏拊牘搏拊初箭應􅉧牘牘應牘牘次箭應搏鼓拊搏拊搏應拊搏拊牘搏拊牘搏拊牘搏拊牘搏拊三箭應鼓牘牘應牘牘四箭應搏鼓拊搏拊搏應拊搏拊射樂所重在節章句一定而節則隨其等殺用之如騶虞一詩用之天子則九節用之鄉射則五節詩句不足則咏歎後二句以足之故九節七節之詩即五節之詩也若衆賔數多則一章四句之詩復奏後韻即足一耦又在臨期酌量初不泥定一法頖宫禮樂疏卷十
